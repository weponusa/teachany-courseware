name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'community/pending/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 构建发布目录（scripts/build-publish-site.sh，含 19000 文件门禁）
      - name: Build publish directory
        run: bash scripts/build-publish-site.sh _site

      # 增量部署到 gh-pages：先 clone 现有分支，rsync 更新，只 push 差异
      - name: Deploy to gh-pages (incremental)
        run: |
          set -euo pipefail
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          # 尝试 clone 已有的 gh-pages 分支（shallow clone 减少传输量）
          if git clone --depth 1 --branch gh-pages "$REPO_URL" _deploy 2>/dev/null; then
            echo "✅ Cloned existing gh-pages branch"
          else
            echo "⚠️ gh-pages branch not found, creating fresh"
            mkdir _deploy && cd _deploy && git init && cd ..
          fi

          cd _deploy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 同步 _site 内容到 _deploy（删除不再存在的文件）
          rsync -a --delete --exclude='.git/' ../_site/ ./

          touch .nojekyll
          git add -A
          CHANGES=$(git diff --cached --numstat | wc -l | tr -d ' ')
          echo "Changed files: $CHANGES"

          if [ "$CHANGES" -eq 0 ]; then
            echo "✅ No changes to deploy"
            exit 0
          fi

          # 显示摘要（用 diff --stat 避免 SIGPIPE）
          git diff --cached --stat | tail -5 || true
          git commit -m "deploy: ${{ github.event.head_commit.message || 'manual deploy' }}"
          git push origin HEAD:gh-pages
          echo "✅ Deployed successfully ($CHANGES files changed)"

      # teachany.cn 由 Cloudflare Pages 连接 gh-pages 分支提供静态文件（非 main 直出）
