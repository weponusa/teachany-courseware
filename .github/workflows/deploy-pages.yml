name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'community/pending/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 构建纯净的发布目录 _site/。
      # 注意：不要发布顶层 scripts/，GitHub Pages 对该路径构建失败；官方课件改用本地 assets/scripts 或课件根目录脚本。
      - name: Build publish directory
        run: |
          mkdir -p _site

          # 1. 复制课件目录（运行时模块走站点根 /assets/scripts/，不重复打包每课副本）
          rsync -a --exclude='remotion/' --exclude='*/assets/scripts/' community/ _site/community/

          # 2. 复制静态资源。顶层 physical 大底图未被课件直接引用，排除以避免 Pages 超限。
          rsync -a --exclude='maps/physical/' assets/ _site/assets/

          # 3. 复制数据目录，并移除本地 Python 虚拟环境、断链符号链接与 kp 备份（避免 Pages 2 万文件上限）
          rsync -a --exclude='.venv/' --exclude='history' --exclude='geography' --exclude='kp/_backups/' data/ _site/data/

          # 4. 复制根级文件
          touch _site/.nojekyll
          cp 404.html _site/ 2>/dev/null || true
          cp index.html _site/ 2>/dev/null || true
          cp courseware-registry.json _site/ 2>/dev/null || true
          cp registry.json _site/ 2>/dev/null || true
          cp registry-v2.json _site/ 2>/dev/null || true
          cp commercial-license.html _site/ 2>/dev/null || true
          cp pbl.html _site/ 2>/dev/null || true
          cp tree.html _site/ 2>/dev/null || true
          cp knowledge-map.html _site/ 2>/dev/null || true
          cp path.html _site/ 2>/dev/null || true
          cp my.html _site/ 2>/dev/null || true
          cp license.html _site/ 2>/dev/null || true
          cp imported-course.html _site/ 2>/dev/null || true
          cp reading.html _site/ 2>/dev/null || true

          # 5. 复制阅读学院
          rsync -a reading-academy/ _site/reading-academy/

          echo "✅ _site/ built successfully"
          echo "Top-level:"
          ls _site/
          echo "Approx publish size:"
          du -sh _site

      # 增量部署到 gh-pages：先 clone 现有分支，rsync 更新，只 push 差异
      - name: Deploy to gh-pages (incremental)
        run: |
          set -euo pipefail
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          # 尝试 clone 已有的 gh-pages 分支（shallow clone 减少传输量）
          if git clone --depth 1 --branch gh-pages "$REPO_URL" _deploy 2>/dev/null; then
            echo "✅ Cloned existing gh-pages branch"
          else
            echo "⚠️ gh-pages branch not found, creating fresh"
            mkdir _deploy && cd _deploy && git init && cd ..
          fi

          cd _deploy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 同步 _site 内容到 _deploy（删除不再存在的文件）
          rsync -a --delete --exclude='.git/' ../_site/ ./

          touch .nojekyll
          git add -A
          CHANGES=$(git diff --cached --numstat | wc -l | tr -d ' ')
          echo "Changed files: $CHANGES"

          if [ "$CHANGES" -eq 0 ]; then
            echo "✅ No changes to deploy"
            exit 0
          fi

          # 显示摘要（用 diff --stat 避免 SIGPIPE）
          git diff --cached --stat | tail -5 || true
          git commit -m "deploy: ${{ github.event.head_commit.message || 'manual deploy' }}"
          git push origin HEAD:gh-pages
          echo "✅ Deployed successfully ($CHANGES files changed)"

      # teachany.cn 由 Cloudflare Pages 连接 gh-pages 分支提供静态文件（非 main 直出）
