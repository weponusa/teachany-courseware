name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'community/pending/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 构建纯净的发布目录 _site/。
      # 注意：不要发布顶层 scripts/，GitHub Pages 对该路径构建失败；官方课件改用本地 assets/scripts 或课件根目录脚本。
      - name: Build publish directory
        run: |
          mkdir -p _site

          # 1. 复制课件目录（官方课件已经内置运行时模块）
          cp -r community _site/community

          # 2. 复制静态资源
          cp -r assets _site/assets

          # 3. 复制数据目录
          cp -r data _site/data

          # 4. 复制根级文件
          touch _site/.nojekyll
          cp 404.html _site/ 2>/dev/null || true
          cp courseware-registry.json _site/ 2>/dev/null || true
          cp commercial-license.html _site/ 2>/dev/null || true

          # 5. 复制归档目录（如果存在）
          [ -d "_archive_20260508" ] && cp -r _archive_20260508 _site/_archive_20260508 || true

          echo "✅ _site/ built successfully"
          echo "Top-level:"
          ls _site/

      # 直接使用 git 命令部署，绕过 peaceiris 的任何隐含行为
      - name: Deploy to gh-pages via git
        run: |
          cd _site
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          echo "Staged files count: $(git status --short | wc -l)"
          echo "Top-level staged entries:"
          git status --short | head -20
          git commit -m "deploy: ${{ github.event.head_commit.message }}"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages
