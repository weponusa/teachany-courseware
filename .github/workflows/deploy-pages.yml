name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'community/pending/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 清理 scripts/ 目录：只保留运行时前端模块（.js/.css/.json），
      # 删除构建脚本（.py/.sh/.cjs）和子目录，防止 exclude_assets glob 干扰。
      - name: Clean scripts/ to runtime-only
        run: |
          cd scripts
          # 删除所有非运行时文件
          find . -maxdepth 1 -type f \( -name "*.py" -o -name "*.sh" -o -name "*.cjs" -o -name "*.txt" -o -name "*.log" \) -delete
          # 删除子目录（如 content/）
          find . -maxdepth 1 -type d ! -name "." -exec rm -rf {} +
          echo "✅ scripts/ cleaned. Remaining files:"
          ls -la

      # 大仓库使用 branch-source 增量部署：Pages 设置为 Deploy from a branch → gh-pages / root。
      # 不走 actions/deploy-pages artifact 全量上传。
      - name: Deploy incrementally to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: ${{ github.event.head_commit.message }}'
          # scripts/ 已在上一步清理为纯运行时文件，这里不再需要 *.py 等规则影响它。
          # 只排除根目录级的维护文件和 CI/依赖目录。
          exclude_assets: '.github,node_modules,__pycache__,*.py,*.pyc,*.sh,*.cjs,*.txt,*.log'
