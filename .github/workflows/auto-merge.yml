name: Auto Merge Community PR

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-merge:
    if: >
      github.event.label.name == 'passed-validation' &&
      github.event.pull_request.state == 'open'
    runs-on: ubuntu-latest
    steps:
      - name: Merge validated community PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = pr.labels.map(l => l.name);
            if (!labels.includes('community-courseware')) {
              console.log('Skip: not a community-courseware PR');
              return;
            }
            if (labels.includes('needs-revision') || labels.includes('do-not-merge')) {
              console.log('Skip: PR needs revision or is blocked');
              return;
            }
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: 'squash',
              commit_title: `${pr.title} (auto-merge)`,
              commit_message: `自动合并：社区课件质检通过。\n\nPR #${pr.number}\n作者：${pr.user.login}`,
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: '🎉 **已自动合并**\n\n接下来 `community-publish.yml` 会自动解包、运行 `rebuild-index.py` 注册课件，并部署到 `https://www.teachany.cn/`。',
            });
