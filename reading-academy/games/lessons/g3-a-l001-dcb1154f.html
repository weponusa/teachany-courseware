<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大青树下的小学互动挑战</title>
<style>
:root{--bg:#0e1710;--panel:#19281d;--panel2:#203326;--gold:#e1bc62;--ink:#fff7e2;--muted:#c2cfb6;--line:rgba(225,188,98,.24);--ok:#62d99a;--no:#e98175}
*{box-sizing:border-box}html,body{margin:0}body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:radial-gradient(900px 520px at 50% -10%,#35523b 0%,transparent 62%),radial-gradient(900px 520px at 100% 100%,#2b3d2f 0%,transparent 55%),var(--bg);color:var(--ink);min-height:100vh}.stars{position:fixed;inset:0;pointer-events:none;opacity:.45}.wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:18px 16px 58px}.top{display:flex;align-items:center;gap:12px;margin-bottom:14px}.crest{width:48px;height:48px;border-radius:14px;overflow:hidden;border:1px solid var(--line);display:grid;place-items:center;padding:0;background:#111}.crest img{width:100%;height:100%;object-fit:cover;display:block}.title h1{font-size:19px;margin:0}.title p{margin:3px 0 0;font-size:12px;color:var(--muted)}.badge{margin-left:auto;font-size:12px;color:var(--gold);background:rgba(225,188,98,.1);border:1px solid var(--line);border-radius:999px;padding:6px 12px}.steps{display:flex;gap:6px;margin:0 0 16px}.step{flex:1;height:6px;border-radius:999px;background:rgba(255,255,255,.08)}.step.done{background:var(--gold)}.step.cur{background:linear-gradient(90deg,var(--gold),rgba(225,188,98,.2))}.card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 22px 56px rgba(0,0,0,.34)}.stage{position:relative;width:100%;aspect-ratio:16/10;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#111831;margin-bottom:15px}.stage img{width:100%;height:100%;object-fit:cover;display:block}.stage .loading{position:absolute;inset:0;display:grid;place-items:center;color:var(--muted);background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(0,0,0,.18));text-align:center;padding:20px}.scene-tag{display:inline-block;font-size:12px;color:var(--gold);background:rgba(225,188,98,.1);border:1px solid var(--line);border-radius:999px;padding:5px 12px;margin-bottom:14px}.story{font-size:15px;line-height:1.9;margin:0 0 12px}.story em{font-style:normal;color:var(--gold)}.qbox{margin-top:16px;padding-top:16px;border-top:1px dashed var(--line)}.q{font-size:18px;font-weight:800;line-height:1.65;margin:0 0 4px}.hint{font-size:12px;color:var(--muted);margin:0 0 12px}.opts{display:grid;gap:10px}.opt{text-align:left;font-size:14px;line-height:1.55;padding:14px 15px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--ink);cursor:pointer;font-family:inherit}.opt:hover{border-color:var(--gold);background:rgba(225,188,98,.08)}.opt.ok{border-color:var(--ok);background:rgba(98,217,154,.14);color:#c8f7df}.opt.no{border-color:var(--no);background:rgba(233,129,117,.14);color:#ffd0ca}.feedback{display:none;margin-top:14px;padding:14px 15px;border-radius:14px;font-size:13px;line-height:1.8;border:1px solid var(--line);background:rgba(225,188,98,.07)}.feedback.show{display:block}.nav{display:flex;gap:10px;margin-top:16px}button{font-family:inherit}.btn{flex:1;border:0;border-radius:14px;padding:13px;font-size:14px;font-weight:800;cursor:pointer}.btn-primary{background:linear-gradient(180deg,var(--gold),#bd9343);color:#241b08}.btn-primary:disabled{opacity:.45;cursor:default}.btn-ghost{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--line)}.end{text-align:center;padding:10px 0}.end h2{color:var(--gold);font-size:26px;margin:8px 0}.blurb{font-size:15px;line-height:1.9;color:var(--ink)}.create{margin-top:18px;text-align:left;border:1px solid var(--line);border-radius:18px;padding:16px;background:rgba(255,255,255,.05)}.create h3{margin:0 0 8px;color:var(--gold)}.create p{margin:0 0 12px;color:var(--muted);line-height:1.75;font-size:13px}.prompt-row{display:flex;gap:8px}.prompt-row input{flex:1;border:1px solid var(--line);border-radius:12px;background:rgba(0,0,0,.22);color:var(--ink);padding:12px;font:inherit}.image-box{display:none;margin-top:14px;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#111}.image-box img{display:block;width:100%;height:auto}.image-caption{padding:10px 12px;color:var(--muted);font-size:12px;line-height:1.6}@media(max-width:640px){.wrap{padding:12px 10px 42px}.card{padding:16px;border-radius:16px}.prompt-row{display:grid}}
</style>
<link rel="icon" href="../../assets/teachany-icon.png" type="image/png">
</head>
<body>
<canvas class="stars" id="stars"></canvas>
<div class="wrap">
  <div class="top"><div class="crest"><img src="../../assets/teachany-icon.png" alt="TeachAny"></div><div class="title"><h1>大青树下的小学互动挑战</h1><p>3年级上册 · 阅读侦探</p></div><span class="badge" id="scoreBadge">积分 0</span></div>
  <div class="steps" id="steps"></div>
  <div class="card" id="scene"></div>
</div>
<script>
const DATA={"item": {"kind": "lesson", "grade": 3, "volume": "上册", "no": 1, "title": "大青树下的小学", "writing": "晨绒球汉艳服装扮读静停粗影", "literacy": "坝汉艳扮扬读摔跤凤洁"}, "levels": [{"tag": "第1关·民族团结", "img": "", "story": "清晨阳光洒在校园，不同民族的小朋友汇聚在一起。", "q": "课文中提到哪些民族的小学生一起来上学？", "hint": "看第一句列举的民族。", "opts": [{"t": "A", "c": true}, {"t": "B", "c": false}, {"t": "C", "c": false}, {"t": "D", "c": false}], "fb": "你真棒！记住了所有民族名称。", "image": "/assets/generated-scenes/dcb1154f-01-62851bf0ba.webp"}, {"tag": "第2关·窗外动静", "img": "", "story": "上课铃响后，同学们开始朗读课文，窗外变得很安静。", "q": "上课时，窗外的鸟儿和蝴蝶表现怎么样？", "hint": "找文中描写动物行为的词。", "opts": [{"t": "A", "c": false}, {"t": "B", "c": true}, {"t": "C", "c": false}, {"t": "D", "c": false}], "fb": "回答正确！它们都在静静听讲。", "image": "/assets/generated-scenes/dcb1154f-02-ecf0c6a8ac.webp"}, {"tag": "第3关·课间活动", "img": "", "story": "下课了，同学们来到大青树下尽情玩耍，气氛热烈。", "q": "为什么课文说树枝不摇、鸟儿不叫、蝴蝶停下？", "hint": "想想它们是被什么吸引住了。", "opts": [{"t": "A", "c": false}, {"t": "B", "c": false}, {"t": "C", "c": true}, {"t": "D", "c": false}], "fb": "没错！是被好听的声音吸引了。", "image": "/assets/generated-scenes/dcb1154f-03-898d58c383.webp"}, {"tag": "第4关·地点特征", "img": "", "story": "这所小学不仅美丽，还很有特色，位于祖国的边疆。", "q": "从哪些细节可以看出这是一所边疆小学？", "hint": "结合民族多样性和活动内容判断。", "opts": [{"t": "A", "c": false}, {"t": "B", "c": true}, {"t": "C", "c": false}, {"t": "D", "c": false}], "fb": "分析得很到位！体现了边疆特色。", "image": "/assets/generated-scenes/dcb1154f-04-cd362fd223.webp"}, {"tag": "第5关·情感体会", "img": "", "story": "无论上课还是下课，这所学校都充满了快乐与和谐。", "q": "这篇课文主要表达了作者怎样的情感？", "hint": "关注学校氛围和同学关系。", "opts": [{"t": "A", "c": false}, {"t": "B", "c": false}, {"t": "C", "c": false}, {"t": "D", "c": true}], "fb": "完全正确！感受到了爱国爱校之情。", "image": "/assets/generated-scenes/dcb1154f-05-47654c13f4.webp"}], "theme": {"id": "detective", "name": "阅读侦探", "role": "侦探", "place": "线索板", "icon": "⌕"}};
let state={idx:0,score:0,answered:false};
const $=s=>document.querySelector(s), scene=$('#scene'), steps=$('#steps'), scoreBadge=$('#scoreBadge');
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function onSceneImgError(img){
const loading=img.previousElementSibling;
const prompt=decodeURIComponent(img.dataset.imgPrompt||'')||'reading scene';
(async()=>{try{img.src=await agnesImage(prompt)}catch(e){if(loading)loading.textContent='插画加载失败，继续答题吧～'}})();
}

function renderSteps(){steps.innerHTML='';DATA.levels.forEach((_,i)=>{const d=document.createElement('div');d.className='step'+(i<state.idx?' done':'')+(i===state.idx?' cur':'');steps.appendChild(d)})}
function renderLevel(){renderSteps();scoreBadge.textContent='积分 '+state.score;state.answered=false;const lv=DATA.levels[state.idx];const hasImg=lv.image||lv.img;let imgHtml='';if(hasImg){const imgSrc=(lv.image||'').replace(/^\.\.\/\.\.\//,'/');imgHtml='<div class="stage"><div class="loading">正在打开阅读插画…</div><img alt="场景插画" src="'+imgSrc+'" data-img-prompt="'+encodeURIComponent(lv.img||'')+'" onerror="onSceneImgError(this)" onload="if(this.previousElementSibling)this.previousElementSibling.remove()"></div>';}scene.innerHTML=`<span class="scene-tag">${lv.tag}</span>${imgHtml}<p class="story">${lv.story}</p><div class="qbox"><p class="q">${lv.q}</p><p class="hint">${lv.hint}</p><div class="opts" id="opts"></div><div class="feedback" id="feedback"></div></div><div class="nav"><button class="btn btn-ghost" id="prevBtn" ${state.idx===0?'style="display:none"':''}>← 上一关</button><button class="btn btn-primary" id="nextBtn" disabled>${state.idx===DATA.levels.length-1?'查看结果 ✦':'下一关 →'}</button></div>`;const opts=$('#opts');shuffle(lv.opts.slice()).forEach(o=>{const b=document.createElement('button');b.className='opt';b.textContent=o.t;b.onclick=()=>answer(b,o,lv);opts.appendChild(b)});$('#nextBtn').onclick=()=>{state.idx===DATA.levels.length-1?showEnd():(state.idx++,renderLevel())};const prev=$('#prevBtn');if(prev)prev.onclick=()=>{state.idx--;renderLevel()}}
function answer(btn,opt,lv){if(state.answered)return;state.answered=true;document.querySelectorAll('.opt').forEach(b=>{const o=lv.opts.find(x=>x.t===b.textContent);if(o&&o.c)b.classList.add('ok');else if(b===btn)b.classList.add('no')});const fb=$('#feedback');fb.innerHTML=(opt.c?'🌟 ':'💡 ')+lv.fb;fb.classList.add('show');if(opt.c){state.score++;scoreBadge.textContent='积分 '+state.score}$('#nextBtn').disabled=false}
function showEnd(){renderSteps();document.querySelectorAll('.step').forEach(s=>s.classList.add('done'));const full=state.score===DATA.levels.length;scene.innerHTML=`<div class="end"><div style="font-size:46px">${full?'🏅':'📖'}</div><h2>${full?'阅读徽章到手':'闯关完成'}</h2><p class="blurb">你获得 <b style="color:var(--gold)">${state.score} / ${DATA.levels.length}</b> 分。真正的通关，是能带着文本证据说出自己的理解。</p><div class="create"><h3>最后的创作任务：把阅读变成一张图</h3><p>请写一段图像提示词，包含“谁、在哪里、做什么、画面颜色或心情”。写好后点击生成，看看你的阅读画面会变成什么样。</p><div class="prompt-row"><input id="imagePrompt" value="《大青树下的小学》中最打动我的画面，儿童绘本风格，温暖光线，细节丰富"><button class="btn btn-primary" id="imageBtn">生成我的阅读插画</button></div><div class="image-box" id="imageBox"><img id="imageResult" alt="阅读插画"><div class="image-caption" id="imageCaption"></div></div></div><div class="nav"><button class="btn btn-ghost" id="againBtn">再玩一次</button></div></div>`;$('#againBtn').onclick=()=>{state={idx:0,score:0,answered:false};renderLevel()};$('#imageBtn').onclick=generateImage}
const AGNES_CFG={key:'sk-sizYW5qbTggzJ2liRgzJ9wj7IYGajALpUBtvzOfY86h1BqRE',base:'https://apihub.agnes-ai.com/v1',model:'agnes-image-2.1-flash'};
async function agnesImage(prompt){const finalPrompt=prompt+'，儿童绘本插画，温暖光线，适合小学生阅读分享，无文字';const r=await fetch(AGNES_CFG.base+'/images/generations',{method:'POST',headers:{Authorization:'Bearer '+AGNES_CFG.key,'Content-Type':'application/json'},body:JSON.stringify({model:AGNES_CFG.model,prompt:finalPrompt,n:1,size:'1024x1024'})});if(!r.ok)throw new Error('生图失败 '+r.status);const d=await r.json();const item=(d.data&&d.data[0])||{};if(item.url)return item.url;if(item.b64_json)return 'data:image/png;base64,'+item.b64_json;throw new Error('生图返回为空')}
async function generateImage(){const input=$('#imagePrompt');const prompt=(input.value||'').trim();if(!prompt){input.focus();return}const img=$('#imageResult'),box=$('#imageBox'),caption=$('#imageCaption'),btn=$('#imageBtn');box.style.display='block';caption.textContent='正在生成阅读插画…';btn.disabled=true;try{img.src=await agnesImage(prompt);caption.textContent='提示词：'+prompt}catch(e){caption.textContent='生图失败：'+e.message}finally{btn.disabled=false}}
(function stars(){const c=$('#stars'),x=c.getContext('2d');function rs(){c.width=innerWidth;c.height=innerHeight}rs();addEventListener('resize',rs);const st=[];for(let i=0;i<80;i++)st.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.4+.3,a:Math.random()});(function draw(){x.clearRect(0,0,c.width,c.height);st.forEach(s=>{s.a+=(Math.random()-.5)*.05;if(s.a<.1)s.a=.1;if(s.a>1)s.a=1;x.beginPath();x.arc(s.x,s.y,s.r,0,7);x.fillStyle='rgba(225,188,98,'+(s.a*.65)+')';x.fill()});requestAnimationFrame(draw)})()})();
renderLevel();
</script>
</body>
</html>
