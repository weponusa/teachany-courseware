<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>魔法阅读学院</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <a class="ta-banner" href="https://www.teachany.cn/" target="_blank" rel="noopener">
    <img class="ta-banner-icon" src="./assets/teachany-icon.png" alt="TeachAny" width="48" height="48">
    <span class="ta-banner-text">TeachAny</span>
  </a>
  <main class="app-shell">
    <section class="picker-card">
      <h1>魔法阅读学院</h1>
      <div class="picker-row">
        <label><span>类型</span><select id="kindFilter"><option value="all">全部</option><option value="lesson">课文</option><option value="reading">推荐阅读</option></select></label>
        <label><span>年级</span><select id="gradeFilter"><option value="all">全部年级</option></select></label>
        <label><span>册次</span><select id="volumeFilter"><option value="all">全部册次</option><option value="上册">上册</option><option value="下册">下册</option></select></label>
      </div>
      <label class="item-picker"><span>选择游戏</span><select id="gameSelect"></select></label>
      <div class="actions">
        <button id="playBtn" type="button">开始游戏</button>
        <a id="openLink" target="_blank" rel="noopener">新窗口打开</a>
        <button id="readerBtn" type="button" class="ghost-action">阅读原文</button>
        <a id="practiceBtn" class="ghost-action" target="_blank" rel="noopener">生字练习</a>
        <button id="customGameBtn" type="button" class="custom-game-btn">✨ 自制游戏</button>
      </div>
    </section>
    <iframe id="previewFrame" title="互动游戏预览"></iframe>
  </main>

  <!-- 自制游戏弹窗 -->
  <div id="customModal" class="reader-modal" aria-hidden="true">
    <div class="reader-card custom-card" role="dialog" aria-modal="true">
      <div class="reader-head">
        <div>
          <p>✨ 自选书目</p>
          <h2>自制阅读闯关游戏</h2>
        </div>
        <button id="closeCustom" type="button">关闭</button>
      </div>
      <div class="custom-body">
        <!-- 预设书目 -->
        <div class="preset-section">
          <h3>📚 经典书目（点击选择）</h3>
          <div class="preset-group">
            <h4>🧙 哈利·波特系列 <button type="button" class="select-all-btn" data-series="hp">全选</button></h4>
            <div class="preset-list" id="hpList"></div>
          </div>
          <div class="preset-group">
            <h4>🚀 儒勒·凡尔纳系列 <button type="button" class="select-all-btn" data-series="verne">全选</button></h4>
            <div class="preset-list" id="verneList"></div>
          </div>
        </div>
        <!-- 自定义输入 -->
        <div class="custom-input-section">
          <h3>✏️ 自定义书籍</h3>
          <div class="custom-form">
            <label><span>书名 *</span><input type="text" id="customTitle" placeholder="例如：西游记"></label>
            <label><span>作者</span><input type="text" id="customAuthor" placeholder="例如：吴承恩"></label>
            <label><span>适合年级</span>
              <select id="customGrade">
                <option value="3">3年级（中低年级）</option>
                <option value="4" selected>4年级（中年级）</option>
                <option value="5">5年级（中高年级）</option>
                <option value="6">6年级（高年级）</option>
              </select>
            </label>
            <label class="full-width"><span>简介或内容片段（可选，有助于生成更好的题目）</span>
              <textarea id="customBrief" rows="3" placeholder="粘贴一段书的简介或精彩片段..."></textarea>
            </label>
            <button id="addCustomBook" type="button" class="ghost-action">➕ 添加到列表</button>
          </div>
        </div>
        <!-- 已选书目 -->
        <div class="selected-section">
          <h3>📋 已选书目 <span id="selectedCount">0</span> 本</h3>
          <div id="selectedList" class="selected-list"></div>
        </div>
        <!-- 生成按钮 -->
        <div class="generate-bar">
          <button id="generateBtn" type="button" disabled>🎮 一键生成游戏</button>
          <p id="generateStatus" class="gen-status"></p>
        </div>
      </div>
    </div>
  </div>

  <div id="readerModal" class="reader-modal" aria-hidden="true">
    <div class="reader-card" role="dialog" aria-modal="true" aria-labelledby="readerTitle">
      <div class="reader-head">
        <div>
          <p id="readerKicker">阅读原文</p>
          <h2 id="readerTitle">课文原文</h2>
        </div>
        <button id="closeReader" type="button">关闭</button>
      </div>
      <div id="readerBody" class="reader-body"></div>
    </div>
  </div>

  <script src="./data/game-index.js"></script>
  <script src="./data/lesson-index.js"></script>
  <script src="./data/book-index.js"></script>
  <script src="./data/char-index.js"></script>
  <script src="./data/text-data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
