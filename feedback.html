<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TeachAny 学习反馈</title>
  <style>
    :root{--bg:#f8fafc;--card:#ffffff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--shadow:0 18px 45px rgba(15,23,42,.10)}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#eff6ff,#f8fafc 42%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.7}
    header{max-width:920px;margin:0 auto;padding:40px 20px 18px}a{color:var(--blue);text-decoration:none}.brand{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:14px}.brand img{width:28px;height:28px;border-radius:8px}.hero{margin-top:24px}.hero h1{font-size:36px;line-height:1.2;margin:0 0 12px}.hero p{margin:0;color:var(--muted);font-size:17px}
    main{max-width:920px;margin:0 auto;padding:12px 20px 48px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:24px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}label{display:block;font-weight:700;font-size:14px;margin-bottom:6px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 12px;font:inherit;background:#fff;color:var(--text)}textarea{min-height:110px;resize:vertical}.full{grid-column:1/-1}.hint{font-size:12px;color:var(--muted);margin-top:4px}.actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:20px}button{border:0;border-radius:999px;padding:12px 20px;background:var(--blue);color:#fff;font-weight:800;cursor:pointer}button:disabled{opacity:.6;cursor:not-allowed}.status{font-size:14px}.ok{color:var(--green)}.err{color:var(--red)}.foot{margin-top:18px;color:var(--muted);font-size:13px}@media(max-width:720px){.grid{grid-template-columns:1fr}.hero h1{font-size:30px}}
  </style>
</head>
<body>
<header>
  <a class="brand" href="/">
    <img src="/assets/teachany-logo.png" alt="TeachAny" onerror="this.style.display='none'">
    <span>TeachAny（教我学）</span>
  </a>
  <section class="hero">
    <h1>学习反馈</h1>
    <p>学完一节课后，用 1 分钟告诉老师：你学懂了什么，哪里还卡住。</p>
  </section>
</header>
<main>
  <form id="feedbackForm" class="card">
    <div class="grid">
      <div>
        <label for="course_id">课程 ID *</label>
        <input id="course_id" name="course_id" required placeholder="如 math-linear-function">
      </div>
      <div>
        <label for="course_name">课程名称</label>
        <input id="course_name" name="course_name" placeholder="如 一次函数">
      </div>
      <div>
        <label for="node_id">知识点 node_id</label>
        <input id="node_id" name="node_id" placeholder="如 math-m-linear-function">
      </div>
      <div>
        <label for="subject">学科</label>
        <input id="subject" name="subject" placeholder="math / physics / biology...">
      </div>
      <div>
        <label for="grade">年级</label>
        <input id="grade" name="grade" placeholder="如 8">
      </div>
      <div>
        <label for="class_name">班级/小组</label>
        <input id="class_name" name="class_name" placeholder="可不填">
      </div>
      <div>
        <label for="learner_name">姓名/昵称</label>
        <input id="learner_name" name="learner_name" placeholder="建议填昵称，不填敏感信息">
      </div>
      <div>
        <label for="difficulty">难度感受</label>
        <select id="difficulty" name="difficulty">
          <option value="">请选择</option>
          <option value="easy">偏简单</option>
          <option value="ok">刚刚好</option>
          <option value="hard">有点难</option>
        </select>
      </div>
      <div>
        <label for="pre_score">前测得分</label>
        <input id="pre_score" name="pre_score" type="number" min="0" max="100" step="1" placeholder="0-100，可不填">
      </div>
      <div>
        <label for="post_score">后测得分</label>
        <input id="post_score" name="post_score" type="number" min="0" max="100" step="1" placeholder="0-100，可不填">
      </div>
      <div class="full">
        <label><input id="understood" name="understood" type="checkbox" style="width:auto;margin-right:8px">我基本学懂了这节课</label>
      </div>
      <div class="full">
        <label for="hardest_part">最难的地方</label>
        <textarea id="hardest_part" name="hardest_part" placeholder="比如：不会看图像交点、不理解斜率、题目读不懂……"></textarea>
      </div>
      <div class="full">
        <label for="reflection">一句反思 / 想问老师的问题</label>
        <textarea id="reflection" name="reflection" placeholder="今天我发现…… / 我还想问……"></textarea>
      </div>
      <div class="full">
        <label for="feedback_password">反馈密码</label>
        <input id="feedback_password" name="feedback_password" type="password" autocomplete="off" placeholder="如果老师设置了反馈密码，请在这里填写">
        <div class="hint">没有设置密码的课件可留空；如果提示密码错误，请向做课老师确认。</div>
      </div>
      <div class="full">
        <label for="contact">联系方式</label>
        <input id="contact" name="contact" placeholder="可不填；不要填写身份证、家庭住址等敏感信息">
        <div class="hint">仅用于教师回访；试点阶段不建议收集敏感个人信息。</div>
      </div>
    </div>
    <div class="actions">
      <button id="submitBtn" type="submit">提交反馈</button>
      <span id="status" class="status"></span>
    </div>
    <p class="foot">教师查看：<a href="/teacher/feedback.html">/teacher/feedback.html</a>。如果提示 D1 未配置，说明还需要在 Cloudflare 绑定数据库。</p>
  </form>
</main>
<script>
const params = new URLSearchParams(location.search);
for (const key of ["course_id","course_name","node_id","subject","grade"]) {
  const value = params.get(key);
  if (value && document.getElementById(key)) document.getElementById(key).value = value;
}
const form = document.getElementById('feedbackForm');
const statusEl = document.getElementById('status');
const submitBtn = document.getElementById('submitBtn');
form.addEventListener('submit', async (event) => {
  event.preventDefault();
  submitBtn.disabled = true;
  statusEl.className = 'status';
  statusEl.textContent = '提交中...';
  const fd = new FormData(form);
  const payload = Object.fromEntries(fd.entries());
  payload.understood = document.getElementById('understood').checked;
  try {
    const res = await fetch('/api/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) throw new Error(data.message || data.error || '提交失败');
    statusEl.className = 'status ok';
    statusEl.textContent = '已提交，谢谢反馈。';
    form.reset();
  } catch (error) {
    statusEl.className = 'status err';
    statusEl.textContent = error.message || '提交失败，请稍后再试。';
  } finally {
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
