<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TeachAny 课件已迁移</title>
  <script>
    (function () {
      var oldPrefix = '/teachany/';
      var newPrefix = 'https://weponusa.github.io/teachany-courseware/';
      var path = location.pathname;
      if (path.indexOf(oldPrefix) === 0) {
        var rest = path.slice(oldPrefix.length);
        if (/^(community|examples)\//.test(rest)) {
          location.replace(newPrefix + rest + location.search + location.hash);
        }
      }
    })();
  </script>
  <style>body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;max-width:720px;margin:80px auto;padding:0 24px;line-height:1.8;color:#0f172a}a{color:#2563eb}</style>
</head>
<body>
  <h1>TeachAny 课件已迁移</h1>
  <p>旧的课件路径已迁移到新的课件资产仓库。</p>
  <p><a id="new-url" href="https://weponusa.github.io/teachany-courseware/">打开 TeachAny Courseware</a></p>
  <script>
    var rest = location.pathname.replace(/^\/teachany\//, '');
    if (/^(community|examples)\//.test(rest)) {
      var url = 'https://weponusa.github.io/teachany-courseware/' + rest + location.search + location.hash;
      document.getElementById('new-url').href = url;
    }
  </script>
</body>
</html>
