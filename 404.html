<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>正在打开 TeachAny 课件</title>
  <script>
    (function () {
      var oldPrefix = '/teachany/';
      var newPrefix = 'https://weponusa.github.io/teachany-courseware/';
      var path = location.pathname;
      if (path.indexOf(oldPrefix) === 0) {
        var rest = path.slice(oldPrefix.length);
        if (/^(community|examples)\//.test(rest)) {
          location.replace(newPrefix + rest + location.search + location.hash);
        }
      }
    })();
  </script>
  <style>body{margin:0;background:#07111f;color:#e5f2ff;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;display:grid;min-height:100vh;place-items:center;text-align:center;line-height:1.8}a{color:#7dd3fc}</style>
</head>
<body>
  <main>
    <p>正在打开课件，请稍候…</p>
    <p><a id="new-url" href="https://weponusa.github.io/teachany-courseware/">如果没有自动打开，点这里</a></p>
  </main>
  <script>
    var rest = location.pathname.replace(/^\/teachany\//, '');
    if (/^(community|examples)\//.test(rest)) {
      var url = 'https://weponusa.github.io/teachany-courseware/' + rest + location.search + location.hash;
      document.getElementById('new-url').href = url;
    }
  </script>
</body>
</html>
