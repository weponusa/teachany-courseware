<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs><rect width="1280" height="720" fill="url(#g)"/><circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/><circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/><text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">核能与核反应</text><text x="70" y="168" fill="#bae6fd" font-size="28">怎样用物理模型解释和计算「核能与核反应」中的关键现象？</text><text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：核能与核反应问题分析师 · 课标节点：phy-h-nuclear-energy</text><rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/><text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">功</text><text x="96" y="374" fill="#dbeafe" font-size="21">力和位移共同决定做功，W=Fscosθ，方向夹角不能忽略。</text><text x="96" y="410" fill="#dbeafe" font-size="21"></text><rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/><text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">动能/势能</text><text x="486" y="374" fill="#dbeafe" font-size="21">动能看速度，势能看相互作用位置，能量变化由做功连接。</text><text x="486" y="410" fill="#dbeafe" font-size="21"></text><rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/><text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">守恒</text><text x="876" y="374" fill="#dbeafe" font-size="21">只有保守力做功时机械能守恒，非保守力做功会改变机械能。</text><text x="876" y="410" fill="#dbeafe" font-size="21"></text><rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/><text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text><text x="260" y="585" fill="#e0f2fe" font-size="26">能量题先选系统，再看谁做功，最后判断是否守恒。</text><text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中物理完整模式 