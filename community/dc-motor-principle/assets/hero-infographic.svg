<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="url(#bg)" rx="18"/>

  <!-- Title -->
  <text x="480" y="50" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="28" font-weight="700">直流电动机原理</text>
  <text x="480" y="78" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">DC Motor Principle · 知识结构图</text>

  <!-- === Left: Magnetic Field === -->
  <rect x="60" y="110" width="240" height="340" rx="14" fill="rgba(56,189,248,.08)" stroke="rgba(56,189,248,.25)" stroke-width="1.5"/>
  <text x="180" y="145" text-anchor="middle" fill="#7dd3fc" font-family="system-ui, sans-serif" font-size="18" font-weight="600">磁场</text>

  <!-- N and S poles -->
  <rect x="90" y="170" width="60" height="80" rx="8" fill="#ef4444"/>
  <text x="120" y="215" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="24" font-weight="700">N</text>
  <rect x="210" y="170" width="60" height="80" rx="8" fill="#3b82f6"/>
  <text x="240" y="215" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="24" font-weight="700">S</text>

  <!-- Field lines -->
  <line x1="170" y1="190" x2="210" y2="190" stroke="rgba(255,255,255,.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="170" y1="210" x2="210" y2="210" stroke="rgba(255,255,255,.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="170" y1="230" x2="210" y2="230" stroke="rgba(255,255,255,.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="205,185 215,190 205,195" fill="rgba(255,255,255,.4)"/>
  <polygon points="205,205 215,210 205,215" fill="rgba(255,255,255,.4)"/>
  <polygon points="205,225 215,230 205,235" fill="rgba(255,255,255,.4)"/>

  <text x="180" y="285" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="13">磁感线：N → S</text>
  <text x="180" y="310" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">提供匀强磁场</text>
  <text x="180" y="330" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">B = 磁感应强度</text>

  <!-- Arrow to center -->
  <line x1="310" y1="280" x2="370" y2="280" stroke="url(#brand)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="340" y="270" text-anchor="middle" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="11">磁场作用</text>

  <!-- === Center: Force & Rotation === -->
  <rect x="380" y="110" width="200" height="340" rx="14" fill="rgba(34,197,94,.08)" stroke="rgba(34,197,94,.25)" stroke-width="1.5"/>
  <text x="480" y="145" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="18" font-weight="600">安培力</text>

  <!-- Coil representation -->
  <rect x="430" y="175" width="100" height="60" rx="6" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
  <text x="480" y="210" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="14" font-weight="600">通电线圈</text>

  <!-- Force arrows -->
  <line x1="450" y1="165" x2="450" y2="145" stroke="#4ade80" stroke-width="2.5" marker-end="url(#arrowhead-green)"/>
  <line x1="510" y1="165" x2="510" y2="145" stroke="#4ade80" stroke-width="2.5" marker-end="url(#arrowhead-green)"/>
  <text x="450" y="135" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="11">F↑</text>
  <text x="510" y="135" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="11">F↓</text>

  <!-- Left hand -->
  <text x="480" y="280" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="14" font-weight="600">✋ 左手定则</text>
  <text x="480" y="305" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="12">磁感线 → 穿掌心</text>
  <text x="480" y="325" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="12">四指 → 电流方向</text>
  <text x="480" y="345" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="12">拇指 → 受力方向</text>

  <text x="480" y="385" text-anchor="middle" fill="#f87171" font-family="system-ui, sans-serif" font-size="13" font-weight="600">F = BIL</text>

  <!-- Arrow to right -->
  <line x1="590" y1="280" x2="650" y2="280" stroke="url(#brand)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="620" y="270" text-anchor="middle" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="11">换向切换</text>

  <!-- === Right: Commutator === -->
  <rect x="660" y="110" width="240" height="340" rx="14" fill="rgba(167,139,250,.08)" stroke="rgba(167,139,250,.25)" stroke-width="1.5"/>
  <text x="780" y="145" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="18" font-weight="600">换向器</text>

  <!-- Commutator diagram -->
  <circle cx="780" cy="210" r="35" fill="#d97706" stroke="#b45309" stroke-width="2"/>
  <line x1="780" y1="175" x2="780" y2="245" stroke="#1e293b" stroke-width="3"/>
  <text x="760" y="215" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="11">A</text>
  <text x="800" y="215" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="11">B</text>

  <!-- Brushes -->
  <rect x="735" y="198" width="14" height="24" rx="3" fill="#475569"/>
  <rect x="811" y="198" width="14" height="24" rx="3" fill="#475569"/>
  <text x="742" y="240" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">电刷</text>
  <text x="818" y="240" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">电刷</text>

  <text x="780" y="295" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="13">每转半圈</text>
  <text x="780" y="318" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="13">切换电流方向</text>

  <text x="780" y="360" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="14" font-weight="600">确保持续单向转动</text>

  <!-- === Bottom: Output === -->
  <rect x="380" y="420" width="200" height="70" rx="14" fill="rgba(245,158,11,.08)" stroke="rgba(245,158,11,.25)" stroke-width="1.5"/>
  <text x="480" y="450" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="16" font-weight="600">⚡ 输出：机械转动</text>
  <text x="480" y="475" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="12">电能 → 机械能</text>

  <!-- Arrow from commutator to output -->
  <line x1="780" y1="460" x2="600" y2="460" stroke="url(#brand)" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Arrow from force to output -->
  <line x1="480" y1="460" x2="480" y2="420" stroke="url(#brand)" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ade80"/>
    </marker>
  </defs>
</svg>
