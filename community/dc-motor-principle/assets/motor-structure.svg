<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0f172a" rx="12"/>
  <text x="320" y="32" text-anchor="middle" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="18" font-weight="700">直流电动机结构示意图</text>

  <!-- Magnet N pole -->
  <rect x="60" y="80" width="50" height="240" rx="6" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
  <text x="85" y="205" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="20" font-weight="700">N</text>
  <text x="85" y="345" text-anchor="middle" fill="#fca5a5" font-family="system-ui,sans-serif" font-size="12">永磁体/电磁铁</text>

  <!-- Magnet S pole -->
  <rect x="530" y="80" width="50" height="240" rx="6" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
  <text x="555" y="205" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="20" font-weight="700">S</text>
  <text x="555" y="345" text-anchor="middle" fill="#93c5fd" font-family="system-ui,sans-serif" font-size="12">永磁体/电磁铁</text>

  <!-- Field lines -->
  <line x1="120" y1="120" x2="520" y2="120" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="120" y1="160" x2="520" y2="160" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="120" y1="200" x2="520" y2="200" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="120" y1="240" x2="520" y2="240" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="120" y1="280" x2="520" y2="280" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="510,115 520,120 510,125" fill="rgba(255,255,255,0.3)"/>
  <polygon points="510,155 520,160 510,165" fill="rgba(255,255,255,0.3)"/>
  <polygon points="510,195 520,200 510,205" fill="rgba(255,255,255,0.3)"/>
  <polygon points="510,235 520,240 510,245" fill="rgba(255,255,255,0.3)"/>
  <polygon points="510,275 520,280 510,285" fill="rgba(255,255,255,0.3)"/>

  <!-- Coil (armature) -->
  <rect x="260" y="140" width="120" height="120" rx="8" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <text x="320" y="205" text-anchor="middle" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="14" font-weight="600">线圈</text>
  <text x="320" y="225" text-anchor="middle" fill="#fde68a" font-family="system-ui,sans-serif" font-size="11">（电枢）</text>

  <!-- Commutator -->
  <circle cx="320" cy="300" r="22" fill="#d97706" stroke="#b45309" stroke-width="2"/>
  <line x1="320" y1="278" x2="320" y2="322" stroke="#1e293b" stroke-width="3"/>
  <text x="320" y="345" text-anchor="middle" fill="#fdba74" font-family="system-ui,sans-serif" font-size="12">换向器</text>

  <!-- Brushes -->
  <rect x="290" y="292" width="14" height="16" rx="3" fill="#475569" stroke="#64748b" stroke-width="1"/>
  <rect x="336" y="292" width="14" height="16" rx="3" fill="#475569" stroke="#64748b" stroke-width="1"/>
  <text x="297" y="365" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">电刷</text>
  <text x="343" y="365" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">电刷</text>

  <!-- Shaft -->
  <line x1="320" y1="140" x2="320" y2="100" stroke="#94a3b8" stroke-width="3"/>
  <circle cx="320" cy="95" r="5" fill="#94a3b8"/>
  <text x="340" y="100" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="12">转轴</text>

  <!-- Annotations -->
  <text x="140" y="375" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="12">① 磁极产生匀强磁场</text>
  <text x="320" y="375" text-anchor="middle" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="12">② 线圈通电后受安培力转动</text>
  <text x="500" y="375" text-anchor="end" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="12">③ 换向器切换电流方向</text>

  <!-- Current direction indicators on coil -->
  <text x="255" y="175" text-anchor="end" fill="#22d3ee" font-family="system-ui,sans-serif" font-size="14" font-weight="600">⊙</text>
  <text x="255" y="235" text-anchor="end" fill="#22d3ee" font-family="system-ui,sans-serif" font-size="14" font-weight="600">⊗</text>
  <text x="225" y="175" text-anchor="end" fill="#22d3ee" font-family="system-ui,sans-serif" font-size="11">电流向外</text>
  <text x="225" y="235" text-anchor="end" fill="#22d3ee" font-family="system-ui,sans-serif" font-size="11">电流向里</text>

  <!-- Force arrows -->
  <line x1="270" y1="130" x2="270" y2="110" stroke="#4ade80" stroke-width="2" marker-end="url(#af)"/>
  <text x="270" y="105" text-anchor="middle" fill="#4ade80" font-family="system-ui,sans-serif" font-size="11">F↑</text>
  <line x1="370" y1="270" x2="370" y2="290" stroke="#4ade80" stroke-width="2" marker-end="url(#af2)"/>
  <text x="370" y="300" text-anchor="middle" fill="#4ade80" font-family="system-ui,sans-serif" font-size="11">F↓</text>

  <defs>
    <marker id="af" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#4ade80"/>
    </marker>
    <marker id="af2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#4ade80"/>
    </marker>
  </defs>
</svg>
