<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360">
  <rect width="480" height="360" fill="#0f172a" rx="12"/>
  <text x="240" y="32" text-anchor="middle" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="18" font-weight="700">左手定则</text>

  <!-- Palm -->
  <path d="M220 80 Q200 70 190 90 Q180 110 185 130 Q175 140 170 160 Q165 180 175 200 L185 240 L215 240 L225 200 Q235 180 230 160 Q225 140 215 130 Q220 110 210 90 Q200 70 220 80" fill="#fcd34d" stroke="#fbbf24" stroke-width="2"/>

  <!-- Fingers -->
  <rect x="200" y="50" width="12" height="40" rx="6" fill="#fcd34d" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="216" y="45" width="12" height="45" rx="6" fill="#fcd34d" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="232" y="50" width="12" height="40" rx="6" fill="#fcd34d" stroke="#fbbf24" stroke-width="1.5"/>

  <!-- Thumb -->
  <rect x="175" y="170" width="35" height="14" rx="7" fill="#fcd34d" stroke="#fbbf24" stroke-width="1.5" transform="rotate(-25 192 177)"/>

  <!-- Labels -->
  <text x="150" y="100" text-anchor="end" fill="#38bdf8" font-family="system-ui,sans-serif" font-size="14" font-weight="600">磁感线 → 穿掌心</text>
  <line x1="155" y1="95" x2="190" y2="110" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="3,2"/>

  <text x="280" y="60" text-anchor="start" fill="#f87171" font-family="system-ui,sans-serif" font-size="14" font-weight="600">四指 → 电流方向</text>
  <line x1="275" y1="65" x2="240" y2="70" stroke="#f87171" stroke-width="1.5" stroke-dasharray="3,2"/>

  <text x="130" y="200" text-anchor="end" fill="#4ade80" font-family="system-ui,sans-serif" font-size="14" font-weight="600">拇指 → 受力方向</text>
  <line x1="135" y1="195" x2="170" y2="180" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- B field arrow through palm -->
  <line x1="280" y1="140" x2="340" y2="140" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrB)"/>
  <text x="360" y="145" fill="#38bdf8" font-family="system-ui,sans-serif" font-size="13">B（磁场）</text>

  <!-- Current arrow (fingers) -->
  <line x1="280" y1="80" x2="340" y2="50" stroke="#f87171" stroke-width="2.5" marker-end="url(#arrI)"/>
  <text x="360" y="55" fill="#f87171" font-family="system-ui,sans-serif" font-size="13">I（电流）</text>

  <!-- Force arrow (thumb) -->
  <line x1="120" y1="200" x2="80" y2="230" stroke="#4ade80" stroke-width="2.5" marker-end="url(#arrF)"/>
  <text x="60" y="245" fill="#4ade80" font-family="system-ui,sans-serif" font-size="13">F（安培力）</text>

  <!-- Formula -->
  <text x="240" y="310" text-anchor="middle" fill="#a78bfa" font-family="ui-monospace,Menlo,monospace" font-size="16" font-weight="600">F = B × I × L</text>
  <text x="240" y="335" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="12">伸左手 · 磁感线穿掌心 · 四指指电流 · 拇指指受力</text>

  <defs>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#38bdf8"/>
    </marker>
    <marker id="arrI" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#f87171"/>
    </marker>
    <marker id="arrF" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#4ade80"/>
    </marker>
  </defs>
</svg>
