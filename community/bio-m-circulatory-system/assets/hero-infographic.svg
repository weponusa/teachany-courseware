<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <rect width="600" height="300" rx="16" fill="#0b1120"/>
  <text x="300" y="30" text-anchor="middle" fill="#60a5fa" font-size="18" font-weight="bold">循环与呼吸系统 · 知识结构图</text>
  <!-- Heart -->
  <rect x="230" y="80" width="140" height="120" rx="12" fill="#1e1030" stroke="#dc2626" stroke-width="2"/>
  <line x1="300" y1="80" x2="300" y2="200" stroke="#dc2626" stroke-width="1" stroke-dasharray="4"/>
  <line x1="230" y1="140" x2="370" y2="140" stroke="#dc2626" stroke-width="1" stroke-dasharray="4"/>
  <text x="265" y="118" text-anchor="middle" fill="#fca5a5" font-size="10">左心房</text>
  <text x="335" y="118" text-anchor="middle" fill="#93c5fd" font-size="10">右心房</text>
  <text x="265" y="175" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="bold">左心室</text>
  <text x="335" y="175" text-anchor="middle" fill="#93c5fd" font-size="10">右心室</text>
  <text x="300" y="60" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">❤️ 心脏四腔</text>
  <!-- Body circulation -->
  <path d="M230 160 Q100 160 100 100 Q100 40 300 40 Q500 40 500 100 Q500 160 370 160" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6"/>
  <text x="100" y="100" text-anchor="middle" fill="#ef4444" font-size="11">体循环</text>
  <!-- Lung circulation -->
  <path d="M370 120 Q450 80 500 120 Q550 160 450 180 Q370 200 370 160" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6"/>
  <text x="480" y="140" text-anchor="middle" fill="#3b82f6" font-size="11">肺循环</text>
  <!-- Gas exchange -->
  <rect x="40" y="220" width="160" height="60" rx="8" fill="#111c33" stroke="#fbbf24" stroke-width="1"/>
  <text x="120" y="245" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">组织细胞气体交换</text>
  <text x="120" y="265" text-anchor="middle" fill="#8aa0c0" font-size="9">O₂进入细胞 · CO₂进入血液</text>
  <rect x="400" y="220" width="160" height="60" rx="8" fill="#111c33" stroke="#60a5fa" stroke-width="1"/>
  <text x="480" y="245" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold">肺泡气体交换</text>
  <text x="480" y="265" text-anchor="middle" fill="#8aa0c0" font-size="9">CO₂进入肺泡 · O₂进入血液</text>
</svg>
