  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">烃类综合</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">拿到一个未知烃，怎样用结构和实验现象判断它是哪一类？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：有机反应判题教练 · 课标节点：chem-h-hydrocarbons</text>
  
