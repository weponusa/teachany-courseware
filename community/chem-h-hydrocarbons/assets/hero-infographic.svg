  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">不饱和度</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">碳碳双键、三键和苯环都会提高不饱和度，是判断反应类型的关键。</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21"></text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">实验鉴别</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">溴水、高锰酸钾酸性溶液等可帮助识别部分不饱和结构。</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21"></text>
