  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">同分异构</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">碳数增加后，碳链异构和位置异构会让同分子式对应多种结构。</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21"></text>
