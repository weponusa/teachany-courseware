<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'PingFang SC','Source Han Sans SC',system-ui,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fffbf0"/>
      <stop offset="100%" style="stop-color:#e8f5e9"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="480" y="52" text-anchor="middle" font-size="28" font-weight="800" fill="url(#greenGrad)">🌿 绿色工程与可持续发展</text>

  <!-- Central circle - Earth -->
  <circle cx="480" cy="270" r="80" fill="#4CAF50" opacity="0.15"/>
  <circle cx="480" cy="270" r="60" fill="#66BB6A" opacity="0.25"/>
  <text x="480" y="265" text-anchor="middle" font-size="36">🌍</text>
  <text x="480" y="295" text-anchor="middle" font-size="13" fill="#2E7D32" font-weight="600">可持续发展</text>

  <!-- Branch 1: Renewable Energy (Left) -->
  <line x1="400" y1="270" x2="200" y2="180" stroke="#4ecdc4" stroke-width="3" stroke-dasharray="8,4"/>
  <rect x="100" y="120" width="200" height="120" rx="16" fill="white" stroke="#4ecdc4" stroke-width="2" opacity="0.9"/>
  <text x="200" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#00897B">⚡ 可再生能源</text>
  <text x="200" y="180" text-anchor="middle" font-size="12" fill="#666">太阳能 · 风能 · 水力</text>
  <text x="200" y="200" text-anchor="middle" font-size="12" fill="#666">地热 · 生物质能</text>
  <text x="200" y="225" text-anchor="middle" font-size="24">☀️ 💨 💧</text>

  <!-- Branch 2: 3R Principles (Top) -->
  <line x1="480" y1="190" x2="480" y2="100" stroke="#ff6b6b" stroke-width="3" stroke-dasharray="8,4"/>
  <rect x="370" y="68" width="220" height="60" rx="16" fill="white" stroke="#ff6b6b" stroke-width="2" opacity="0.9"/>
  <text x="480" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">♻️ 3R 原则</text>
  <text x="480" y="115" text-anchor="middle" font-size="12" fill="#666">减少 Reduce · 重用 Reuse · 回收 Recycle</text>

  <!-- Branch 3: Green Building (Right) -->
  <line x1="560" y1="270" x2="760" y2="180" stroke="#4ecdc4" stroke-width="3" stroke-dasharray="8,4"/>
  <rect x="660" y="120" width="200" height="120" rx="16" fill="white" stroke="#4ecdc4" stroke-width="2" opacity="0.9"/>
  <text x="760" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#00897B">🏗️ 绿色建筑</text>
  <text x="760" y="180" text-anchor="middle" font-size="12" fill="#666">太阳能板 · 雨水收集</text>
  <text x="760" y="200" text-anchor="middle" font-size="12" fill="#666">隔热材料 · LED灯</text>
  <text x="760" y="225" text-anchor="middle" font-size="24">🏢 🌿 💡</text>

  <!-- Branch 4: Circular Economy (Bottom) -->
  <line x1="480" y1="350" x2="480" y2="420" stroke="#ff6b6b" stroke-width="3" stroke-dasharray="8,4"/>
  <rect x="350" y="420" width="260" height="80" rx="16" fill="white" stroke="#ff6b6b" stroke-width="2" opacity="0.9"/>
  <text x="480" y="450" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">🔄 循环经济</text>
  <text x="480" y="472" text-anchor="middle" font-size="12" fill="#666">废物 → 原料 → 产品 → 再利用</text>
  <text x="480" y="490" text-anchor="middle" font-size="12" fill="#888">从"用完就扔"到"循环再生"</text>

  <!-- Sub-connections -->
  <line x1="200" y1="240" x2="350" y2="420" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="760" y1="240" x2="610" y2="420" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Footer -->
  <text x="480" y="530" text-anchor="middle" font-size="11" fill="#aaa">小学六年级科学 · 技术与工程领域</text>
</svg>
