<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="结构拓扑优化 · 桁架受力分配 · 知识结构主图">
<defs>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0f172a"/>
    <stop offset="100%" stop-color="#1e293b"/>
  </linearGradient>
  <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#6366f1"/>
    <stop offset="100%" stop-color="#8b5cf6"/>
  </linearGradient>
  <linearGradient id="forceGrad" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%" stop-color="#ef4444"/>
    <stop offset="100%" stop-color="#f97316"/>
  </linearGradient>
  <linearGradient id="compGrad" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%" stop-color="#22c55e"/>
    <stop offset="100%" stop-color="#10b981"/>
  </linearGradient>
  <linearGradient id="tensGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3b82f6"/>
    <stop offset="100%" stop-color="#60a5fa"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softShadow">
    <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
  </filter>
  <marker id="arrowRed" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
  </marker>
  <marker id="arrowBlue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
  </marker>
</defs>

<!-- Background -->
<rect width="1280" height="720" fill="url(#bgGrad)"/>
<!-- Subtle grid -->
<g opacity="0.06" stroke="#94a3b8" stroke-width="0.5">
  <line x1="0" y1="180" x2="1280" y2="180"/><line x1="0" y1="360" x2="1280" y2="360"/>
  <line x1="0" y1="540" x2="1280" y2="540"/><line x1="320" y1="0" x2="320" y2="720"/>
  <line x1="640" y1="0" x2="640" y2="720"/><line x1="960" y1="0" x2="960" y2="720"/>
</g>

<!-- ===== LEFT: Warren Truss Structure ===== -->
<g transform="translate(80, 120)">
  <!-- Title -->
  <text x="200" y="0" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="20" font-weight="600" fill="#e2e8f0">桁架结构受力分析</text>

  <!-- Truss geometry: 5-panel Warren truss -->
  <!-- Bottom chord nodes: A(40,400) B(120,400) C(200,400) D(280,400) E(360,400) -->
  <!-- Top chord nodes: F(80,280) G(160,280) H(240,280) I(320,280) -->

  <!-- Members - Compression (green) -->
  <line x1="80" y1="280" x2="120" y2="400" stroke="url(#compGrad)" stroke-width="3.5" opacity="0.85"/>
  <line x1="160" y1="280" x2="120" y2="400" stroke="url(#compGrad)" stroke-width="3.5" opacity="0.85"/>
  <line x1="240" y1="280" x2="280" y2="400" stroke="url(#compGrad)" stroke-width="3.5" opacity="0.85"/>
  <line x1="320" y1="280" x2="280" y2="400" stroke="url(#compGrad)" stroke-width="3.5" opacity="0.85"/>
  <!-- Top chord -->
  <line x1="80" y1="280" x2="160" y2="280" stroke="url(#compGrad)" stroke-width="4" opacity="0.7"/>
  <line x1="160" y1="280" x2="240" y2="280" stroke="url(#compGrad)" stroke-width="4" opacity="0.5"/>
  <line x1="240" y1="280" x2="320" y2="280" stroke="url(#compGrad)" stroke-width="4" opacity="0.5"/>

  <!-- Members - Tension (blue) -->
  <line x1="40" y1="400" x2="80" y2="280" stroke="url(#tensGrad)" stroke-width="3.5" opacity="0.85"/>
  <line x1="40" y1="400" x2="120" y2="400" stroke="url(#tensGrad)" stroke-width="4" opacity="0.7"/>
  <line x1="160" y1="280" x2="200" y2="400" stroke="url(#tensGrad)" stroke-width="3.5" opacity="0.85"/>
  <line x1="120" y1="400" x2="200" y2="400" stroke="url(#tensGrad)" stroke-width="4" opacity="0.7"/>
  <line x1="240" y1="280" x2="200" y2="400" stroke="url(#tensGrad)" stroke-width="3.5" opacity="0.85"/>
  <line x1="320" y1="280" x2="360" y2="400" stroke="url(#tensGrad)" stroke-width="3.5" opacity="0.85"/>
  <line x1="200" y1="400" x2="280" y2="400" stroke="url(#tensGrad)" stroke-width="4" opacity="0.5"/>
  <line x1="280" y1="400" x2="360" y2="400" stroke="url(#tensGrad)" stroke-width="4" opacity="0.7"/>

  <!-- External force arrows (downward at top nodes) -->
  <line x1="160" y1="230" x2="160" y2="270" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="160" y="222" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#ef4444" font-weight="600">P</text>
  <line x1="240" y1="230" x2="240" y2="270" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="240" y="222" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#ef4444" font-weight="600">P</text>

  <!-- Support symbols -->
  <!-- Pin support at A (left) -->
  <polygon points="40,400 28,425 52,425" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <line x1="20" y1="428" x2="60" y2="428" stroke="#f59e0b" stroke-width="2"/>
  <!-- Roller support at E (right) -->
  <polygon points="360,400 348,425 372,425" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="354" cy="432" r="5" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="366" cy="432" r="5" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="340" y1="440" x2="380" y2="440" stroke="#f59e0b" stroke-width="2"/>

  <!-- Reaction arrows (upward) -->
  <line x1="40" y1="450" x2="40" y2="410" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="40" y="465" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b">R₁</text>
  <line x1="360" y1="450" x2="360" y2="410" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="360" y="465" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b">R₂</text>

  <!-- Node labels -->
  <g font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" font-weight="500">
    <text x="40" y="395" text-anchor="middle">A</text>
    <text x="120" y="395" text-anchor="middle">B</text>
    <text x="200" y="395" text-anchor="middle">C</text>
    <text x="280" y="395" text-anchor="middle">D</text>
    <text x="360" y="395" text-anchor="middle">E</text>
    <text x="80" y="275" text-anchor="middle">F</text>
    <text x="160" y="275" text-anchor="middle">G</text>
    <text x="240" y="275" text-anchor="middle">H</text>
    <text x="320" y="275" text-anchor="middle">I</text>
  </g>

  <!-- Force value labels on members -->
  <g font-family="system-ui,sans-serif" font-size="10" font-weight="500">
    <text x="55" y="345" fill="#60a5fa" transform="rotate(-60,55,345)">+3.2kN</text>
    <text x="105" y="345" fill="#4ade80" transform="rotate(60,105,345)">−2.8kN</text>
    <text x="175" y="345" fill="#4ade80" transform="rotate(-60,175,345)">−2.8kN</text>
    <text x="225" y="345" fill="#60a5fa" transform="rotate(60,225,345)">+3.2kN</text>
  </g>

  <!-- Legend -->
  <g transform="translate(20, 490)">
    <rect x="0" y="0" width="360" height="65" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" opacity="0.9"/>
    <line x1="15" y1="20" x2="45" y2="20" stroke="#3b82f6" stroke-width="3"/>
    <text x="55" y="24" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="12" fill="#93c5fd">拉力（Tension）</text>
    <line x1="180" y1="20" x2="210" y2="20" stroke="#22c55e" stroke-width="3"/>
    <text x="220" y="24" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="12" fill="#86efac">压力（Compression）</text>
    <line x1="15" y1="45" x2="45" y2="45" stroke="#ef4444" stroke-width="2.5"/>
    <text x="55" y="49" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="12" fill="#fca5a5">外力</text>
    <line x1="180" y1="45" x2="210" y2="45" stroke="#f59e0b" stroke-width="2"/>
    <text x="220" y="49" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="12" fill="#fcd34d">支座反力</text>
  </g>
</g>

<!-- ===== RIGHT: Topology Optimization Concept ===== -->
<g transform="translate(560, 120)">
  <text x="320" y="0" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="20" font-weight="600" fill="#e2e8f0">拓扑优化过程</text>

  <!-- Step 1: Full material block -->
  <g transform="translate(20, 30)">
    <rect x="0" y="0" width="120" height="80" rx="4" fill="#475569" opacity="0.6" stroke="#64748b" stroke-width="1"/>
    <text x="60" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">初始材料</text>
    <!-- Force arrow -->
    <line x1="60" y1="-15" x2="60" y2="-3" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
    <!-- Fixed left -->
    <rect x="-5" y="10" width="5" height="60" rx="1" fill="#f59e0b" opacity="0.7"/>
    <rect x="-5" y="10" width="5" height="60" rx="1" fill="none" stroke="#f59e0b" stroke-width="1"/>
  </g>

  <!-- Arrow -->
  <g transform="translate(155, 65)">
    <line x1="0" y1="0" x2="35" y2="0" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="17" y="-8" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#a78bfa">优化</text>
  </g>

  <!-- Step 2: Intermediate -->
  <g transform="translate(200, 30)">
    <rect x="0" y="0" width="120" height="80" rx="4" fill="#475569" opacity="0.3" stroke="#64748b" stroke-width="1"/>
    <!-- Removed material (holes) -->
    <circle cx="30" cy="20" r="12" fill="#0f172a"/>
    <circle cx="70" cy="50" r="15" fill="#0f172a"/>
    <circle cx="90" cy="20" r="10" fill="#0f172a"/>
    <circle cx="40" cy="55" r="10" fill="#0f172a"/>
    <!-- Remaining material -->
    <path d="M0,10 L40,10 L60,30 L60,50 L0,70 Z" fill="#475569" opacity="0.5"/>
    <text x="60" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">迭代优化</text>
    <line x1="60" y1="-15" x2="60" y2="-3" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
    <rect x="-5" y="10" width="5" height="60" rx="1" fill="#f59e0b" opacity="0.7"/>
  </g>

  <!-- Arrow -->
  <g transform="translate(335, 65)">
    <line x1="0" y1="0" x2="35" y2="0" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="17" y="-8" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#a78bfa">收敛</text>
  </g>

  <!-- Step 3: Final optimized truss -->
  <g transform="translate(380, 30)">
    <rect x="0" y="0" width="120" height="80" rx="4" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="4 4"/>
    <!-- Optimized truss shape -->
    <line x1="0" y1="20" x2="40" y2="10" stroke="#6366f1" stroke-width="3" filter="url(#glow)"/>
    <line x1="40" y1="10" x2="80" y2="10" stroke="#6366f1" stroke-width="3" filter="url(#glow)"/>
    <line x1="80" y1="10" x2="120" y2="40" stroke="#6366f1" stroke-width="3" filter="url(#glow)"/>
    <line x1="0" y1="60" x2="40" y2="70" stroke="#6366f1" stroke-width="2.5" filter="url(#glow)"/>
    <line x1="40" y1="70" x2="80" y2="70" stroke="#6366f1" stroke-width="2.5" filter="url(#glow)"/>
    <line x1="80" y1="70" x2="120" y2="40" stroke="#6366f1" stroke-width="2.5" filter="url(#glow)"/>
    <line x1="0" y1="20" x2="0" y2="60" stroke="#6366f1" stroke-width="2.5"/>
    <line x1="40" y1="10" x2="40" y2="70" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="80" y1="10" x2="80" y2="70" stroke="#8b5cf6" stroke-width="2"/>
    <text x="60" y="100" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="11" fill="#a78bfa">最优桁架</text>
    <line x1="60" y1="-15" x2="60" y2="-3" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
    <rect x="-5" y="10" width="5" height="60" rx="1" fill="#f59e0b" opacity="0.7"/>
  </g>
</g>

<!-- ===== BOTTOM: Key Concepts ===== -->
<g transform="translate(80, 540)">
  <!-- Card 1: 节点法 -->
  <g filter="url(#softShadow)">
    <rect x="0" y="0" width="260" height="110" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect x="0" y="0" width="5" height="110" rx="2" fill="#6366f1"/>
    <text x="25" y="30" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">节点法</text>
    <text x="25" y="50" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="12" fill="#94a3b8">Method of Joints</text>
    <text x="25" y="75" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="12" fill="#64748b">逐节点建立平衡方程</text>
    <text x="25" y="95" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="12" fill="#64748b">ΣFx=0, ΣFy=0 → 杆件内力</text>
  </g>

  <!-- Card 2: 三角形稳定性 -->
  <g filter="url(#softShadow)" transform="translate(290, 0)">
    <rect x="0" y="0" width="260" height="110" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect x="0" y="0" width="5" height="110" rx="2" fill="#06b6d4"/>
    <text x="25" y="30" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">三角形稳定性</text>
    <text x="25" y="50" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="12" fill="#94a3b8">Triangular Stability</text>
    <text x="25" y="75" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="12" fill="#64748b">桁架以三角形为基本单元</text>
    <text x="25" y="95" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="12" fill="#64748b">几何不变 → 承载可靠</text>
  </g>

  <!-- Card 3: 纸桥PBL -->
  <g filter="url(#softShadow)" transform="translate(580, 0)">
    <rect x="0" y="0" width="260" height="110" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect x="0" y="0" width="5" height="110" rx="2" fill="#10b981"/>
    <text x="25" y="30" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">纸桥项目 PBL</text>
    <text x="25" y="50" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="12" fill="#94a3b8">Paper Bridge Project</text>
    <text x="25" y="75" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="12" fill="#64748b">选择最优桁架形式</text>
    <text x="25" y="95" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="12" fill="#64748b">纸材方向 × 跨度 × 荷载</text>
  </g>
</g>

<!-- Main title -->
<text x="640" y="60" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="42" font-weight="700" fill="#f1f5f9">结构拓扑优化的简化模型</text>
<text x="640" y="90" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="20" fill="#94a3b8">桁架受力分配 · 节点法 · 三角形稳定性</text>

<!-- Bottom right branding -->
<text x="1256" y="700" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" fill="#475569">TeachAny · 桁架拓扑优化 · ext-72948119</text>
</svg>