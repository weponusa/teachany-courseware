<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;display=swap");
    text { font-family: "Noto Sans SC", system-ui, -apple-system, sans-serif; }
  </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07111f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0b1628;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="batteryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>
  
  <!-- 装饰性圆圈 -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>
  <circle cx="700" cy="300" r="60" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
  <circle cx="650" cy="80" r="40" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  
  <!-- 电池主体 -->
  <rect x="300" y="120" width="200" height="160" rx="15" fill="url(#batteryGrad)" stroke="#22c55e" stroke-width="3"/>
  
  <!-- 电池正极帽 -->
  <rect x="365" y="100" width="70" height="20" rx="5" fill="#ef4444" opacity="0.8"/>
  
  <!-- 电池内部 - 正极 -->
  <rect x="310" y="130" width="180" height="50" rx="8" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="1"/>
  <text x="400" y="160" font-family="Arial" font-size="14" fill="#ef4444" text-anchor="middle">正极 (+)</text>
  
  <!-- 电池内部 - 负极 -->
  <rect x="310" y="190" width="180" height="50" rx="8" fill="#000000" opacity="0.3" stroke="#000000" stroke-width="1"/>
  <text x="400" y="220" font-family="Arial" font-size="14" fill="#000000" text-anchor="middle">负极 (-)</text>
  
  <!-- 锂离子 -->
  <circle cx="340" cy="170" r="8" fill="#f59e0b"/>
  <text x="340" y="174" font-family="Arial" font-size="8" fill="#000000" text-anchor="middle">Li⁺</text>
  
  <circle cx="460" cy="210" r="8" fill="#f59e0b"/>
  <text x="460" y="214" font-family="Arial" font-size="8" fill="#000000" text-anchor="middle">Li⁺</text>
  
  <!-- 电子流动箭头 -->
  <path d="M 250 220 Q 300 200 310 220" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowblue)"/>
  <text x="260" y="210" font-family="Arial" font-size="11" fill="#3b82f6">e⁻</text>
  
  <!-- 标题 -->
  <text x="400" y="340" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#eef6ff" text-anchor="middle">锂离子电池技术</text>
  <text x="400" y="370" font-family="Arial, sans-serif" font-size="14" fill="#9fb4cc" text-anchor="middle">Lithium-ion Battery Technology</text>
  
  <!-- 装饰性闪电符号 -->
  <text x="550" y="250" font-size="40" fill="#f59e0b" opacity="0.6">⚡</text>
</svg>