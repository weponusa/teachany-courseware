<text x="122" y="542" fill="#dbeafe" font-size="22" font-family="PingFang SC,Arial">• 观察处于细胞周期不同阶段的细胞，结合有丝分裂模型，描述细胞增殖的主要特征，并举例说明细胞的分化、衰老、死亡等生命现象</text>
