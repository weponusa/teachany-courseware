<text x="122" y="480" fill="#dbeafe" font-size="22" font-family="PingFang SC,Arial">• 2.3.2 说明在个体发育过程中，细胞在形态、结构和功能方面发生特异性的分化，形成了复杂的多细胞生物体</text>
