<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs>
  <rect width="1280" height="720" fill="url(#g)"/>
  <circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/>
  <circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/>
  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">化学平衡</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">为什么化学平衡是“动态平衡”，而不是反应完全停止？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：动态系统观察员 · 课标节点：chem-h-chemical-equilibrium</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">可逆反应</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">在同一条件下既能向正方向进行，也能向逆方向进行的反应叫可逆反</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">应。</text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">动态平衡</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">平衡时 v正 = v逆，各物质浓度保持不变，但正逆反应仍同时</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21">发生。</text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">平衡状态特征</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">定温、定容等条件下，浓度、压强、颜色等宏观量不再变化，可作为</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21">判断平衡的证据。</text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text>
  <text x="260" y="585" fill="#e0f2fe" font-size="26">平衡不是停，是 v正等于 v逆；宏观不变，微观不停。</text>
  <text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中化学完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas 互动 / 课标挂树</text>
</svg>