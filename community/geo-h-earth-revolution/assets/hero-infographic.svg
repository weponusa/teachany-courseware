<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#052e2b"/><stop offset="1" stop-color="#172554"/></linearGradient></defs><rect width="1280" height="720" fill="url(#g)"/><circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/><circle cx="220" cy="620" r="220" fill="#22c55e" opacity="0.12"/><text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">地球的公转（黄赤交角/正午太阳高度）</text><text x="70" y="168" fill="#bae6fd" font-size="28">怎样用地图、图表和过程证据解释地球的公转（黄赤交角/正午太阳高度）的空间格局与成因？</text><text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：太阳高度分析师 · 课标节点：geo-h-earth-revolution</text><rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/><text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">黄赤交角</text><text x="96" y="374" fill="#dbeafe" font-size="21">学习地球的公转（黄赤交角/正午太阳高度）时，先确定研究对象的</text><text x="96" y="410" fill="#dbeafe" font-size="21">位置、尺度和边界，避免把不同区域或过程混在一起。</text><rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/><text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">太阳直射点</text><text x="486" y="374" fill="#dbeafe" font-size="21">把地球的公转（黄赤交角/正午太阳高度）放进因果链：自然条件、</text><text x="486" y="410" fill="#dbeafe" font-size="21">时间变化、人类活动如何共同改变地理现象。</text><rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/><text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">昼夜长短</text><text x="876" y="374" fill="#dbeafe" font-size="21">用地图、剖面、统计图或案例证据检验结论，而不是只背一句定义。</text><text x="876" y="410" fill="#dbeafe" font-size="21"></text><rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/><text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text><text x="260" y="585" fill="#e0f2fe" font-size="26">公转意义要抓住太阳直射点的年移动。</text><text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中地理完整模式 · AI 学伴 / TTS / 知识图谱 / 地图互动 / 课标挂树</text></svg>