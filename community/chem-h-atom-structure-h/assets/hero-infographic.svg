<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs>
  <rect width="1280" height="720" fill="url(#g)"/>
  <circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/>
  <circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/>
  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">原子结构</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">为什么质子数决定元素种类，而最外层电子决定很多化学性质？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：元素身份识别员 · 课标节点：chem-h-atom-structure-h</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">原子核</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">原子核由质子和中子构成，质子数 Z 等于核电荷数，决定元素种</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">类。</text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">核外电子</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">中性原子中核外电子数等于质子数，电子分层排布，最外层电子影响</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21">得失电子倾向。</text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">同位素与离子</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">同位素质子数相同、中子数不同；离子由原子得失电子形成，质子数</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21">不变。</text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text>
  <text x="260" y="585" fill="#e0f2fe" font-size="26">身份看质子，质量看质中，反应看外层电子。</text>
  <text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中化学完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas 互动 / 课标挂树</text>
