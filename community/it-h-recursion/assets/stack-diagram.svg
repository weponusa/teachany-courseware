<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><rect width="1000" height="560" fill="#07101c"/><text x="60" y="70" fill="#e0f2fe" font-size="42" font-family="Songti SC" font-weight="800">调用栈：先下潜，再回收</text><g font-family="Menlo" font-size="22"><rect x="130" y="130" width="330" height="70" rx="16" fill="#13223a" stroke="#38e8ff"/><text x="160" y="175" fill="#fff">factorial(5)</text><rect x="170" y="220" width="330" height="70" rx="16" fill="#13223a" stroke="#38e8ff"/><text x="200" y="265" fill="#fff">5 * factorial(4)</text><rect x="210" y="310" width="330" height="70" rx="16" fill="#13223a" stroke="#38e8ff"/><text x="240" y="355" fill="#fff">4 * factorial(3)</text><rect x="250" y="400" width="330" height="70" rx="16" fill="#2b2414" stroke="#ffd166"/><text x="280" y="445" fill="#fff">factorial(1)=1</text></g><path d="M640 150 C750 180 780 350 640 430" fill="none" stroke="#ffd166" stroke-width="8" stroke-linecap="round"/><text x="690" y="286" fill="#ffd166" font-family="Songti SC" font-size="30">返回值向上合并</text></svg>