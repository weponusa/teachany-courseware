<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">递归与分治知识结构图</title>
  <desc id="desc">大问题被递归拆成同类小问题，调用栈逐层展开，最终合并答案。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="0.55" stop-color="#0b1730"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#67e8f9"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#fb7185"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#ffffff" stroke-opacity=".06"/></pattern>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect width="1440" height="900" fill="url(#grid)"/>
  <circle cx="224" cy="180" r="190" fill="#22d3ee" opacity=".10" filter="url(#glow)"/>
  <circle cx="1180" cy="730" r="230" fill="#fb7185" opacity=".10" filter="url(#glow)"/>
  <text x="88" y="112" fill="#e5f6ff" font-family="Songti SC, Noto Serif CJK SC, serif" font-size="58" font-weight="800">递归与分治</text>
  <text x="92" y="160" fill="#94a3b8" font-family="Menlo, monospace" font-size="23">RECURSION · DIVIDE · CONQUER · COMBINE</text>
  <g transform="translate(90 248)">
    <rect x="0" y="0" width="360" height="106" rx="24" fill="#0f2038" stroke="#67e8f9" stroke-opacity=".55"/>
    <text x="34" y="45" fill="#e0f2fe" font-family="Songti SC" font-size="28" font-weight="700">原问题 P(n)</text>
    <text x="34" y="78" fill="#94a3b8" font-family="Menlo" font-size="18">规模 n，结构复杂</text>
  </g>
  <g stroke="#67e8f9" stroke-width="4" stroke-linecap="round" opacity=".85">
    <path d="M450 302 C540 260 590 240 670 220" fill="none"/>
    <path d="M450 302 C555 322 610 360 690 410" fill="none"/>
    <path d="M450 302 C540 430 590 520 680 650" fill="none"/>
  </g>
  <g transform="translate(680 166)">
    <rect width="280" height="88" rx="22" fill="#10243e" stroke="#22d3ee" stroke-opacity=".55"/>
    <text x="24" y="38" fill="#f8fafc" font-family="Songti SC" font-size="24" font-weight="700">子问题 P(n/2)</text>
    <text x="24" y="66" fill="#93c5fd" font-family="Menlo" font-size="15">same structure</text>
  </g>
  <g transform="translate(720 372)">
    <rect width="280" height="88" rx="22" fill="#10243e" stroke="#22d3ee" stroke-opacity=".55"/>
    <text x="24" y="38" fill="#f8fafc" font-family="Songti SC" font-size="24" font-weight="700">子问题 P(n/2)</text>
    <text x="24" y="66" fill="#93c5fd" font-family="Menlo" font-size="15">recursive call</text>
  </g>
  <g transform="translate(685 616)">
    <rect width="280" height="88" rx="22" fill="#1b2335" stroke="#fbbf24" stroke-opacity=".6"/>
    <text x="24" y="38" fill="#fef3c7" font-family="Songti SC" font-size="24" font-weight="700">基本情况</text>
    <text x="24" y="66" fill="#fde68a" font-family="Menlo" font-size="15">base case: stop</text>
  </g>
  <g transform="translate(1050 270)">
    <rect width="260" height="72" rx="18" fill="#0b1220" stroke="#c4b5fd" stroke-opacity=".55"/>
    <text x="24" y="44" fill="#ddd6fe" font-family="Songti SC" font-size="25" font-weight="700">调用栈展开</text>
    <rect y="94" width="260" height="56" rx="12" fill="#1e293b" stroke="#67e8f9" stroke-opacity=".45"/>
    <rect y="160" width="260" height="56" rx="12" fill="#1e293b" stroke="#67e8f9" stroke-opacity=".35"/>
    <rect y="226" width="260" height="56" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-opacity=".45"/>
    <text x="26" y="130" fill="#f8fafc" font-family="Menlo" font-size="18">factorial(5)</text>
    <text x="26" y="196" fill="#f8fafc" font-family="Menlo" font-size="18">factorial(4)</text>
    <text x="26" y="262" fill="#fef3c7" font-family="Menlo" font-size="18">factorial(1)</text>
  </g>
  <g transform="translate(1010 650)">
    <rect width="340" height="96" rx="24" fill="url(#amber)" opacity=".95"/>
    <text x="30" y="42" fill="#111827" font-family="Songti SC" font-size="28" font-weight="900">合并答案</text>
    <text x="30" y="72" fill="#111827" font-family="Menlo" font-size="17">combine small results</text>
  </g>
  <path d="M965 666 C1020 610 1048 560 1060 520" fill="none" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/>
  <text x="92" y="812" fill="#cbd5e1" font-family="Songti SC" font-size="27">三件事：出口明确、规模变小、同类问题。分治再多一步：把小答案合并成大答案。</text>
</svg>
