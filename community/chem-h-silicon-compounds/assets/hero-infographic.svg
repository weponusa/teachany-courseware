<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs>
  <rect width="1280" height="720" fill="url(#g)"/>
  <circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/>
  <circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/>
  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">硅及其化合物</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">为什么同样含硅，石英、玻璃、硅酸盐和晶体硅会表现出不同材料性质？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：材料结构分析师 · 课标节点：chem-h-silicon-compounds</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">晶体硅</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">硅位于金属与非金属交界附近，晶体硅具有半导体性质，是芯片和太</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">阳能电池的重要材料。</text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">二氧化硅</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">SiO₂ 常形成空间网状结构，熔点高、硬度大，广泛存在于石英</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21">、砂和玻璃原料中。</text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">硅酸盐材料</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">硅酸盐由 Si-O 骨架与金属阳离子构成，是玻璃、陶瓷、水泥</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21">等材料的基础。</text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text>
  <text x="260" y="585" fill="#e0f2fe" font-size="26">硅材料三看：晶体硅看半导体，二氧化硅看网络，硅酸盐看骨架和阳离子。</text>
  <text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中化学完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas 互动 / 课标挂树</text>
</svg>