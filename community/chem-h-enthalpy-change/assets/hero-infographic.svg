<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs>
  <rect width="1280" height="720" fill="url(#g)"/>
  <circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/>
  <circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/>
  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">焓变与反应热</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">为什么同一个反应反向书写时，ΔH 的符号要反过来？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：能源方案评估师 · 课标节点：chem-h-enthalpy-change</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">焓变定义</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">在恒压条件下，反应焓变可近似理解为生成物总焓与反应物总焓之差</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">：ΔH = H产物 - H反应物。</text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">符号意义</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">ΔH &lt; 0 表示放热，ΔH &gt; 0 表示吸热；反应反向书写</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21">时 ΔH 变号。</text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">系数倍数</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">热化学方程式的系数乘以 k，ΔH 也乘以 k；因为反应热与反</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21">应的物质的量成比例。</text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text>
  <text x="260" y="585" fill="#e0f2fe" font-size="26">ΔH 看终点减起点：终点低为负，反向写就变号，倍数变也跟着变。</text>
  <text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中化学完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas 互动 / 课标挂树</text>
</svg>