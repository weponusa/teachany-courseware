<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">集合运算区域速查图</title>
  <desc id="desc">用四个 Venn 图对比并集、交集、差集和补集的阴影区域。</desc>
  <rect width="1280" height="720" rx="36" fill="#f8fafc"/>
  <text x="640" y="70" text-anchor="middle" font-size="42" font-weight="800" fill="#1e293b">集合运算区域速查图</text>
  <text x="640" y="112" text-anchor="middle" font-size="22" fill="#64748b">看阴影区域：或并、且交、去掉、框内非</text>
  <defs>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;display=swap");
    text { font-family: "Noto Sans SC", system-ui, -apple-system, sans-serif; }
  </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#94a3b8" flood-opacity="0.28"/></filter>
    <clipPath id="clipA"><circle cx="0" cy="0" r="72"/></clipPath>
  </defs>
  <g transform="translate(160 205)" filter="url(#shadow)">
    <rect x="-105" y="-45" width="210" height="260" rx="22" fill="#fff"/>
    <circle cx="-36" cy="62" r="72" fill="#818cf8" fill-opacity="0.42" stroke="#4f46e5" stroke-width="5"/>
    <circle cx="36" cy="62" r="72" fill="#c084fc" fill-opacity="0.42" stroke="#9333ea" stroke-width="5"/>
    <text y="-10" text-anchor="middle" font-size="28" font-weight="800" fill="#1e293b">并集 A∪B</text>
    <text x="-70" y="42" font-size="22" font-weight="800" fill="#312e81">A</text><text x="58" y="42" font-size="22" font-weight="800" fill="#581c87">B</text>
    <text y="190" text-anchor="middle" font-size="20" fill="#475569">两个圆全部区域</text>
  </g>
  <g transform="translate(480 205)" filter="url(#shadow)">
    <rect x="-105" y="-45" width="210" height="260" rx="22" fill="#fff"/>
    <circle cx="-36" cy="62" r="72" fill="none" stroke="#4f46e5" stroke-width="5"/>
    <circle cx="36" cy="62" r="72" fill="none" stroke="#9333ea" stroke-width="5"/>
    <g transform="translate(-36 62)" clip-path="url(#clipA)"><circle cx="72" cy="0" r="72" fill="#6366f1" fill-opacity="0.45"/></g>
    <text y="-10" text-anchor="middle" font-size="28" font-weight="800" fill="#1e293b">交集 A∩B</text>
    <text x="-70" y="42" font-size="22" font-weight="800" fill="#312e81">A</text><text x="58" y="42" font-size="22" font-weight="800" fill="#581c87">B</text>
    <text y="190" text-anchor="middle" font-size="20" fill="#475569">只取重叠区域</text>
  </g>
  <g transform="translate(800 205)" filter="url(#shadow)">
    <rect x="-105" y="-45" width="210" height="260" rx="22" fill="#fff"/>
    <circle cx="-36" cy="62" r="72" fill="#818cf8" fill-opacity="0.42" stroke="#4f46e5" stroke-width="5"/>
    <circle cx="36" cy="62" r="72" fill="#fff" stroke="#9333ea" stroke-width="5"/>
    <text y="-10" text-anchor="middle" font-size="28" font-weight="800" fill="#1e293b">差集 A-B</text>
    <text x="-70" y="42" font-size="22" font-weight="800" fill="#312e81">A</text><text x="58" y="42" font-size="22" font-weight="800" fill="#581c87">B</text>
    <text y="190" text-anchor="middle" font-size="20" fill="#475569">A 中去掉 B</text>
  </g>
  <g transform="translate(1120 205)" filter="url(#shadow)">
    <rect x="-105" y="-45" width="210" height="260" rx="22" fill="#fff"/>
    <rect x="-82" y="18" width="164" height="128" rx="14" fill="#818cf8" fill-opacity="0.28" stroke="#64748b" stroke-width="4"/>
    <circle cx="0" cy="82" r="54" fill="#fff" stroke="#4f46e5" stroke-width="5"/>
    <text y="-10" text-anchor="middle" font-size="28" font-weight="800" fill="#1e293b">补集 ∁UA</text>
    <text x="-70" y="43" font-size="18" fill="#475569">U</text><text x="-10" y="88" font-size="22" font-weight="800" fill="#312e81">A</text>
    <text y="190" text-anchor="middle" font-size="20" fill="#475569">框内但不在 A</text>
  </g>
  <g transform="translate(170 555)">
    <rect x="0" y="0" width="940" height="84" rx="20" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="28" y="36" font-size="24" font-weight="800" fill="#3730a3">判断口诀</text>
    <text x="160" y="36" font-size="24" fill="#1e293b">“或”看全部，“且”看重叠，“非”先找全集。</text>
    <text x="160" y="66" font-size="20" fill="#475569">做题时先圈全集 U，再决定要取 A、B 的哪一块区域。</text>
  </g>
</svg>
