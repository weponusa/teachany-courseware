<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs>
  <rect width="1280" height="720" fill="url(#g)"/>
  <circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/>
  <circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/>
  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">分散系（溶液/胶体）</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">为什么一束光穿过胶体会出现明亮光路，而穿过真正溶液却看不见？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：饮料研发工程师 · 课标节点：chem-h-dispersion-system</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">分散系三要素</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">分散质被分散到分散剂中形成分散系。按粒子直径可分为溶液、胶体</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">和浊液。</text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">胶体的粒子尺度</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">胶体粒子通常约 1—100 nm，足够小而不易沉降，又足够大</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21">而能散射光。</text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">丁达尔效应</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">光通过胶体时被胶体粒子散射，从侧面可看到一条光路；溶液粒子太</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21">小，散射很弱。</text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text>
  <text x="260" y="585" fill="#e0f2fe" font-size="26">尺度锚点：溶液小到看不见，浊液大到会沉，胶体夹在中间会散光。</text>
  <text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中化学完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas 互动 / 课标挂树</text>
</svg>