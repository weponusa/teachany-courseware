<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5276;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e74c3c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景线 -->
  <line x1="50" y1="60" x2="750" y2="60" stroke="#34495e" stroke-width="4" />
  
  <!-- 1月 - 巴黎和会 -->
  <circle cx="100" cy="60" r="12" fill="url(#blueGrad)" />
  <text x="100" y="45" text-anchor="middle" fill="#2980b9" font-size="12" font-weight="bold">1月</text>
  <text x="100" y="85" text-anchor="middle" fill="#5d6d7e" font-size="10">巴黎和会召开</text>
  
  <!-- 4月 - 中国提案 -->
  <circle cx="280" cy="60" r="12" fill="url(#blueGrad)" />
  <text x="280" y="45" text-anchor="middle" fill="#2980b9" font-size="12" font-weight="bold">4月</text>
  <text x="280" y="85" text-anchor="middle" fill="#5d6d7e" font-size="10">中国提出收回山东权益</text>
  
  <!-- 5月4日 - 学生游行 -->
  <circle cx="460" cy="60" r="16" fill="url(#redGrad)" />
  <text x="460" y="45" text-anchor="middle" fill="#e74c3c" font-size="14" font-weight="bold">5月4日</text>
  <text x="460" y="85" text-anchor="middle" fill="#c0392b" font-size="11" font-weight="bold">学生游行 · 外争主权</text>
  
  <!-- 6月 - 工人罢工 -->
  <circle cx="640" cy="60" r="14" fill="url(#greenGrad)" />
  <text x="640" y="45" text-anchor="middle" fill="#2ecc71" font-size="12" font-weight="bold">6月</text>
  <text x="640" y="85" text-anchor="middle" fill="#27ae60" font-size="10">工人罢工 · 运动高潮</text>
  
  <!-- 6月底 - 北洋政府妥协 -->
  <circle cx="780" cy="60" r="12" fill="url(#greenGrad)" />
  <text x="780" y="45" text-anchor="middle" fill="#2ecc71" font-size="12" font-weight="bold">6月底</text>
  <text x="780" y="85" text-anchor="middle" fill="#27ae60" font-size="10">北洋政府妥协</text>
</svg>
