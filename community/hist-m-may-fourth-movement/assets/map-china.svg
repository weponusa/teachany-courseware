<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;display=swap");
    text { font-family: "Noto Sans SC", system-ui, -apple-system, sans-serif; }
  </style>
    <linearGradient id="chinaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1c40f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shandongGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 海洋背景 -->
  <rect x="0" y="0" width="400" height="300" fill="#85c1e9"/>
  
  <!-- 中国轮廓（简化） -->
  <path d="M50,100 L100,50 L180,60 L220,80 L280,90 L320,120 L340,160 L330,220 L300,260 L250,280 L180,270 L120,250 L80,220 Z" 
        fill="url(#chinaGrad)" stroke="#8b4513" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- 山东省（红色高亮） -->
  <path d="M200,80 L240,60 L260,80 L280,100 L260,120 L220,100 Z" 
        fill="url(#shandongGrad)" stroke="#c0392b" stroke-width="3" filter="url(#shadow)"/>
  
  <!-- 山东标注 -->
  <text x="240" y="95" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">山东</text>
  
  <!-- 青岛标注 -->
  <circle cx="270" cy="75" r="6" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
  <text x="285" y="75" text-anchor="start" fill="#e74c3c" font-size="10" font-weight="bold">青岛</text>
  
  <!-- 日本方向箭头 -->
  <line x1="360" y1="100" x2="280" y2="80" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <!-- 日本国旗 -->
  <rect x="340" y="60" width="30" height="20" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
  <circle cx="355" cy="70" r="8" fill="#e74c3c"/>
  
  <!-- 图例 -->
  <rect x="50" y="240" width="20" height="20" fill="#f1c40f"/>
  <text x="80" y="250" fill="#333" font-size="11">中国</text>
  
  <rect x="150" y="240" width="20" height="20" fill="#e74c3c"/>
  <text x="180" y="250" fill="#333" font-size="11">山东（权益被转让）</text>
  
  <text x="300" y="250" fill="#e74c3c" font-size="11" font-weight="bold">日本侵占方向</text>
  <line x1="300" y1="255" x2="380" y2="255" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
</svg>
