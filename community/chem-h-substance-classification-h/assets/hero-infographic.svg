<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs>
  <rect width="1280" height="720" fill="url(#g)"/>
  <circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/>
  <circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/>
  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">物质的分类</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">拿到一瓶未知物质时，怎样用“组成—性质”两条线把它快速归类？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：实验室试剂管理员 · 课标节点：chem-h-substance-classification-h</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">纯净物 / 混合物</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">只含一种物质的是纯净物；由多种物质混合且各成分保持原性质的是</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">混合物。空气、食盐水属于混合物。</text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">单质 / 化合物</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">纯净物继续看元素种类：只由一种元素组成的是单质，如 O₂、F</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21">e；由多种元素组成的是化合物，如 H₂O、NaCl。</text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">氧化物 / 酸碱盐</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">化合物还可按组成和性质细分。氧化物只含两种元素且一种是氧；酸</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21">电离产生 H⁺，碱产生 OH⁻，盐由金属离子或铵根与酸根</text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text>
  <text x="260" y="585" fill="#e0f2fe" font-size="26">分类口诀：先分纯混，再分单化；化合物里看氧酸碱盐。</text>
  <text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中化学完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas 互动 / 课标挂树</text>
</svg>