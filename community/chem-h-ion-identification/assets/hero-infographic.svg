<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs>
  <rect width="1280" height="720" fill="url(#g)"/>
  <circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/>
  <circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/>
  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">离子检验与共存</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">看到一个实验现象时，怎样把它变成可靠的离子证据，而不是猜测？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：未知溶液侦探 · 课标节点：chem-h-ion-identification</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">特征反应</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">Cl⁻ 可用 AgNO₃ 和稀 HNO₃ 检验，SO₄²⁻ </text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">可用 Ba²⁺ 试剂并注意排除 CO₃²⁻ 干扰。</text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">共存判断</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">若离子之间能生成沉淀、气体、弱电解质或发生氧化还原，就不能在</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21">溶液中大量共存。</text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">证据链</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">检验不能只写现象，还要写试剂、现象、净离子方程式和排除干扰的</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21">理由。</text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text>
  <text x="260" y="585" fill="#e0f2fe" font-size="26">检验四件套：加什么、看什么、说明什么、排除什么。</text>
  <text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中化学完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas 互动 / 课标挂树</text>
