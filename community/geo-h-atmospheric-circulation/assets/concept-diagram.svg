<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640"><rect width="1200" height="640" fill="#081426"/><circle cx="1020" cy="110" r="170" fill="#38bdf8" opacity="0.12"/><text x="80" y="100" fill="#f8fafc" font-size="48" font-weight="900">大气环流（三圈环流） · 概念结构图</text><text x="80" y="158" fill="#cbd5e1" font-size="26">怎样用地图、图表和过程证据解释大气环流（三圈环流）的空间格局与成因？</text><rect x="80" y="250" width="280" height="150" rx="22" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/><text x="110" y="330" fill="#38bdf8" font-size="30" font-weight="800">受热过程</text><rect x="440" y="250" width="280" height="150" rx="22" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/><text x="470" y="330" fill="#a78bfa" font-size="30" font-weight="800">热力环流</text><rect x="800" y="250" width="280" height="150" rx="22" fill="#0f172a" stroke="#22c55e" stroke-width="4"/><text x="830" y="330" fill="#22c55e" font-size="30" font-weight="800">天气系统</text><text x="80" y="540" fill="#fbbf24" font-size="28">从地图和图表进入问题，再回到过程、区域和人地协调。</text></svg>