<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="城市排水系统知识结构图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1d3a"/>
      <stop offset="100%" stop-color="#0a1426"/>
    </linearGradient>
    <linearGradient id="rain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity=".35"/></filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Title -->
  <text x="60" y="60" font-family="-apple-system, PingFang SC, sans-serif" font-size="32" font-weight="800" fill="#f8fafc">城市排水系统 · 知识结构</text>
  <text x="60" y="92" font-family="-apple-system, PingFang SC, sans-serif" font-size="16" fill="#94a3b8">从一滴雨到入河出海的完整路径</text>

  <!-- Rain -->
  <g opacity=".7">
    <line x1="180" y1="120" x2="170" y2="160" stroke="#7dd3fc" stroke-width="2"/>
    <line x1="240" y1="110" x2="232" y2="155" stroke="#7dd3fc" stroke-width="2"/>
    <line x1="300" y1="125" x2="294" y2="170" stroke="#7dd3fc" stroke-width="2"/>
    <line x1="360" y1="115" x2="354" y2="160" stroke="#7dd3fc" stroke-width="2"/>
    <line x1="420" y1="120" x2="416" y2="165" stroke="#7dd3fc" stroke-width="2"/>
    <line x1="480" y1="118" x2="476" y2="162" stroke="#7dd3fc" stroke-width="2"/>
    <line x1="540" y1="130" x2="538" y2="175" stroke="#7dd3fc" stroke-width="2"/>
  </g>

  <!-- 五环节 cards -->
  <g font-family="-apple-system, PingFang SC, sans-serif">
    <!-- 1. 屋顶/路面汇水 -->
    <g transform="translate(60, 200)" filter="url(#shadow)">
      <rect width="200" height="120" rx="14" fill="#14233a" stroke="#38bdf8" stroke-width="2"/>
      <text x="100" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#7dd3fc">① 汇水面</text>
      <text x="100" y="62" text-anchor="middle" font-size="14" fill="#cbd5e1">屋顶 · 路面 · 草地</text>
      <text x="100" y="84" text-anchor="middle" font-size="13" fill="#94a3b8">径流系数 φ</text>
      <text x="100" y="104" text-anchor="middle" font-size="13" fill="#94a3b8">硬化率越高 φ 越大</text>
    </g>
    <!-- 2. 雨水口 -->
    <g transform="translate(290, 200)" filter="url(#shadow)">
      <rect width="200" height="120" rx="14" fill="#14233a" stroke="#a78bfa" stroke-width="2"/>
      <text x="100" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">② 雨水口</text>
      <text x="100" y="62" text-anchor="middle" font-size="14" fill="#cbd5e1">街角篦子 · 落水管</text>
      <text x="100" y="84" text-anchor="middle" font-size="13" fill="#94a3b8">堵塞 = 内涝起点</text>
      <text x="100" y="104" text-anchor="middle" font-size="13" fill="#94a3b8">日常清扫至关重要</text>
    </g>
    <!-- 3. 排水管道 -->
    <g transform="translate(520, 200)" filter="url(#shadow)">
      <rect width="200" height="120" rx="14" fill="#14233a" stroke="#22c55e" stroke-width="2"/>
      <text x="100" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#86efac">③ 排水管道</text>
      <text x="100" y="62" text-anchor="middle" font-size="14" fill="#cbd5e1">DN300 · DN800 · DN1200</text>
      <text x="100" y="84" text-anchor="middle" font-size="13" fill="#94a3b8">Q = A · v</text>
      <text x="100" y="104" text-anchor="middle" font-size="13" fill="#94a3b8">管径不够 → 冒井盖</text>
    </g>
    <!-- 4. 泵站/调蓄池 -->
    <g transform="translate(750, 200)" filter="url(#shadow)">
      <rect width="200" height="120" rx="14" fill="#14233a" stroke="#f59e0b" stroke-width="2"/>
      <text x="100" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#fcd34d">④ 泵站 / 调蓄池</text>
      <text x="100" y="62" text-anchor="middle" font-size="14" fill="#cbd5e1">提水 · 缓冲峰值</text>
      <text x="100" y="84" text-anchor="middle" font-size="13" fill="#94a3b8">海绵城市核心设施</text>
      <text x="100" y="104" text-anchor="middle" font-size="13" fill="#94a3b8">削峰可降一半积水</text>
    </g>
    <!-- 5. 河道/海洋 -->
    <g transform="translate(980, 200)" filter="url(#shadow)">
      <rect width="160" height="120" rx="14" fill="#14233a" stroke="#38bdf8" stroke-width="2"/>
      <text x="80" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#7dd3fc">⑤ 受纳水体</text>
      <text x="80" y="62" text-anchor="middle" font-size="14" fill="#cbd5e1">河 · 湖 · 海</text>
      <text x="80" y="84" text-anchor="middle" font-size="13" fill="#94a3b8">合流制有污染</text>
      <text x="80" y="104" text-anchor="middle" font-size="13" fill="#94a3b8">分流制相对清洁</text>
    </g>
  </g>

  <!-- 连线箭头 -->
  <g stroke="url(#brand)" stroke-width="2" fill="none" marker-end="url(#arr)">
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
        <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
      </marker>
    </defs>
    <path d="M260,260 L290,260" />
    <path d="M490,260 L520,260" />
    <path d="M720,260 L750,260" />
    <path d="M950,260 L980,260" />
  </g>

  <!-- 三大主题底栏 -->
  <g font-family="-apple-system, PingFang SC, sans-serif" transform="translate(0, 380)">
    <g transform="translate(60, 0)">
      <rect width="350" height="170" rx="16" fill="rgba(56,189,248,.08)" stroke="rgba(56,189,248,.3)"/>
      <text x="22" y="38" font-size="16" font-weight="800" fill="#7dd3fc">A · 流量计算</text>
      <text x="22" y="68" font-size="13" fill="#cbd5e1">Q = ψ · q · F</text>
      <text x="22" y="92" font-size="12" fill="#94a3b8">ψ = 径流系数（草地 0.15，沥青 0.9）</text>
      <text x="22" y="112" font-size="12" fill="#94a3b8">q = 暴雨强度（mm/min）</text>
      <text x="22" y="132" font-size="12" fill="#94a3b8">F = 汇水面积（ha）</text>
      <text x="22" y="156" font-size="12" fill="#7dd3fc">→ 决定该用 DN 多大的管道</text>
    </g>
    <g transform="translate(430, 0)">
      <rect width="340" height="170" rx="16" fill="rgba(167,139,250,.08)" stroke="rgba(167,139,250,.3)"/>
      <text x="22" y="38" font-size="16" font-weight="800" fill="#c4b5fd">B · 系统类型</text>
      <text x="22" y="68" font-size="13" fill="#cbd5e1">合流制：雨污共管，省钱但污染</text>
      <text x="22" y="90" font-size="13" fill="#cbd5e1">分流制：雨污分管，新城首选</text>
      <text x="22" y="116" font-size="12" fill="#94a3b8">老城改造常见"分流后又合流"</text>
      <text x="22" y="138" font-size="12" fill="#94a3b8">海绵城市 = 渗 + 滞 + 蓄 + 净 + 用 + 排</text>
      <text x="22" y="160" font-size="12" fill="#c4b5fd">→ 决定一个城市能否抗住一场暴雨</text>
    </g>
    <g transform="translate(790, 0)">
      <rect width="350" height="170" rx="16" fill="rgba(245,158,11,.08)" stroke="rgba(245,158,11,.3)"/>
      <text x="22" y="38" font-size="16" font-weight="800" fill="#fcd34d">C · 内涝原因诊断</text>
      <text x="22" y="68" font-size="13" fill="#cbd5e1">① 管径偏小</text>
      <text x="22" y="90" font-size="13" fill="#cbd5e1">② 雨水口堵塞</text>
      <text x="22" y="112" font-size="13" fill="#cbd5e1">③ 硬化率太高（地下水补不进）</text>
      <text x="22" y="134" font-size="13" fill="#cbd5e1">④ 受纳水体顶托倒灌</text>
      <text x="22" y="158" font-size="12" fill="#fcd34d">→ 不要一概归罪于"雨太大"</text>
    </g>
  </g>

  <text x="60" y="585" font-family="-apple-system, PingFang SC, sans-serif" font-size="11" fill="#475569">TeachAny · 城市排水系统基础 · 知识结构图</text>
</svg>
