<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs>
  <rect width="1280" height="720" fill="url(#g)"/>
  <circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/>
  <circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/>
  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">化学反应速率</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">改变浓度、温度和催化剂时，为什么反应速率会改变？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：反应条件调控师 · 课标节点：chem-h-reaction-rate</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">速率表示</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">反应速率通常用单位时间内反应物浓度减少或生成物浓度增加来表示</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">。</text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">有效碰撞</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">只有具有足够能量并且取向合适的碰撞才可能导致反应。</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21"></text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">影响因素</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">升温、增大浓度、增大气体压强、增大接触面积和使用催化剂通常能</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21">提高反应速率。</text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text>
  <text x="260" y="585" fill="#e0f2fe" font-size="26">速率看有效碰撞：更多碰撞、更高能量、合适取向，反应就更快。</text>
  <text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中化学完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas 互动 / 课标挂树</text>
