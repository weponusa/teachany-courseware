<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
<defs>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;display=swap");
    text { font-family: "Noto Sans SC", system-ui, -apple-system, sans-serif; }
  </style>
</defs>
<rect width="900" height="420" fill="#0f172a" rx="16"/>
<text x="450" y="36" text-anchor="middle" fill="#a78bfa" font-size="22" font-weight="bold">三大战役对比</text>
<rect x="30" y="55" width="270" height="310" rx="10" fill="#1e3a5f" stroke="#3b82f6"/>
<text x="165" y="82" text-anchor="middle" fill="#93c5fd" font-size="16" font-weight="bold">辽沈战役</text>
<text x="50" y="110" fill="#bfdbfe" font-size="12">时间：1948.9—11</text>
<text x="50" y="135" fill="#bfdbfe" font-size="12">地点：东北地区</text>
<text x="50" y="160" fill="#bfdbfe" font-size="12">歼敌：47万</text>
<text x="50" y="185" fill="#bfdbfe" font-size="12">指挥：林彪 罗荣桓</text>
<text x="50" y="215" fill="#fbbf24" font-size="12" font-weight="bold">意义：</text>
<text x="50" y="240" fill="#bfdbfe" font-size="11">解放东北全境</text>
<text x="50" y="260" fill="#bfdbfe" font-size="11">使人民解放军在数量上</text>
<text x="50" y="280" fill="#bfdbfe" font-size="11">超过国民党军队</text>
<text x="50" y="310" fill="#34d399" font-size="12" font-weight="bold">关键：先打锦州</text>
<text x="50" y="330" fill="#94a3b8" font-size="11">关门打狗 封闭歼敌</text>
<rect x="315" y="55" width="270" height="310" rx="10" fill="#052e16" stroke="#10b981"/>
<text x="450" y="82" text-anchor="middle" fill="#6ee7b7" font-size="16" font-weight="bold">淮海战役</text>
<text x="335" y="110" fill="#a7f3d0" font-size="12">时间：1948.11—1949.1</text>
<text x="335" y="135" fill="#a7f3d0" font-size="12">地点：以徐州为中心</text>
<text x="335" y="160" fill="#a7f3d0" font-size="12">歼敌：55万</text>
<text x="335" y="185" fill="#a7f3d0" font-size="12">指挥：刘伯承 陈毅 等</text>
<text x="335" y="215" fill="#fbbf24" font-size="12" font-weight="bold">意义：</text>
<text x="335" y="240" fill="#a7f3d0" font-size="11">解放长江中下游以北</text>
<text x="335" y="260" fill="#a7f3d0" font-size="11">地区广大领土</text>
<text x="335" y="310" fill="#34d399" font-size="12" font-weight="bold">特点：规模最大</text>
<text x="335" y="330" fill="#94a3b8" font-size="11">人民群众用小车推出来的胜利</text>
<rect x="600" y="55" width="270" height="310" rx="10" fill="#422006" stroke="#f59e0b"/>
<text x="735" y="82" text-anchor="middle" fill="#fde68a" font-size="16" font-weight="bold">平津战役</text>
<text x="620" y="110" fill="#fef3c7" font-size="12">时间：1948.11—1949.1</text>
<text x="620" y="135" fill="#fef3c7" font-size="12">地点：华北地区</text>
<text x="620" y="160" fill="#fef3c7" font-size="12">歼灭改编：52万</text>
<text x="620" y="185" fill="#fef3c7" font-size="12">指挥：林彪 罗荣桓 聂荣臻</text>
<text x="620" y="215" fill="#fbbf24" font-size="12" font-weight="bold">意义：</text>
<text x="620" y="240" fill="#fef3c7" font-size="11">华北全境基本解放</text>
<text x="620" y="260" fill="#fef3c7" font-size="11">北平和平解放</text>
<text x="620" y="310" fill="#34d399" font-size="12" font-weight="bold">特点：和平解放</text>
<text x="620" y="330" fill="#94a3b8" font-size="11">保护了北平古都文化</text>
<rect x="150" y="380" width="600" height="30" rx="6" fill="#2d1515" stroke="#ef4444"/>
<text x="450" y="401" text-anchor="middle" fill="#f87171" font-size="13" font-weight="bold">三大战役共歼敌154万 国民党军队主力基本被消灭</text>
</svg>