<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
<rect width="900" height="360" fill="#0f172a" rx="16"/>
<text x="450" y="36" text-anchor="middle" fill="#60a5fa" font-size="22" font-weight="bold">解放战争战略演变</text>
<line x1="100" y1="160" x2="800" y2="160" stroke="#334155" stroke-width="2"/>
<rect x="80" y="130" width="180" height="60" rx="8" fill="#1e3a5f" stroke="#3b82f6"/>
<text x="170" y="158" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="bold">战略防御</text>
<text x="170" y="176" text-anchor="middle" fill="#bfdbfe" font-size="11">1946-1947</text>
<text x="295" y="166" fill="#fbbf24" font-size="20">&#x2192;</text>
<rect x="320" y="130" width="200" height="60" rx="8" fill="#422006" stroke="#f59e0b"/>
<text x="420" y="158" text-anchor="middle" fill="#fde68a" font-size="14" font-weight="bold">战略反攻</text>
<text x="420" y="176" text-anchor="middle" fill="#fef3c7" font-size="11">1947 挺进大别山</text>
<text x="555" y="166" fill="#fbbf24" font-size="20">&#x2192;</text>
<rect x="580" y="130" width="220" height="60" rx="8" fill="#052e16" stroke="#10b981"/>
<text x="690" y="158" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="bold">战略决战</text>
<text x="690" y="176" text-anchor="middle" fill="#a7f3d0" font-size="11">1948-1949 三大战役</text>
<rect x="200" y="240" width="500" height="50" rx="8" fill="#0d1f3c" stroke="#1d4ed8"/>
<text x="450" y="262" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">关键转折：刘邓大军千里挺进大别山</text>
<text x="450" y="280" text-anchor="middle" fill="#94a3b8" font-size="11">像一把尖刀插入敌人心脏，威胁南京和武汉</text>
</svg>