<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340">
<defs>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;display=swap");
    text { font-family: "Noto Sans SC", system-ui, -apple-system, sans-serif; }
  </style>
</defs>
<rect width="900" height="340" fill="#0f172a" rx="16"/>
<text x="450" y="36" text-anchor="middle" fill="#34d399" font-size="22" font-weight="bold">解放战争时间线 1945-1949</text>
<line x1="60" y1="140" x2="840" y2="140" stroke="#334155" stroke-width="2"/>
<circle cx="120" cy="140" r="7" fill="#60a5fa"/>
<text x="120" y="118" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">1945.8</text>
<text x="120" y="168" text-anchor="middle" fill="#94a3b8" font-size="10">重庆谈判</text>
<circle cx="240" cy="140" r="7" fill="#f87171"/>
<text x="240" y="118" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="bold">1946.6</text>
<text x="240" y="168" text-anchor="middle" fill="#94a3b8" font-size="10">全面内战</text>
<circle cx="370" cy="140" r="7" fill="#fbbf24"/>
<text x="370" y="118" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="bold">1947.6</text>
<text x="370" y="168" text-anchor="middle" fill="#94a3b8" font-size="10">挺进大别山</text>
<circle cx="510" cy="140" r="7" fill="#a78bfa"/>
<text x="510" y="118" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">1948.9</text>
<text x="510" y="168" text-anchor="middle" fill="#94a3b8" font-size="10">三大战役</text>
<circle cx="650" cy="140" r="7" fill="#34d399"/>
<text x="650" y="118" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">1949.4</text>
<text x="650" y="168" text-anchor="middle" fill="#94a3b8" font-size="10">渡江战役</text>
<circle cx="780" cy="140" r="10" fill="#f87171"/>
<text x="780" y="118" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="bold">1949.10.1</text>
<text x="780" y="168" text-anchor="middle" fill="#fca5a5" font-size="11">新中国成立</text>
<rect x="150" y="220" width="600" height="80" rx="10" fill="#0d2a1f" stroke="#059669"/>
<text x="450" y="250" text-anchor="middle" fill="#34d399" font-size="14" font-weight="bold">新民主主义革命胜利的基本经验</text>
<text x="450" y="278" text-anchor="middle" fill="#94a3b8" font-size="12">中国共产党的正确领导 + 马克思主义与中国国情结合 + 人民群众的支持</text>
</svg>