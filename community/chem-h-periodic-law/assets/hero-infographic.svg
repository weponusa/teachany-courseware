  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">周期与电子层</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">同一周期元素电子层数相同，从左到右核电荷数增加，最外层电子数</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">逐渐变化。</text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">族与最外层电子</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">同主族元素最外层电子数相同，因此化学性质具有相似性。</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21"></text>
