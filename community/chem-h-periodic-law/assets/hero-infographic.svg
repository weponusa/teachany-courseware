  <text x="876" y="374" fill="#dbeafe" font-size="21">同周期从左到右原子半径总体减小，金属性减弱，非金属性增强；同</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21">主族向下金属性增强。</text>
