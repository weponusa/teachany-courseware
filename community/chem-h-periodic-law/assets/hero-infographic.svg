  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">元素周期律</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">怎样不用死记硬背，也能根据元素在周期表中的位置预测它的性质？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：元素性质预测师 · 课标节点：chem-h-periodic-law</text>
  
