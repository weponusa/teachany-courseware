<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="PingFang SC, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#101d32"/>
    </linearGradient>
    <linearGradient id="cell-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="epi-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="mus-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="ner-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="con-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="480" y="50" text-anchor="middle" fill="#eef6ff" font-size="28" font-weight="700">细胞分化 · 知识结构图</text>
  <text x="480" y="78" text-anchor="middle" fill="#9fb4cc" font-size="14">Cell Differentiation Knowledge Map</text>
  
  <!-- Central stem cell -->
  <circle cx="480" cy="200" r="50" fill="url(#cell-grad)" opacity="0.9"/>
  <circle cx="480" cy="200" r="50" fill="none" stroke="#7dd3fc" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="480" y="195" text-anchor="middle" fill="#07111f" font-size="14" font-weight="600">未分化</text>
  <text x="480" y="212" text-anchor="middle" fill="#07111f" font-size="12">干细胞</text>
  
  <!-- Arrow down -->
  <path d="M480 255 L480 290" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="480" y="280" text-anchor="middle" fill="#38bdf8" font-size="12">分化</text>
  
  <!-- Differentiation label -->
  <rect x="380" y="295" width="200" height="30" rx="15" fill="rgba(56,189,248,0.15)" stroke="#38bdf8" stroke-width="1"/>
  <text x="480" y="315" text-anchor="middle" fill="#bae6fd" font-size="13">形态·结构·功能 发生变化</text>
  
  <!-- Four tissue types -->
  <!-- Epithelial -->
  <line x1="420" y1="330" x2="180" y2="400" stroke="#f472b6" stroke-width="1.5" opacity="0.6"/>
  <rect x="110" y="380" width="140" height="80" rx="14" fill="rgba(244,114,182,0.12)" stroke="#f472b6" stroke-width="1.5"/>
  <text x="180" y="410" text-anchor="middle" fill="#f472b6" font-size="15" font-weight="600">上皮组织</text>
  <text x="180" y="432" text-anchor="middle" fill="#9fb4cc" font-size="11">保护·分泌·吸收</text>
  <text x="180" y="450" text-anchor="middle" fill="#9fb4cc" font-size="10">如：皮肤表皮、小肠绒毛</text>
  
  <!-- Muscle -->
  <line x1="450" y1="330" x2="350" y2="400" stroke="#fb923c" stroke-width="1.5" opacity="0.6"/>
  <rect x="280" y="380" width="140" height="80" rx="14" fill="rgba(251,146,60,0.12)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="350" y="410" text-anchor="middle" fill="#fb923c" font-size="15" font-weight="600">肌肉组织</text>
  <text x="350" y="432" text-anchor="middle" fill="#9fb4cc" font-size="11">收缩·运动</text>
  <text x="350" y="450" text-anchor="middle" fill="#9fb4cc" font-size="10">如：心肌、骨骼肌</text>
  
  <!-- Nervous -->
  <line x1="510" y1="330" x2="610" y2="400" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <rect x="540" y="380" width="140" height="80" rx="14" fill="rgba(167,139,250,0.12)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="610" y="410" text-anchor="middle" fill="#a78bfa" font-size="15" font-weight="600">神经组织</text>
  <text x="610" y="432" text-anchor="middle" fill="#9fb4cc" font-size="11">感受刺激·传导兴奋</text>
  <text x="610" y="450" text-anchor="middle" fill="#9fb4cc" font-size="10">如：脑、脊髓神经细胞</text>
  
  <!-- Connective -->
  <line x1="540" y1="330" x2="780" y2="400" stroke="#34d399" stroke-width="1.5" opacity="0.6"/>
  <rect x="710" y="380" width="140" height="80" rx="14" fill="rgba(52,211,153,0.12)" stroke="#34d399" stroke-width="1.5"/>
  <text x="780" y="410" text-anchor="middle" fill="#34d399" font-size="15" font-weight="600">结缔组织</text>
  <text x="780" y="432" text-anchor="middle" fill="#9fb4cc" font-size="11">支持·连接·保护</text>
  <text x="780" y="450" text-anchor="middle" fill="#9fb4cc" font-size="10">如：血液、骨、脂肪</text>
  
  <!-- Key features box -->
  <rect x="60" y="490" width="260" height="40" rx="10" fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
  <text x="190" y="515" text-anchor="middle" fill="#bae6fd" font-size="12">特点：持久性 · 不可逆性 · 稳定性</text>
  
  <!-- Division vs Differentiation -->
  <rect x="350" y="490" width="260" height="40" rx="10" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="480" y="515" text-anchor="middle" fill="#c4b5fd" font-size="12">分裂↗数量 · 分化↗种类</text>
  
  <!-- Stem cell note -->
  <rect x="640" y="490" width="260" height="40" rx="10" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>
  <text x="770" y="515" text-anchor="middle" fill="#6ee7b7" font-size="12">干细胞：保持分化潜能的细胞</text>
  
  <!-- Prereq arrow -->
  <text x="80" y="195" text-anchor="middle" fill="#64748b" font-size="11">前置知识</text>
  <rect x="30" y="200" width="100" height="28" rx="8" fill="rgba(100,116,139,0.15)" stroke="#475569" stroke-width="1"/>
  <text x="80" y="219" text-anchor="middle" fill="#94a3b8" font-size="11">细胞分裂</text>
  <path d="M135 214 L170 214 L170 200 L430 200" stroke="#475569" stroke-width="1" fill="none" stroke-dasharray="4,3"/>
  
  <!-- Next arrow -->
  <text x="880" y="195" text-anchor="middle" fill="#64748b" font-size="11">后续知识</text>
  <rect x="830" y="200" width="100" height="28" rx="8" fill="rgba(100,116,139,0.15)" stroke="#475569" stroke-width="1"/>
  <text x="880" y="219" text-anchor="middle" fill="#94a3b8" font-size="11">组织与器官</text>
  <path d="M530 200 L790 200 L790 214 L825 214" stroke="#475569" stroke-width="1" fill="none" stroke-dasharray="4,3"/>
</svg>
