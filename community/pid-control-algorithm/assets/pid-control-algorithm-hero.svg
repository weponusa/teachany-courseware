<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">PID 控制算法知识结构图</title>
  <desc id="desc">展示闭环反馈、比例、积分、微分和响应曲线之间的关系</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#14233a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="160" cy="90" r="210" fill="#38bdf8" opacity="0.13"/>
  <circle cx="1110" cy="120" r="260" fill="#a78bfa" opacity="0.12"/>
  <text x="70" y="92" fill="#edf7ff" font-family="PingFang SC, system-ui" font-size="50" font-weight="800">PID 控制算法</text>
  <text x="72" y="138" fill="#a9bed4" font-family="PingFang SC, system-ui" font-size="24">P 看现在，I 记过去，D 看趋势，把误差变成控制量</text>

  <g transform="translate(70 220)">
    <rect x="0" y="0" width="210" height="96" rx="18" fill="#10213a" stroke="#38bdf8" stroke-opacity="0.45"/>
    <text x="105" y="40" fill="#e0f2fe" text-anchor="middle" font-family="PingFang SC, system-ui" font-size="22" font-weight="700">目标值</text>
    <text x="105" y="70" fill="#a9bed4" text-anchor="middle" font-family="PingFang SC, system-ui" font-size="17">希望达到的状态</text>
  </g>
  <g transform="translate(340 220)">
    <rect x="0" y="0" width="210" height="96" rx="18" fill="#10213a" stroke="#f59e0b" stroke-opacity="0.55"/>
    <text x="105" y="40" fill="#fef3c7" text-anchor="middle" font-family="PingFang SC, system-ui" font-size="22" font-weight="700">误差 e</text>
    <text x="105" y="70" fill="#a9bed4" text-anchor="middle" font-family="PingFang SC, system-ui" font-size="17">目标 - 实际</text>
  </g>
  <g transform="translate(610 185)">
    <rect x="0" y="0" width="250" height="166" rx="22" fill="#10213a" stroke="url(#accent)" stroke-width="2"/>
    <text x="125" y="42" fill="#edf7ff" text-anchor="middle" font-family="PingFang SC, system-ui" font-size="25" font-weight="800">PID 控制器</text>
    <text x="42" y="82" fill="#38bdf8" font-family="PingFang SC, system-ui" font-size="22" font-weight="700">P</text>
    <text x="78" y="82" fill="#a9bed4" font-family="PingFang SC, system-ui" font-size="18">当前误差</text>
    <text x="42" y="114" fill="#22c55e" font-family="PingFang SC, system-ui" font-size="22" font-weight="700">I</text>
    <text x="78" y="114" fill="#a9bed4" font-family="PingFang SC, system-ui" font-size="18">历史累计</text>
    <text x="42" y="146" fill="#a78bfa" font-family="PingFang SC, system-ui" font-size="22" font-weight="700">D</text>
    <text x="78" y="146" fill="#a9bed4" font-family="PingFang SC, system-ui" font-size="18">变化趋势</text>
  </g>
  <g transform="translate(930 220)">
    <rect x="0" y="0" width="220" height="96" rx="18" fill="#10213a" stroke="#22c55e" stroke-opacity="0.45"/>
    <text x="110" y="40" fill="#dcfce7" text-anchor="middle" font-family="PingFang SC, system-ui" font-size="22" font-weight="700">执行器</text>
    <text x="110" y="70" fill="#a9bed4" text-anchor="middle" font-family="PingFang SC, system-ui" font-size="17">输出控制量</text>
  </g>
  <g transform="translate(930 390)">
    <rect x="0" y="0" width="220" height="96" rx="18" fill="#10213a" stroke="#ef4444" stroke-opacity="0.45"/>
    <text x="110" y="40" fill="#fee2e2" text-anchor="middle" font-family="PingFang SC, system-ui" font-size="22" font-weight="700">被控对象</text>
    <text x="110" y="70" fill="#a9bed4" text-anchor="middle" font-family="PingFang SC, system-ui" font-size="17">温度/速度/高度</text>
  </g>
  <g transform="translate(610 390)">
    <rect x="0" y="0" width="250" height="96" rx="18" fill="#10213a" stroke="#38bdf8" stroke-opacity="0.45"/>
    <text x="125" y="40" fill="#e0f2fe" text-anchor="middle" font-family="PingFang SC, system-ui" font-size="22" font-weight="700">传感器反馈</text>
    <text x="125" y="70" fill="#a9bed4" text-anchor="middle" font-family="PingFang SC, system-ui" font-size="17">测量实际值</text>
  </g>

  <g stroke="#7dd3fc" stroke-width="4" fill="none" stroke-linecap="round" marker-end="url(#arrow)">
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7dd3fc"/>
    </marker>
  </defs>
  <path d="M280 268 L340 268" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M550 268 L610 268" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M860 268 L930 268" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M1040 316 L1040 390" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M930 438 L860 438" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M610 438 C460 438 440 350 445 316" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <g transform="translate(82 540)">
    <rect x="0" y="0" width="1090" height="118" rx="22" fill="#081426" stroke="#334155"/>
    <line x1="60" y1="75" x2="1030" y2="75" stroke="#334155"/>
    <path d="M60 75 C170 70 210 35 300 40 S420 88 520 58 S700 52 815 60 S940 62 1030 60" stroke="#38bdf8" stroke-width="5" fill="none" filter="url(#glow)"/>
    <line x1="60" y1="58" x2="1030" y2="58" stroke="#f59e0b" stroke-width="3" stroke-dasharray="10 8"/>
    <text x="72" y="32" fill="#edf7ff" font-family="PingFang SC, system-ui" font-size="19" font-weight="700">响应曲线：速度、过冲、稳态误差共同决定调参质量</text>
    <text x="930" y="102" fill="#a9bed4" font-family="PingFang SC, system-ui" font-size="16">时间</text>
  </g>
</svg>
