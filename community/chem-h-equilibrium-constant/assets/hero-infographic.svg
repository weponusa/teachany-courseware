<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs>
  <rect width="1280" height="720" fill="url(#g)"/>
  <circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/>
  <circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/>
  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">平衡常数</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">为什么 K 很大时，平衡通常更偏向生成物？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：平衡数据分析师 · 课标节点：chem-h-equilibrium-constant</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">表达式</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">对 aA+bB⇌cC+dD，K=[C]^c[D]^d/[A]</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">^a[B]^b，固体和纯液体通常不写入。</text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">数值意义</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">K 越大，平衡时生成物相对越多；K 越小，平衡时反应物相对越</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21">多。</text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">影响因素</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">在给定反应中，K 只随温度改变；改变浓度会移动平衡，但新的平</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21">衡仍满足同一温度下的 K。</text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text>
  <text x="260" y="585" fill="#e0f2fe" font-size="26">K 大偏产物，K 小偏反应物；温度才改 K，浓度只改 Q。</text>
  <text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中化学完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas 互动 / 课标挂树</text>
</svg>