<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs><rect width="1280" height="720" fill="url(#g)"/><circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/><circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/><text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">光的直线传播</text><text x="70" y="168" fill="#bae6fd" font-size="28">怎样用实验现象和变量关系解释光的直线传播？</text><text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：光路实验员 · 课标节点：phy-m-light-propagation</text><rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/><text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">光源</text><text x="96" y="374" fill="#dbeafe" font-size="21">学习光的直线传播先要明确观察对象和实验条件，不能把生活直觉直</text><text x="96" y="410" fill="#dbeafe" font-size="21">接当结论。</text><rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/><text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">直线传播</text><text x="486" y="374" fill="#dbeafe" font-size="21">把光的直线传播拆成可改变的变量、可观察的结果和需要控制的条件</text><text x="486" y="410" fill="#dbeafe" font-size="21">。</text><rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/><text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">影和小孔成像</text><text x="876" y="374" fill="#dbeafe" font-size="21">用测量数据、图像或现象证据检验解释，而不是只背公式或定义。</text><text x="876" y="410" fill="#dbeafe" font-size="21"></text><rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/><text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text><text x="260" y="585" fill="#e0f2fe" font-size="26">光路题先画光线，再说明条件：同种均匀介质中沿直线传播。</text><text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 初中物理完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas+PhET 互动 / 课标挂树</text></svg>