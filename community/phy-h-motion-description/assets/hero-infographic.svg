<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs><rect width="1280" height="720" fill="url(#g)"/><circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/><circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/><text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">运动的描述</text><text x="70" y="168" fill="#bae6fd" font-size="28">为什么讨论运动前必须先问“相对于谁在运动”？</text><text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：运动数据记录员 · 课标节点：phy-h-motion-description</text><rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/><text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">参考系</text><text x="96" y="374" fill="#dbeafe" font-size="21">描述物体运动时被选作标准的物体或坐标系。参考系不同，运动状态</text><text x="96" y="410" fill="#dbeafe" font-size="21">描述可能不同。</text><rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/><text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">位移与路程</text><text x="486" y="374" fill="#dbeafe" font-size="21">位移是从初位置指向末位置的矢量，路程是实际轨迹长度，二者一般</text><text x="486" y="410" fill="#dbeafe" font-size="21">不相同。</text><rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/><text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">速度与加速度</text><text x="876" y="374" fill="#dbeafe" font-size="21">速度描述位置变化快慢和方向，加速度描述速度变化快慢和方向。</text><text x="876" y="410" fill="#dbeafe" font-size="21"></text><rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/><text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text><text x="260" y="585" fill="#e0f2fe" font-size="26">运动描述三步：定参考系，看位移，再看速度怎样变。</text><text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中物理完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas 互动 / 课标挂树</text></svg>