  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">烃（烷/烯/炔/芳）</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">为什么乙烯能使溴水褪色，而甲烷通常不能？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：石油组分分析员 · 课标节点：chem-h-hydrocarbon</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">烷烃</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">只含 C-C 单键和 C-H 键，化学性质较稳定，典型反应有</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">燃烧和取代。</text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">不饱和烃</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">烯烃含 C=C，炔烃含 C≡C，π 键较活泼，易发生加成。</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21"></text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">芳香烃</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">苯环具有特殊稳定性，常发生取代反应而不是简单加成。</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21"></text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
