<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
<defs>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;display=swap");
    text { font-family: "Noto Sans SC", system-ui, -apple-system, sans-serif; }
  </style>
</defs>
  <rect width="900" height="420" fill="#052e16" rx="16"/>
  <text x="450" y="46" text-anchor="middle" fill="#34d399" font-size="24" font-weight="bold" font-family="serif">《权利法案》1689 — 核心条款</text>
  <!-- 左列 -->
  <rect x="40" y="70" width="380" height="52" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="60" y="91" fill="#6ee7b7" font-size="13" font-weight="bold">议会权力</text>
  <text x="60" y="111" fill="#d1fae5" font-size="12">国王不得干涉议会选举，议会须定期召开</text>

  <rect x="40" y="138" width="380" height="52" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="60" y="159" fill="#6ee7b7" font-size="13" font-weight="bold">征税限制</text>
  <text x="60" y="179" fill="#d1fae5" font-size="12">未经议会同意，国王不得征税</text>

  <rect x="40" y="206" width="380" height="52" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="60" y="227" fill="#6ee7b7" font-size="13" font-weight="bold">军队限制</text>
  <text x="60" y="247" fill="#d1fae5" font-size="12">和平时期不得招募常备军</text>

  <rect x="40" y="274" width="380" height="52" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="60" y="295" fill="#6ee7b7" font-size="13" font-weight="bold">法律至上</text>
  <text x="60" y="315" fill="#d1fae5" font-size="12">国王不得暂停法律效力</text>

  <!-- 右列 -->
  <rect x="480" y="70" width="380" height="52" rx="8" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1"/>
  <text x="500" y="91" fill="#93c5fd" font-size="13" font-weight="bold">公民权利</text>
  <text x="500" y="111" fill="#dbeafe" font-size="12">臣民有向国王请愿的权利</text>

  <rect x="480" y="138" width="380" height="52" rx="8" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1"/>
  <text x="500" y="159" fill="#93c5fd" font-size="13" font-weight="bold">司法独立</text>
  <text x="500" y="179" fill="#dbeafe" font-size="12">法官独立，不受国王任意罢免</text>

  <rect x="480" y="206" width="380" height="52" rx="8" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1"/>
  <text x="500" y="227" fill="#93c5fd" font-size="13" font-weight="bold">言论自由</text>
  <text x="500" y="247" fill="#dbeafe" font-size="12">议会内言论不受法庭追究</text>

  <!-- 底部结论 -->
  <rect x="180" y="346" width="540" height="52" rx="10" fill="#14532d" stroke="#34d399" stroke-width="2"/>
  <text x="450" y="367" text-anchor="middle" fill="#86efac" font-size="14" font-weight="bold">历史意义</text>
  <text x="450" y="387" text-anchor="middle" fill="#bbf7d0" font-size="13">奠定英国君主立宪制基础，开启近代资产阶级民主政治先河</text>
</svg>