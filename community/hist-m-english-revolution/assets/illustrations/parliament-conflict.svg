<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1e1a40"/>
  <text x="400" y="80" text-anchor="middle" fill="#e2c97e" font-size="32" font-family="serif" font-weight="bold">英国议会 vs 斯图亚特王朝</text>
  <!-- 议会 -->
  <rect x="80" y="120" width="260" height="200" rx="12" fill="#3b82f6" opacity="0.8"/>
  <text x="210" y="190" text-anchor="middle" fill="white" font-size="20" font-weight="bold">英国议会</text>
  <text x="210" y="220" text-anchor="middle" fill="#bfdbfe" font-size="14">资产阶级 + 新贵族</text>
  <text x="210" y="250" text-anchor="middle" fill="#bfdbfe" font-size="13">《大宪章》传统</text>
  <text x="210" y="275" text-anchor="middle" fill="#bfdbfe" font-size="13">法律高于国王</text>
  <!-- 箭头 -->
  <line x1="345" y1="220" x2="455" y2="220" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="455" y1="250" x2="345" y2="250" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow2)"/>
  <text x="400" y="210" text-anchor="middle" fill="#f59e0b" font-size="12">对抗</text>
  <text x="400" y="270" text-anchor="middle" fill="#ef4444" font-size="12">镇压</text>
  <defs>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;display=swap");
    text { font-family: "Noto Sans SC", system-ui, -apple-system, sans-serif; }
  </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
  </defs>
  <!-- 国王 -->
  <rect x="460" y="120" width="260" height="200" rx="12" fill="#7c3aed" opacity="0.8"/>
  <text x="590" y="190" text-anchor="middle" fill="white" font-size="20" font-weight="bold">斯图亚特王朝</text>
  <text x="590" y="220" text-anchor="middle" fill="#ddd6fe" font-size="14">查理一世</text>
  <text x="590" y="250" text-anchor="middle" fill="#ddd6fe" font-size="13">君权神授</text>
  <text x="590" y="275" text-anchor="middle" fill="#ddd6fe" font-size="13">不经议会征税</text>
  <!-- 结果 -->
  <rect x="250" y="360" width="300" height="80" rx="10" fill="#10b981" opacity="0.85"/>
  <text x="400" y="395" text-anchor="middle" fill="white" font-size="18" font-weight="bold">《权利法案》1689</text>
  <text x="400" y="420" text-anchor="middle" fill="#d1fae5" font-size="13">君主立宪制确立</text>
</svg>