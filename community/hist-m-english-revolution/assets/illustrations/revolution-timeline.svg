<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
<defs>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;display=swap");
    text { font-family: "Noto Sans SC", system-ui, -apple-system, sans-serif; }
  </style>
</defs>
  <rect width="900" height="420" fill="#0f172a" rx="16"/>
  <text x="450" y="44" text-anchor="middle" fill="#60a5fa" font-size="24" font-weight="bold" font-family="serif">英国资产阶级革命时间线 1640–1689</text>
  <!-- 横轴 -->
  <line x1="60" y1="200" x2="840" y2="200" stroke="#334155" stroke-width="2"/>
  <!-- 节点数据：x, year, label, color, y-offset(up/down) -->
  <!-- 1640 -->
  <circle cx="120" cy="200" r="8" fill="#3b82f6"/>
  <line x1="120" y1="192" x2="120" y2="140" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="120" y="130" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold">1640</text>
  <text x="120" y="113" text-anchor="middle" fill="#cbd5e1" font-size="11">长期议会</text>
  <text x="120" y="98"  text-anchor="middle" fill="#cbd5e1" font-size="11">召开</text>
  <!-- 1642 -->
  <circle cx="230" cy="200" r="8" fill="#ef4444"/>
  <line x1="230" y1="208" x2="230" y2="265" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="230" y="278" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="bold">1642</text>
  <text x="230" y="293" text-anchor="middle" fill="#cbd5e1" font-size="11">内战</text>
  <text x="230" y="308" text-anchor="middle" fill="#cbd5e1" font-size="11">爆发</text>
  <!-- 1649 -->
  <circle cx="370" cy="200" r="8" fill="#f59e0b"/>
  <line x1="370" y1="192" x2="370" y2="140" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="370" y="130" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="bold">1649</text>
  <text x="370" y="113" text-anchor="middle" fill="#cbd5e1" font-size="11">查理一世</text>
  <text x="370" y="98"  text-anchor="middle" fill="#cbd5e1" font-size="11">被处决</text>
  <!-- 1653 -->
  <circle cx="500" cy="200" r="8" fill="#8b5cf6"/>
  <line x1="500" y1="208" x2="500" y2="265" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="500" y="278" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="bold">1653</text>
  <text x="500" y="293" text-anchor="middle" fill="#cbd5e1" font-size="11">克伦威尔</text>
  <text x="500" y="308" text-anchor="middle" fill="#cbd5e1" font-size="11">独裁统治</text>
  <!-- 1660 -->
  <circle cx="640" cy="200" r="8" fill="#06b6d4"/>
  <line x1="640" y1="192" x2="640" y2="140" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="640" y="130" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="bold">1660</text>
  <text x="640" y="113" text-anchor="middle" fill="#cbd5e1" font-size="11">王朝</text>
  <text x="640" y="98"  text-anchor="middle" fill="#cbd5e1" font-size="11">复辟</text>
  <!-- 1689 -->
  <circle cx="790" cy="200" r="10" fill="#10b981"/>
  <line x1="790" y1="208" x2="790" y2="265" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="790" y="278" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="bold">1689</text>
  <text x="790" y="293" text-anchor="middle" fill="#a7f3d0" font-size="12" font-weight="bold">《权利法案》</text>
  <text x="790" y="310" text-anchor="middle" fill="#a7f3d0" font-size="11">君主立宪</text>
  <text x="790" y="325" text-anchor="middle" fill="#a7f3d0" font-size="11">制确立</text>
  <!-- 底部说明 -->
  <text x="450" y="390" text-anchor="middle" fill="#475569" font-size="12">革命历经近50年，以《权利法案》的颁布宣告完成</text>
</svg>