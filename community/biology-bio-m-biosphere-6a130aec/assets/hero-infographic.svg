<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="PingFang SC, system-ui, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="40%" stop-color="#4fc3f7"/>
      <stop offset="60%" stop-color="#81d4fa"/>
      <stop offset="100%" stop-color="#e1f5fe"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#039be5"/>
      <stop offset="100%" stop-color="#01579b"/>
    </linearGradient>
    <linearGradient id="rock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5d4037"/>
      <stop offset="100%" stop-color="#3e2723"/>
    </linearGradient>
  </defs>

  <!-- Background: atmosphere -->
  <rect width="960" height="540" fill="url(#sky)"/>

  <!-- Atmosphere layer -->
  <rect x="0" y="0" width="960" height="180" fill="url(#sky)" opacity="0.9"/>
  <text x="60" y="50" font-size="18" fill="#fff" font-weight="bold">大气圈底部</text>
  <text x="60" y="75" font-size="13" fill="#b3e5fc">飞鸟、昆虫、细菌、花粉</text>

  <!-- Bird silhouettes -->
  <path d="M200 80 Q215 65 230 80 Q245 65 260 80" fill="none" stroke="#fff" stroke-width="2"/>
  <path d="M320 60 Q335 45 350 60 Q365 45 380 60" fill="none" stroke="#fff" stroke-width="2"/>
  <path d="M700 100 Q715 85 730 100 Q745 85 760 100" fill="none" stroke="#fff" stroke-width="2"/>

  <!-- Cloud -->
  <ellipse cx="550" cy="70" rx="60" ry="25" fill="#fff" opacity="0.3"/>
  <ellipse cx="590" cy="65" rx="40" ry="20" fill="#fff" opacity="0.25"/>

  <!-- Water layer -->
  <rect x="0" y="180" width="960" height="180" fill="url(#water)" opacity="0.85"/>
  <text x="60" y="220" font-size="18" fill="#fff" font-weight="bold">水圈的大部</text>
  <text x="60" y="245" font-size="13" fill="#b3e5fc">鱼类、海藻、浮游生物、珊瑚</text>

  <!-- Fish -->
  <ellipse cx="300" cy="280" rx="25" ry="12" fill="#ffab40"/>
  <polygon points="275,280 260,270 260,290" fill="#ffab40"/>
  <circle cx="315" cy="277" r="3" fill="#1a1a1a"/>

  <ellipse cx="600" cy="310" rx="20" ry="10" fill="#69f0ae"/>
  <polygon points="580,310 568,302 568,318" fill="#69f0ae"/>

  <!-- Seaweed -->
  <path d="M150 360 Q160 330 155 300 Q165 270 160 250" fill="none" stroke="#2e7d32" stroke-width="3"/>
  <path d="M170 360 Q180 340 175 310 Q185 290 180 265" fill="none" stroke="#388e3c" stroke-width="3"/>

  <!-- Rock/Lithosphere layer -->
  <rect x="0" y="360" width="960" height="180" fill="url(#rock)"/>
  <text x="60" y="400" font-size="18" fill="#fff" font-weight="bold">岩石圈表面</text>
  <text x="60" y="425" font-size="13" fill="#bcaaa4">植物根系、蚯蚓、微生物、地下水中的细菌</text>

  <!-- Ground surface with grass -->
  <rect x="0" y="358" width="960" height="8" fill="#4caf50"/>
  <path d="M100 358 L105 340 L110 358 M130 358 L135 342 L140 358 M160 358 L165 338 L170 358" fill="#66bb6a"/>
  <path d="M400 358 L405 342 L410 358 M430 358 L435 340 L440 358" fill="#66bb6a"/>

  <!-- Tree -->
  <rect x="480" y="320" width="12" height="40" fill="#5d4037"/>
  <ellipse cx="486" cy="310" rx="30" ry="25" fill="#2e7d32"/>
  <ellipse cx="500" cy="320" rx="20" ry="18" fill="#388e3c"/>

  <!-- Root system -->
  <path d="M486 360 Q480 390 470 420 M486 360 Q490 400 500 430 M486 360 Q486 395 486 440" fill="none" stroke="#6d4c41" stroke-width="2"/>

  <!-- Earthworm -->
  <path d="M700 420 Q720 415 740 420 Q760 425 780 420" fill="none" stroke="#e8a0bf" stroke-width="4" stroke-linecap="round"/>

  <!-- Title banner -->
  <rect x="280" y="460" width="400" height="60" rx="12" fill="rgba(0,0,0,0.7)"/>
  <text x="480" y="490" text-anchor="middle" font-size="22" fill="#fff" font-weight="bold">🌍 生物圈 = 所有生物 + 环境</text>
  <text x="480" y="512" text-anchor="middle" font-size="13" fill="#b3e5fc">地球上最大的生态系统 · 生命活动的唯一家园</text>

  <!-- Conditions icons on right -->
  <g transform="translate(800, 180)">
    <rect x="0" y="0" width="140" height="170" rx="10" fill="rgba(0,0,0,0.5)"/>
    <text x="70" y="25" text-anchor="middle" font-size="12" fill="#ffeb3b" font-weight="bold">生存条件</text>
    <text x="20" y="50" font-size="12" fill="#fff">☀️ 阳光</text>
    <text x="20" y="73" font-size="12" fill="#fff">💧 水</text>
    <text x="20" y="96" font-size="12" fill="#fff">🌬️ 空气</text>
    <text x="20" y="119" font-size="12" fill="#fff">🌡️ 温度</text>
    <text x="20" y="142" font-size="12" fill="#fff">🥗 营养物质</text>
    <text x="20" y="165" font-size="12" fill="#fff">🏠 生存空间</text>
  </g>

  <!-- Boundary markers -->
  <line x1="0" y1="180" x2="960" y2="180" stroke="#fff" stroke-width="1" stroke-dasharray="8,4" opacity="0.5"/>
  <line x1="0" y1="360" x2="960" y2="360" stroke="#fff" stroke-width="1" stroke-dasharray="8,4" opacity="0.5"/>
</svg>
