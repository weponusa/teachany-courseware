<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540"><rect width="960" height="540" rx="36" fill="#07111f"/><rect x="70" y="80" width="820" height="360" rx="30" fill="#10233b" stroke="#22d3ee"/><text x="110" y="150" fill="#ecfeff" font-size="38" font-family="PingFang SC" font-weight="800">四步判断图像变换</text><text x="120" y="230" fill="#fde68a" font-size="27" font-family="PingFang SC">1 看 a：开口方向和宽窄</text><text x="120" y="285" fill="#d1fae5" font-size="27" font-family="PingFang SC">2 看 h：顶点横坐标，对称轴 x=h</text><text x="120" y="340" fill="#d1fae5" font-size="27" font-family="PingFang SC">3 看 k：顶点纵坐标，上下平移</text><text x="120" y="395" fill="#93c5fd" font-size="27" font-family="PingFang SC">4 合起来：写顶点、对称轴、开口、平移</text></svg>