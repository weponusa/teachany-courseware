<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, Source Han Sans SC, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1a2e"/>
      <stop offset="100%" stop-color="#07111f"/>
    </linearGradient>
    <linearGradient id="node1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="node2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="node3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="node4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="480" fill="url(#bg)" rx="18"/>

  <!-- Connection lines -->
  <line x1="480" y1="80" x2="200" y2="190" stroke="rgba(56,189,248,0.3)" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="480" y1="80" x2="480" y2="190" stroke="rgba(56,189,248,0.3)" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="480" y1="80" x2="760" y2="190" stroke="rgba(56,189,248,0.3)" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="200" y1="240" x2="130" y2="350" stroke="rgba(167,139,250,0.3)" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="200" y1="240" x2="270" y2="350" stroke="rgba(167,139,250,0.3)" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="480" y1="240" x2="480" y2="350" stroke="rgba(34,197,94,0.3)" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="760" y1="240" x2="690" y2="350" stroke="rgba(245,158,11,0.3)" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="760" y1="240" x2="830" y2="350" stroke="rgba(245,158,11,0.3)" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Top node: 摩擦力 -->
  <g filter="url(#glow)">
    <rect x="380" y="40" width="200" height="50" rx="25" fill="url(#node1)"/>
    <text x="480" y="72" text-anchor="middle" fill="#fff" font-size="20" font-weight="800">摩擦力</text>
  </g>

  <!-- Level 2: 分类 -->
  <rect x="110" y="185" width="180" height="48" rx="24" fill="url(#node2)"/>
  <text x="200" y="215" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">滑动摩擦力</text>

  <rect x="390" y="185" width="180" height="48" rx="24" fill="url(#node2)"/>
  <text x="480" y="215" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">静摩擦力</text>

  <rect x="670" y="185" width="180" height="48" rx="24" fill="url(#node2)"/>
  <text x="760" y="215" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">滚动摩擦力</text>

  <!-- Level 3: Details -->
  <rect x="55" y="340" width="150" height="44" rx="22" fill="rgba(167,139,250,0.2)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
  <text x="130" y="368" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">f = μN</text>

  <rect x="215" y="340" width="110" height="44" rx="22" fill="rgba(167,139,250,0.2)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
  <text x="270" y="368" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">与运动反向</text>

  <rect x="410" y="340" width="140" height="44" rx="22" fill="rgba(34,197,94,0.2)" stroke="rgba(34,197,94,0.4)" stroke-width="1"/>
  <text x="480" y="368" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600">0 ≤ f ≤ f_max</text>

  <rect x="615" y="340" width="150" height="44" rx="22" fill="rgba(245,158,11,0.2)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="690" y="368" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="600">⬆️ 增大摩擦</text>

  <rect x="775" y="340" width="150" height="44" rx="22" fill="rgba(245,158,11,0.2)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="850" y="368" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="600">⬇️ 减小摩擦</text>

  <!-- Bottom: 产生条件 -->
  <rect x="200" y="420" width="560" height="36" rx="18" fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.25)" stroke-width="1"/>
  <text x="480" y="444" text-anchor="middle" fill="#7dd3fc" font-size="13">产生条件：接触 + 挤压（有压力）+ 粗糙 + 有相对运动/运动趋势</text>

  <!-- Decorative dots -->
  <circle cx="50" cy="60" r="2" fill="rgba(56,189,248,0.3)"/>
  <circle cx="910" cy="100" r="3" fill="rgba(167,139,250,0.3)"/>
  <circle cx="30" cy="300" r="2" fill="rgba(34,197,94,0.3)"/>
  <circle cx="930" cy="400" r="2" fill="rgba(245,158,11,0.3)"/>
</svg>
