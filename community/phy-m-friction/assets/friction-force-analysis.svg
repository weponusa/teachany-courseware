<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0c1a2e"/><stop offset="100%" stop-color="#14233a"/></linearGradient>
  </defs>
  <rect width="480" height="280" fill="url(#bg1)" rx="14"/>
  <!-- Ground -->
  <rect x="40" y="180" width="400" height="20" rx="4" fill="#3a4a62"/>
  <text x="240" y="218" text-anchor="middle" fill="#94a3b8" font-size="12">粗糙接触面</text>
  <!-- Box -->
  <rect x="170" y="120" width="80" height="60" rx="6" fill="#3b82f6" opacity="0.9"/>
  <text x="210" y="156" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">物体</text>
  <!-- Push arrow -->
  <line x1="100" y1="150" x2="165" y2="150" stroke="#38bdf8" stroke-width="3"/>
  <polygon points="165,143 178,150 165,157" fill="#38bdf8"/>
  <text x="110" y="140" fill="#38bdf8" font-size="13" font-weight="600">推力 F</text>
  <!-- Friction arrow -->
  <line x1="250" y1="175" x2="320" y2="175" stroke="#ef4444" stroke-width="3"/>
  <polygon points="320,168 333,175 320,182" fill="#ef4444"/>
  <text x="270" y="165" fill="#ef4444" font-size="13" font-weight="600">摩擦力 f</text>
  <!-- Weight arrow -->
  <line x1="210" y1="180" x2="210" y2="230" stroke="#22c55e" stroke-width="2"/>
  <polygon points="203,230 210,243 217,230" fill="#22c55e"/>
  <text x="225" y="240" fill="#22c55e" font-size="12">G</text>
  <!-- Normal force arrow -->
  <line x1="210" y1="120" x2="210" y2="80" stroke="#a78bfa" stroke-width="2"/>
  <polygon points="203,80 210,67 217,80" fill="#a78bfa"/>
  <text x="225" y="75" fill="#a78bfa" font-size="12">N</text>
  <!-- Title -->
  <text x="240" y="35" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">摩擦力受力分析</text>
  <!-- Rough texture lines -->
  <g stroke="#5a6a82" stroke-width="1" opacity="0.5">
    <line x1="50" y1="183" x2="55" y2="190"/><line x1="80" y1="183" x2="85" y2="190"/>
    <line x1="110" y1="183" x2="115" y2="190"/><line x1="140" y1="183" x2="145" y2="190"/>
    <line x1="170" y1="183" x2="175" y2="190"/><line x1="250" y1="183" x2="255" y2="190"/>
    <line x1="280" y1="183" x2="285" y2="190"/><line x1="310" y1="183" x2="315" y2="190"/>
    <line x1="340" y1="183" x2="345" y2="190"/><line x1="370" y1="183" x2="375" y2="190"/>
    <line x1="400" y1="183" x2="405" y2="190"/><line x1="420" y1="183" x2="425" y2="190"/>
  </g>
</svg>
