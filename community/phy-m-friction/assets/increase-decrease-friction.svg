<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0c1a2e"/><stop offset="100%" stop-color="#14233a"/></linearGradient>
  </defs>
  <rect width="480" height="280" fill="url(#bg3)" rx="14"/>
  <text x="240" y="30" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">增大摩擦 vs 减小摩擦</text>
  <!-- Left: 增大 -->
  <text x="120" y="55" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="700">⬆️ 增大摩擦</text>
  <!-- Shoe sole -->
  <rect x="40" y="70" width="60" height="80" rx="8" fill="#4a5568"/>
  <g stroke="#718096" stroke-width="2">
    <line x1="48" y1="85" x2="92" y2="85"/><line x1="48" y1="95" x2="92" y2="95"/>
    <line x1="48" y1="105" x2="92" y2="105"/><line x1="48" y1="115" x2="92" y2="115"/>
    <line x1="48" y1="125" x2="92" y2="125"/><line x1="48" y1="135" x2="92" y2="135"/>
  </g>
  <text x="70" y="168" text-anchor="middle" fill="#94a3b8" font-size="11">鞋底花纹</text>
  <!-- Brake -->
  <circle cx="120" cy="100" r="25" fill="none" stroke="#6b7280" stroke-width="3"/>
  <rect x="105" y="65" width="30" height="10" rx="2" fill="#ef4444"/>
  <text x="120" y="168" text-anchor="middle" fill="#94a3b8" font-size="11">刹车捏闸</text>
  <text x="120" y="195" text-anchor="middle" fill="#64748b" font-size="10">增大压力/粗糙度</text>
  <!-- Divider -->
  <line x1="240" y1="45" x2="240" y2="260" stroke="#25415f" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- Right: 减小 -->
  <text x="360" y="55" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="700">⬇️ 减小摩擦</text>
  <!-- Wheel -->
  <circle cx="300" cy="95" r="20" fill="none" stroke="#6b7280" stroke-width="3"/>
  <circle cx="300" cy="95" r="4" fill="#94a3b8"/>
  <text x="300" y="130" text-anchor="middle" fill="#94a3b8" font-size="11">滚轮</text>
  <!-- Oil drop -->
  <ellipse cx="360" cy="85" rx="12" ry="16" fill="#38bdf8" opacity="0.6"/>
  <text x="360" y="130" text-anchor="middle" fill="#94a3b8" font-size="11">润滑油</text>
  <!-- Maglev -->
  <rect x="410" y="80" width="40" height="15" rx="4" fill="#a78bfa" opacity="0.7"/>
  <rect x="415" y="100" width="30" height="3" rx="1" fill="#38bdf8" opacity="0.4"/>
  <text x="430" y="125" text-anchor="middle" fill="#94a3b8" font-size="11">磁悬浮</text>
  <text x="360" y="195" text-anchor="middle" fill="#64748b" font-size="10">减小压力/粗糙度</text>
  <text x="360" y="210" text-anchor="middle" fill="#64748b" font-size="10">变滑动为滚动</text>
  <text x="360" y="225" text-anchor="middle" fill="#64748b" font-size="10">使接触面分离</text>
  <!-- Bottom comparison -->
  <rect x="40" y="240" width="180" height="28" rx="14" fill="rgba(34,197,94,.1)" stroke="rgba(34,197,94,.25)" stroke-width="1"/>
  <text x="130" y="259" text-anchor="middle" fill="#86efac" font-size="12">安全、防滑、制动</text>
  <rect x="260" y="240" width="180" height="28" rx="14" fill="rgba(245,158,11,.1)" stroke="rgba(245,158,11,.25)" stroke-width="1"/>
  <text x="350" y="259" text-anchor="middle" fill="#fcd34d" font-size="12">省力、高效、减少磨损</text>
</svg>
