<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0c1a2e"/><stop offset="100%" stop-color="#14233a"/></linearGradient>
  </defs>
  <rect width="480" height="280" fill="url(#bg2)" rx="14"/>
  <!-- Left: 静摩擦力 -->
  <text x="120" y="30" text-anchor="middle" fill="#a78bfa" font-size="15" font-weight="700">静摩擦力</text>
  <rect x="60" y="130" width="70" height="50" rx="6" fill="#7c3aed" opacity="0.8"/>
  <text x="95" y="160" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">箱子</text>
  <rect x="30" y="180" width="160" height="14" rx="3" fill="#3a4a62"/>
  <!-- Push arrow small -->
  <line x1="10" y1="155" x2="55" y2="155" stroke="#38bdf8" stroke-width="2"/>
  <polygon points="55,150 62,155 55,160" fill="#38bdf8"/>
  <text x="20" y="148" fill="#38bdf8" font-size="11">F推=10N</text>
  <!-- Friction arrow small -->
  <line x1="130" y1="177" x2="165" y2="177" stroke="#ef4444" stroke-width="2"/>
  <polygon points="165,172 172,177 165,182" fill="#ef4444"/>
  <text x="138" y="200" fill="#ef4444" font-size="11">f静=10N</text>
  <text x="95" y="230" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">箱子不动！</text>
  <text x="95" y="250" text-anchor="middle" fill="#94a3b8" font-size="11">f静 = F推</text>
  <!-- Divider -->
  <line x1="240" y1="20" x2="240" y2="260" stroke="#25415f" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- Right: 滑动摩擦力 -->
  <text x="360" y="30" text-anchor="middle" fill="#38bdf8" font-size="15" font-weight="700">滑动摩擦力</text>
  <rect x="290" y="130" width="70" height="50" rx="6" fill="#2563eb" opacity="0.8"/>
  <text x="325" y="160" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">箱子</text>
  <rect x="260" y="180" width="160" height="14" rx="3" fill="#3a4a62"/>
  <!-- Push arrow large -->
  <line x1="250" y1="155" x2="285" y2="155" stroke="#38bdf8" stroke-width="3"/>
  <polygon points="285,148 296,155 285,162" fill="#38bdf8"/>
  <text x="248" y="148" fill="#38bdf8" font-size="11">F推=30N</text>
  <!-- Friction arrow -->
  <line x1="360" y1="177" x2="400" y2="177" stroke="#ef4444" stroke-width="2"/>
  <polygon points="400,172 410,177 400,182" fill="#ef4444"/>
  <text x="370" y="200" fill="#ef4444" font-size="11">f滑=20N</text>
  <!-- Motion arrows -->
  <text x="325" y="115" text-anchor="middle" fill="#fbbf24" font-size="18">→→→</text>
  <text x="325" y="230" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">箱子在动！</text>
  <text x="325" y="250" text-anchor="middle" fill="#94a3b8" font-size="11">f滑 = μN（与推力无关）</text>
</svg>
