<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" role="img" aria-label="三种应用文对比">
  <rect width="720" height="240" fill="#fffbf0" rx="12"/>
  <text x="360" y="28" fill="#333" font-size="18" font-family="PingFang SC,sans-serif" text-anchor="middle" font-weight="700">通知 / 邀请函 / 倡议书</text>
  <rect x="40" y="48" width="200" height="170" fill="#fff" stroke="#ff6b6b" stroke-width="3" rx="14"/>
  <text x="140" y="78" fill="#ff6b6b" font-size="16" text-anchor="middle" font-family="PingFang SC,sans-serif" font-weight="700">通知</text>
  <text x="55" y="108" fill="#666" font-size="12" font-family="PingFang SC,sans-serif">告知事项</text>
  <rect x="260" y="48" width="200" height="170" fill="#fff" stroke="#cc5de8" stroke-width="3" rx="14"/>
  <text x="360" y="78" fill="#cc5de8" font-size="16" text-anchor="middle" font-family="PingFang SC,sans-serif" font-weight="700">邀请函</text>
  <text x="275" y="108" fill="#666" font-size="12" font-family="PingFang SC,sans-serif">礼貌邀请</text>
  <rect x="480" y="48" width="200" height="170" fill="#fff" stroke="#4ecdc4" stroke-width="3" rx="14"/>
  <text x="580" y="78" fill="#2a9d8f" font-size="16" text-anchor="middle" font-family="PingFang SC,sans-serif" font-weight="700">倡议书</text>
  <text x="495" y="108" fill="#666" font-size="12" font-family="PingFang SC,sans-serif">号召行动</text>
</svg>
