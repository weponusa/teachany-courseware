<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="邀请函格式">
  <rect width="720" height="200" fill="#faf5ff" rx="12"/>
  <text x="360" y="36" fill="#cc5de8" font-size="20" font-family="PingFang SC,sans-serif" text-anchor="middle" font-weight="700">邀请函格式</text>
  <rect x="80" y="58" width="560" height="28" fill="#fff" stroke="#cc5de8" rx="6"/>
  <text x="360" y="78" fill="#333" font-size="14" text-anchor="middle" font-family="PingFang SC,sans-serif">称呼：亲爱的某某</text>
  <rect x="80" y="96" width="560" height="28" fill="#fff" stroke="#ffe66d" rx="6"/>
  <text x="100" y="115" fill="#555" font-size="13" font-family="PingFang SC,sans-serif">正文：缘由 + 时间地点 + 诚挚邀请</text>
  <rect x="80" y="134" width="560" height="28" fill="#fff" stroke="#4ecdc4" rx="6"/>
  <text x="100" y="153" fill="#555" font-size="13" font-family="PingFang SC,sans-serif">结尾：期待到来 / 请回复能否参加</text>
  <text x="520" y="185" fill="#cc5de8" font-size="12" text-anchor="end" font-family="PingFang SC,sans-serif">邀请人 + 日期</text>
</svg>
