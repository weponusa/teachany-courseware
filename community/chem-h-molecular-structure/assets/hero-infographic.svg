  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">分子结构与性质</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">为什么相同元素种类或相似化学键，也可能因为空间形状不同而性质不同？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：分子形状设计师 · 课标节点：chem-h-molecular-structure</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">电子域排斥</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">中心原子周围的成键电子对和孤电子对会相互排斥，决定分子空间构</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">型。</text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">常见构型</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">CO₂ 常为直线形，H₂O 为折线形，NH₃ 为三角锥形，C</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21">H₄ 为正四面体。</text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">分子极性</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">键有极性不等于分子一定有极性，还要看空间对称性是否让偶极抵消</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21">。</text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text>
  <text x="260" y="585" fill="#e0f2fe" font-size="26">分子极性两步看：先看键是否偏，再看形状能不能抵消。</text>
