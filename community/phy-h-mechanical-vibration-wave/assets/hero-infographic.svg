<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs><rect width="1280" height="720" fill="url(#g)"/><circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/><circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/><text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">机械振动与机械波</text><text x="70" y="168" fill="#bae6fd" font-size="28">怎样用物理模型解释和计算「机械振动与机械波」中的关键现象？</text><text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：机械振动与机械波问题分析师 · 课标节点：phy-h-mechanical-vibration-wave</text><rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/><text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">振动</text><text x="96" y="374" fill="#dbeafe" font-size="21">周期性往复运动可用周期、频率和振幅描述。</text><text x="96" y="410" fill="#dbeafe" font-size="21"></text><rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/><text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">机械波</text><text x="486" y="374" fill="#dbeafe" font-size="21">波传播的是振动形式和能量，不是介质整体迁移。</text><text x="486" y="410" fill="#dbeafe" font-size="21"></text><rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/><text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">干涉/衍射</text><text x="876" y="374" fill="#dbeafe" font-size="21">波叠加产生加强和减弱，障碍物尺度影响衍射明显程度。</text><text x="876" y="410" fill="#dbeafe" font-size="21"></text><rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/><text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text><text x="260" y="585" fill="#e0f2fe" font-size="26">波题抓三量：v、f、λ；再看相位和叠加。</text><text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中物理完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas 互动 / 课标挂树</text></svg>