<rect x="86" y="446" width="1108" height="50" rx="16" fill="#ffffff" opacity=".08"/>
<text x="122" y="480" fill="#dbeafe" font-size="22" font-family="PingFang SC,Arial">• 从物质与能量视角，探索光合作用与呼吸作用，阐明细胞生命活动过程中贯穿着物质与能量的变化</text>
<rect x="86" y="508" width="1108" height="50" rx="16" fill="#ffffff" opacity=".08"/>
<text x="122" y="542" fill="#dbeafe" font-size="22" font-family="PingFang SC,Arial">• 说明植物细胞的叶绿体从太阳光中捕获能量，这些能量在二氧化碳和水转变为糖与氧气的过程中，转换并储存为糖分子中的化学能</text>
<rect x="86" y="570" width="1108" height="50" rx="16" fill="#ffffff" opacity=".08"/>
<text x="122" y="604" fill="#dbeafe" font-size="22" font-family="PingFang SC,Arial">• 说明生物通过细胞呼吸将储存在有机分子中的能量转化为生命活动可以利用的能量</text>
