<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#042f2e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="600" fill="url(#bg3)" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="45" font-family="Noto Sans CJK SC, sans-serif" font-size="26" font-weight="bold" fill="#34d399" text-anchor="middle">明清启蒙思想家对比图</text>
  <text x="450" y="68" font-family="Noto Sans CJK SC, sans-serif" font-size="14" fill="#6ee7b7" text-anchor="middle">批判继承儒学  启蒙思想先声</text>
  
  <!-- Li Zhi card -->
  <rect x="40" y="100" width="185" height="210" rx="12" fill="rgba(52,211,153,0.1)" stroke="#34d399" stroke-width="2"/>
  <text x="132" y="130" font-family="Noto Sans CJK SC, sans-serif" font-size="22" font-weight="bold" fill="#34d399" text-anchor="middle">李贽</text>
  <text x="132" y="150" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#6ee7b7" text-anchor="middle">1527—1602  晚明</text>
  <line x1="60" y1="162" x2="205" y2="162" stroke="rgba(52,211,153,0.4)" stroke-width="1"/>
  <text x="132" y="185" font-family="Noto Sans CJK SC, sans-serif" font-size="13" fill="#a7f3d0" text-anchor="middle">核心主张</text>
  <text x="132" y="207" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">反对"以孔子是非</text>
  <text x="132" y="223" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">为是非"的教条</text>
  <text x="132" y="249" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">提倡个性解放</text>
  <text x="132" y="268" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#fbbf24" text-anchor="middle">代表作：《焚书》</text>
  <text x="132" y="295" font-family="Noto Sans CJK SC, sans-serif" font-size="11" fill="#6ee7b7" text-anchor="middle">★ 挑战儒家权威</text>
  
  <!-- Huang Zongxi card -->
  <rect x="245" y="100" width="185" height="210" rx="12" fill="rgba(96,165,250,0.1)" stroke="#60a5fa" stroke-width="2"/>
  <text x="337" y="130" font-family="Noto Sans CJK SC, sans-serif" font-size="22" font-weight="bold" fill="#60a5fa" text-anchor="middle">黄宗羲</text>
  <text x="337" y="150" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#93c5fd" text-anchor="middle">1610—1695  明末清初</text>
  <line x1="265" y1="162" x2="410" y2="162" stroke="rgba(96,165,250,0.4)" stroke-width="1"/>
  <text x="337" y="185" font-family="Noto Sans CJK SC, sans-serif" font-size="13" fill="#bfdbfe" text-anchor="middle">核心主张</text>
  <text x="337" y="207" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">抨击君主专制</text>
  <text x="337" y="223" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">"天下为主  君为客"</text>
  <text x="337" y="249" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">提倡民本思想</text>
  <text x="337" y="268" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#fbbf24" text-anchor="middle">代表作：《明夷待访录》</text>
  <text x="337" y="295" font-family="Noto Sans CJK SC, sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle">★ 民主思想先驱</text>
  
  <!-- Gu Yanwu card -->
  <rect x="450" y="100" width="185" height="210" rx="12" fill="rgba(251,191,36,0.1)" stroke="#fbbf24" stroke-width="2"/>
  <text x="542" y="130" font-family="Noto Sans CJK SC, sans-serif" font-size="22" font-weight="bold" fill="#fbbf24" text-anchor="middle">顾炎武</text>
  <text x="542" y="150" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#fde68a" text-anchor="middle">1613—1682  明末清初</text>
  <line x1="470" y1="162" x2="615" y2="162" stroke="rgba(251,191,36,0.4)" stroke-width="1"/>
  <text x="542" y="185" font-family="Noto Sans CJK SC, sans-serif" font-size="13" fill="#fef3c7" text-anchor="middle">核心主张</text>
  <text x="542" y="207" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">"经世致用"</text>
  <text x="542" y="223" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">学问须有益于国家</text>
  <text x="542" y="249" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">"天下兴亡  匹夫有责"</text>
  <text x="542" y="268" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#fbbf24" text-anchor="middle">代表作：《日知录》</text>
  <text x="542" y="295" font-family="Noto Sans CJK SC, sans-serif" font-size="11" fill="#fde68a" text-anchor="middle">★ 爱国思想典范</text>
  
  <!-- Wang Fuzhi card -->
  <rect x="655" y="100" width="185" height="210" rx="12" fill="rgba(167,139,250,0.1)" stroke="#a78bfa" stroke-width="2"/>
  <text x="747" y="130" font-family="Noto Sans CJK SC, sans-serif" font-size="22" font-weight="bold" fill="#a78bfa" text-anchor="middle">王夫之</text>
  <text x="747" y="150" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle">1619—1692  明末清初</text>
  <line x1="675" y1="162" x2="820" y2="162" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
  <text x="747" y="185" font-family="Noto Sans CJK SC, sans-serif" font-size="13" fill="#ddd6fe" text-anchor="middle">核心主张</text>
  <text x="747" y="207" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">唯物主义哲学</text>
  <text x="747" y="223" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">"气者  理之依也"</text>
  <text x="747" y="249" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">反对禁欲主义</text>
  <text x="747" y="268" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#fbbf24" text-anchor="middle">代表作：《船山遗书》</text>
  <text x="747" y="295" font-family="Noto Sans CJK SC, sans-serif" font-size="11" fill="#c4b5fd" text-anchor="middle">★ 中国唯物主义集大成</text>
  
  <!-- Common features section -->
  <rect x="40" y="340" width="820" height="100" rx="10" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.4)" stroke-width="1.5"/>
  <text x="450" y="368" font-family="Noto Sans CJK SC, sans-serif" font-size="16" font-weight="bold" fill="#34d399" text-anchor="middle">共同特征</text>
  <text x="220" y="395" font-family="Noto Sans CJK SC, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">✦ 生活于明末清初社会大变革时期</text>
  <text x="220" y="415" font-family="Noto Sans CJK SC, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">✦ 深受国家兴亡的切身感受影响</text>
  <text x="620" y="395" font-family="Noto Sans CJK SC, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">✦ 批判理学空谈  注重实际</text>
  <text x="620" y="415" font-family="Noto Sans CJK SC, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">✦ 未形成系统  未能动摇封建统治</text>
  
  <!-- Bottom note -->
  <rect x="40" y="465" width="820" height="110" rx="10" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.3)" stroke-width="1.5"/>
  <text x="450" y="490" font-family="Noto Sans CJK SC, sans-serif" font-size="15" font-weight="bold" fill="#fbbf24" text-anchor="middle">易错辨析：明清思想是否属于"资本主义启蒙"？</text>
  <text x="450" y="513" font-family="Noto Sans CJK SC, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">✗ 不能等同于西方启蒙运动：未提出系统民主政治理论，未挑战封建土地制度</text>
  <text x="450" y="534" font-family="Noto Sans CJK SC, sans-serif" font-size="13" fill="#6ee7b7" text-anchor="middle">✓ 是早期启蒙：在儒学框架内批判专制，推动思想解放，影响近代改良运动</text>
  <text x="450" y="558" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">根本原因：商品经济发展，市民阶层壮大；明清专制空前强化，知识分子反思</text>
</svg>
