<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="900" height="600" fill="url(#bg2)" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="50" font-family="Noto Sans CJK SC, sans-serif" font-size="28" font-weight="bold" fill="#a78bfa" text-anchor="middle">元朝统一多民族国家示意图</text>
  
  <!-- Central oval representing Yuan Empire territory -->
  <ellipse cx="450" cy="300" rx="340" ry="200" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="2" stroke-dasharray="8,4"/>
  
  <!-- Yuan central box -->
  <rect x="345" y="255" width="210" height="90" rx="12" fill="rgba(167,139,250,0.3)" stroke="#a78bfa" stroke-width="2"/>
  <text x="450" y="290" font-family="Noto Sans CJK SC, sans-serif" font-size="22" font-weight="bold" fill="#e9d5ff" text-anchor="middle">元朝（1271-1368）</text>
  <text x="450" y="315" font-family="Noto Sans CJK SC, sans-serif" font-size="14" fill="#c4b5fd" text-anchor="middle">中书省统辖全国行政</text>
  <text x="450" y="334" font-family="Noto Sans CJK SC, sans-serif" font-size="14" fill="#c4b5fd" text-anchor="middle">设宣政院管辖西藏</text>
  
  <!-- Surrounding regions -->
  <!-- North -->
  <rect x="355" y="90" width="190" height="50" rx="8" fill="rgba(96,165,250,0.2)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="450" y="110" font-family="Noto Sans CJK SC, sans-serif" font-size="14" font-weight="bold" fill="#93c5fd" text-anchor="middle">漠北蒙古故地</text>
  <text x="450" y="130" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">岭北行省管辖</text>
  
  <!-- South -->
  <rect x="355" y="460" width="190" height="50" rx="8" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.5"/>
  <text x="450" y="480" font-family="Noto Sans CJK SC, sans-serif" font-size="14" font-weight="bold" fill="#6ee7b7" text-anchor="middle">江南汉地</text>
  <text x="450" y="500" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">江浙、湖广等行省</text>
  
  <!-- West Tibet -->
  <rect x="80" y="255" width="180" height="50" rx="8" fill="rgba(251,191,36,0.2)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="170" y="275" font-family="Noto Sans CJK SC, sans-serif" font-size="14" font-weight="bold" fill="#fde68a" text-anchor="middle">吐蕃（西藏）</text>
  <text x="170" y="295" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">宣政院辖地（首次纳入版图）</text>
  
  <!-- East -->
  <rect x="640" y="255" width="180" height="50" rx="8" fill="rgba(251,191,36,0.2)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="730" y="275" font-family="Noto Sans CJK SC, sans-serif" font-size="14" font-weight="bold" fill="#fde68a" text-anchor="middle">辽东朝鲜方向</text>
  <text x="730" y="295" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">辽阳行省管辖</text>
  
  <!-- Arrows connecting regions to center -->
  <line x1="450" y1="140" x2="450" y2="255" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="450" y1="345" x2="450" y2="460" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="260" y1="280" x2="345" y2="295" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="640" y1="280" x2="555" y2="295" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  
  <!-- Admin system labels -->
  <text x="450" y="190" font-family="Noto Sans CJK SC, sans-serif" font-size="15" font-weight="bold" fill="#fbbf24" text-anchor="middle">行省制度（十个行省）</text>
  <text x="450" y="210" font-family="Noto Sans CJK SC, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">元朝首创行省制，为后代省级行政区划奠基</text>
  
  <!-- Bottom info -->
  <rect x="80" y="530" width="740" height="50" rx="8" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="450" y="553" font-family="Noto Sans CJK SC, sans-serif" font-size="14" font-weight="bold" fill="#a78bfa" text-anchor="middle">历史意义：结束长期分裂  推进民族交融  奠定多民族国家格局</text>
  <text x="450" y="572" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">西藏、云南首次成为中央政府直辖行政区域</text>
</svg>
