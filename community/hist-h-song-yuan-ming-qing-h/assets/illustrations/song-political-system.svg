<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;display=swap");
    text { font-family: "Noto Sans SC", system-ui, -apple-system, sans-serif; }
  </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa"/>
    </marker>
  </defs>
  <rect width="900" height="600" fill="url(#bg)" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="50" font-size="28" font-weight="bold" fill="#60a5fa" text-anchor="middle">两宋政治制度结构图</text>
  
  <!-- Emperor box -->
  <rect x="370" y="80" width="160" height="55" rx="10" fill="rgba(96,165,250,0.2)" stroke="#60a5fa" stroke-width="2"/>
  <text x="450" y="112" font-size="20" font-weight="bold" fill="#60a5fa" text-anchor="middle">皇帝</text>
  
  <!-- Arrow down -->
  <line x1="450" y1="135" x2="450" y2="165" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Central Executive -->
  <rect x="180" y="165" width="540" height="55" rx="10" fill="rgba(167,139,250,0.2)" stroke="#a78bfa" stroke-width="2"/>
  <text x="450" y="197" font-size="18" font-weight="bold" fill="#a78bfa" text-anchor="middle">中枢机构（二府三司）</text>
  <text x="310" y="213" font-size="13" fill="#94a3b8" text-anchor="middle">中书门下省（政事堂）</text>
  <text x="450" y="213" font-size="13" fill="#94a3b8" text-anchor="middle">枢密院</text>
  <text x="590" y="213" font-size="13" fill="#94a3b8" text-anchor="middle">三司（财政）</text>
  
  <!-- Arrows to three departments -->
  <line x1="310" y1="220" x2="310" y2="270" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="220" x2="450" y2="270" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="590" y1="220" x2="590" y2="270" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Three departments -->
  <rect x="180" y="270" width="180" height="55" rx="8" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="270" y="295" font-size="16" font-weight="bold" fill="#fbbf24" text-anchor="middle">宰相（行政）</text>
  <text x="270" y="316" font-size="12" fill="#94a3b8" text-anchor="middle">制定政策  执行行政</text>
  
  <rect x="370" y="270" width="160" height="55" rx="8" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="450" y="295" font-size="16" font-weight="bold" fill="#fbbf24" text-anchor="middle">枢密使（军事）</text>
  <text x="450" y="316" font-size="12" fill="#94a3b8" text-anchor="middle">掌管军事调度</text>
  
  <rect x="540" y="270" width="180" height="55" rx="8" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="630" y="295" font-size="16" font-weight="bold" fill="#fbbf24" text-anchor="middle">三司使（财政）</text>
  <text x="630" y="316" font-size="12" fill="#94a3b8" text-anchor="middle">掌管国家财政</text>
  
  <!-- Separator line -->
  <line x1="80" y1="360" x2="820" y2="360" stroke="rgba(96,165,250,0.3)" stroke-width="1" stroke-dasharray="6,4"/>
  
  <!-- Local Administration -->
  <text x="450" y="390" font-size="18" font-weight="bold" fill="#34d399" text-anchor="middle">地方行政体系（路—州—县）</text>
  
  <rect x="80" y="410" width="180" height="50" rx="8" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1.5"/>
  <text x="170" y="438" font-size="15" font-weight="bold" fill="#34d399" text-anchor="middle">路（相当于省）</text>
  <text x="170" y="454" font-size="12" fill="#94a3b8" text-anchor="middle">设四司分掌权力</text>
  
  <rect x="360" y="410" width="180" height="50" rx="8" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1.5"/>
  <text x="450" y="438" font-size="15" font-weight="bold" fill="#34d399" text-anchor="middle">州/府/军/监</text>
  <text x="450" y="454" font-size="12" fill="#94a3b8" text-anchor="middle">文官担任知州</text>
  
  <rect x="640" y="410" width="180" height="50" rx="8" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1.5"/>
  <text x="730" y="438" font-size="15" font-weight="bold" fill="#34d399" text-anchor="middle">县（基层）</text>
  <text x="730" y="454" font-size="12" fill="#94a3b8" text-anchor="middle">知县主管治理</text>
  
  <!-- Key feature box -->
  <rect x="80" y="490" width="740" height="80" rx="10" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.4)" stroke-width="1.5"/>
  <text x="450" y="515" font-size="16" font-weight="bold" fill="#fbbf24" text-anchor="middle">核心特征：重文轻武  分权制衡</text>
  <text x="450" y="540" font-size="13" fill="#94a3b8" text-anchor="middle">✦ 分割宰相权力：行政、军事、财政三权分立，互不统属</text>
  <text x="450" y="558" font-size="13" fill="#94a3b8" text-anchor="middle">✦ 文官主政：以文制武，防止武将擅权；副作用：积贫积弱</text>
</svg>
