<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="结构与稳定性（搭建桥梁）· 知识全景图">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fffbf0"/>
    <stop offset="100%" stop-color="#fff7e6"/>
  </linearGradient>
  <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
    <feOffset dx="0" dy="3" result="offsetblur"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<rect width="1280" height="720" fill="url(#bg)"/>

<!-- 桥梁简笔画 -->
<g transform="translate(640,90)" opacity="0.12">
  <line x1="-300" y1="40" x2="300" y2="40" stroke="#ff6b6b" stroke-width="8" stroke-linecap="round"/>
  <line x1="-200" y1="40" x2="-150" y2="-30" stroke="#ff6b6b" stroke-width="5"/>
  <line x1="-150" y1="-30" x2="-100" y2="40" stroke="#ff6b6b" stroke-width="5"/>
  <line x1="-100" y1="40" x2="-50" y2="-30" stroke="#ff6b6b" stroke-width="5"/>
  <line x1="-50" y1="-30" x2="0" y2="40" stroke="#ff6b6b" stroke-width="5"/>
  <line x1="0" y1="40" x2="50" y2="-30" stroke="#ff6b6b" stroke-width="5"/>
  <line x1="50" y1="-30" x2="100" y2="40" stroke="#ff6b6b" stroke-width="5"/>
  <line x1="100" y1="40" x2="150" y2="-30" stroke="#ff6b6b" stroke-width="5"/>
  <line x1="150" y1="-30" x2="200" y2="40" stroke="#ff6b6b" stroke-width="5"/>
</g>

<!-- 中心标题 -->
<text x="640" y="200" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="52" font-weight="700" fill="#333">结构与稳定性</text>
<text x="640" y="250" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="28" fill="#ff6b6b" font-weight="600">搭建桥梁</text>

<!-- 连线 -->
<line x1="640" y1="340" x2="340" y2="410" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 4"/>
<line x1="640" y1="340" x2="940" y2="410" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 4"/>
<line x1="340" y1="460" x2="340" y2="560" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 4"/>
<line x1="940" y1="460" x2="940" y2="560" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 4"/>
<line x1="640" y1="340" x2="640" y2="560" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 4"/>

<!-- 核心概念卡片 -->
<g filter="url(#s)"><rect x="210" y="380" width="260" height="80" rx="16" fill="white" stroke="#ff6b6b" stroke-width="3"/>
<rect x="210" y="380" width="6" height="80" rx="3" fill="#ff6b6b"/>
<text x="340" y="418" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="20" font-weight="700" fill="#333">🔺 三角形最稳定</text>
<text x="340" y="446" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="14" fill="#666">三角形的边互相支撑</text></g>

<g filter="url(#s)"><rect x="810" y="380" width="260" height="80" rx="16" fill="white" stroke="#4ecdc4" stroke-width="3"/>
<rect x="810" y="380" width="6" height="80" rx="3" fill="#4ecdc4"/>
<text x="940" y="418" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="20" font-weight="700" fill="#333">🌉 拱形分散力量</text>
<text x="940" y="446" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="14" fill="#666">压力沿弧线传到两端</text></g>

<g filter="url(#s)"><rect x="510" y="530" width="260" height="80" rx="16" fill="white" stroke="#ffe66d" stroke-width="3"/>
<rect x="510" y="530" width="6" height="80" rx="3" fill="#f5c542"/>
<text x="640" y="568" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="20" font-weight="700" fill="#333">🔧 动手搭建测试</text>
<text x="640" y="596" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="14" fill="#666">设计→搭建→测试→改进</text></g>

<!-- 次级卡片 -->
<g filter="url(#s)"><rect x="190" y="540" width="220" height="60" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
<text x="300" y="577" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="16" fill="#555">方形→加对角线变稳</text></g>

<g filter="url(#s)"><rect x="870" y="540" width="220" height="60" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
<text x="980" y="577" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',system-ui,sans-serif" font-size="16" fill="#555">梁桥 vs 拱桥 vs 桁架桥</text></g>

<text x="1256" y="700" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">TeachAny · knowledge-structure · sci-e-bridge-structure</text>
</svg>
