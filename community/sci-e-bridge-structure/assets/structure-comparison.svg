<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="三角形、方形、拱形的稳定性对比">
<defs>
  <marker id="ar" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#ef4444"/></marker>
  <marker id="ag" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#22c55e"/></marker>
</defs>
<rect width="600" height="320" fill="#fffbf0" rx="12"/>

<!-- 三角形 -->
<g transform="translate(50,30)">
  <polygon points="90,0 0,160 180,160" fill="rgba(34,197,94,0.08)" stroke="#22c55e" stroke-width="3" stroke-linejoin="round"/>
  <text x="90" y="90" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="40" fill="rgba(34,197,94,0.2)">△</text>
  <line x1="190" y1="80" x2="175" y2="80" stroke="#22c55e" stroke-width="2" marker-end="url(#ag)"/>
  <text x="195" y="85" font-family="PingFang SC,sans-serif" font-size="11" fill="#22c55e">推不动✓</text>
  <text x="90" y="195" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#22c55e" font-weight="700">三角形：最稳定</text>
  <text x="90" y="215" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="11" fill="#666">三条边互相限制</text>
</g>

<!-- 方形 -->
<g transform="translate(220,30)">
  <rect x="0" y="0" width="150" height="160" fill="rgba(239,68,68,0.06)" stroke="#ef4444" stroke-width="3" stroke-dasharray="8 4" transform="skewX(8)"/>
  <line x1="165" y1="80" x2="150" y2="80" stroke="#ef4444" stroke-width="2" marker-end="url(#ar)"/>
  <text x="170" y="85" font-family="PingFang SC,sans-serif" font-size="11" fill="#ef4444">推歪了✗</text>
  <text x="75" y="195" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#ef4444" font-weight="700">方形：不稳定</text>
  <text x="75" y="215" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="11" fill="#666">能被推成平行四边形</text>
</g>

<!-- 拱形 -->
<g transform="translate(420,30)">
  <path d="M0,160 Q75,-20 150,160" fill="rgba(59,130,246,0.08)" stroke="#3b82f6" stroke-width="3"/>
  <!-- 压力箭头 -->
  <line x1="75" y1="10" x2="75" y2="40" stroke="#f59e0b" stroke-width="2" marker-end="url(#ar)"/>
  <text x="75" y="6" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="10" fill="#f59e0b">压力↓</text>
  <!-- 分散箭头 -->
  <line x1="30" y1="140" x2="10" y2="160" stroke="#3b82f6" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="120" y1="140" x2="140" y2="160" stroke="#3b82f6" stroke-width="2" marker-end="url(#ag)"/>
  <text x="75" y="195" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="14" fill="#3b82f6" font-weight="700">拱形：很稳定</text>
  <text x="75" y="215" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="11" fill="#666">压力沿弧线分散到两端</text>
</g>

<!-- 底部结论 -->
<rect x="30" y="260" width="540" height="40" rx="8" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
<text x="300" y="285" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="13" fill="#16a34a" font-weight="600">💡 关键发现：三角形 &amp; 拱形稳定，方形不稳定——加对角线分成三角形即可变稳！</text>
</svg>