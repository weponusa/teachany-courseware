<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="方形加对角线变稳定的原理">
<defs>
  <marker id="push-r" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#ef4444"/></marker>
  <marker id="push-g" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#22c55e"/></marker>
  <marker id="push-gray" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#999"/></marker>
</defs>
<rect width="600" height="320" fill="#fffbf0" rx="12"/>

<!-- 左：不稳的方形 -->
<g transform="translate(50,50)">
  <rect x="0" y="0" width="140" height="120" fill="rgba(239,68,68,0.06)" stroke="#ef4444" stroke-width="3" stroke-dasharray="8 4" transform="skewX(6)"/>
  <line x1="160" y1="50" x2="145" y2="50" stroke="#ef4444" stroke-width="2" marker-end="url(#push-r)"/>
  <text x="168" y="55" font-family="PingFang SC,sans-serif" font-size="12" fill="#ef4444">推→歪了</text>
  <text x="70" y="155" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="13" fill="#ef4444" font-weight="600">不加对角线：不稳定</text>
</g>

<!-- 中间箭头 -->
<text x="270" y="110" font-family="PingFang SC,sans-serif" font-size="36" fill="#f59e0b">→</text>
<text x="262" y="135" font-family="PingFang SC,sans-serif" font-size="12" fill="#f59e0b" font-weight="600">加一根对角线</text>

<!-- 右：加对角线后 -->
<g transform="translate(340,50)">
  <rect x="0" y="0" width="140" height="120" fill="rgba(34,197,94,0.06)" stroke="#22c55e" stroke-width="3"/>
  <!-- 对角线 -->
  <line x1="0" y1="0" x2="140" y2="120" stroke="#ff6b6b" stroke-width="4"/>
  <!-- 两个三角形标记 -->
  <text x="35" y="65" font-family="PingFang SC,sans-serif" font-size="22" fill="rgba(255,107,107,0.35)">△</text>
  <text x="90" y="100" font-family="PingFang SC,sans-serif" font-size="22" fill="rgba(255,107,107,0.35)">△</text>
  <!-- 推力箭头（无效） -->
  <line x1="160" y1="50" x2="148" y2="50" stroke="#999" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#push-gray)"/>
  <text x="168" y="55" font-family="PingFang SC,sans-serif" font-size="12" fill="#999">推不动</text>
  <text x="70" y="155" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="13" fill="#22c55e" font-weight="600">加对角线：两个三角形！</text>
</g>

<!-- 底部总结 -->
<rect x="30" y="240" width="540" height="60" rx="8" fill="rgba(59,130,246,0.06)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
<text x="300" y="263" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="13" fill="#2563eb" font-weight="600">🔑 核心方法：把不稳定的多边形，用对角线分割成若干三角形</text>
<text x="300" y="285" text-anchor="middle" font-family="PingFang SC,sans-serif" font-size="12" fill="#666">N边形 → 至少加 (N-3) 根对角线 → 全部变成三角形 → 稳定！</text>
</svg>