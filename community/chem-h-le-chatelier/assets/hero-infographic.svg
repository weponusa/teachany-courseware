<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs>
  <rect width="1280" height="720" fill="url(#g)"/>
  <circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/>
  <circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/>
  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">勒夏特列原理</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">怎样用“减弱外界改变”一句话判断平衡移动方向？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：平衡移动预测师 · 课标节点：chem-h-le-chatelier</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">浓度扰动</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">增加某反应物浓度，平衡通常向消耗该反应物的方向移动；减少某物</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">质则向生成它的方向移动。</text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">压强扰动</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">对有气体参与且气体计量数不同的反应，增大压强平衡向气体体积减</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21">小方向移动。</text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">温度扰动</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">升温平衡向吸热方向移动，降温平衡向放热方向移动。</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21"></text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text>
  <text x="260" y="585" fill="#e0f2fe" font-size="26">平衡会“反抗改变”：加谁耗谁，升温走吸热，加压走小体积。</text>
