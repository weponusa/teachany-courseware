<svg viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1628"/>
      <stop offset="100%" style="stop-color:#1a2744"/>
    </linearGradient>
  </defs>
  <rect width="680" height="320" rx="12" fill="url(#bg1)"/>
  <!-- Title -->
  <text x="340" y="35" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="600">纤维方向对纸条弯曲的影响</text>
  <!-- Left: MD Bending -->
  <g transform="translate(30,60)">
    <text x="150" y="20" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="600">沿纤维方向弯曲 (MD)</text>
    <!-- Paper strip - slightly bent -->
    <rect x="20" y="80" width="260" height="14" rx="3" fill="#475569" transform="rotate(-3,150,87)"/>
    <!-- Fibers -->
    <g opacity="0.6" transform="rotate(-3,150,87)">
      <line x1="25" y1="84" x2="275" y2="84" stroke="#38bdf8" stroke-width="1.2"/>
      <line x1="25" y1="87" x2="275" y2="87" stroke="#38bdf8" stroke-width="1.2"/>
      <line x1="25" y1="90" x2="275" y2="90" stroke="#38bdf8" stroke-width="1.2"/>
    </g>
    <!-- Force arrows -->
    <line x1="150" y1="50" x2="150" y2="72" stroke="#f87171" stroke-width="2"/>
    <polygon points="144,72 150,80 156,72" fill="#f87171"/>
    <text x="150" y="45" text-anchor="middle" fill="#f87171" font-size="11">F</text>
    <!-- Reaction -->
    <polygon points="15,110 25,100 25,110" fill="#34d399"/>
    <polygon points="285,110 275,100 275,110" fill="#34d399"/>
    <!-- Result -->
    <rect x="40" y="120" width="220" height="40" rx="8" fill="rgba(52,211,153,0.1)" stroke="#34d399" stroke-width="1"/>
    <text x="150" y="145" text-anchor="middle" fill="#34d399" font-size="13" font-weight="600">挠度小 · 刚度高</text>
    <text x="150" y="190" text-anchor="middle" fill="#94a3b8" font-size="12">E_MD ≈ 4.0 GPa</text>
    <text x="150" y="210" text-anchor="middle" fill="#94a3b8" font-size="12">D = E_MD × I ≈ 13.3 N·mm²</text>
  </g>
  <!-- Right: CD Bending -->
  <g transform="translate(360,60)">
    <text x="150" y="20" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="600">垂直纤维弯曲 (CD)</text>
    <!-- Paper strip - heavily bent -->
    <path d="M20,95 Q75,65 150,60 Q225,55 280,95" fill="none" stroke="#475569" stroke-width="14" stroke-linecap="round"/>
    <!-- Fibers (vertical now) -->
    <g opacity="0.5">
      <line x1="60" y1="55" x2="60" y2="95" stroke="#f59e0b" stroke-width="1.2"/>
      <line x1="90" y1="48" x2="90" y2="85" stroke="#f59e0b" stroke-width="1.2"/>
      <line x1="120" y1="46" x2="120" y2="78" stroke="#f59e0b" stroke-width="1.2"/>
      <line x1="150" y1="45" x2="150" y2="72" stroke="#f59e0b" stroke-width="1.2"/>
      <line x1="180" y1="46" x2="180" y2="78" stroke="#f59e0b" stroke-width="1.2"/>
      <line x1="210" y1="48" x2="210" y2="85" stroke="#f59e0b" stroke-width="1.2"/>
      <line x1="240" y1="55" x2="240" y2="95" stroke="#f59e0b" stroke-width="1.2"/>
    </g>
    <!-- Force arrows -->
    <line x1="150" y1="30" x2="150" y2="45" stroke="#f87171" stroke-width="2"/>
    <polygon points="144,45 150,53 156,45" fill="#f87171"/>
    <text x="150" y="25" text-anchor="middle" fill="#f87171" font-size="11">F</text>
    <!-- Reaction -->
    <polygon points="5,110 15,100 15,110" fill="#34d399"/>
    <polygon points="295,110 285,100 285,110" fill="#34d399"/>
    <!-- Result -->
    <rect x="40" y="120" width="220" height="40" rx="8" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="1"/>
    <text x="150" y="145" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="600">挠度大 · 刚度低</text>
    <text x="150" y="190" text-anchor="middle" fill="#94a3b8" font-size="12">E_CD ≈ 1.8 GPa</text>
    <text x="150" y="210" text-anchor="middle" fill="#94a3b8" font-size="12">D = E_CD × I ≈ 6.0 N·mm²</text>
  </g>
  <!-- Bottom comparison -->
  <rect x="120" y="275" width="440" height="35" rx="8" fill="rgba(139,92,246,0.1)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="340" y="298" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="600">D_MD / D_CD ≈ 2.2 倍 — 同一张纸，方向不同刚度差一倍</text>
</svg>
