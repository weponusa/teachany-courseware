<svg viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1628"/>
      <stop offset="100%" style="stop-color:#1a2744"/>
    </linearGradient>
  </defs>
  <rect width="680" height="340" rx="12" fill="url(#bg2)"/>
  <text x="340" y="35" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="600">三种方法判断纸张纤维方向</text>
  <!-- Method 1: Bending -->
  <g transform="translate(15,55)">
    <rect width="210" height="260" rx="10" fill="rgba(56,189,248,0.08)" stroke="#38bdf8" stroke-width="1"/>
    <text x="105" y="30" text-anchor="middle" fill="#38bdf8" font-size="15" font-weight="700">① 弯曲法</text>
    <!-- Hand bending paper -->
    <rect x="30" y="60" width="150" height="8" rx="3" fill="#475569" transform="rotate(-15,105,64)"/>
    <text x="105" y="95" text-anchor="middle" fill="#94a3b8" font-size="12">沿两个方向分别弯曲</text>
    <rect x="30" y="115" width="150" height="60" rx="6" fill="rgba(52,211,153,0.08)"/>
    <text x="105" y="138" text-anchor="middle" fill="#34d399" font-size="12" font-weight="600">更难弯 = 纤维纵向</text>
    <text x="105" y="158" text-anchor="middle" fill="#34d399" font-size="12" font-weight="600">更易弯 = 纤维横向</text>
    <text x="105" y="200" text-anchor="middle" fill="#64748b" font-size="11">⏱ 最快</text>
    <text x="105" y="220" text-anchor="middle" fill="#64748b" font-size="11">✅ 无损</text>
    <text x="105" y="240" text-anchor="middle" fill="#64748b" font-size="11">👍 推荐</text>
  </g>
  <!-- Method 2: Tearing -->
  <g transform="translate(235,55)">
    <rect width="210" height="260" rx="10" fill="rgba(245,158,11,0.08)" stroke="#f59e0b" stroke-width="1"/>
    <text x="105" y="30" text-anchor="middle" fill="#f59e0b" font-size="15" font-weight="700">② 撕裂法</text>
    <rect x="30" y="60" width="150" height="8" rx="3" fill="#475569"/>
    <line x1="105" y1="60" x2="105" y2="80" stroke="#ef4444" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="105" y="95" text-anchor="middle" fill="#94a3b8" font-size="12">沿两个方向撕裂</text>
    <rect x="30" y="115" width="150" height="60" rx="6" fill="rgba(52,211,153,0.08)"/>
    <text x="105" y="138" text-anchor="middle" fill="#34d399" font-size="12" font-weight="600">裂口较直 = MD</text>
    <text x="105" y="158" text-anchor="middle" fill="#34d399" font-size="12" font-weight="600">锯齿状 = CD</text>
    <text x="105" y="200" text-anchor="middle" fill="#64748b" font-size="11">⏱ 较快</text>
    <text x="105" y="220" text-anchor="middle" fill="#64748b" font-size="11">❌ 有损</text>
    <text x="105" y="240" text-anchor="middle" fill="#64748b" font-size="11">🔍 辅助验证</text>
  </g>
  <!-- Method 3: Water drop -->
  <g transform="translate(455,55)">
    <rect width="210" height="260" rx="10" fill="rgba(139,92,246,0.08)" stroke="#8b5cf6" stroke-width="1"/>
    <text x="105" y="30" text-anchor="middle" fill="#8b5cf6" font-size="15" font-weight="700">③ 水滴法</text>
    <circle cx="105" cy="68" r="10" fill="rgba(56,189,248,0.3)" stroke="#38bdf8" stroke-width="1"/>
    <text x="105" y="95" text-anchor="middle" fill="#94a3b8" font-size="12">在纸上滴水观察卷曲</text>
    <rect x="30" y="115" width="150" height="60" rx="6" fill="rgba(52,211,153,0.08)"/>
    <text x="105" y="138" text-anchor="middle" fill="#34d399" font-size="12" font-weight="600">卷曲轴 = MD</text>
    <text x="105" y="158" text-anchor="middle" fill="#34d399" font-size="12" font-weight="600">膨胀方向 = CD</text>
    <text x="105" y="200" text-anchor="middle" fill="#64748b" font-size="11">⏱ 较慢</text>
    <text x="105" y="220" text-anchor="middle" fill="#64748b" font-size="11">❌ 有损</text>
    <text x="105" y="240" text-anchor="middle" fill="#64748b" font-size="11">🔬 最直观</text>
  </g>
</svg>
