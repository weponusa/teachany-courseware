<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'PingFang SC',sans-serif">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eff6ff"/><stop offset="1" stop-color="#dbeafe"/></linearGradient></defs>
<rect width="1280" height="720" fill="url(#bg)"/>
<text x="640" y="120" text-anchor="middle" font-size="56" font-weight="700" fill="#1e3a8a">简单机械</text>
<text x="640" y="168" text-anchor="middle" font-size="24" fill="#2563eb">用巧劲，省力气：杠杆 · 滑轮 · 斜面</text>
<g>
<rect x="120" y="240" width="240" height="160" rx="16" fill="#fff" stroke="#3b82f6" stroke-width="3"/>
<text x="240" y="300" text-anchor="middle" font-size="26" font-weight="700" fill="#1e3a8a">杠杆</text>
<text x="240" y="338" text-anchor="middle" font-size="15" fill="#1e40af">支点·动力·阻力</text>
<text x="240" y="362" text-anchor="middle" font-size="15" fill="#1e40af">撬棍、跷跷板、剪刀</text>
<rect x="520" y="240" width="240" height="160" rx="16" fill="#fff" stroke="#3b82f6" stroke-width="3"/>
<text x="640" y="300" text-anchor="middle" font-size="26" font-weight="700" fill="#1e3a8a">滑轮</text>
<text x="640" y="338" text-anchor="middle" font-size="15" fill="#1e40af">定滑轮改变方向</text>
<text x="640" y="362" text-anchor="middle" font-size="15" fill="#1e40af">动滑轮省力</text>
<rect x="920" y="240" width="240" height="160" rx="16" fill="#fff" stroke="#3b82f6" stroke-width="3"/>
<text x="1040" y="300" text-anchor="middle" font-size="26" font-weight="700" fill="#1e3a8a">斜面</text>
<text x="1040" y="338" text-anchor="middle" font-size="15" fill="#1e40af">越平缓越省力</text>
<text x="1040" y="362" text-anchor="middle" font-size="15" fill="#1e40af">盘山公路、楔子</text>
</g>
<rect x="300" y="470" width="680" height="150" rx="20" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
<text x="640" y="525" text-anchor="middle" font-size="22" font-weight="700" fill="#1e3a8a">核心思想：用更小的力，做同样的功</text>
<text x="640" y="565" text-anchor="middle" font-size="16" fill="#1e40af">机械不能省功，但能省力或改变用力方向，让工作更轻松</text>
<text x="640" y="595" text-anchor="middle" font-size="16" fill="#1e40af">省了力，就要多移动距离——这是不变的代价</text>
<text x="1248" y="702" text-anchor="end" font-size="12" fill="#93c5fd">TeachAny · sci-e-simple-machines</text>
</svg>