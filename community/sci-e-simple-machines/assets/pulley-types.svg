<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" font-family="'PingFang SC',sans-serif">
<rect width="600" height="300" fill="#f0fdfa"/>
<text x="300" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f766e">定滑轮 vs 动滑轮</text>
<g><rect x="60" y="60" width="180" height="24" fill="#94a3b8"/><circle cx="150" cy="110" r="26" fill="#fff" stroke="#0d9488" stroke-width="5"/>
<line x1="124" y1="110" x2="124" y2="200" stroke="#0d9488" stroke-width="3"/><line x1="176" y1="110" x2="176" y2="200" stroke="#ef4444" stroke-width="3"/>
<text x="150" y="230" text-anchor="middle" font-size="15" fill="#115e59">定滑轮</text><text x="150" y="252" text-anchor="middle" font-size="13" fill="#334155">不省力，改变方向</text></g>
<g><rect x="360" y="60" width="180" height="24" fill="#94a3b8"/>
<line x1="400" y1="84" x2="400" y2="150" stroke="#0d9488" stroke-width="3"/><line x1="500" y1="84" x2="500" y2="150" stroke="#ef4444" stroke-width="3"/>
<circle cx="450" cy="160" r="26" fill="#fff" stroke="#0d9488" stroke-width="5"/><rect x="430" y="190" width="40" height="34" fill="#3b82f6"/>
<text x="450" y="250" text-anchor="middle" font-size="15" fill="#115e59">动滑轮</text><text x="450" y="272" text-anchor="middle" font-size="13" fill="#334155">省一半力，多走一倍绳</text></g>
</svg>