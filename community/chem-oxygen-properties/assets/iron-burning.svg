<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#0f172a" rx="16"/>
  <text x="400" y="38" text-anchor="middle" fill="#f59e0b" font-size="20" font-family="system-ui,sans-serif" font-weight="bold">铁 + 氧气 → 四氧化三铁</text>
  <text x="400" y="62" text-anchor="middle" fill="#64748b" font-size="14" font-family="system-ui,sans-serif">3Fe + 2O₂ → Fe₃O₄（化合反应）</text>
  <!-- Left: iron -->
  <rect x="60" y="100" width="160" height="170" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <line x1="90" y1="240" x2="190" y2="120" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <circle cx="140" cy="170" r="6" fill="#f87171"/>
  <text x="140" y="260" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="system-ui,sans-serif">Fe 铁丝</text>
  <text x="140" y="280" text-anchor="middle" fill="#64748b" font-size="12" font-family="system-ui,sans-serif">银白色金属</text>
  <!-- Arrow -->
  <text x="270" y="190" text-anchor="middle" fill="#38bdf8" font-size="18">+</text>
  <!-- Center: oxygen -->
  <rect x="310" y="100" width="160" height="170" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <circle cx="390" cy="165" r="20" fill="none" stroke="#38bdf8" stroke-width="2"/>
  <circle cx="382" cy="158" r="5" fill="#38bdf8"/>
  <circle cx="398" cy="172" r="5" fill="#38bdf8"/>
  <text x="390" y="225" text-anchor="middle" fill="#38bdf8" font-size="14" font-family="system-ui,sans-serif">O₂ 氧气</text>
  <!-- Arrow -->
  <text x="520" y="190" text-anchor="middle" fill="#10b981" font-size="22">→</text>
  <!-- Right: result -->
  <rect x="580" y="100" width="180" height="190" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <!-- Sparks -->
  <circle cx="620" cy="150" r="3" fill="#fbbf24" opacity="0.8"/>
  <circle cx="680" cy="130" r="2.5" fill="#f97316" opacity="0.9"/>
  <circle cx="650" cy="120" r="2" fill="#fbbf24" opacity="0.7"/>
  <circle cx="700" cy="160" r="2.5" fill="#ef4444" opacity="0.6"/>
  <circle cx="630" cy="200" r="2" fill="#f59e0b" opacity="0.5"/>
  <!-- Main -->
  <rect x="640" y="180" width="60" height="40" rx="6" fill="#1f2937" stroke="#f87171" stroke-width="2"/>
  <text x="670" y="206" text-anchor="middle" fill="#f87171" font-size="12" font-family="system-ui,sans-serif">Fe₃O₄</text>
  <text x="670" y="245" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="system-ui,sans-serif">黑色固体</text>
  <!-- Bottom warning -->
  <rect x="120" y="330" width="560" height="80" rx="8" fill="rgba(239,68,68,0.08)" stroke="#ef4444" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="400" y="358" text-anchor="middle" fill="#ef4444" font-size="16" font-family="system-ui,sans-serif" font-weight="bold">⚠ 集气瓶底必须预留少量水或铺一层细沙</text>
  <text x="400" y="382" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="system-ui,sans-serif">防止高温熔融物溅落炸裂瓶底</text>
  <!-- Phenomenon label -->
  <text x="140" y="450" text-anchor="middle" fill="#f59e0b" font-size="14" font-family="system-ui,sans-serif">空气中：仅红热</text>
  <text x="670" y="450" text-anchor="middle" fill="#f59e0b" font-size="14" font-family="system-ui,sans-serif">氧气中：剧烈燃烧，火星四射</text>
</svg>