<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#0f172a" rx="16"/>
  <text x="400" y="38" text-anchor="middle" fill="#f59e0b" font-size="20" font-family="system-ui,sans-serif" font-weight="bold">碳 + 氧气 → 二氧化碳</text>
  <text x="400" y="62" text-anchor="middle" fill="#64748b" font-size="14" font-family="system-ui,sans-serif">C + O₂ → CO₂（化合反应）</text>
  <!-- Left: carbon -->
  <rect x="80" y="130" width="140" height="140" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="110" y="160" width="80" height="30" rx="4" fill="#1f2937" stroke="#f59e0b" stroke-width="2"/>
  <text x="150" y="180" text-anchor="middle" fill="#f59e0b" font-size="14" font-family="system-ui,sans-serif">C 木炭</text>
  <text x="150" y="220" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="system-ui,sans-serif">黑色固体</text>
  <text x="150" y="245" text-anchor="middle" fill="#64748b" font-size="12" font-family="system-ui,sans-serif">空气中：红光</text>
  <!-- Arrow -->
  <text x="270" y="200" text-anchor="middle" fill="#38bdf8" font-size="18">+</text>
  <!-- Center: oxygen -->
  <rect x="310" y="130" width="140" height="140" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <circle cx="380" cy="180" r="18" fill="none" stroke="#38bdf8" stroke-width="2"/>
  <circle cx="372" cy="174" r="5" fill="#38bdf8"/>
  <circle cx="388" cy="186" r="5" fill="#38bdf8"/>
  <text x="380" y="215" text-anchor="middle" fill="#38bdf8" font-size="14" font-family="system-ui,sans-serif">O₂ 氧气</text>
  <text x="380" y="238" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="system-ui,sans-serif">无色气体</text>
  <!-- Arrow -->
  <text x="500" y="200" text-anchor="middle" fill="#10b981" font-size="22">→</text>
  <!-- Right: result -->
  <rect x="560" y="100" width="180" height="190" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <circle cx="650" cy="155" r="22" fill="#fbbf24" opacity="0.2"/>
  <text x="650" y="160" text-anchor="middle" fill="#fbbf24" font-size="22">☀</text>
  <text x="650" y="200" text-anchor="middle" fill="#10b981" font-size="14" font-family="system-ui,sans-serif">CO₂ 二氧化碳</text>
  <text x="650" y="225" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="system-ui,sans-serif">明亮白光</text>
  <text x="650" y="248" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="system-ui,sans-serif">使石灰水变浑浊</text>
  <!-- Bottom note -->
  <text x="400" y="400" text-anchor="middle" fill="#475569" font-size="12" font-family="system-ui,sans-serif">木炭应从上而下缓慢伸入集气瓶</text>
  <rect x="140" y="420" width="520" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="446" text-anchor="middle" fill="#f59e0b" font-size="13" font-family="system-ui,sans-serif">操作要点：夹持木炭的坩埚钳由瓶口逐渐下移</text>
</svg>