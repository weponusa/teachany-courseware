  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">共价键</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">非金属原子之间常通过共用电子对形成共价键，可分为非极性和极性</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21">共价键。</text>
