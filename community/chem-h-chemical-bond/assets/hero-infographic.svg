  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">离子键</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">活泼金属与活泼非金属之间常通过电子转移形成阴阳离子，靠静电作</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">用结合。</text>
