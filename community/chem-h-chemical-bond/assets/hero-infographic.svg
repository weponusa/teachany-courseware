  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">化学键</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">怎样从原子得失电子或共用电子判断物质中是什么化学键？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：微观结构建模师 · 课标节点：chem-h-chemical-bond</text>
  
