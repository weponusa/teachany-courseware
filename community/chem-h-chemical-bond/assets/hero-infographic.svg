  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">结构决定性质</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">离子晶体通常熔点高，极性分子在溶解性、沸点等方面表现出不同特</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21">点。</text>
