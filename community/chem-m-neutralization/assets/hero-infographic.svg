<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07111f"/>
      <stop offset="100%" style="stop-color:#14233a"/>
    </linearGradient>
    <linearGradient id="acid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#eef6ff" font-size="24" font-weight="bold" font-family="system-ui">中和反应知识结构图</text>
  
  <!-- Acid side -->
  <rect x="40" y="70" width="200" height="360" rx="12" fill="rgba(239,68,68,0.12)" stroke="url(#acid)" stroke-width="2"/>
  <text x="140" y="100" text-anchor="middle" fill="#ef4444" font-size="16" font-weight="bold" font-family="system-ui">酸性溶液</text>
  <text x="140" y="130" text-anchor="middle" fill="#fca5a5" font-size="14" font-family="system-ui">H⁺ + Cl⁻</text>
  <circle cx="100" cy="170" r="12" fill="#ef4444" opacity="0.8"/>
  <text x="100" y="175" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">H⁺</text>
  <circle cx="180" cy="170" r="12" fill="#f97316" opacity="0.8"/>
  <text x="180" y="175" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">Cl⁻</text>
  
  <text x="140" y="220" text-anchor="middle" fill="#fca5a5" font-size="13" font-family="system-ui">特征：</text>
  <text x="140" y="245" text-anchor="middle" fill="#fca5a5" font-size="12" font-family="system-ui">• pH &lt; 7</text>
  <text x="140" y="265" text-anchor="middle" fill="#fca5a5" font-size="12" font-family="system-ui">• 使石蕊变红</text>
  <text x="140" y="285" text-anchor="middle" fill="#fca5a5" font-size="12" font-family="system-ui">• 含 H⁺</text>
  
  <!-- Arrow -->
  <path d="M 260 250 L 340 250" stroke="#a78bfa" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="300" y="240" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold" font-family="system-ui">+</text>
  
  <!-- Base side -->
  <rect x="560" y="70" width="200" height="360" rx="12" fill="rgba(59,130,246,0.12)" stroke="url(#base)" stroke-width="2"/>
  <text x="660" y="100" text-anchor="middle" fill="#3b82f6" font-size="16" font-weight="bold" font-family="system-ui">碱性溶液</text>
  <text x="660" y="130" text-anchor="middle" fill="#93c5fd" font-size="14" font-family="system-ui">Na⁺ + OH⁻</text>
  <circle cx="620" cy="170" r="12" fill="#3b82f6" opacity="0.8"/>
  <text x="620" y="175" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">Na⁺</text>
  <circle cx="700" cy="170" r="12" fill="#6366f1" opacity="0.8"/>
  <text x="700" y="175" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">OH⁻</text>
  
  <text x="660" y="220" text-anchor="middle" fill="#93c5fd" font-size="13" font-family="system-ui">特征：</text>
  <text x="660" y="245" text-anchor="middle" fill="#93c5fd" font-size="12" font-family="system-ui">• pH &gt; 7</text>
  <text x="660" y="265" text-anchor="middle" fill="#93c5fd" font-size="12" font-family="system-ui">• 使酚酞变红</text>
  <text x="660" y="285" text-anchor="middle" fill="#93c5fd" font-size="12" font-family="system-ui">• 含 OH⁻</text>
  
  <!-- Arrow base to center -->
  <path d="M 540 250 L 460 250" stroke="#a78bfa" stroke-width="3" fill="none"/>
  <text x="500" y="240" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold" font-family="system-ui">+</text>
  
  <!-- Center: Reaction -->
  <rect x="300" y="160" width="200" height="180" rx="12" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="2"/>
  <text x="400" y="190" text-anchor="middle" fill="#a78bfa" font-size="15" font-weight="bold" font-family="system-ui">中和反应</text>
  
  <text x="400" y="220" text-anchor="middle" fill="#eef6ff" font-size="13" font-family="system-ui">酸 + 碱 → 盐 + 水</text>
  
  <text x="400" y="250" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="bold" font-family="Georgia,serif">H⁺ + OH⁻ → H₂O</text>
  
  <text x="400" y="280" text-anchor="middle" fill="#c4b5fd" font-size="12" font-family="system-ui">示例：</text>
  <text x="400" y="300" text-anchor="middle" fill="#c4b5fd" font-size="11" font-family="Georgia,serif">HCl + NaOH → NaCl + H₂O</text>
  
  <text x="400" y="325" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">应用：蚊虫叮咬、胃药、污水处理</text>
  
  <!-- Bottom: Water -->
  <rect x="300" y="360" width="200" height="70" rx="8" fill="rgba(34,197,94,0.12)" stroke="url(#water)" stroke-width="2"/>
  <text x="400" y="385" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="bold" font-family="system-ui">生成物：水</text>
  <text x="400" y="410" text-anchor="middle" fill="#86efac" font-size="12" font-family="system-ui">微观实质：H⁺ + OH⁻ → H₂O</text>
  
  <!-- Application icons -->
  <text x="400" y="470" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">🦟  🏥  🏭  🌱  生活应用</text>
</svg>