<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" width="500" height="320">
  <rect width="500" height="320" fill="#0a0a1e"/>
  <text x="250" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#c4b5fd">碱：氢氧化钠 (NaOH) 分子结构</text>
  <text x="250" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#86efac">Na — O — H</text>
  <!-- Na atom -->
  <circle cx="110" cy="175" r="44" fill="#c084fc" stroke="#a855f7" stroke-width="3"/>
  <text x="110" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="white">Na</text>
  <text x="110" y="193" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#ede9fe">钠原子</text>
  <text x="110" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#d8b4fe">带正电</text>
  <!-- Bond Na-O -->
  <line x1="154" y1="175" x2="216" y2="175" stroke="white" stroke-width="4"/>
  <!-- O atom -->
  <circle cx="260" cy="175" r="36" fill="#f87171" stroke="#ef4444" stroke-width="3"/>
  <text x="260" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="white">O</text>
  <text x="260" y="193" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#fee2e2">氧原子</text>
  <!-- Bond O-H -->
  <line x1="296" y1="175" x2="358" y2="130" stroke="white" stroke-width="4"/>
  <!-- H atom -->
  <circle cx="390" cy="100" r="30" fill="#fde047" stroke="#facc15" stroke-width="3"/>
  <text x="390" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">H</text>
  <text x="390" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#fef9c3">氢原子</text>
  <!-- OH- label -->
  <ellipse cx="340" cy="115" rx="40" ry="25" fill="none" stroke="#60a5fa" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="340" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#60a5fa">OH⁻</text>
  <text x="250" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#f472b6">碱性来源：OH⁻ 在水中可自由移动 → 使溶液呈碱性</text>
  <text x="250" y="295" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#94a3b8">NaOH 在水中解离：NaOH → Na⁺ + OH⁻</text>
</svg>