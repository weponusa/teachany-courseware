<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" width="560" height="320">
  <rect width="560" height="320" fill="#0f172a"/>
  <text x="280" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="white">中和反应 · 核心概念网络</text>
  <!-- Central node -->
  <circle cx="280" cy="160" r="50" fill="#4f46e5" stroke="#6366f1" stroke-width="4"/>
  <text x="280" y="153" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white">中和</text>
  <text x="280" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#c7d2fe">反应</text>
  <!-- Surrounding nodes -->
  <!-- Node 1: 酸 -->
  <circle cx="130" cy="90" r="38" fill="#ef4444" stroke="#dc2626" stroke-width="3"/>
  <text x="130" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="white">酸</text>
  <text x="130" y="105" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#fecaca">H⁺</text>
  <line x1="162" y1="115" x2="238" y2="138" stroke="#94a3b8" stroke-width="2"/>
  <text x="190" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">提供</text>
  <!-- Node 2: 碱 -->
  <circle cx="430" cy="90" r="38" fill="#3b82f6" stroke="#2563eb" stroke-width="3"/>
  <text x="430" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="white">碱</text>
  <text x="430" y="105" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#bfdbfe">OH⁻</text>
  <line x1="398" y1="115" x2="322" y2="138" stroke="#94a3b8" stroke-width="2"/>
  <text x="370" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">提供</text>
  <!-- Node 3: 盐 -->
  <circle cx="130" cy="240" r="36" fill="#d946ef" stroke="#c026d3" stroke-width="3"/>
  <text x="130" y="236" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="white">盐</text>
  <text x="130" y="254" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#f5d0fe">金属+酸根</text>
  <line x1="160" y1="215" x2="238" y2="178" stroke="#94a3b8" stroke-width="2"/>
  <text x="185" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">生成</text>
  <!-- Node 4: 水 -->
  <circle cx="430" cy="240" r="36" fill="#22d3ee" stroke="#06b6d4" stroke-width="3"/>
  <text x="430" y="236" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="white">水</text>
  <text x="430" y="254" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#cffafe">H₂O 中性</text>
  <line x1="398" y1="215" x2="322" y2="178" stroke="#94a3b8" stroke-width="2"/>
  <text x="375" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">生成</text>
  <!-- Equation below -->
  <rect x="120" y="290" width="320" height="26" rx="6" fill="#1e1b4b"/>
  <text x="280" y="308" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#fbbf24">酸 + 碱 → 盐 + 水</text>
  <!-- pH indicator note -->
  <text x="490" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#fde047">pH试纸/</text>
  <text x="490" y="176" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#fde047">指示剂</text>
  <line x1="490" y1="182" x2="330" y2="162" stroke="#fde047" stroke-width="1" stroke-dasharray="3,2"/>
</svg>