<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" width="500" height="320">
  <rect width="500" height="320" fill="#0a0a1e"/>
  <text x="250" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#c4b5fd">酸：盐酸 (HCl) 分子结构</text>
  <text x="250" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#86efac">H — Cl</text>
  <!-- H atom -->
  <circle cx="160" cy="175" r="38" fill="#fde047" stroke="#facc15" stroke-width="3"/>
  <text x="160" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#1a1a1a">H</text>
  <text x="160" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#fef9c3">氢原子</text>
  <text x="160" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#fef08a">不带电</text>
  <!-- Bond line H-Cl -->
  <line x1="198" y1="175" x2="302" y2="175" stroke="white" stroke-width="4"/>
  <text x="250" y="165" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#94a3b8">单键</text>
  <!-- Cl atom -->
  <circle cx="340" cy="175" r="52" fill="#4ade80" stroke="#22c55e" stroke-width="3"/>
  <text x="340" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#1a1a1a">Cl</text>
  <text x="340" y="193" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#dcfce7">氯原子</text>
  <text x="340" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#bbf7d0">带负电</text>
  <!-- Labels -->
  <text x="250" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#f472b6">酸性来源：H⁺ 在水中可自由移动 → 使溶液呈酸性</text>
  <text x="250" y="295" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#94a3b8">H-Cl 键长 127pm，Cl 吸引电子能力强于 H</text>
</svg>