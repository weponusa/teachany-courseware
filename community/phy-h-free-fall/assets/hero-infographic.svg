<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs><rect width="1280" height="720" fill="url(#g)"/><circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/><circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/><text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">自由落体运动</text><text x="70" y="168" fill="#bae6fd" font-size="28">为什么在真空中，轻重不同的物体会同时落地？</text><text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：落体实验复现实验员 · 课标节点：phy-h-free-fall</text><rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/><text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">自由落体条件</text><text x="96" y="374" fill="#dbeafe" font-size="21">物体只受重力作用、初速度为零的下落运动叫自由落体运动。</text><text x="96" y="410" fill="#dbeafe" font-size="21"></text><rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/><text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">重力加速度</text><text x="486" y="374" fill="#dbeafe" font-size="21">近地面自由落体加速度约 g=9.8 m/s²，方向竖直向下。</text><text x="486" y="410" fill="#dbeafe" font-size="21"></text><rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/><text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">公式迁移</text><text x="876" y="374" fill="#dbeafe" font-size="21">自由落体是 v₀=0、a=g 的匀加速直线运动，可用 v=g</text><text x="876" y="410" fill="#dbeafe" font-size="21">t、h=1/2gt²。</text><rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/><text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text><text x="260" y="585" fill="#e0f2fe" font-size="26">自由落体三条件：只受重力、初速为零、加速度为 g。</text><text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中物理完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas 互动 / 课标挂树</text></svg>