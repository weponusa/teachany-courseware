  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">元素周期表</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">看到一个元素在周期表中的位置，怎样推断它大概会怎样反应？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：元素地图导航员 · 课标节点：chem-h-periodic-table-h</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">周期</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">周期数通常对应核外电子层数。同周期从左到右，核电荷数增加，原</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">子半径总体减小。</text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">族</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">主族序数通常对应最外层电子数，同主族元素化学性质相似，如碱金</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21">属和卤素。</text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">性质地图</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">左下方金属性强，右上方非金属性强；稀有气体最外层稳定，通常反</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21">应活性低。</text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text>
  <text x="260" y="585" fill="#e0f2fe" font-size="26">周期表口诀：横看周期变趋势，竖看族群找相似；左金右非，右上最非。</text>
