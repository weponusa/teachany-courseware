<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs>
  <rect width="1280" height="720" fill="url(#g)"/>
  <circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/>
  <circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/>
  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">电解质与离子反应综合</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">两种溶液混合后，怎样判断哪些离子真的反应了，哪些只是旁观？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：水质检测实验员 · 课标节点：chem-h-ionic-reactions-electrolyte</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">电解质</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">在水溶液或熔融状态能导电的化合物叫电解质，酸、碱、多数盐属于</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">常见电解质。</text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">离子反应条件</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">溶液中离子反应通常因生成沉淀、气体、弱电解质或发生氧化还原而</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21">能持续进行。</text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">旁观离子</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">反应前后形态和数量不变的离子没有参与净变化，是写净离子方程式</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21">时要删去的对象。</text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text>
  <text x="260" y="585" fill="#e0f2fe" font-size="26">离子反应四看：沉淀、气体、水，另看价态变不变。</text>
  <text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中化学完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas 互动 / 课标挂树</text>
</svg>