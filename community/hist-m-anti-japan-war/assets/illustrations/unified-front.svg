<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
<defs>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;display=swap");
    text { font-family: "Noto Sans SC", system-ui, -apple-system, sans-serif; }
  </style>
</defs>
<rect width="900" height="420" fill="#0f172a" rx="16"/>
<text x="450" y="40" text-anchor="middle" fill="#f87171" font-size="24" font-weight="bold" font-family="serif">抗日民族统一战线</text>
<rect x="320" y="60" width="260" height="50" rx="8" fill="#7c3aed" opacity="0.8"/>
<text x="450" y="92" text-anchor="middle" fill="white" font-size="18" font-weight="bold">中国共产党 倡导</text>
<line x1="380" y1="110" x2="250" y2="160" stroke="#60a5fa" stroke-width="2"/>
<line x1="520" y1="110" x2="650" y2="160" stroke="#60a5fa" stroke-width="2"/>
<rect x="130" y="160" width="240" height="80" rx="8" fill="#1e3a5f" stroke="#60a5fa"/>
<text x="250" y="192" text-anchor="middle" fill="#93c5fd" font-size="16" font-weight="bold">国民党（正面战场）</text>
<text x="250" y="218" text-anchor="middle" fill="#bfdbfe" font-size="12">淞沪·台儿庄·武汉·长沙</text>
<rect x="530" y="160" width="240" height="80" rx="8" fill="#052e16" stroke="#34d399"/>
<text x="650" y="192" text-anchor="middle" fill="#6ee7b7" font-size="16" font-weight="bold">共产党（敌后战场）</text>
<text x="650" y="218" text-anchor="middle" fill="#a7f3d0" font-size="12">平型关·百团大战·游击战</text>
<line x1="250" y1="240" x2="450" y2="300" stroke="#fbbf24" stroke-width="2"/>
<line x1="650" y1="240" x2="450" y2="300" stroke="#fbbf24" stroke-width="2"/>
<rect x="320" y="290" width="260" height="50" rx="8" fill="#422006" stroke="#fbbf24"/>
<text x="450" y="322" text-anchor="middle" fill="#fde68a" font-size="16" font-weight="bold">团结抗日 取得胜利</text>
<rect x="150" y="360" width="600" height="40" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)"/>
<text x="450" y="386" text-anchor="middle" fill="#94a3b8" font-size="13">其他爱国力量：各民主党派、爱国华侨、少数民族、国际友人</text>
</svg>