<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
<rect width="900" height="360" fill="#0f172a" rx="16"/>
<text x="450" y="36" text-anchor="middle" fill="#f87171" font-size="22" font-weight="bold">抗日战争时间线 1931-1945</text>
<line x1="60" y1="160" x2="840" y2="160" stroke="#334155" stroke-width="2"/>
<circle cx="120" cy="160" r="8" fill="#f87171"/>
<text x="120" y="130" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="bold">1931</text>
<text x="120" y="115" text-anchor="middle" fill="#94a3b8" font-size="10">九一八事变</text>
<circle cx="260" cy="160" r="8" fill="#f87171"/>
<text x="260" y="195" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="bold">1937.7</text>
<text x="260" y="210" text-anchor="middle" fill="#94a3b8" font-size="10">七七事变</text>
<circle cx="360" cy="160" r="8" fill="#fbbf24"/>
<text x="360" y="130" text-anchor="middle" fill="#fde68a" font-size="12" font-weight="bold">1937.12</text>
<text x="360" y="115" text-anchor="middle" fill="#94a3b8" font-size="10">南京大屠杀</text>
<circle cx="470" cy="160" r="8" fill="#34d399"/>
<text x="470" y="195" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="bold">1938</text>
<text x="470" y="210" text-anchor="middle" fill="#94a3b8" font-size="10">台儿庄大捷</text>
<circle cx="580" cy="160" r="8" fill="#34d399"/>
<text x="580" y="130" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="bold">1940</text>
<text x="580" y="115" text-anchor="middle" fill="#94a3b8" font-size="10">百团大战</text>
<circle cx="700" cy="160" r="10" fill="#60a5fa"/>
<text x="700" y="195" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold">1945.8.15</text>
<text x="700" y="210" text-anchor="middle" fill="#93c5fd" font-size="11">日本投降</text>
<rect x="100" y="260" width="700" height="70" rx="8" fill="rgba(248,113,113,0.06)" stroke="rgba(248,113,113,0.2)"/>
<text x="450" y="286" text-anchor="middle" fill="#f87171" font-size="14" font-weight="bold">14年抗战（1931-1945）</text>
<text x="450" y="310" text-anchor="middle" fill="#94a3b8" font-size="12">近代以来中华民族第一次取得完全胜利的民族解放战争</text>
</svg>