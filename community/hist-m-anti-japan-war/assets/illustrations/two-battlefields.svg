<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#0f172a" rx="16"/>
<text x="450" y="40" text-anchor="middle" fill="#60a5fa" font-size="22" font-weight="bold">正面战场 vs 敌后战场</text>
<rect x="40" y="60" width="380" height="320" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
<text x="230" y="92" text-anchor="middle" fill="#93c5fd" font-size="18" font-weight="bold">正面战场（国民党）</text>
<text x="60" y="130" fill="#bfdbfe" font-size="13">战略：阵地战、大会战</text>
<text x="60" y="160" fill="#bfdbfe" font-size="13">代表战役：淞沪会战、台儿庄战役</text>
<text x="60" y="190" fill="#bfdbfe" font-size="13">武汉会战、第三次长沙会战</text>
<text x="60" y="220" fill="#bfdbfe" font-size="13">特点：消耗日军有生力量</text>
<text x="60" y="250" fill="#bfdbfe" font-size="13">粉碎了日军速战速决企图</text>
<text x="60" y="290" fill="#fbbf24" font-size="14" font-weight="bold">作用：抵御日军正面进攻</text>
<rect x="480" y="60" width="380" height="320" rx="10" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
<text x="670" y="92" text-anchor="middle" fill="#6ee7b7" font-size="18" font-weight="bold">敌后战场（共产党）</text>
<text x="500" y="130" fill="#a7f3d0" font-size="13">战略：游击战、运动战</text>
<text x="500" y="160" fill="#a7f3d0" font-size="13">代表战役：平型关大捷、百团大战</text>
<text x="500" y="190" fill="#a7f3d0" font-size="13">建立抗日根据地</text>
<text x="500" y="220" fill="#a7f3d0" font-size="13">特点：深入敌后，发动群众</text>
<text x="500" y="250" fill="#a7f3d0" font-size="13">牵制大量日军兵力</text>
<text x="500" y="290" fill="#fbbf24" font-size="14" font-weight="bold">作用：战略配合正面战场</text>
<rect x="200" y="390" width="500" height="24" rx="6" fill="#422006"/>
<text x="450" y="407" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="bold">两个战场相互配合、相互依存 共同取得抗战胜利</text>
</svg>