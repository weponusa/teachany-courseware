<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="标准滴定法知识结构图">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0f172a"/>
    <stop offset="100%" stop-color="#1e293b"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
    <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;display=swap");
    .title { font-family: "Noto Sans SC", system-ui, sans-serif; font-size: 52px; font-weight: 700; fill: #f8fafc; }
    .subtitle { font-family: "Noto Sans SC", system-ui, sans-serif; font-size: 28px; font-weight: 600; fill: #38bdf8; }
    .node-title { font-family: "Noto Sans SC", system-ui, sans-serif; font-size: 24px; font-weight: 600; }
    .node-text { font-family: "Noto Sans SC", system-ui, sans-serif; font-size: 18px; }
    .node-desc { font-family: "Noto Sans SC", system-ui, sans-serif; font-size: 16px; fill: #94a3b8; }
  </style>
</defs>
<rect width="1280" height="720" fill="url(#bg)"/>

<!-- 标题 -->
<text x="640" y="140" text-anchor="middle" class="title">标准滴定法</text>
<text x="640" y="195" text-anchor="middle" class="subtitle">AgNO₃ 滴定测定 Cl⁻ 浓度</text>

<!-- 连接线 -->
<line x1="220" y1="320" x2="1060" y2="320" stroke="#38bdf8" stroke-width="2" opacity="0.4"/>
<circle cx="220" cy="320" r="8" fill="#38bdf8" filter="url(#glow)"/>
<circle cx="640" cy="320" r="8" fill="#a78bfa" filter="url(#glow)"/>
<circle cx="1060" cy="320" r="8" fill="#22c55e" filter="url(#glow)"/>

<!-- 节点1: 核心原理 -->
<rect x="80" y="360" width="280" height="280" rx="16" fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.3)" stroke-width="2"/>
<text x="220" y="405" text-anchor="middle" class="node-title" fill="#38bdf8">核心原理</text>
<text x="220" y="445" text-anchor="middle" class="node-text" fill="#e2e8f0">Ag⁺ + Cl⁻ → AgCl↓</text>
<text x="220" y="475" text-anchor="middle" class="node-desc">沉淀反应，Ksp极小</text>
<text x="220" y="510" text-anchor="middle" class="node-text" fill="#e2e8f0">K₂CrO₄ 指示剂</text>
<text x="220" y="540" text-anchor="middle" class="node-desc">分步沉淀，砖红色终点</text>
<text x="220" y="580" text-anchor="middle" class="node-text" fill="#e2e8f0">定量关系</text>
<text x="220" y="610" text-anchor="middle" class="node-desc">n(Ag⁺) = n(Cl⁻)</text>

<!-- 节点2: 操作步骤 -->
<rect x="500" y="360" width="280" height="280" rx="16" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.3)" stroke-width="2"/>
<text x="640" y="405" text-anchor="middle" class="node-title" fill="#a78bfa">操作步骤</text>
<text x="640" y="445" text-anchor="middle" class="node-text" fill="#e2e8f0">① 润洗与装液</text>
<text x="640" y="475" text-anchor="middle" class="node-desc">避免稀释，排除气泡</text>
<text x="640" y="510" text-anchor="middle" class="node-text" fill="#e2e8f0">② 滴定与终点判断</text>
<text x="640" y="540" text-anchor="middle" class="node-desc">砖红色，30秒不褪</text>
<text x="640" y="580" text-anchor="middle" class="node-text" fill="#e2e8f0">③ 读数与记录</text>
<text x="640" y="610" text-anchor="middle" class="node-desc">精确至0.01 mL</text>

<!-- 节点3: 计算与误差 -->
<rect x="920" y="360" width="280" height="280" rx="16" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.3)" stroke-width="2"/>
<text x="1060" y="405" text-anchor="middle" class="node-title" fill="#22c55e">计算与误差</text>
<text x="1060" y="445" text-anchor="middle" class="node-text" fill="#e2e8f0">c(Cl⁻) = c(Ag⁺)·V/V</text>
<text x="1060" y="475" text-anchor="middle" class="node-desc">核心计算公式</text>
<text x="1060" y="510" text-anchor="middle" class="node-text" fill="#e2e8f0">误差来源分析</text>
<text x="1060" y="540" text-anchor="middle" class="node-desc">润洗、终点、读数</text>
<text x="1060" y="580" text-anchor="middle" class="node-text" fill="#e2e8f0">平行实验取均值</text>
<text x="1060" y="610" text-anchor="middle" class="node-desc">提高准确度</text>

<!-- 底部装饰 -->
<text x="640" y="690" text-anchor="middle" font-size="14" fill="#64748b" font-family="system-ui">TeachAny · 高中化学 · 定量分析</text>
</svg>