<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="宝玉挨打">
  <defs>
    <radialGradient id="bg" cx="20%" cy="10%" r="95%">
      <stop offset="0" stop-color="#5a1725"/>
      <stop offset="0.45" stop-color="#211014"/>
      <stop offset="1" stop-color="#080506"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8e7a0"/>
      <stop offset="0.52" stop-color="#c9a227"/>
      <stop offset="1" stop-color="#8b6b12"/>
    </linearGradient>
    <linearGradient id="silk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b91c3c" stop-opacity="0.15"/>
      <stop offset="0.5" stop-color="#f472b6" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0  0 0.72 0 0 0  0 0 0.45 0 0  0 0 0 0.55 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <pattern id="paper" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M0 59.5H60M59.5 0V60" stroke="#f8e7a0" stroke-opacity="0.055"/>
      <circle cx="12" cy="18" r="1" fill="#fff7d6" fill-opacity="0.08"/>
      <circle cx="44" cy="42" r="1.2" fill="#fff7d6" fill-opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <rect width="1200" height="680" fill="url(#paper)"/>
  <path d="M0 510 C180 430 300 610 500 520 C760 400 885 615 1200 500 L1200 680 L0 680 Z" fill="url(#silk)"/>
  <circle cx="1050" cy="108" r="116" fill="#c9a227" opacity="0.10" filter="url(#soft)"/>
  <circle cx="164" cy="582" r="122" fill="#b91c3c" opacity="0.12" filter="url(#soft)"/>
  <rect x="44" y="42" width="1112" height="596" rx="34" fill="#12080b" fill-opacity="0.62" stroke="url(#gold)" stroke-opacity="0.65" stroke-width="2"/>
  
  <g transform="translate(640 116)">
    <rect x="42" y="64" width="430" height="290" rx="22" fill="#160a0d" stroke="#c9a227" opacity="0.9"/>
    <path d="M70 92 H444" stroke="#f8e7a0" stroke-width="3" opacity="0.45"/>
    <g transform="translate(92 136)"><rect width="88" height="160" rx="18" fill="#312e81"/><circle cx="44" cy="-10" r="28" fill="#f6d7b0"/><text x="18" y="94" font-size="24" fill="#fde68a" font-family="Songti SC">宝玉</text></g>
    <g transform="translate(302 116)"><rect width="102" height="190" rx="14" fill="#4a1d1d"/><circle cx="52" cy="-10" r="30" fill="#d6a06a"/><text x="22" y="102" font-size="24" fill="#fde68a" font-family="Songti SC">贾政</text></g>
    <path d="M258 160 C224 176 198 204 178 242" stroke="#f97316" stroke-width="10" stroke-linecap="round"/>
    <path d="M330 28 L384 82" stroke="#c9a227" stroke-width="7" stroke-linecap="round"/>
    <text x="88" y="398" font-size="22" fill="#d6d3d1" font-family="PingFang SC">真情与礼教在厅堂里撞到最疼。</text>
  </g>

  <g font-family="PingFang SC, Source Han Serif SC, Songti SC, serif">
    <text x="88" y="112" font-size="28" fill="#f8e7a0" letter-spacing="6">红楼梦整本书阅读</text>
    <text x="88" y="172" font-size="54" font-weight="700" fill="#fff7d6">宝玉挨打</text>
    <text x="92" y="222" font-size="24" fill="#d6d3d1">第33回 · 礼教冲突</text>
    <rect x="88" y="258" width="520" height="2" fill="url(#gold)" opacity="0.75"/>
    <text x="92" y="310" font-size="26" fill="#fde68a">仕途经济，压住真情</text>
  </g>
