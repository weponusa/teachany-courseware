<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420">
  <rect width="1100" height="420" fill="#0f172a"/>
  <text x="36" y="42" fill="#fef3c7" font-size="26" font-weight="800" font-family="PingFang SC, sans-serif">情节脉络时间轴（前八十回主线）</text>
  <line x1="80" y1="200" x2="1020" y2="200" stroke="#57534e" stroke-width="4"/>
  <circle cx="120" cy="200" r="14" fill="#38bdf8"/>
  <text x="120" y="165" text-anchor="middle" fill="#bae6fd" font-size="14" font-family="PingFang SC, sans-serif">太虚幻境</text>
  <text x="120" y="245" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="PingFang SC, sans-serif">神话框架</text>
  <circle cx="280" cy="200" r="14" fill="#22c55e"/>
  <text x="280" y="165" text-anchor="middle" fill="#86efac" font-size="14" font-family="PingFang SC, sans-serif">大观园建成</text>
  <text x="280" y="245" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="PingFang SC, sans-serif">青春繁华</text>
  <circle cx="460" cy="200" r="14" fill="#f472b6"/>
  <text x="460" y="165" text-anchor="middle" fill="#fbcfe8" font-size="14" font-family="PingFang SC, sans-serif">黛玉葬花</text>
  <text x="460" y="245" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="PingFang SC, sans-serif">约第27回</text>
  <circle cx="640" cy="200" r="14" fill="#fbbf24"/>
  <text x="640" y="165" text-anchor="middle" fill="#fde68a" font-size="14" font-family="PingFang SC, sans-serif">宝玉挨打</text>
  <text x="640" y="245" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="PingFang SC, sans-serif">礼教冲突</text>
  <circle cx="820" cy="200" r="14" fill="#f97316"/>
  <text x="820" y="165" text-anchor="middle" fill="#fdba74" font-size="14" font-family="PingFang SC, sans-serif">抄检大观园</text>
  <text x="820" y="245" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="PingFang SC, sans-serif">盛衰转折</text>
  <circle cx="980" cy="200" r="14" fill="#b91c3c"/>
  <text x="980" y="165" text-anchor="middle" fill="#fecaca" font-size="14" font-family="PingFang SC, sans-serif">贾府败落</text>
  <text x="980" y="245" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="PingFang SC, sans-serif">悲剧收束</text>
  <rect x="36" y="300" width="1028" height="90" rx="14" fill="#1e293b" stroke="#334155"/>
  <text x="56" y="338" fill="#e2e8f0" font-size="17" font-family="PingFang SC, sans-serif">主线：繁华 → 冲突 → 转折 → 败落；标注个人感动节点。</text>
  <text x="56" y="368" fill="#94a3b8" font-size="15" font-family="PingFang SC, sans-serif">研读：每节点摘录原文，说明手法与主旨。</text>
</svg>