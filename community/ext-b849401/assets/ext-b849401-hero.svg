<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">3D 打印工作流程与 G-code 基础知识结构主图</title>
  <desc id="desc">从建模、切片、G-code 到打印监控的流程关系图</desc>
  <defs>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;display=swap");
    text { font-family: "Noto Sans SC", system-ui, -apple-system, sans-serif; }
  </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#08111f"/><stop offset="1" stop-color="#1e1b4b"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1e293b"/><stop offset="1" stop-color="#312e81"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#f59e0b"/></marker>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="120" r="150" fill="#7c3aed" opacity="0.16"/>
  <circle cx="170" cy="650" r="190" fill="#06b6d4" opacity="0.12"/>
  <text x="640" y="86" text-anchor="middle" fill="#f8fafc" font-size="44" font-weight="800">3D 打印工作流程与 G-code 基础</text>
  <text x="640" y="128" text-anchor="middle" fill="#bfdbfe" font-size="22">把“模型”翻译成“机器动作清单”</text>
  <g filter="url(#shadow)">
    <g transform="translate(70 220)">
      <rect width="230" height="170" rx="22" fill="url(#card)" stroke="#38bdf8" stroke-width="3"/>
      <text x="115" y="48" text-anchor="middle" fill="#38bdf8" font-size="30" font-weight="800">① 建模</text>
      <text x="115" y="88" text-anchor="middle" fill="#f8fafc" font-size="22">STL / 网格 / 尺寸</text>
      <text x="115" y="126" text-anchor="middle" fill="#cbd5e1" font-size="18">设计可打印物体</text>
    </g>
    <g transform="translate(370 220)">
      <rect width="230" height="170" rx="22" fill="url(#card)" stroke="#a78bfa" stroke-width="3"/>
      <text x="115" y="48" text-anchor="middle" fill="#c4b5fd" font-size="30" font-weight="800">② 切片</text>
      <text x="115" y="88" text-anchor="middle" fill="#f8fafc" font-size="22">层高 / 填充 / 支撑</text>
      <text x="115" y="126" text-anchor="middle" fill="#cbd5e1" font-size="18">变成逐层路径</text>
    </g>
    <g transform="translate(670 220)">
      <rect width="230" height="170" rx="22" fill="url(#card)" stroke="#f59e0b" stroke-width="3"/>
      <text x="115" y="48" text-anchor="middle" fill="#fbbf24" font-size="30" font-weight="800">③ G-code</text>
      <text x="115" y="88" text-anchor="middle" fill="#f8fafc" font-size="22">G1 / M104 / E / Z</text>
      <text x="115" y="126" text-anchor="middle" fill="#cbd5e1" font-size="18">机器动作清单</text>
    </g>
    <g transform="translate(970 220)">
      <rect width="230" height="170" rx="22" fill="url(#card)" stroke="#22c55e" stroke-width="3"/>
      <text x="115" y="48" text-anchor="middle" fill="#4ade80" font-size="30" font-weight="800">④ 打印</text>
      <text x="115" y="88" text-anchor="middle" fill="#f8fafc" font-size="22">温度 / 速度 / 风险</text>
      <text x="115" y="126" text-anchor="middle" fill="#cbd5e1" font-size="18">监控成品质量</text>
    </g>
  </g>
  <g stroke="#f59e0b" stroke-width="5" marker-end="url(#arrow)" fill="none" opacity="0.95">
    <path d="M310 305 H355"/><path d="M610 305 H655"/><path d="M910 305 H955"/>
  </g>
  <g transform="translate(180 470)">
    <rect width="920" height="120" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
    <text x="42" y="48" fill="#22d3ee" font-family="SFMono-Regular, Menlo, monospace" font-size="26">G28</text>
    <text x="128" y="48" fill="#e2e8f0" font-size="22">回零</text>
    <text x="250" y="48" fill="#fbbf24" font-family="SFMono-Regular, Menlo, monospace" font-size="26">M104 S200</text>
    <text x="420" y="48" fill="#e2e8f0" font-size="22">加热喷嘴</text>
    <text x="585" y="48" fill="#22d3ee" font-family="SFMono-Regular, Menlo, monospace" font-size="26">G1 X80 Y40 E3</text>
    <text x="42" y="88" fill="#e2e8f0" font-size="22">核心理解：每一行 G-code 都对应一个可观察的机器动作。</text>
  </g>
</svg>
