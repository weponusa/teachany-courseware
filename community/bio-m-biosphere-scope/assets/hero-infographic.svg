<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" style="background:#07111f">
  <defs>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;display=swap");
    text { font-family: "Noto Sans SC", system-ui, -apple-system, sans-serif; }
  </style>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0284c7;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="earthGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#84cc16;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#65a30d;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#854d0e;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 标题 -->
  <text x="600" y="60" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#eef6ff" text-anchor="middle">生物圈的结构与功能</text>
  <text x="600" y="95" font-family="Arial, sans-serif" font-size="18" fill="#9fb4cc" text-anchor="middle">地球上所有生命及其生存环境构成的统一整体</text>
  
  <!-- 地球剖面示意图 -->
  <g transform="translate(150, 150)">
    <!-- 大气圈底部 -->
    <rect x="0" y="0" width="450" height="120" fill="url(#skyGrad)" stroke="#38bdf8" stroke-width="2" rx="8"/>
    <text x="225" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#eef6ff" text-anchor="middle">大气圈底部</text>
    <text x="225" y="60" font-family="Arial, sans-serif" font-size="14" fill="#bae6fd" text-anchor="middle">约10km 高度</text>
    <text x="225" y="85" font-family="Arial, sans-serif" font-size="14" fill="#e0f2fe" text-anchor="middle">🦅 飞鸟 🦟 昆虫 🌬️ 气体</text>
    
    <!-- 水圈全部 -->
    <rect x="0" y="130" width="450" height="140" fill="url(#waterGrad)" stroke="#0284c7" stroke-width="2" rx="8"/>
    <text x="225" y="165" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#eef6ff" text-anchor="middle">水圈全部</text>
    <text x="225" y="190" font-family="Arial, sans-serif" font-size="14" fill="#bae6fd" text-anchor="middle">从海洋表层到深达11km</text>
    <text x="225" y="215" font-family="Arial, sans-serif" font-size="14" fill="#e0f2fe" text-anchor="middle">🐟 鱼类 🦐 浮游生物 🪸 珊瑚</text>
    <text x="225" y="240" font-family="Arial, sans-serif" font-size="14" fill="#e0f2fe" text-anchor="middle">🐙 深海生物 💧 藻类</text>
    
    <!-- 岩石圈表层 -->
    <rect x="0" y="280" width="450" height="160" fill="url(#earthGrad)" stroke="#84cc16" stroke-width="2" rx="8"/>
    <text x="225" y="315" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#eef6ff" text-anchor="middle">岩石圈表层</text>
    <text x="225" y="340" font-family="Arial, sans-serif" font-size="14" fill="#d9f99d" text-anchor="middle">表层土壤约0-3m</text>
    <text x="225" y="365" font-family="Arial, sans-serif" font-size="14" fill="#ecfccb" text-anchor="middle">🌳 植物根系 🪱 蚯蚓 🐜 土壤生物</text>
    <text x="225" y="390" font-family="Arial, sans-serif" font-size="14" fill="#ecfccb" text-anchor="middle">🦔 穴居动物 🍄 真菌</text>
    <text x="225" y="415" font-family="Arial, sans-serif" font-size="14" fill="#ecfccb" text-anchor="middle">🪨 岩石风化层</text>
  </g>
  
  <!-- 生态系统组成 -->
  <g transform="translate(650, 150)">
    <text x="250" y="20" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#eef6ff" text-anchor="middle">生态系统的组成</text>
    
    <!-- 生产者 -->
    <g transform="translate(0, 50)">
      <rect x="0" y="0" width="220" height="85" fill="#14233a" stroke="#22c55e" stroke-width="2" rx="8"/>
      <text x="110" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#22c55e" text-anchor="middle">🌿 生产者</text>
      <text x="110" y="48" font-family="Arial, sans-serif" font-size="13" fill="#bae6fd" text-anchor="middle">植物、藻类</text>
      <text x="110" y="68" font-family="Arial, sans-serif" font-size="13" fill="#9fb4cc" text-anchor="middle">光合作用制造有机物</text>
    </g>
    
    <!-- 消费者 -->
    <g transform="translate(0, 145)">
      <rect x="0" y="0" width="220" height="85" fill="#14233a" stroke="#f59e0b" stroke-width="2" rx="8"/>
      <text x="110" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#f59e0b" text-anchor="middle">🦁 消费者</text>
      <text x="110" y="48" font-family="Arial, sans-serif" font-size="13" fill="#bae6fd" text-anchor="middle">动物</text>
      <text x="110" y="68" font-family="Arial, sans-serif" font-size="13" fill="#9fb4cc" text-anchor="middle">直接或间接以植物为食</text>
    </g>
    
    <!-- 分解者 -->
    <g transform="translate(0, 240)">
      <rect x="0" y="0" width="220" height="85" fill="#14233a" stroke="#a78bfa" stroke-width="2" rx="8"/>
      <text x="110" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#a78bfa" text-anchor="middle">🍄 分解者</text>
      <text x="110" y="48" font-family="Arial, sans-serif" font-size="13" fill="#bae6fd" text-anchor="middle">细菌、真菌</text>
      <text x="110" y="68" font-family="Arial, sans-serif" font-size="13" fill="#9fb4cc" text-anchor="middle">分解有机物返回环境</text>
    </g>
    
    <!-- 非生物环境 -->
    <g transform="translate(260, 50)">
      <rect x="0" y="0" width="220" height="275" fill="#14233a" stroke="#38bdf8" stroke-width="2" rx="8"/>
      <text x="110" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#38bdf8" text-anchor="middle">🌍 非生物环境</text>
      <text x="110" y="60" font-family="Arial, sans-serif" font-size="14" fill="#bae6fd" text-anchor="middle">☀️ 阳光</text>
      <text x="110" y="85" font-family="Arial, sans-serif" font-size="14" fill="#bae6fd" text-anchor="middle">💧 水分</text>
      <text x="110" y="110" font-family="Arial, sans-serif" font-size="14" fill="#bae6fd" text-anchor="middle">🌡️ 温度</text>
      <text x="110" y="135" font-family="Arial, sans-serif" font-size="14" fill="#bae6fd" text-anchor="middle">🌬️ 空气</text>
      <text x="110" y="160" font-family="Arial, sans-serif" font-size="14" fill="#bae6fd" text-anchor="middle">🪨 土壤</text>
      <text x="110" y="185" font-family="Arial, sans-serif" font-size="14" fill="#bae6fd" text-anchor="middle">💎 矿物质</text>
      <line x1="20" y1="200" x2="200" y2="200" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>
      <text x="110" y="225" font-family="Arial, sans-serif" font-size="12" fill="#9fb4cc" text-anchor="middle">影响和制约生物</text>
      <text x="110" y="245" font-family="Arial, sans-serif" font-size="12" fill="#9fb4cc" text-anchor="middle">被生物改造</text>
    </g>
  </g>
  
  <!-- 能量流动与物质循环 -->
  <g transform="translate(150, 520)">
    <text x="450" y="20" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#eef6ff" text-anchor="middle">能量流动 vs 物质循环</text>
    
    <!-- 能量流动 -->
    <g transform="translate(0, 40)">
      <rect x="0" y="0" width="420" height="180" fill="#14233a" stroke="#ef4444" stroke-width="2" rx="8"/>
      <text x="210" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ef4444" text-anchor="middle">⚡ 能量流动(单向)</text>
      
      <circle cx="70" cy="80" r="30" fill="#fbbf24" stroke="#f59e0b" stroke-width="2" filter="url(#glow)"/>
      <text x="70" y="87" font-family="Arial, sans-serif" font-size="14" fill="#07111f" text-anchor="middle" font-weight="bold">☀️太阳</text>
      
      <path d="M 100 80 L 130 80" stroke="#ef4444" stroke-width="3" fill="none" marker-end="url(#arrowRed)"/>
      <defs>
        <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,6 L9,3 z" fill="#ef4444"/>
        </marker>
      </defs>
      
      <rect x="140" y="60" width="70" height="40" fill="#22c55e" stroke="#16a34a" stroke-width="2" rx="6"/>
      <text x="175" y="85" font-family="Arial, sans-serif" font-size="13" fill="#07111f" text-anchor="middle" font-weight="bold">生产者</text>
      
      <path d="M 210 80 L 240 80" stroke="#ef4444" stroke-width="3" fill="none" marker-end="url(#arrowRed)"/>
      
      <rect x="250" y="60" width="70" height="40" fill="#f59e0b" stroke="#d97706" stroke-width="2" rx="6"/>
      <text x="285" y="85" font-family="Arial, sans-serif" font-size="13" fill="#07111f" text-anchor="middle" font-weight="bold">消费者</text>
      
      <path d="M 320 80 L 350 80" stroke="#ef4444" stroke-width="3" fill="none" marker-end="url(#arrowRed)"/>
      
      <text x="380" y="85" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">🔥 热散失</text>
      
      <text x="210" y="135" font-family="Arial, sans-serif" font-size="13" fill="#fca5a5" text-anchor="middle">能量逐级递减</text>
      <text x="210" y="155" font-family="Arial, sans-serif" font-size="13" fill="#fca5a5" text-anchor="middle">最终以热能形式散失</text>
    </g>
    
    <!-- 物质循环 -->
    <g transform="translate(480, 40)">
      <rect x="0" y="0" width="420" height="180" fill="#14233a" stroke="#22c55e" stroke-width="2" rx="8"/>
      <text x="210" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#22c55e" text-anchor="middle">♻️ 物质循环(往复)</text>
      
      <!-- 循环箭头 -->
      <ellipse cx="210" cy="100" rx="140" ry="50" fill="none" stroke="#22c55e" stroke-width="3" stroke-dasharray="5,5"/>
      
      <rect x="60" y="80" width="70" height="40" fill="#38bdf8" stroke="#0284c7" stroke-width="2" rx="6"/>
      <text x="95" y="105" font-family="Arial, sans-serif" font-size="12" fill="#07111f" text-anchor="middle" font-weight="bold">无机环境</text>
      
      <rect x="175" y="55" width="70" height="35" fill="#22c55e" stroke="#16a34a" stroke-width="2" rx="6"/>
      <text x="210" y="77" font-family="Arial, sans-serif" font-size="12" fill="#07111f" text-anchor="middle" font-weight="bold">生产者</text>
      
      <rect x="290" y="80" width="70" height="40" fill="#f59e0b" stroke="#d97706" stroke-width="2" rx="6"/>
      <text x="325" y="105" font-family="Arial, sans-serif" font-size="12" fill="#07111f" text-anchor="middle" font-weight="bold">消费者</text>
      
      <rect x="175" y="130" width="70" height="35" fill="#a78bfa" stroke="#7c3aed" stroke-width="2" rx="6"/>
      <text x="210" y="152" font-family="Arial, sans-serif" font-size="12" fill="#07111f" text-anchor="middle" font-weight="bold">分解者</text>
      
      <!-- 箭头 -->
      <defs>
        <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
        </marker>
      </defs>
      <path d="M 130 95 Q 155 75, 175 73" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
      <path d="M 245 75 Q 270 85, 290 95" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
      <path d="M 325 120 Q 300 140, 245 148" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
      <path d="M 175 148 Q 140 140, 120 120" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
      
      <text x="210" y="155" font-family="Arial, sans-serif" font-size="13" fill="#86efac" text-anchor="middle">C/N/O 等元素循环往复</text>
    </g>
  </g>
  
  <!-- 底部总结 -->
  <text x="600" y="750" font-family="Arial, sans-serif" font-size="16" fill="#9fb4cc" text-anchor="middle">生物圈是一个统一的整体,各部分相互依存、相互作用</text>
</svg>
