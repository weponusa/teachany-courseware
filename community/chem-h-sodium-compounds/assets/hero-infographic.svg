<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs>
  <rect width="1280" height="720" fill="url(#g)"/>
  <circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/>
  <circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/>
  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">钠及其化合物</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">为什么钠必须保存在煤油中，而食盐中的钠却非常稳定？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：危险化学品安全员 · 课标节点：chem-h-sodium-compounds</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">钠单质</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">钠最外层只有 1 个电子，易失电子形成 Na⁺，表现出强还原</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">性，与水反应生成 NaOH 和 H₂。</text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">氧化钠与过氧化钠</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">Na₂O 是碱性氧化物，Na₂O₂ 可与 CO₂、H₂O 反</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21">应放出 O₂，常体现强氧化性。</text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">碳酸钠与碳酸氢钠</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">Na₂CO₃ 俗称纯碱，碱性较强；NaHCO₃ 俗称小苏打，</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21">受热易分解并能与酸放 CO₂。</text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text>
  <text x="260" y="585" fill="#e0f2fe" font-size="26">钠单质看失电子，过氧化钠看放氧，碳酸氢钠看受热放 CO₂。</text>
  <text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中化学完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas 互动 / 课标挂树</text>
</svg>