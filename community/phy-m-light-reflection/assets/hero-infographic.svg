<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Helvetica Neue',sans-serif">
  <defs>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;display=swap");
    text { font-family: "Noto Sans SC", system-ui, -apple-system, sans-serif; }
  </style>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1445"/>
      <stop offset="100%" style="stop-color:#050a1e"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sglow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fbbf24"/>
    </marker>
    <marker id="arrW" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34d399"/>
    </marker>
  </defs>
  <rect width="900" height="480" fill="url(#bgG)"/>

  <!-- 标题 -->
  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#fbbf24" filter="url(#sglow)">光的反射</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#64748b">Reflection of Light · 初中物理八年级</text>

  <!-- ===== 中央：反射示意图 ===== -->
  <!-- 镜面 -->
  <line x1="290" y1="280" x2="610" y2="280" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <text x="450" y="300" text-anchor="middle" font-size="11" fill="#94a3b8">平面镜（反射面）</text>

  <!-- 法线（虚线） -->
  <line x1="450" y1="180" x2="450" y2="310" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="468" y="195" font-size="11" fill="#94a3b8">法线 N</text>

  <!-- 入射光线 -->
  <line x1="340" y1="200" x2="450" y2="280" stroke="#fbbf24" stroke-width="2.5" marker-end="url(#arr)" filter="url(#sglow)"/>
  <text x="345" y="225" font-size="12" font-weight="bold" fill="#fbbf24">入射光线</text>

  <!-- 反射光线 -->
  <line x1="450" y1="280" x2="565" y2="200" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrW)" filter="url(#sglow)"/>
  <text x="520" y="225" font-size="12" font-weight="bold" fill="#60a5fa">反射光线</text>

  <!-- 入射点 O -->
  <circle cx="450" cy="280" r="4" fill="#f97316"/>
  <text x="455" y="275" font-size="11" fill="#f97316" font-weight="bold">O</text>

  <!-- 入射角弧 -->
  <path d="M 440,265 A 22,22 0 0,0 416,268" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="410" y="262" font-size="11" fill="#fbbf24">α</text>
  <text x="360" y="272" font-size="10" fill="#fbbf24">入射角</text>

  <!-- 反射角弧 -->
  <path d="M 460,265 A 22,22 0 0,1 484,268" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="486" y="262" font-size="11" fill="#60a5fa">α</text>
  <text x="490" y="272" font-size="10" fill="#60a5fa">反射角</text>

  <!-- 等号 -->
  <text x="450" y="245" text-anchor="middle" font-size="16" font-weight="bold" fill="#34d399" filter="url(#sglow)">入射角 = 反射角</text>

  <!-- ===== 左侧知识卡：反射定律 ===== -->
  <rect x="30" y="70" rx="10" ry="10" width="230" height="190" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5" opacity="0.92"/>
  <text x="145" y="93" text-anchor="middle" font-size="13" font-weight="bold" fill="#fbbf24">📐 光的反射定律</text>
  <line x1="50" y1="100" x2="240" y2="100" stroke="#fbbf2430" stroke-width="1"/>
  <text x="50" y="120" font-size="11" fill="#fef3c7">① 三线共面</text>
  <text x="50" y="136" font-size="10" fill="#94a3b8">入射光线、反射光线、法线</text>
  <text x="50" y="150" font-size="10" fill="#94a3b8">在同一平面内</text>
  <text x="50" y="170" font-size="11" fill="#fef3c7">② 两线分居</text>
  <text x="50" y="186" font-size="10" fill="#94a3b8">入射、反射光线分居</text>
  <text x="50" y="200" font-size="10" fill="#94a3b8">法线两侧</text>
  <text x="50" y="220" font-size="11" fill="#fef3c7">③ 两角相等</text>
  <text x="50" y="236" font-size="10" fill="#94a3b8">反射角 = 入射角</text>
  <text x="50" y="250" font-size="10" fill="#64748b">（光路可逆！）</text>

  <!-- ===== 右侧知识卡：镜面 vs 漫反射 ===== -->
  <rect x="640" y="70" rx="10" ry="10" width="230" height="190" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5" opacity="0.92"/>
  <text x="755" y="93" text-anchor="middle" font-size="13" font-weight="bold" fill="#c4b5fd">🪞 两种反射</text>
  <line x1="660" y1="100" x2="850" y2="100" stroke="#a78bfa30" stroke-width="1"/>
  <text x="660" y="120" font-size="11" fill="#c4b5fd">镜面反射</text>
  <text x="660" y="136" font-size="10" fill="#94a3b8">光滑表面（镜子/平静水面）</text>
  <text x="660" y="151" font-size="10" fill="#94a3b8">平行光→平行反射</text>
  <text x="660" y="166" font-size="10" fill="#fbbf24">→ 刺眼的强烈反光</text>
  <text x="660" y="186" font-size="11" fill="#c4b5fd">漫反射</text>
  <text x="660" y="202" font-size="10" fill="#94a3b8">粗糙表面（纸张/墙面）</text>
  <text x="660" y="217" font-size="10" fill="#94a3b8">平行光→各方向反射</text>
  <text x="660" y="233" font-size="10" fill="#34d399">→ 柔和，可从各角度看到</text>
  <text x="660" y="252" font-size="10" fill="#64748b">两者均遵守反射定律</text>

  <!-- ===== 底部：平面镜成像 ===== -->
  <rect x="100" y="340" rx="10" ry="10" width="320" height="105" fill="#1e293b" stroke="#34d399" stroke-width="1.5" opacity="0.9"/>
  <text x="260" y="362" text-anchor="middle" font-size="13" font-weight="bold" fill="#6ee7b7">🪞 平面镜成像特点</text>
  <line x1="120" y1="369" x2="400" y2="369" stroke="#34d39930" stroke-width="1"/>
  <text x="120" y="388" font-size="10" fill="#a7f3d0">① 等大：像与物体等大</text>
  <text x="120" y="404" font-size="10" fill="#a7f3d0">② 等距：像到镜距 = 物到镜距</text>
  <text x="120" y="420" font-size="10" fill="#a7f3d0">③ 虚像：光线反向延长线相交</text>
  <text x="120" y="436" font-size="10" fill="#a7f3d0">④ 左右互换（前后不换）</text>

  <!-- ===== 底部：应用 ===== -->
  <rect x="480" y="340" rx="10" ry="10" width="320" height="105" fill="#1e293b" stroke="#f97316" stroke-width="1.5" opacity="0.9"/>
  <text x="640" y="362" text-anchor="middle" font-size="13" font-weight="bold" fill="#fb923c">💡 生活中的应用</text>
  <line x1="500" y1="369" x2="780" y2="369" stroke="#f9731630" stroke-width="1"/>
  <text x="500" y="388" font-size="10" fill="#fed7aa">• 汽车后视镜（凸面镜扩大视野）</text>
  <text x="500" y="404" font-size="10" fill="#fed7aa">• 潜望镜（两次平面镜反射）</text>
  <text x="500" y="420" font-size="10" fill="#fed7aa">• 医用额镜（汇聚光线）</text>
  <text x="500" y="436" font-size="10" fill="#fed7aa">• 夜间行车警示（猫眼反射）</text>

  <!-- 漫反射小示意 -->
  <line x1="80" y1="320" x2="100" y2="280" stroke="#fbbf24" stroke-width="1.2" opacity="0.6"/>
  <line x1="80" y1="320" x2="110" y2="275" stroke="#fbbf24" stroke-width="1.2" opacity="0.6"/>
  <line x1="80" y1="320" x2="95" y2="270" stroke="#fbbf24" stroke-width="1.2" opacity="0.6" stroke-dasharray="2,2"/>
  <line x1="80" y1="320" x2="100" y2="312" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="320" x2="88" y2="298" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="320" x2="115" y2="308" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <line x1="65" y1="320" x2="100" y2="320" stroke="#64748b" stroke-width="2"/>
</svg>
