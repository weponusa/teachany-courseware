<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs>
  <rect width="1280" height="720" fill="url(#g)"/>
  <circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/>
  <circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/>
  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">物质的量（摩尔）</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">为什么化学计算不直接数分子，而要引入“1 mol”这个桥梁？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：药物配方计算师 · 课标节点：chem-h-mole-concept</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">1 mol 的含义</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">1 mol 任何粒子集合都含约 6.02×10²³ 个粒子，</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">这个数叫阿伏加德罗常数 Nₐ。</text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">n、N、Nₐ 的关系</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">粒子数 N = n × Nₐ；物质的量 n = N / Nₐ</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21">。这里的粒子可以是原子、分子、离子。</text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">摩尔质量</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">摩尔质量 M 的数值常与相对分子质量相同，单位是 g/mol</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21">；质量 m = n × M。</text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text>
  <text x="260" y="585" fill="#e0f2fe" font-size="26">三角关系：m、n、M 中间放 n，m = nM；N、n、Nₐ 中间也放 n，N = nNₐ。</text>
  <text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中化学完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas 互动 / 课标挂树</text>
</svg>