  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">烃的衍生物</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">怎样从官能团角度把一串烃的衍生物串成反应网络？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：有机物分类整理师 · 课标节点：chem-h-organic-derivatives</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">卤代烃</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">卤素原子引入后，可发生取代、水解或消去，是合成中的重要中间体</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">。</text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">含氧衍生物</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">醇、醛、羧酸、酯通过氧化、酯化、水解等反应相互联系。</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21"></text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">性质来源</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">极性、氢键、酸性和还原性等性质都与官能团结构有关。</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21"></text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text>
  <text x="260" y="585" fill="#e0f2fe" font-size="26">衍生物一张网：卤代可换，醇可氧化，酸醇成酯，酯能水解。</text>
