<svg viewBox="0 0 960 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0b1628"/><stop offset="100%" style="stop-color:#14233a"/></linearGradient>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#38bdf8" opacity=".6"/></marker>
  </defs>
  <rect width="960" height="340" fill="url(#bg)" rx="18"/>
  <text x="480" y="16" text-anchor="middle" fill="#64748b" font-size="12">电导率测定的逻辑链：R → G → κ → Λₘ</text>
  <rect x="340" y="28" width="280" height="56" rx="16" fill="rgba(56,189,248,.12)" stroke="rgba(56,189,248,.3)" stroke-width="1.5"/>
  <text x="480" y="63" text-anchor="middle" fill="#bae6fd" font-size="22" font-family="Georgia,serif">κ = G · (l/A)</text>
  <rect x="60" y="140" width="180" height="55" rx="14" fill="rgba(167,139,250,.1)" stroke="rgba(167,139,250,.3)" stroke-width="1.5"/>
  <text x="150" y="174" text-anchor="middle" fill="#c4b5fd" font-size="18">电阻 R (Ω)</text>
  <rect x="390" y="140" width="180" height="55" rx="14" fill="rgba(56,189,248,.1)" stroke="rgba(56,189,248,.3)" stroke-width="1.5"/>
  <text x="480" y="174" text-anchor="middle" fill="#7dd3fc" font-size="18">电导 G = 1/R (S)</text>
  <rect x="390" y="250" width="180" height="55" rx="14" fill="rgba(34,197,94,.1)" stroke="rgba(34,197,94,.3)" stroke-width="1.5"/>
  <text x="480" y="284" text-anchor="middle" fill="#86efac" font-size="18">电导率 κ (S/m)</text>
  <rect x="680" y="140" width="220" height="55" rx="14" fill="rgba(245,158,11,.1)" stroke="rgba(245,158,11,.3)" stroke-width="1.5"/>
  <text x="790" y="174" text-anchor="middle" fill="#fcd34d" font-size="18">电导池常数 l/A (m⁻¹)</text>
  <rect x="680" y="250" width="220" height="55" rx="14" fill="rgba(239,68,68,.1)" stroke="rgba(239,68,68,.3)" stroke-width="1.5"/>
  <text x="790" y="284" text-anchor="middle" fill="#fca5a5" font-size="18">摩尔电导率 Λₘ (S·m²/mol)</text>
  <line x1="240" y1="168" x2="390" y2="168" stroke="#a78bfa" stroke-width="2" marker-end="url(#ar)" opacity=".7"/>
  <text x="315" y="158" text-anchor="middle" fill="#94a3b8" font-size="13">取倒数</text>
  <line x1="480" y1="195" x2="480" y2="250" stroke="#38bdf8" stroke-width="2" marker-end="url(#ar)" opacity=".7"/>
  <text x="510" y="228" fill="#94a3b8" font-size="13">× l/A</text>
  <line x1="570" y1="168" x2="680" y2="168" stroke="#f59e0b" stroke-width="2" marker-end="url(#ar)" opacity=".7"/>
  <text x="625" y="158" text-anchor="middle" fill="#94a3b8" font-size="13">标准化</text>
  <line x1="790" y1="195" x2="790" y2="250" stroke="#ef4444" stroke-width="2" marker-end="url(#ar)" opacity=".7"/>
  <text x="830" y="228" fill="#94a3b8" font-size="13">÷ c</text>
</svg>
