<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" aria-labelledby="hero-title" role="img">
  <title id="hero-title">细胞分裂与分化知识结构图</title>
  <defs>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;display=swap");
    text { font-family: "Noto Sans SC", system-ui, -apple-system, sans-serif; }
  </style>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eab308;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="680" fill="#07111f"/>
  
  <!-- Title -->
  <text x="600" y="50" font-size="32" font-weight="bold" fill="url(#grad1)" text-anchor="middle">
    细胞分裂与分化：从一个到万千
  </text>
  
  <!-- Central fertilized egg -->
  <g id="fertilized-egg">
    <circle cx="600" cy="150" r="35" fill="#38bdf8" opacity="0.3" filter="url(#glow)"/>
    <circle cx="600" cy="150" r="28" fill="#38bdf8" stroke="#7dd3fc" stroke-width="2"/>
    <circle cx="600" cy="150" r="12" fill="#0c4a6e"/>
    <text x="600" y="205" font-size="16" fill="#eef6ff" text-anchor="middle">受精卵（起点）</text>
  </g>
  
  <!-- Left branch: Cell Division -->
  <g id="division-branch">
    <path d="M 580 180 Q 420 280 350 380" stroke="#38bdf8" stroke-width="3" fill="none" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="2s" repeatCount="indefinite"/>
    </path>
    
    <rect x="200" y="350" width="300" height="180" rx="20" fill="#14233a" stroke="#38bdf8" stroke-width="2"/>
    <text x="350" y="385" font-size="22" font-weight="bold" fill="#38bdf8" text-anchor="middle">
      细胞分裂（数量↑）
    </text>
    
    <!-- Mitosis stages icons -->
    <g transform="translate(220, 410)">
      <!-- Interphase -->
      <circle cx="25" cy="25" r="20" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="25" y="55" font-size="11" fill="#94a3b8" text-anchor="middle">间期</text>
      
      <!-- Prophase -->
      <circle cx="80" cy="25" r="20" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1.5"/>
      <path d="M 70 20 L 90 30 M 70 30 L 90 20" stroke="#38bdf8" stroke-width="2"/>
      <text x="80" y="55" font-size="11" fill="#94a3b8" text-anchor="middle">前期</text>
      
      <!-- Metaphase -->
      <circle cx="135" cy="25" r="20" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1.5"/>
      <line x1="125" y1="25" x2="145" y2="25" stroke="#38bdf8" stroke-width="2"/>
      <text x="135" y="55" font-size="11" fill="#94a3b8" text-anchor="middle">中期</text>
      
      <!-- Anaphase -->
      <circle cx="190" cy="25" r="20" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1.5"/>
      <path d="M 182 25 L 175 25 M 198 25 L 205 25" stroke="#38bdf8" stroke-width="2"/>
      <text x="190" y="55" font-size="11" fill="#94a3b8" text-anchor="middle">后期</text>
      
      <!-- Telophase -->
      <g transform="translate(245, 25)">
        <circle cx="-8" cy="0" r="12" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1.5"/>
        <circle cx="8" cy="0" r="12" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1.5"/>
      </g>
      <text x="245" y="55" font-size="11" fill="#94a3b8" text-anchor="middle">末期</text>
    </g>
    
    <text x="350" y="500" font-size="14" fill="#9fb4cc" text-anchor="middle">
      结果：2 → 4 → 8 → 2ⁿ 个相同细胞
    </text>
  </g>
  
  <!-- Right branch: Cell Differentiation -->
  <g id="differentiation-branch">
    <path d="M 620 180 Q 780 280 850 380" stroke="#22c55e" stroke-width="3" fill="none" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="2s" repeatCount="indefinite"/>
    </path>
    
    <rect x="700" y="350" width="300" height="180" rx="20" fill="#14233a" stroke="#22c55e" stroke-width="2"/>
    <text x="850" y="385" font-size="22" font-weight="bold" fill="#22c55e" text-anchor="middle">
      细胞分化（种类↑）
    </text>
    
    <!-- Differentiation paths -->
    <g transform="translate(720, 410)">
      <!-- Stem cell -->
      <circle cx="130" cy="20" r="18" fill="#166534" stroke="#22c55e" stroke-width="2"/>
      <text x="130" y="50" font-size="11" fill="#94a3b8" text-anchor="middle">干细胞</text>
      
      <!-- Arrow down -->
      <path d="M 130 42 L 130 65" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowhead)"/>
      
      <!-- Different cell types -->
      <g transform="translate(0, 75)">
        <!-- Nerve cell -->
        <g transform="translate(30, 0)">
          <ellipse cx="0" cy="0" rx="15" ry="8" fill="#166534" stroke="#22c55e" stroke-width="1.5"/>
          <line x1="-15" y1="0" x2="-30" y2="0" stroke="#22c55e" stroke-width="2"/>
          <text x="0" y="22" font-size="10" fill="#94a3b8" text-anchor="middle">神经</text>
        </g>
        
        <!-- Muscle cell -->
        <g transform="translate(130, 0)">
          <rect x="-18" y="-6" width="36" height="12" rx="3" fill="#166534" stroke="#22c55e" stroke-width="1.5"/>
          <line x1="-12" y1="0" x2="12" y2="0" stroke="#4ade80" stroke-width="1"/>
          <text x="0" y="22" font-size="10" fill="#94a3b8" text-anchor="middle">肌肉</text>
        </g>
        
        <!-- Blood cell -->
        <g transform="translate(230, 0)">
          <circle cx="0" cy="0" r="10" fill="#166534" stroke="#22c55e" stroke-width="1.5"/>
          <circle cx="0" cy="0" r="5" fill="#22c55e" opacity="0.3"/>
          <text x="0" y="22" font-size="10" fill="#94a3b8" text-anchor="middle">血液</text>
        </g>
      </g>
    </g>
    
    <text x="850" y="500" font-size="14" fill="#9fb4cc" text-anchor="middle">
      结果：形态、功能各异的细胞类型
    </text>
  </g>
  
  <!-- Bottom: Tissue formation -->
  <g id="tissue-formation">
    <path d="M 350 530 Q 600 570 850 530" stroke="#a78bfa" stroke-width="3" fill="none"/>
    
    <rect x="450" y="590" width="300" height="70" rx="15" fill="#14233a" stroke="url(#grad1)" stroke-width="2"/>
    <text x="600" y="620" font-size="20" font-weight="bold" fill="url(#grad1)" text-anchor="middle">
      组织形成
    </text>
    <text x="600" y="645" font-size="13" fill="#9fb4cc" text-anchor="middle">
      相似细胞聚集 → 上皮、结缔、肌肉、神经组织
    </text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#22c55e"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <g transform="translate(50, 600)">
    <text x="0" y="0" font-size="12" fill="#64748b">
      💡 核心逻辑：分裂（复制） + 分化（特化） = 多细胞生物
    </text>
  </g>
</svg>
