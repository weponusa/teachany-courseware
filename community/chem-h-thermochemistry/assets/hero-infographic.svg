<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs>
  <rect width="1280" height="720" fill="url(#g)"/>
  <circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/>
  <circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/>
  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">热化学（焓变）</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">怎样用一个能量图判断反应是放热还是吸热？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：反应能量审计师 · 课标节点：chem-h-thermochemistry</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">体系与环境</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">研究对象叫体系，体系之外叫环境；热量可在体系与环境之间转移。</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21"></text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">放热与吸热</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">生成物能量低于反应物通常放热，ΔH &lt; 0；生成物能量高于反</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21">应物通常吸热，ΔH &gt; 0。</text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">热化学方程式</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">热化学方程式不仅写物质和系数，还要写状态和反应热，系数改变时</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21">反应热也按比例改变。</text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text>
  <text x="260" y="585" fill="#e0f2fe" font-size="26">能量图判断：生成物低，放热负；生成物高，吸热正。</text>
  <text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中化学完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas 互动 / 课标挂树</text>
