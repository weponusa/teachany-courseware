<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs><rect width="1280" height="720" fill="url(#g)"/><circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/><circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/><text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">力的合成与分解</text><text x="70" y="168" fill="#bae6fd" font-size="28">为什么斜向上的拉力，既能向前拉动物体，也能减小地面对物体的压力？</text><text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：桥梁拉索受力分析师 · 课标节点：phy-h-force-decomposition</text><rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/><text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">矢量</text><text x="96" y="374" fill="#dbeafe" font-size="21">力既有大小又有方向，合成时遵循矢量运算法则。</text><text x="96" y="410" fill="#dbeafe" font-size="21"></text><rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/><text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">合力</text><text x="486" y="374" fill="#dbeafe" font-size="21">几个力共同作用的效果可用一个等效力表示。</text><text x="486" y="410" fill="#dbeafe" font-size="21"></text><rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/><text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">分力</text><text x="876" y="374" fill="#dbeafe" font-size="21">一个力可沿选定方向分解成等效分量，常用 Fx=Fcosθ、F</text><text x="876" y="410" fill="#dbeafe" font-size="21">y=Fsinθ。</text><rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/><text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text><text x="260" y="585" fill="#e0f2fe" font-size="26">力的分解不是把力切碎，而是换一组等效坐标语言。</text><text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中物理完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas 互动 / 课标挂树</text></svg>