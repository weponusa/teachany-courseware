<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs>
  <rect width="1280" height="720" fill="url(#g)"/>
  <circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/>
  <circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/>
  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">铁及其化合物</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">怎样用颜色、沉淀和价态变化判断铁元素处在哪一种状态？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：钢铁腐蚀诊断师 · 课标节点：chem-h-iron-compounds</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">铁单质与价态</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">铁常见价态为 0、+2、+3；Fe 可被酸或氧化剂转化为 F</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">e²⁺ 或 Fe³⁺。</text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">Fe²⁺ / Fe³⁺ 检验</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">Fe²⁺ 遇 OH⁻ 先生成 Fe(OH)₂，易被氧化；Fe</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21">³⁺ 遇 OH⁻ 生成红褐色 Fe(OH)₃，遇 SCN</text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">腐蚀与防护</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">铁腐蚀本质是电化学氧化过程，可通过隔绝水氧、牺牲阳极或涂层等</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21">方式防护。</text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text>
  <text x="260" y="585" fill="#e0f2fe" font-size="26">铁看两价三价：二价易被氧化，三价遇 SCN⁻ 血红，遇 OH⁻ 红褐沉淀。</text>
  <text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中化学完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas 互动 / 课标挂树</text>
