<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs>
  <rect width="1280" height="720" fill="url(#g)"/>
  <circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/>
  <circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/>
  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">气体摩尔体积</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">为什么在标准状况下，1 mol 不同气体都近似占 22.4 L？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：气体储罐工程师 · 课标节点：chem-h-gas-molar-volume</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">气体摩尔体积 Vₘ</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">单位物质的量气体所占的体积叫气体摩尔体积，Vₘ = V/n，</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">单位 L/mol。</text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">标准状况近似值</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">在 0 ℃、101 kPa 条件下，1 mol 理想气体体积</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21">约为 22.4 L。</text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">适用边界</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">22.4 L/mol 只适合标准状况下的气体，不能直接套到液</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21">体、固体或非标况气体。</text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text>
  <text x="260" y="585" fill="#e0f2fe" font-size="26">22.4 只问三件事：是不是气体？是不是 1 mol？是不是标准状况？少一个都要谨慎。</text>
  <text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中化学完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas 互动 / 课标挂树</text>
</svg>