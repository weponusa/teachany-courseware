<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a2e"/>
      <stop offset="100%" stop-color="#070e1a"/>
    </linearGradient>
    <linearGradient id="reactor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#10233d"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#bg)" rx="16"/>
  <rect x="1" y="1" width="898" height="558" fill="none" stroke="#1e3a5f" stroke-width="1" rx="16"/>

  <!-- Title -->
  <text x="450" y="44" text-anchor="middle" fill="#eef6ff" font-size="22" font-weight="700">氢还原法提氧原理</text>
  <text x="450" y="68" text-anchor="middle" fill="#8fa8c8" font-size="14">Hydrogen Reduction · FeO + H₂ → Fe + H₂O</text>

  <!-- Step 1: Input -->
  <rect x="30" y="100" width="200" height="180" rx="12" fill="url(#reactor)" stroke="#1e3a5f"/>
  <text x="130" y="128" text-anchor="middle" fill="#bae6fd" font-size="15" font-weight="600">① 输入原料</text>

  <!-- FeO block -->
  <rect x="50" y="145" width="160" height="52" rx="8" fill="rgba(34,197,94,.12)" stroke="rgba(34,197,94,.35)"/>
  <text x="130" y="168" text-anchor="middle" fill="#22c55e" font-size="16" font-weight="700">FeO</text>
  <text x="130" y="188" text-anchor="middle" fill="#8fa8c8" font-size="11">铁氧化物（月壤含~17%）</text>

  <!-- H₂ block -->
  <rect x="50" y="210" width="160" height="52" rx="8" fill="rgba(56,189,248,.12)" stroke="rgba(56,189,248,.35)"/>
  <text x="130" y="233" text-anchor="middle" fill="#38bdf8" font-size="16" font-weight="700">H₂</text>
  <text x="130" y="253" text-anchor="middle" fill="#8fa8c8" font-size="11">氢气（需从地球运或电解水）</text>

  <!-- Arrow 1 -->
  <line x1="235" y1="190" x2="290" y2="190" stroke="url(#arrowGrad)" stroke-width="2.5"/>
  <polygon points="288,183 302,190 288,197" fill="#38bdf8"/>

  <!-- Step 2: Reactor -->
  <rect x="305" y="100" width="260" height="180" rx="12" fill="url(#reactor)" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="435" y="128" text-anchor="middle" fill="#fca5a5" font-size="15" font-weight="600">② 高温反应器</text>

  <!-- Reactor vessel -->
  <rect x="340" y="140" width="190" height="80" rx="10" fill="rgba(239,68,68,.08)" stroke="rgba(239,68,68,.3)"/>
  <text x="435" y="168" text-anchor="middle" fill="#fbbf24" font-size="18" font-weight="700">~1000°C</text>
  <text x="435" y="192" text-anchor="middle" fill="#eef6ff" font-size="14">FeO + H₂ → Fe + H₂O</text>
  <text x="435" y="210" text-anchor="middle" fill="#94a3b8" font-size="11">还原反应释放水蒸气</text>

  <!-- Energy note -->
  <rect x="340" y="230" width="190" height="40" rx="8" fill="rgba(251,191,36,.08)" stroke="rgba(251,191,36,.25)"/>
  <text x="435" y="255" text-anchor="middle" fill="#fbbf24" font-size="12">⚡ 能耗：3-5 kWh / kg O₂</text>

  <!-- Arrow 2 -->
  <line x1="570" y1="190" x2="625" y2="190" stroke="url(#arrowGrad)" stroke-width="2.5"/>
  <polygon points="623,183 637,190 623,197" fill="#38bdf8"/>

  <!-- Step 3: Output -->
  <rect x="640" y="100" width="230" height="180" rx="12" fill="url(#reactor)" stroke="#1e3a5f"/>
  <text x="755" y="128" text-anchor="middle" fill="#bae6fd" font-size="15" font-weight="600">③ 产物分离</text>

  <!-- Fe output -->
  <rect x="660" y="145" width="190" height="52" rx="8" fill="rgba(167,139,250,.12)" stroke="rgba(167,139,250,.35)"/>
  <text x="755" y="168" text-anchor="middle" fill="#a78bfa" font-size="16" font-weight="700">Fe（金属铁）</text>
  <text x="755" y="188" text-anchor="middle" fill="#8fa8c8" font-size="11">副产品：可用于建材或3D打印</text>

  <!-- H₂O output -->
  <rect x="660" y="210" width="190" height="52" rx="8" fill="rgba(56,189,248,.12)" stroke="rgba(56,189,248,.35)"/>
  <text x="755" y="233" text-anchor="middle" fill="#38bdf8" font-size="16" font-weight="700">H₂O（水蒸气）</text>
  <text x="755" y="253" text-anchor="middle" fill="#8fa8c8" font-size="11">冷凝收集 → 电解 → O₂ + H₂</text>

  <!-- Step 4: Electrolysis (second row) -->
  <rect x="305" y="310" width="260" height="110" rx="12" fill="url(#reactor)" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="435" y="338" text-anchor="middle" fill="#7dd3fc" font-size="15" font-weight="600">④ 水电解</text>

  <rect x="340" y="350" width="190" height="55" rx="8" fill="rgba(56,189,248,.08)" stroke="rgba(56,189,248,.2)"/>
  <text x="435" y="372" text-anchor="middle" fill="#eef6ff" font-size="14">2H₂O → 2H₂ + O₂</text>
  <text x="435" y="393" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="600">🎯 最终产物：O₂（呼吸用氧）</text>

  <!-- Arrow from output H₂O down to electrolysis -->
  <path d="M755,265 L755,290 Q755,300 745,300 L580,300 Q570,300 570,310 L570,310" stroke="#38bdf8" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <polygon points="567,308 570,318 573,308" fill="#38bdf8"/>

  <!-- H₂ recycle arrow -->
  <path d="M340,390 L130,390 Q120,390 120,380 L120,275" stroke="#38bdf8" stroke-width="1.2" fill="none" stroke-dasharray="4,3"/>
  <polygon points="117,277 120,267 123,277" fill="#38bdf8"/>
  <text x="220" y="408" text-anchor="middle" fill="#38bdf8" font-size="11">♻ H₂ 循环利用</text>

  <!-- Key metrics bar -->
  <rect x="30" y="440" width="840" height="100" rx="12" fill="rgba(16,35,61,.6)" stroke="#1e3a5f"/>
  <text x="450" y="468" text-anchor="middle" fill="#eef6ff" font-size="15" font-weight="600">关键指标</text>

  <!-- Metric cards -->
  <rect x="50" y="480" width="190" height="44" rx="8" fill="rgba(34,197,94,.1)" stroke="rgba(34,197,94,.25)"/>
  <text x="145" y="500" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="600">氧产率 2-3%</text>
  <text x="145" y="516" text-anchor="middle" fill="#8fa8c8" font-size="10">仅FeO中的氧被提取</text>

  <rect x="260" y="480" width="190" height="44" rx="8" fill="rgba(251,191,36,.1)" stroke="rgba(251,191,36,.25)"/>
  <text x="355" y="500" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600">温度 ~1000°C</text>
  <text x="355" y="516" text-anchor="middle" fill="#8fa8c8" font-size="10">较熔融电解低很多</text>

  <rect x="470" y="480" width="190" height="44" rx="8" fill="rgba(56,189,248,.1)" stroke="rgba(56,189,248,.25)"/>
  <text x="565" y="500" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="600">能耗 3-5 kWh/kg</text>
  <text x="565" y="516" text-anchor="middle" fill="#8fa8c8" font-size="10">三种方法中最低</text>

  <rect x="680" y="480" width="170" height="44" rx="8" fill="rgba(239,68,68,.1)" stroke="rgba(239,68,68,.25)"/>
  <text x="765" y="500" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="600">需H₂来源</text>
  <text x="765" y="516" text-anchor="middle" fill="#8fa8c8" font-size="10">月球无天然氢源</text>
</svg>