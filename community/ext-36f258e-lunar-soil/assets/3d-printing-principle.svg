<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a2e"/>
      <stop offset="100%" stop-color="#070e1a"/>
    </linearGradient>
    <linearGradient id="panel3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#10233d"/>
    </linearGradient>
    <linearGradient id="lunarGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b5a0"/>
      <stop offset="100%" stop-color="#8a7d6b"/>
    </linearGradient>
    <linearGradient id="laserBeam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="60%" stop-color="#ef4444" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="heatGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#bg3)" rx="16"/>
  <rect x="1" y="1" width="898" height="558" fill="none" stroke="#1e3a5f" stroke-width="1" rx="16"/>

  <!-- Title -->
  <text x="450" y="44" text-anchor="middle" fill="#eef6ff" font-size="22" font-weight="700">月壤3D打印建造原理</text>
  <text x="450" y="68" text-anchor="middle" fill="#8fa8c8" font-size="14">Lunar Regolith 3D Printing · 逐层烧结 / 微波熔融</text>

  <!-- Main diagram area -->
  <rect x="30" y="85" width="520" height="380" rx="14" fill="url(#panel3)" stroke="#1e3a5f"/>

  <!-- Lunar surface -->
  <rect x="40" y="380" width="500" height="75" rx="0" fill="#1a1610"/>
  <text x="60" y="435" fill="#8a7d6b" font-size="11">月球表面 (1/6g, 真空, -170°C~+130°C)</text>

  <!-- Building base -->
  <rect x="140" y="300" width="280" height="80" fill="url(#lunarGrad)" opacity=".6" rx="2"/>

  <!-- Printed layers (visual) -->
  <rect x="150" y="310" width="260" height="8" fill="#c4b5a0" opacity=".7" rx="1"/>
  <rect x="155" y="300" width="250" height="8" fill="#c4b5a0" opacity=".75" rx="1"/>
  <rect x="162" y="290" width="236" height="8" fill="#c4b5a0" opacity=".8" rx="1"/>
  <rect x="170" y="280" width="220" height="8" fill="#c4b5a0" opacity=".85" rx="1"/>
  <rect x="178" y="270" width="204" height="8" fill="#c4b5a0" opacity=".9" rx="1"/>

  <!-- Sintering zone glow -->
  <ellipse cx="280" cy="287" rx="40" ry="6" fill="#f59e0b" opacity=".3" filter="url(#heatGlow)"/>

  <!-- Printer gantry -->
  <rect x="100" y="100" width="380" height="14" rx="4" fill="#475569"/>
  <rect x="100" y="100" width="14" height="200" rx="3" fill="#475569"/>
  <rect x="466" y="100" width="14" height="200" rx="3" fill="#475569"/>

  <!-- Print head -->
  <rect x="240" y="114" width="80" height="30" rx="4" fill="#64748b" stroke="#94a3b8"/>
  <rect x="265" y="144" width="30" height="120" rx="2" fill="#475569"/>
  <!-- Laser nozzle -->
  <polygon points="270,264 290,264 280,280" fill="#ef4444"/>

  <!-- Laser beam -->
  <line x1="280" y1="280" x2="280" y2="292" stroke="url(#laserBeam)" stroke-width="4" filter="url(#heatGlow)"/>

  <!-- Labels on main diagram -->
  <text x="290" y="108" text-anchor="middle" fill="#94a3b8" font-size="11">龙门架导轨</text>
  <text x="310" y="135" fill="#94a3b8" font-size="11">打印头</text>

  <!-- Layer annotation -->
  <line x1="430" y1="290" x2="460" y2="260" stroke="#fbbf24" stroke-width="1"/>
  <text x="462" y="258" fill="#fbbf24" font-size="11">当前烧结层</text>

  <!-- Feedstock arrow -->
  <path d="M130,350 L130,380 L200,380 L200,350" stroke="#c4b5a0" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <text x="165" y="370" text-anchor="middle" fill="#c4b5a0" font-size="10">月壤进料</text>

  <!-- Right panel: Process steps -->
  <rect x="570" y="85" width="300" height="380" rx="14" fill="url(#panel3)" stroke="#1e3a5f"/>
  <text x="720" y="112" text-anchor="middle" fill="#bae6fd" font-size="16" font-weight="600">工艺流程</text>

  <!-- Step 1 -->
  <rect x="590" y="125" width="260" height="50" rx="8" fill="rgba(196,181,160,.1)" stroke="rgba(196,181,160,.25)"/>
  <text x="610" y="147" fill="#c4b5a0" font-size="13" font-weight="700">1</text>
  <text x="635" y="147" fill="#eef6ff" font-size="13">月壤采集 + 筛分</text>
  <text x="635" y="165" fill="#8fa8c8" font-size="11">粒径 < 100μm，去除大颗粒</text>

  <!-- Arrow -->
  <line x1="720" y1="178" x2="720" y2="190" stroke="#38bdf8" stroke-width="1.5"/>
  <polygon points="716,188 720,196 724,188" fill="#38bdf8"/>

  <!-- Step 2 -->
  <rect x="590" y="198" width="260" height="50" rx="8" fill="rgba(56,189,248,.08)" stroke="rgba(56,189,248,.2)"/>
  <text x="610" y="220" fill="#38bdf8" font-size="13" font-weight="700">2</text>
  <text x="635" y="220" fill="#eef6ff" font-size="13">输送至打印头</text>
  <text x="635" y="238" fill="#8fa8c8" font-size="11">气动/螺旋输送至喷嘴</text>

  <!-- Arrow -->
  <line x1="720" y1="251" x2="720" y2="263" stroke="#38bdf8" stroke-width="1.5"/>
  <polygon points="716,261 720,269 724,261" fill="#38bdf8"/>

  <!-- Step 3 -->
  <rect x="590" y="271" width="260" height="50" rx="8" fill="rgba(239,68,68,.08)" stroke="rgba(239,68,68,.2)"/>
  <text x="610" y="293" fill="#fca5a5" font-size="13" font-weight="700">3</text>
  <text x="635" y="293" fill="#eef6ff" font-size="13">激光/微波烧结</text>
  <text x="635" y="311" fill="#8fa8c8" font-size="11">局部加热 >1200°C，熔融固化</text>

  <!-- Arrow -->
  <line x1="720" y1="324" x2="720" y2="336" stroke="#38bdf8" stroke-width="1.5"/>
  <polygon points="716,334 720,342 724,334" fill="#38bdf8"/>

  <!-- Step 4 -->
  <rect x="590" y="344" width="260" height="50" rx="8" fill="rgba(34,197,94,.08)" stroke="rgba(34,197,94,.2)"/>
  <text x="610" y="366" fill="#22c55e" font-size="13" font-weight="700">4</text>
  <text x="635" y="366" fill="#eef6ff" font-size="13">逐层堆叠 → 成型</text>
  <text x="635" y="384" fill="#8fa8c8" font-size="11">层厚1-10mm，穹顶结构</text>

  <!-- Arrow -->
  <line x1="720" y1="397" x2="720" y2="409" stroke="#38bdf8" stroke-width="1.5"/>
  <polygon points="716,407 720,415 724,407" fill="#38bdf8"/>

  <!-- Step 5 -->
  <rect x="590" y="417" width="260" height="40" rx="8" fill="rgba(167,139,250,.08)" stroke="rgba(167,139,250,.2)"/>
  <text x="610" y="440" fill="#a78bfa" font-size="13" font-weight="700">5</text>
  <text x="635" y="440" fill="#eef6ff" font-size="13">冷却固化 → 居住舱</text>

  <!-- Bottom: Key constraints -->
  <rect x="30" y="475" width="840" height="70" rx="12" fill="rgba(16,35,61,.6)" stroke="#1e3a5f"/>
  <text x="450" y="500" text-anchor="middle" fill="#eef6ff" font-size="15" font-weight="600">月壤3D打印核心约束</text>

  <rect x="50" y="512" width="195" height="26" rx="6" fill="rgba(239,68,68,.08)"/>
  <text x="147" y="530" text-anchor="middle" fill="#fca5a5" font-size="11">真空下散热仅靠辐射</text>

  <rect x="260" y="512" width="195" height="26" rx="6" fill="rgba(251,191,36,.08)"/>
  <text x="357" y="530" text-anchor="middle" fill="#fbbf24" font-size="11">1/6g影响熔融池形态</text>

  <rect x="470" y="512" width="195" height="26" rx="6" fill="rgba(56,189,248,.08)"/>
  <text x="567" y="530" text-anchor="middle" fill="#38bdf8" font-size="11">粉尘污染威胁设备</text>

  <rect x="680" y="512" width="170" height="26" rx="6" fill="rgba(167,139,250,.08)"/>
  <text x="765" y="530" text-anchor="middle" fill="#a78bfa" font-size="11">热循环导致结构开裂</text>
</svg>