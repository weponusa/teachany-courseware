<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a2e"/>
      <stop offset="100%" stop-color="#070e1a"/>
    </linearGradient>
    <linearGradient id="cell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#10233d"/>
    </linearGradient>
    <linearGradient id="melt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity=".3"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity=".3"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#bg2)" rx="16"/>
  <rect x="1" y="1" width="898" height="558" fill="none" stroke="#1e3a5f" stroke-width="1" rx="16"/>

  <!-- Title -->
  <text x="450" y="44" text-anchor="middle" fill="#eef6ff" font-size="22" font-weight="700">熔融电解法提氧原理</text>
  <text x="450" y="68" text-anchor="middle" fill="#8fa8c8" font-size="14">Molten Regolith Electrolysis · SiO₂ → Si + O₂</text>

  <!-- Electrolysis Cell - Main Diagram -->
  <rect x="60" y="90" width="480" height="360" rx="14" fill="url(#cell)" stroke="#1e3a5f"/>

  <!-- Cell label -->
  <text x="300" y="118" text-anchor="middle" fill="#bae6fd" font-size="16" font-weight="600">电解槽截面图</text>

  <!-- Crucible (outer) -->
  <rect x="120" y="140" width="360" height="260" rx="6" fill="none" stroke="#64748b" stroke-width="3"/>
  <text x="130" y="420" fill="#94a3b8" font-size="11">耐高温坩埚（钨/铱合金）</text>

  <!-- Molten regolith (inside crucible) -->
  <rect x="126" y="200" width="348" height="170" rx="4" fill="url(#melt)" opacity=".7"/>
  <!-- Bubbles in melt -->
  <circle cx="180" cy="280" r="6" fill="none" stroke="#fbbf24" stroke-width="1" opacity=".6"/>
  <circle cx="250" cy="300" r="4" fill="none" stroke="#fbbf24" stroke-width="1" opacity=".5"/>
  <circle cx="320" cy="270" r="5" fill="none" stroke="#fbbf24" stroke-width="1" opacity=".6"/>
  <circle cx="380" cy="290" r="7" fill="none" stroke="#fbbf24" stroke-width="1" opacity=".4"/>

  <!-- Melt label -->
  <text x="300" y="230" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="600">熔融月壤 &gt;1600°C</text>
  <text x="300" y="250" text-anchor="middle" fill="#eef6ff" font-size="12" opacity=".8">SiO₂、Al₂O₃、FeO、MgO、CaO</text>

  <!-- Cathode (left) -->
  <rect x="160" y="145" width="24" height="220" rx="3" fill="#64748b"/>
  <rect x="160" y="145" width="24" height="55" rx="3" fill="#a78bfa"/>
  <text x="172" y="140" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">阴极 (−)</text>

  <!-- Metal deposit on cathode -->
  <rect x="148" y="340" width="48" height="25" rx="4" fill="rgba(167,139,250,.5)"/>
  <text x="172" y="358" text-anchor="middle" fill="#eef6ff" font-size="9" font-weight="600">金属沉积</text>

  <!-- Anode (right) -->
  <rect x="416" y="145" width="24" height="220" rx="3" fill="#64748b"/>
  <rect x="416" y="145" width="24" height="55" rx="3" fill="#ef4444"/>
  <text x="428" y="140" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">阳极 (+)</text>

  <!-- O₂ bubbles rising from anode -->
  <circle cx="428" cy="175" r="8" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity=".8"/>
  <text x="428" y="179" text-anchor="middle" fill="#38bdf8" font-size="8">O₂</text>
  <circle cx="435" cy="155" r="6" fill="none" stroke="#38bdf8" stroke-width="1" opacity=".6"/>
  <circle cx="422" cy="138" r="5" fill="none" stroke="#38bdf8" stroke-width="1" opacity=".4"/>

  <!-- Arrow showing O₂ collection -->
  <line x1="428" y1="130" x2="428" y2="110" stroke="#38bdf8" stroke-width="1.5"/>
  <polygon points="424,112 428,104 432,112" fill="#38bdf8"/>
  <text x="470" y="112" fill="#38bdf8" font-size="11" font-weight="600">O₂ 气体收集</text>

  <!-- Current flow arrows -->
  <path d="M172,145 L172,100 L428,100 L428,145" stroke="#fbbf24" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <text x="300" y="95" text-anchor="middle" fill="#fbbf24" font-size="12">直流电流 →</text>

  <!-- Right side: Reaction Equations -->
  <rect x="570" y="90" width="300" height="360" rx="14" fill="url(#cell)" stroke="#1e3a5f"/>
  <text x="720" y="118" text-anchor="middle" fill="#bae6fd" font-size="16" font-weight="600">反应方程式</text>

  <!-- Equation 1 -->
  <rect x="590" y="135" width="260" height="58" rx="8" fill="rgba(239,68,68,.08)" stroke="rgba(239,68,68,.25)"/>
  <text x="720" y="158" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="600">阳极（氧化）</text>
  <text x="720" y="180" text-anchor="middle" fill="#eef6ff" font-size="14">2O²⁻ → O₂ + 4e⁻</text>

  <!-- Equation 2 -->
  <rect x="590" y="205" width="260" height="58" rx="8" fill="rgba(167,139,250,.08)" stroke="rgba(167,139,250,.25)"/>
  <text x="720" y="228" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="600">阴极（还原）</text>
  <text x="720" y="250" text-anchor="middle" fill="#eef6ff" font-size="14">Si⁴⁺ + 4e⁻ → Si</text>

  <!-- Total equation -->
  <rect x="590" y="275" width="260" height="58" rx="8" fill="rgba(34,197,94,.1)" stroke="rgba(34,197,94,.3)"/>
  <text x="720" y="298" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="600">总反应</text>
  <text x="720" y="320" text-anchor="middle" fill="#eef6ff" font-size="14">SiO₂ → Si + O₂</text>

  <!-- Advantage / Disadvantage -->
  <rect x="590" y="345" width="260" height="45" rx="8" fill="rgba(34,197,94,.08)" stroke="rgba(34,197,94,.2)"/>
  <text x="720" y="363" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">✅ 氧产率最高：40-45%</text>
  <text x="720" y="380" text-anchor="middle" fill="#8fa8c8" font-size="11">几乎所有氧化物中的氧都可释放</text>

  <rect x="590" y="400" width="260" height="45" rx="8" fill="rgba(239,68,68,.08)" stroke="rgba(239,68,68,.2)"/>
  <text x="720" y="418" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">⚠️ 能耗极大：~8 kWh/kg</text>
  <text x="720" y="435" text-anchor="middle" fill="#8fa8c8" font-size="11">设备需承受1600°C以上高温</text>

  <!-- Bottom metrics -->
  <rect x="30" y="460" width="840" height="80" rx="12" fill="rgba(16,35,61,.6)" stroke="#1e3a5f"/>
  <text x="450" y="488" text-anchor="middle" fill="#eef6ff" font-size="15" font-weight="600">熔融电解 vs 氢还原 对比</text>

  <rect x="50" y="500" width="260" height="28" rx="6" fill="rgba(239,68,68,.1)"/>
  <text x="180" y="519" text-anchor="middle" fill="#fca5a5" font-size="12">熔融电解：产率高(45%) / 能耗高(8 kWh)</text>

  <rect x="330" y="500" width="260" height="28" rx="6" fill="rgba(34,197,94,.1)"/>
  <text x="460" y="519" text-anchor="middle" fill="#22c55e" font-size="12">氢还原：产率低(3%) / 能耗低(3.5 kWh)</text>

  <rect x="610" y="500" width="240" height="28" rx="6" fill="rgba(251,191,36,.1)"/>
  <text x="730" y="519" text-anchor="middle" fill="#fbbf24" font-size="12">核心权衡：产率 vs 能耗</text>
</svg>