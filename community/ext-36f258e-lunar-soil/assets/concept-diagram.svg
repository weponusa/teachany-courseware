  <rect x="656" y="234" width="188" height="36" rx="6" fill="rgba(239,68,68,.08)"/>
  <text x="750" y="257" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">熔融电解 &gt;1600°C</text>
  <rect x="656" y="278" width="188" height="36" rx="6" fill="rgba(251,191,36,.08)"/>
  <text x="750" y="301" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">碳热还原 &gt;1500°C</text>
  <line x1="750" y1="330" x2="750" y2="370" stroke="#38bdf8" stroke-width="1.5" opacity=".5"/>
  <text x="750" y="390" text-anchor="middle" fill="#7dd3fc" font-size="11">→ 核心权衡：产率vs能耗</text>
  <rect x="180" y="420" width="540" height="120" rx="12" fill="rgba(34,197,94,.06)" stroke="rgba(34,197,94,.2)"/>
  <text x="450" y="450" text-anchor="middle" fill="#22c55e" font-size="15" font-weight="700">工程应用产出</text>
  <rect x="200" y="465" width="160" height="55" rx="8" fill="rgba(56,189,248,.08)"/>
  <text x="280" y="488" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="600">O₂ 呼吸用氧</text>
  <text x="280" y="506" text-anchor="middle" fill="#cbd5e1" font-size="11">0.84 kg/人/天</text>
  <rect x="370" y="465" width="160" height="55" rx="8" fill="rgba(167,139,250,.08)"/>
  <text x="450" y="488" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="600">金属 Fe/Al/Ti</text>
  <text x="450" y="506" text-anchor="middle" fill="#cbd5e1" font-size="11">熔盐电解</text>
  <rect x="540" y="465" width="160" height="55" rx="8" fill="rgba(196,181,160,.08)"/>
  <text x="620" y="488" text-anchor="middle" fill="#c4b5a0" font-size="13" font-weight="600">3D打印建材</text>
  <text x="620" y="506" text-anchor="middle" fill="#cbd5e1" font-size="11">激光/微波烧结</text>
</svg>