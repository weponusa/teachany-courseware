<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#070e1a"/>
      <stop offset="100%" stop-color="#0c1a2e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="560" fill="url(#bg1)"/>
  <rect x="1" y="1" width="898" height="558" fill="none" stroke="#1e3a5f" rx="8"/>
  <text x="450" y="42" text-anchor="middle" fill="#eef6ff" font-size="22" font-weight="700">月壤 ISRU 概念结构图</text>
  <rect x="330" y="60" width="240" height="50" rx="12" fill="rgba(56,189,248,.15)" stroke="rgba(56,189,248,.4)"/>
  <text x="450" y="90" text-anchor="middle" fill="#7dd3fc" font-size="16" font-weight="700">月壤资源利用 (ISRU)</text>
  <line x1="370" y1="110" x2="150" y2="150" stroke="#38bdf8" stroke-width="1.5" opacity=".5"/>
  <line x1="450" y1="110" x2="450" y2="150" stroke="#38bdf8" stroke-width="1.5" opacity=".5"/>
  <line x1="530" y1="110" x2="750" y2="150" stroke="#38bdf8" stroke-width="1.5" opacity=".5"/>
  <rect x="40" y="150" width="220" height="180" rx="10" fill="rgba(239,68,68,.06)" stroke="rgba(239,68,68,.2)"/>
  <text x="150" y="176" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="600">月壤成分</text>
  <text x="60" y="200" fill="#cbd5e1" font-size="12">• SiO2 约43%</text>
  <text x="60" y="218" fill="#cbd5e1" font-size="12">• FeO 约17%</text>
  <text x="60" y="236" fill="#cbd5e1" font-size="12">• Al2O3 / MgO / CaO</text>
  <text x="60" y="258" fill="#fbbf24" font-size="11" font-weight="600">关键：含氧总量40-45%</text>
  <text x="60" y="280" fill="#94a3b8" font-size="11">月海 vs 高地成分差异</text>
  <text x="60" y="298" fill="#94a3b8" font-size="11">纳米铁珠=太空风化证据</text>
  <line x1="150" y1="330" x2="150" y2="370" stroke="#ef4444" stroke-width="1.5" opacity=".5"/>
  <text x="150" y="390" text-anchor="middle" fill="#fca5a5" font-size="11">→ 决定可提取什么</text>
  <rect x="280" y="150" width="340" height="180" rx="10" fill="rgba(251,191,36,.06)" stroke="rgba(251,191,36,.2)"/>
  <text x="450" y="176" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="600">工程约束</text>
  <rect x="296" y="188" width="148" height="40" rx="6" fill="rgba(239,68,68,.08)"/>
  <text x="370" y="212" text-anchor="middle" fill="#fca5a5" font-size="12">真空 · 无对流散热</text>
  <rect x="456" y="188" width="148" height="40" rx="6" fill="rgba(251,191,36,.08)"/>
  <text x="530" y="212" text-anchor="middle" fill="#fbbf24" font-size="12">温差 -170~+130°C</text>
  <rect x="296" y="236" width="148" height="40" rx="6" fill="rgba(56,189,248,.08)"/>
  <text x="370" y="260" text-anchor="middle" fill="#7dd3fc" font-size="12">1/6重力</text>
  <rect x="456" y="236" width="148" height="40" rx="6" fill="rgba(167,139,250,.08)"/>
  <text x="530" y="260" text-anchor="middle" fill="#a78bfa" font-size="12">强辐射环境</text>
  <text x="450" y="305" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">约束决定技术路线选择</text>
  <line x1="450" y1="330" x2="450" y2="370" stroke="#f59e0b" stroke-width="1.5" opacity=".5"/>
