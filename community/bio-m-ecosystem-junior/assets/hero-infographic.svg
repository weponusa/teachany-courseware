<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
<defs>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;display=swap");
    text { font-family: "Noto Sans SC", system-ui, -apple-system, sans-serif; }
  </style>
</defs>
  <rect width="600" height="300" rx="16" fill="#0b1120"/>
  <text x="300" y="28" text-anchor="middle" fill="#4ade80" font-size="18" font-weight="bold">生态系统的组成 · 知识结构图</text>
  <!-- Non-biotic -->
  <rect x="20" y="50" width="130" height="80" rx="10" fill="#111c33" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="85" y="75" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">非生物环境</text>
  <text x="85" y="95" text-anchor="middle" fill="#8aa0c0" font-size="10">阳光·水·空气·温度</text>
  <text x="85" y="112" text-anchor="middle" fill="#8aa0c0" font-size="10">土壤·矿物质</text>
  <!-- Producer -->
  <rect x="180" y="50" width="120" height="80" rx="10" fill="#111c33" stroke="#22c55e" stroke-width="1.5"/>
  <text x="240" y="75" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="bold">🌱 生产者</text>
  <text x="240" y="95" text-anchor="middle" fill="#8aa0c0" font-size="10">植物·藻类</text>
  <text x="240" y="112" text-anchor="middle" fill="#8aa0c0" font-size="10">光合作用制造有机物</text>
  <!-- Consumer -->
  <rect x="330" y="50" width="120" height="80" rx="10" fill="#111c33" stroke="#ef4444" stroke-width="1.5"/>
  <text x="390" y="75" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold">🐰 消费者</text>
  <text x="390" y="95" text-anchor="middle" fill="#8aa0c0" font-size="10">初级(草食动物)</text>
  <text x="390" y="112" text-anchor="middle" fill="#8aa0c0" font-size="10">次级·三级(肉食)</text>
  <!-- Decomposer -->
  <rect x="480" y="50" width="100" height="80" rx="10" fill="#111c33" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="530" y="75" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">🍄 分解者</text>
  <text x="530" y="95" text-anchor="middle" fill="#8aa0c0" font-size="10">细菌·真菌</text>
  <text x="530" y="112" text-anchor="middle" fill="#8aa0c0" font-size="10">分解有机物</text>
  <!-- Food chain -->
  <text x="300" y="165" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="bold">食物链示例</text>
  <text x="300" y="190" text-anchor="middle" fill="#e6edf7" font-size="12">🌿草 → 🦗蚱蜢 → 🐸青蛙 → 🐍蛇 → 🦅鹰</text>
  <!-- Cycle arrow -->
  <text x="300" y="230" text-anchor="middle" fill="#fbbf24" font-size="12">物质循环：生产者固定 → 消费者传递 → 分解者归还 → 回到环境 ♻️</text>
  <!-- Bottom summary -->
  <rect x="100" y="255" width="400" height="30" rx="8" fill="rgba(96,165,250,.1)"/>
  <text x="300" y="275" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold">生态系统 = 生物群落(生产者+消费者+分解者) + 非生物环境</text>
</svg>
