<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs>
  <rect width="1280" height="720" fill="url(#g)"/>
  <circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/>
  <circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/>
  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">金属的腐蚀与防护（高中）</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">为什么盐水环境会明显加快铁的腐蚀，而镀锌能保护铁？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：桥梁防腐工程师 · 课标节点：chem-h-metal-corrosion-h</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">电化学腐蚀</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">金属表面形成微小原电池，较活泼部位作负极失电子被氧化。</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21"></text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">环境因素</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">水、氧和电解质会加快腐蚀；盐水提高导电性，因此海边金属更易腐</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21">蚀。</text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">防护方法</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">涂层隔绝水氧，镀锌和牺牲阳极让更活泼金属先被氧化，外加电流也</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21">可保护金属。</text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text>
  <text x="260" y="585" fill="#e0f2fe" font-size="26">腐蚀三要素：金属、水氧、电解质；防护三思路：隔绝、牺牲、外加电流。</text>
  <text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中化学完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas 互动 / 课标挂树</text>
</svg>