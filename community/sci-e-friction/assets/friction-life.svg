<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="'PingFang SC',sans-serif">
<rect width="600" height="320" fill="#f0fdf4"/>
<text x="300" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#166534">生活中：有时增大，有时减小</text>
<g><rect x="40" y="70" width="250" height="200" rx="14" fill="#fff" stroke="#22c55e" stroke-width="2"/>
<text x="165" y="105" text-anchor="middle" font-size="18" font-weight="700" fill="#15803d">需要增大摩擦</text>
<text x="165" y="150" text-anchor="middle" font-size="15" fill="#166534">🥾 鞋底花纹防滑</text>
<text x="165" y="185" text-anchor="middle" font-size="15" fill="#166534">🚲 刹车皮抱紧车轮</text>
<text x="165" y="220" text-anchor="middle" font-size="15" fill="#166534">🧗 攀岩手套增大抓握</text></g>
<g><rect x="310" y="70" width="250" height="200" rx="14" fill="#fff" stroke="#0ea5e9" stroke-width="2"/>
<text x="435" y="105" text-anchor="middle" font-size="18" font-weight="700" fill="#0369a1">需要减小摩擦</text>
<text x="435" y="150" text-anchor="middle" font-size="15" fill="#075985">⛸️ 冰刀在冰面滑行</text>
<text x="435" y="185" text-anchor="middle" font-size="15" fill="#075985">🛢️ 机器加润滑油</text>
<text x="435" y="220" text-anchor="middle" font-size="15" fill="#075985">🛼 轮子用滚动代替滑动</text></g>
</svg>