<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="'PingFang SC',sans-serif">
<rect width="600" height="320" fill="#fffbeb"/>
<text x="300" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#9a3412">影响摩擦力大小的两个因素</text>
<g><rect x="40" y="70" width="250" height="200" rx="14" fill="#fff" stroke="#fb923c" stroke-width="2"/>
<text x="165" y="105" text-anchor="middle" font-size="18" font-weight="700" fill="#c2410c">① 接触面粗糙程度</text>
<rect x="70" y="200" width="190" height="14" fill="#a8a29e"/>
<path d="M70 200 l10 -10 m10 10 l10 -10 m10 10 l10 -10 m10 10 l10 -10 m10 10 l10 -10 m10 10 l10 -10 m10 10 l10 -10 m10 10 l10 -10" stroke="#78716c" stroke-width="2" fill="none"/>
<text x="165" y="245" text-anchor="middle" font-size="14" fill="#7c2d12">越粗糙，摩擦力越大</text></g>
<g><rect x="310" y="70" width="250" height="200" rx="14" fill="#fff" stroke="#fb923c" stroke-width="2"/>
<text x="435" y="105" text-anchor="middle" font-size="18" font-weight="700" fill="#c2410c">② 压力大小</text>
<rect x="360" y="200" width="150" height="14" fill="#a8a29e"/>
<rect x="405" y="150" width="60" height="50" rx="6" fill="#f97316"/>
<text x="435" y="182" text-anchor="middle" font-size="20" fill="#fff">重</text>
<text x="435" y="245" text-anchor="middle" font-size="14" fill="#7c2d12">压力越大，摩擦力越大</text></g>
</svg>