<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'PingFang SC',sans-serif">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff7ed"/><stop offset="1" stop-color="#ffedd5"/></linearGradient></defs>
<rect width="1280" height="720" fill="url(#bg)"/>
<text x="640" y="120" text-anchor="middle" font-size="58" font-weight="700" fill="#9a3412">摩擦力</text>
<text x="640" y="170" text-anchor="middle" font-size="24" fill="#c2410c">无处不在的"看不见的手"</text>
<g>
<rect x="120" y="240" width="240" height="150" rx="16" fill="#fff" stroke="#fb923c" stroke-width="3"/>
<text x="240" y="300" text-anchor="middle" font-size="26" font-weight="700" fill="#9a3412">什么是摩擦力</text>
<text x="240" y="340" text-anchor="middle" font-size="16" fill="#7c2d12">两个物体接触面</text>
<text x="240" y="364" text-anchor="middle" font-size="16" fill="#7c2d12">阻碍运动的力</text>
<rect x="520" y="240" width="240" height="150" rx="16" fill="#fff" stroke="#fb923c" stroke-width="3"/>
<text x="640" y="300" text-anchor="middle" font-size="26" font-weight="700" fill="#9a3412">影响大小</text>
<text x="640" y="340" text-anchor="middle" font-size="16" fill="#7c2d12">表面粗糙程度</text>
<text x="640" y="364" text-anchor="middle" font-size="16" fill="#7c2d12">压力大小</text>
<rect x="920" y="240" width="240" height="150" rx="16" fill="#fff" stroke="#fb923c" stroke-width="3"/>
<text x="1040" y="300" text-anchor="middle" font-size="26" font-weight="700" fill="#9a3412">生活应用</text>
<text x="1040" y="340" text-anchor="middle" font-size="16" fill="#7c2d12">鞋底花纹·刹车</text>
<text x="1040" y="364" text-anchor="middle" font-size="16" fill="#7c2d12">轮滑·润滑油</text>
</g>
<g stroke="#fdba74" stroke-width="3" fill="none"><path d="M360 315 H520"/><path d="M760 315 H920"/></g>
<rect x="320" y="470" width="640" height="160" rx="20" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
<text x="640" y="525" text-anchor="middle" font-size="22" font-weight="700" fill="#9a3412">增大摩擦 vs 减小摩擦</text>
<text x="640" y="565" text-anchor="middle" font-size="17" fill="#7c2d12">增大：加花纹、变粗糙、增大压力</text>
<text x="640" y="595" text-anchor="middle" font-size="17" fill="#7c2d12">减小：变光滑、加润滑油、用滚动代替滑动</text>
<text x="1248" y="702" text-anchor="end" font-size="12" fill="#fdba74">TeachAny · sci-e-friction</text>
</svg>