<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#061826"/><stop offset="1" stop-color="#123b34"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity=".32"/></filter></defs>
<rect width="1280" height="720" fill="url(#g)"/>
<circle cx="115" cy="105" r="62" fill="#22c55e" opacity=".18"/>
<circle cx="1080" cy="120" r="52" fill="#38bdf8" opacity=".18"/>
<circle cx="1140" cy="560" r="76" fill="#a78bfa" opacity=".18"/>
<circle cx="160" cy="575" r="46" fill="#f59e0b" opacity=".18"/>
<text x="80" y="106" fill="#bbf7d0" font-size="34" font-family="PingFang SC,Arial" font-weight="800">从现象到机制</text>
<text x="80" y="180" fill="#ffffff" font-size="58" font-family="PingFang SC,Arial" font-weight="900">生态系统稳定性：过程模型</text>
<rect x="85" y="275" width="235" height="106" rx="24" fill="#0b1628" stroke="#22c55e" stroke-opacity=".62" filter="url(#shadow)"/>
<text x="203" y="338" text-anchor="middle" fill="#e0f2fe" font-size="25" font-family="PingFang SC,Arial" font-weight="800">观察现象</text>
<path d="M 333 328 H 352" stroke="#86efac" stroke-width="5" stroke-linecap="round"/>
<rect x="370" y="275" width="235" height="106" rx="24" fill="#0b1628" stroke="#38bdf8" stroke-opacity=".62" filter="url(#shadow)"/>
<text x="488" y="338" text-anchor="middle" fill="#e0f2fe" font-size="25" font-family="PingFang SC,Arial" font-weight="800">建立模型</text>
<path d="M 618 328 H 637" stroke="#86efac" stroke-width="5" stroke-linecap="round"/>
<rect x="655" y="275" width="235" height="106" rx="24" fill="#0b1628" stroke="#a78bfa" stroke-opacity=".62" filter="url(#shadow)"/>
<text x="773" y="338" text-anchor="middle" fill="#e0f2fe" font-size="25" font-family="PingFang SC,Arial" font-weight="800">解释机制</text>
<path d="M 903 328 H 922" stroke="#86efac" stroke-width="5" stroke-linecap="round"/>
<rect x="940" y="275" width="235" height="106" rx="24" fill="#0b1628" stroke="#f97316" stroke-opacity=".62" filter="url(#shadow)"/>
<text x="1058" y="338" text-anchor="middle" fill="#e0f2fe" font-size="25" font-family="PingFang SC,Arial" font-weight="800">预测结果</text>
<rect x="86" y="446" width="1108" height="50" rx="16" fill="#ffffff" opacity=".08"/>
<text x="122" y="480" fill="#dbeafe" font-size="22" font-family="PingFang SC,Arial">• 生态系统的稳定性是指生态系统保持或恢复自身结构和功能相对稳定的能力。</text>
<rect x="86" y="508" width="1108" height="50" rx="16" fill="#ffffff" opacity=".08"/>
<text x="122" y="542" fill="#dbeafe" font-size="22" font-family="PingFang SC,Arial">• 阐明生态系统通过自我调节作用抵御和消除一定限度的外来干扰，保持或恢复相对稳定的状态。</text>
<rect x="86" y="570" width="1108" height="50" rx="16" fill="#ffffff" opacity=".08"/>
<text x="122" y="604" fill="#dbeafe" font-size="22" font-family="PingFang SC,Arial">• 举例说明生态系统的稳定性会受到自然或人为因素的影响，如气候变化、人类活动等。</text>
</svg>