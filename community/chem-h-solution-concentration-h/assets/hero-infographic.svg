<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient></defs>
  <rect width="1280" height="720" fill="url(#g)"/>
  <circle cx="1050" cy="120" r="180" fill="#38bdf8" opacity="0.13"/>
  <circle cx="220" cy="620" r="220" fill="#a78bfa" opacity="0.12"/>
  <text x="70" y="112" fill="#f8fafc" font-size="52" font-weight="900">物质的量浓度</text>
  <text x="70" y="168" fill="#bae6fd" font-size="28">实验室怎样把“称多少、加多少水”转化成准确的 mol/L 浓度？</text>
  <text x="70" y="225" fill="#cbd5e1" font-size="24">角色任务：滴定实验配液员 · 课标节点：chem-h-solution-concentration-h</text>
  
  <rect x="70" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="325" fill="#38bdf8" font-size="28" font-weight="800">浓度定义</text>
  <text x="96" y="374" fill="#dbeafe" font-size="21">物质的量浓度 c 表示单位体积溶液中所含溶质 B 的物质的量</text>
  <text x="96" y="410" fill="#dbeafe" font-size="21">：cB = nB / V。</text>
  <rect x="460" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
  <text x="486" y="325" fill="#a78bfa" font-size="28" font-weight="800">单位与体积</text>
  <text x="486" y="374" fill="#dbeafe" font-size="21">常用单位 mol/L。计算时体积 V 必须用 L，不是 mL</text>
  <text x="486" y="410" fill="#dbeafe" font-size="21">。</text>
  <rect x="850" y="270" width="330" height="190" rx="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
  <text x="876" y="325" fill="#22c55e" font-size="28" font-weight="800">稀释守恒</text>
  <text x="876" y="374" fill="#dbeafe" font-size="21">稀释过程中溶质物质的量不变，所以 c₁V₁ = c₂V₂。</text>
  <text x="876" y="410" fill="#dbeafe" font-size="21"></text>
  <rect x="70" y="525" width="1140" height="105" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="105" y="585" fill="#fbbf24" font-size="30" font-weight="800">记忆锚点</text>
  <text x="260" y="585" fill="#e0f2fe" font-size="26">浓度口诀：先求 n，再看 V；mL 先换 L，定容看总量。</text>
  <text x="70" y="675" fill="#64748b" font-size="18">TeachAny v7.14 · 高中化学完整模式 · AI 学伴 / TTS / 知识图谱 / Canvas 互动 / 课标挂树</text>
</svg>