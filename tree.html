<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeachAny 知识地图 · Knowledge Map v2</title>

<style>
:root {
  --bg: #0f172a;
  --bg2: #1e293b;
  --card: rgba(30, 41, 59, 0.85);
  --border: rgba(148, 163, 184, 0.15);
  --text: #f8fafc;
  --dim: #94a3b8;
  --dimmer: #64748b;
  --primary: #3b82f6;
  --secondary: #8b5cf6;
  --accent: #f59e0b;
  --success: #10b981;
  --danger: #ef4444;
  --cyan: #06b6d4;
  --pink: #ec4899;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
}

/* Top Bar — 与 Gallery / 学习路径统一 */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 10;
}
.top-bar h1 {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  white-space: nowrap;
}
.nav-links { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.nav-links a {
  color: var(--dim);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 14px;
  transition: all 0.2s;
}
.nav-links a:hover, .nav-links a.active {
  color: var(--text);
  background: rgba(59,130,246,0.15);
}
.curriculum-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  background: rgba(15,23,42,0.96);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 9;
}
.curriculum-label {
  color: var(--primary);
  font-weight: 700;
  font-size: 12px;
  white-space: nowrap;
  flex-shrink: 0;
}
#curriculumTabs {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
  flex: 1;
}

/* Subject Tabs —— v7.9.14 紧凑版：减小 padding/gap */
.subject-tabs {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 4px 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  max-height: 30vh;
  overflow-y: auto;
}
/* 课标选择行：已移入 top-bar，此规则仅保留兼容占位 */
/* 每个学段的一行 */
.stage-row {
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 6px;
  align-items: center;
  padding: 2px 0;
  min-height: 26px;
}
.stage-row:not(:last-child) {
  border-bottom: 1px dashed rgba(148,163,184,0.08);
}
.stage-row-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--primary);
  padding: 4px 10px;
  background: rgba(59,130,246,0.08);
  border-radius: 6px;
  border-left: 3px solid var(--primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.stage-row-subjects {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
}
.subject-tab {
  padding: 2px 9px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--dim);
  cursor: pointer;
  font-size: 11px;
  white-space: nowrap;
  transition: all 0.2s;
  line-height: 1.4;
}
.subject-tab:hover { border-color: var(--primary); color: var(--text); background: rgba(59,130,246,0.06); }
.subject-tab.active {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
  box-shadow: 0 2px 8px rgba(59,130,246,0.3);
}
/* 课标 row 里 label 样式（保持原 .stage-label 兼容） */
.stage-label {
  padding: 4px 8px;
  font-size: 11px;
  color: var(--dimmer);
  font-weight: 600;
  white-space: nowrap;
}
/* 响应式：窄屏把导航与课标按钮换行 */
@media (max-width: 720px) {
  .top-bar { flex-direction: column; align-items: flex-start; gap: 8px; }
  .nav-links { justify-content: flex-start; }
  .curriculum-bar { flex-direction: column; align-items: flex-start; gap: 6px; }
  #curriculumTabs { width: 100%; }
  .stage-row { grid-template-columns: 1fr; gap: 3px; }
  .stage-row-label { align-self: start; display: inline-block; max-width: fit-content; }
}

/* SVG Canvas */
#tree-container {
  width: 100%;
  height: max(600px, calc(100vh - 132px));
  min-height: 600px;
  position: relative;
  overflow: hidden;
}
svg { width: 100%; height: 100%; display: block; }

/* Nodes */
.node-group { cursor: pointer; }
.node-circle {
  stroke-width: 2.5;
  transition: all 0.3s;
}
.node-group:hover .node-circle {
  stroke-width: 4;
  filter: drop-shadow(0 0 12px rgba(59,130,246,0.5));
}
.node-label {
  font-size: 12px;
  font-family: 'PingFang SC', sans-serif;
  fill: var(--text);
  text-anchor: middle;
  pointer-events: none;
}
.node-label-en {
  font-family: 'Segoe UI', system-ui, sans-serif;
  fill: var(--dim);
  text-anchor: middle;
  pointer-events: none;
}
.node-grade {
  font-size: 10px;
  fill: var(--dimmer);
  text-anchor: middle;
  pointer-events: none;
}

/* Links */
.link {
  stroke: rgba(148,163,184,0.2);
  stroke-width: 1.5;
  fill: none;
}
.link-prerequisite { stroke: rgba(148,163,184,0.3); stroke-width: 2; }
.link-extends { stroke: rgba(139,92,246,0.25); stroke-dasharray: 6 3; }
.link-parallel { stroke: rgba(245,158,11,0.2); stroke-dasharray: 3 3; }

/* Tooltip */
.tooltip {
  position: absolute;
  background: var(--card);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  max-width: 340px;
  max-height: 70vh;
  overflow-y: auto;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 100;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.tooltip.visible { opacity: 1; pointer-events: auto; }
.tooltip h3 { font-size: 15px; margin-bottom: 6px; }
.tooltip .meta { font-size: 12px; color: var(--dim); margin-bottom: 8px; }
.tooltip .status-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
}
.tooltip .badge-active { background: rgba(16,185,129,0.2); color: var(--success); }
.tooltip .badge-gap { background: rgba(239,68,68,0.2); color: var(--danger); }
.tooltip .prereqs { font-size: 12px; color: var(--dim); margin-top: 6px; }
.tooltip .course-link {
  display: block;
  margin-top: 10px;
  padding: 6px 12px;
  background: var(--primary);
  color: white;
  border-radius: 6px;
  text-align: center;
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
  pointer-events: auto;
}
.tooltip .course-link:hover { filter: brightness(1.15); }
.tooltip .tree-make-course-btn {
  display: block;
  width: 100%;
  margin-top: 10px;
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--success), #059669);
  color: white;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  pointer-events: auto;
  text-align: center;
}
.tooltip .tree-make-course-btn:hover { filter: brightness(1.08); }
.tooltip .gap-msg {
  margin-top: 8px;
  padding: 6px 10px;
  background: rgba(239,68,68,0.1);
  border-radius: 6px;
  font-size: 12px;
  color: var(--danger);
}

/* 课标内容模块 */
.tooltip .curriculum-section {
  margin-top: 10px;
  padding: 8px 10px;
  background: rgba(59,130,246,0.08);
  border-left: 3px solid rgba(59,130,246,0.5);
  border-radius: 4px;
  font-size: 12px;
  pointer-events: auto;
}
.tooltip .curriculum-section .cs-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  user-select: none;
  color: var(--text);
  font-weight: 600;
  margin-bottom: 6px;
}
.tooltip .curriculum-section .cs-header:hover { color: var(--primary); }
.tooltip .curriculum-section .cs-toggle {
  font-size: 10px;
  color: var(--dim);
  transition: transform 0.2s;
}
.tooltip .curriculum-section.collapsed .cs-toggle { transform: rotate(-90deg); }
.tooltip .curriculum-section.collapsed .cs-body { display: none; }
.tooltip .curriculum-section .cs-body {
  max-height: 200px;
  overflow-y: auto;
  color: var(--dim);
  line-height: 1.6;
}
.tooltip .curriculum-section .cs-item {
  margin: 4px 0;
  padding: 4px 6px;
  border-radius: 4px;
  background: rgba(148,163,184,0.05);
  border-left: 2px solid rgba(148,163,184,0.3);
}
.tooltip .curriculum-section .cs-item-source {
  display: inline-block;
  margin-right: 6px;
  padding: 1px 6px;
  font-size: 10px;
  border-radius: 8px;
  background: rgba(59,130,246,0.2);
  color: #93c5fd;
  font-weight: 600;
}
.tooltip .curriculum-section .cs-empty {
  padding: 6px;
  color: var(--dimmer);
  font-style: italic;
  font-size: 11px;
}

/* Legend */
.legend {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: var(--card);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 12px;
  z-index: 10;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 4px 0;
}
.legend-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid;
  flex-shrink: 0;
}
.legend-line {
  width: 24px;
  height: 2px;
  flex-shrink: 0;
}

/* Stats bar */
.stats-bar {
  position: absolute;
  top: 12px;
  right: 20px;
  display: flex;
  gap: 16px;
  z-index: 10;
}
.stat-chip {
  background: var(--card);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px;
}
.stat-chip strong { color: var(--accent); }
.stat-chip.clickable { cursor: pointer; transition: all 0.2s; }
.stat-chip.clickable:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.stat-chip.clickable:hover strong { color: #fff; }
@keyframes pulse-ring {
  0%   { r: 22; opacity: 0.8; }
  100% { r: 40; opacity: 0; }
}
.node-pulse { pointer-events: none; }
.refresh-btn {
  background: var(--card);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--accent);
  font-weight: 600;
}
.refresh-btn:hover { background: var(--accent); color: #fff; }
.refresh-btn.spinning { animation: spin 0.8s linear infinite; pointer-events: none; opacity: 0.6; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* Like Button */
.ta-like-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 16px;
  background: rgba(148,163,184,0.1); color: #94a3b8;
  border: 1px solid rgba(148,163,184,0.15);
  cursor: pointer; font-size: 13px;
  transition: all 0.2s; white-space: nowrap;
}
.ta-like-btn:hover {

  border-color: rgba(239,68,68,0.3);

}
.ta-like-btn.liked {

}
.ta-like-btn .like-icon { font-size: 14px; }
.ta-like-btn .like-count { font-weight: 600; font-size: 12px; }
</style>

<script>
/* ─── 数据源配置 ─── */
const TREE_API_BASE = 'https://api.github.com/repos/weponusa/teachany/contents/';
const TREE_RAW_BASE = 'https://raw.githubusercontent.com/weponusa/teachany/main/';
const IS_GITHUB_PAGES = location.hostname.includes('github.io');

/**
 * 获取知识树 JSON。
 * 优先级：站点相对路径 → GitHub API → raw.githubusercontent.com
 * 说明：GitHub API 匿名请求容易 403 限流；raw 偶发 CDN 旧缓存。
 * tree 页面与 data 文件同源部署，优先读相对路径最稳定，也不会在控制台刷 403。
 */
async function fetchTreeJSON(relativePath) {
  // 策略 1：站点相对路径（GitHub Pages / 本地开发）
  try {
    const localUrl = relativePath + '?v=' + Date.now();
    const resp = await fetch(localUrl, { cache: 'no-store' });
    if (resp.ok) {
      console.log('[KnowledgeMap] ✅ via local path');
      return resp.json();
    }
  } catch (e) {
    console.warn('[KnowledgeMap] local path error:', e.message);
  }

  // 策略 2：GitHub Contents API（仅 GitHub Pages 上作为兜底，可能 403）
  if (IS_GITHUB_PAGES) {
    try {
      const apiUrl = TREE_API_BASE + relativePath + '?t=' + Date.now();
      const resp = await fetch(apiUrl, {
        cache: 'no-store',
        headers: { 'Accept': 'application/vnd.github.v3+json' }
      });
      if (resp.ok) {
        const meta = await resp.json();
        if (meta.content) {
          const binaryStr = atob(meta.content.replace(/\n/g, ''));
          const bytes = new Uint8Array(binaryStr.length);
          for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
          const decoded = new TextDecoder('utf-8').decode(bytes);
          console.log('[KnowledgeMap] ✅ via GitHub API');
          return JSON.parse(decoded);
        }
        if (meta.download_url) {
          const rawResp = await fetch(meta.download_url, { cache: 'no-store' });
          if (rawResp.ok) {
            console.log('[KnowledgeMap] ✅ via API download_url');
            return rawResp.json();
          }
        }
      }
      console.warn('[KnowledgeMap] API fallback, status:', resp.status);
    } catch (e) {
      console.warn('[KnowledgeMap] API error, falling back:', e.message);
    }
  }

  // 策略 3：raw.githubusercontent.com — 最终兜底
  try {
    const rawUrl = TREE_RAW_BASE + relativePath + '?v=' + Date.now();
    const resp = await fetch(rawUrl, { cache: 'no-store' });
    if (resp.ok) {
      console.log('[KnowledgeMap] ⚠️ via raw URL fallback');
      return resp.json();
    }
  } catch (e) {
    console.warn('[KnowledgeMap] raw URL error:', e.message);
  }

  throw new Error('All fetch strategies failed for ' + relativePath);
}

const TREES_CN_FALLBACK = [
  // 小学
  { file: 'data/trees/cn/elementary/chinese.json', emoji: '📖', label: '小学语文' },
  { file: 'data/trees/cn/elementary/math.json', emoji: '🔢', label: '小学数学' },

  { file: 'data/trees/cn/middle/math.json', emoji: '📐', label: '初中数学' },
  { file: 'data/trees/cn/middle/english.json', emoji: '🅰️', label: '初中英语' },

  { file: 'data/trees/cn/middle/chemistry.json', emoji: '🧪', label: '初中化学' },
  { file: 'data/trees/cn/middle/biology.json', emoji: '🌱', label: '初中生物' },
  { file: 'data/trees/cn/middle/geography.json', emoji: '🗺️', label: '初中地理' },
  { file: 'data/trees/cn/middle/history.json', emoji: '📜', label: '初中历史' },
  // 高中
  { file: 'data/trees/cn/high/chinese.json', emoji: '📚', label: '高中语文' },
  { file: 'data/trees/cn/high/math.json', emoji: '∑', label: '高中数学' },
  { file: 'data/trees/cn/high/english.json', emoji: '🌐', label: '高中英语' },
  { file: 'data/trees/cn/high/physics.json', emoji: '⚛️', label: '高中物理' },
  { file: 'data/trees/cn/high/chemistry.json', emoji: '⚗️', label: '高中化学' },
  { file: 'data/trees/cn/high/biology.json', emoji: '🧬', label: '高中生物' },
  { file: 'data/trees/cn/high/geography.json', emoji: '🌍', label: '高中地理' },
  { file: 'data/trees/cn/high/history.json', emoji: '🏛️', label: '高中历史' },

// v5.32：课标体系（Curriculum）支持 ——————————————————————
// 从 data/curricula.json 动态加载支持的课标清单；默认 cn-national
let CURRICULA = null;           // 全部课标配置
let CURRENT_CURRICULUM = null;  // 当前选中课标对象 (含 trees 列表)
let TREES = TREES_CN_FALLBACK;  // 当前课标对应的树清单（用于后续 loadTree）
const CURRICULUM_STORAGE_KEY = 'teachany_active_curriculum';

// HTML 转义 —— 避免课标名/学科名中的特殊字符破坏 innerHTML
function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

async function loadCurriculaConfig() {
  try {
    const resp = await fetch('data/curricula.json?v=' + Date.now(), { cache: 'no-store' });
    if (resp.ok) CURRICULA = await resp.json();
  } catch (e) {
    console.warn('[KnowledgeMap] curricula.json 加载失败，使用内置 cn-national 兜底:', e.message);
  }
  if (!CURRICULA) {
    // 兜底：仅中国课标
    CURRICULA = {
      default: 'cn-national',
      curricula: [{
        id: 'cn-national', name_zh: '中国国家课标', short: '中国', emoji: '🇨🇳',
        stages: [
          { key: 'elementary', name_zh: '小学', grade_range: [1,6] },
          { key: 'middle', name_zh: '初中', grade_range: [7,9] },
          { key: 'high', name_zh: '高中', grade_range: [10,12] }
        ],
        trees: TREES_CN_FALLBACK.map(t => ({ file: t.file, emoji: t.emoji, label_zh: t.label }))
      }]
    };
  }
  // 规范化：把每棵树转为 {file, emoji, label} 格式
  CURRICULA.curricula.forEach(c => {
    c.trees_normalized = c.trees.map(t => ({
      file: t.file, emoji: t.emoji,
      label: t.label_zh || t.label_en || t.file,
      label_zh: t.label_zh || '',
      label_en: t.label_en || ''
    }));
  });
}

function switchCurriculum(currId) {
  const curr = CURRICULA.curricula.find(c => c.id === currId);
  if (!curr) return;
  CURRENT_CURRICULUM = curr;
  TREES = curr.trees_normalized;
  try { localStorage.setItem(CURRICULUM_STORAGE_KEY, currId); } catch {}
  // 更新课标按钮激活态
  document.querySelectorAll('#curriculumTabs .subject-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.curr === currId);
  });
  // 重建学科 tab 并加载第一棵树
  rebuildSubjectTabs();
  if (TREES.length > 0) loadTree(0);
  else {
    const svg = document.getElementById('treeSvg');
    if (svg) svg.innerHTML = '';
    const container = document.getElementById('tree-container');
    if (container) {
      const msg = document.createElement('div');
      msg.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--dim);font-size:18px;text-align:center;';
      msg.innerHTML = `<div style="font-size:48px;margin-bottom:12px;">${curr.emoji || '📚'}</div>
        <div><strong>${curr.name_zh || curr.name_en || curr.id}</strong></div>
        <div style="font-size:13px;margin-top:8px;opacity:0.7;">该课标体系的知识树尚未建立<br/>Trees for this curriculum are not yet available</div>
        <div style="font-size:12px;margin-top:8px;opacity:0.5;">欢迎贡献！详见 <code>data/trees/international/README.md</code></div>`;
      container.querySelectorAll('.curriculum-placeholder').forEach(n => n.remove());
      msg.className = 'curriculum-placeholder';
      container.appendChild(msg);
    }
  }
}

function rebuildCurriculumTabs() {
  const el = document.getElementById('curriculumTabs');
  if (!el) return;
  // 只生成课标按钮，不添加标签（标签已在 HTML 写死）
  el.innerHTML = '';
  CURRICULA.curricula.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'subject-tab';
    btn.dataset.curr = c.id;
    // v5.32：中英双语标题 —— "🇨🇳 中国 · CN National"（用 short 简写，避免过长）
    const zh = c.short_zh || c.short || c.name_zh || c.id;
    const en = c.short_en || c.name_en || '';
    btn.innerHTML = `${c.emoji || ''} ${escapeHtml(zh)}${en ? ' · <span style="opacity:0.75;font-size:0.9em;">' + escapeHtml(en) + '</span>' : ''}`;
    btn.title = c.name_en || c.name_zh || '';
    btn.onclick = () => switchCurriculum(c.id);
    el.appendChild(btn);
  });
}

function rebuildSubjectTabs() {
  const tabsEl = document.getElementById('subjectTabs');
  if (!tabsEl) return;
  tabsEl.innerHTML = '';

  // 清除上次注入到 curriculumTabs 的"其他知识"按钮/分隔/标签
  const currBar = document.getElementById('curriculumTabs');
  if (currBar) {
    currBar.querySelectorAll('.other-sep, .other-lbl, .other-btn').forEach(el => el.remove());
  }
  // v5.34.3：学段分组 + 每学段独占一行（grid 布局）
  const stages = (CURRENT_CURRICULUM && CURRENT_CURRICULUM.stages) || [];
  const stageNames = stages.map(s => {
    const zh = s.name_zh || s.key;
    const en = s.name_en || '';
    return (en && en !== zh) ? { zh, en } : { zh, en: '' };
  });

  // treeStage —— 从完整路径提取学段（v5.35：支持新的 curriculum/stage/subject 目录结构）
  function treeStage(treeFile) {
    const full = treeFile || '';
    const base = (full.split('/').pop() || '').replace(/\.json$/i, '');
    const parts = base.split('-');
    // 1) 新结构：路径里直接有学段段（如 data/trees/cn/elementary/math.json）
    //    用路径段做严格匹配，优先级最高
    const pathSegs = full.split('/').map(s => s.toLowerCase());
    for (let i = 0; i < stages.length; i++) {
      const s = stages[i];
      const k = (s.key || '').toLowerCase();
      if (!k) continue;
      if (pathSegs.includes(k)) return i;
    }
    // 2) 兼容旧结构：basename 里用连字符分隔的 token
    for (let i = 0; i < stages.length; i++) {
      const s = stages[i];
      const k = (s.key || '').toLowerCase();
      if (!k) continue;
      if (parts.includes(k)) return i;
      if (s.id_infix && s.id_infix.length >= 4 && full.includes(s.id_infix)) return i;
    }
    return -1;
  }

  // Step 1：按学段把 trees 分桶
  const buckets = stages.map(() => []);
  const orphan = [];
  TREES.forEach((t, i) => {
    const si = treeStage(t.file);
    if (si >= 0) buckets[si].push({ tree: t, index: i });
    else orphan.push({ tree: t, index: i });
  });

  // Step 2：按学段顺序渲染每个 row
  stages.forEach((stage, si) => {
    const items = buckets[si];
    if (!items.length) return;  // 该学段无知识树则不出现
    const row = document.createElement('div');
    row.className = 'stage-row';
    // 学段 label
    const labelEl = document.createElement('div');
    labelEl.className = 'stage-row-label';
    const { zh, en } = stageNames[si];
    labelEl.textContent = zh;
    labelEl.title = en ? `${zh} · ${en}` : zh;
    row.appendChild(labelEl);
    // 科目按钮容器
    const subjectsEl = document.createElement('div');
    subjectsEl.className = 'stage-row-subjects';
    items.forEach(({ tree: t, index: i }) => {
      const btn = document.createElement('button');
      btn.className = 'subject-tab';
      // v5.34：标签已在 curricula.json v1.2 里清洗过，不再需要运行时 replace
      const zhText = (t.label_zh || t.label || '').trim();
      const enText = (t.label_en || '').trim();
      if (enText && enText !== zhText) {
        btn.innerHTML = `${t.emoji || ''} ${escapeHtml(zhText)} <span style="opacity:0.7;font-size:0.85em;">${escapeHtml(enText)}</span>`;
      } else {
        btn.textContent = `${t.emoji || ''} ${zhText}`;
      }
      btn.title = enText || zhText;
      btn.dataset.treeIndex = String(i);
      btn.onclick = () => loadTree(i);
      subjectsEl.appendChild(btn);
    });
    row.appendChild(subjectsEl);
    tabsEl.appendChild(row);
  });

  // Step 3：未命中任何学段的树，追加到 curriculumTabs（top-bar 内）
  if (orphan.length) {
    const currBar = document.getElementById('curriculumTabs');
    if (currBar) {
      // 分隔符
      const sep = document.createElement('span');
      sep.className = 'other-sep';
      sep.style.cssText = 'color:var(--dimmer);font-size:10px;opacity:0.5;margin:0 2px;flex-shrink:0;';
      sep.textContent = '·';
      currBar.appendChild(sep);
      // 其他知识标签
      const lbl = document.createElement('span');
      lbl.className = 'other-lbl';
      lbl.style.cssText = 'font-size:10px;color:var(--dimmer);white-space:nowrap;flex-shrink:0;';
      lbl.textContent = '✨ 其他';
      currBar.appendChild(lbl);
      // 按钮
      orphan.forEach(({ tree: t, index: i }) => {
        const btn = document.createElement('button');
        btn.className = 'subject-tab other-btn';
        btn.style.borderColor = 'rgba(100,116,139,0.3)';
        btn.textContent = `${t.emoji || ''} ${(t.label_zh || t.label || '').trim()}`;
        btn.dataset.treeIndex = String(i);
        btn.onclick = () => loadTree(i);
        currBar.appendChild(btn);
      });
    }
  }

  // 默认激活第一个按钮
  const firstBtn = tabsEl.querySelector('.subject-tab');
  if (firstBtn) firstBtn.classList.add('active');

  // 清除 placeholder（如切换后有树）
  document.querySelectorAll('.curriculum-placeholder').forEach(n => n.remove());
}

let currentTree = null;
let simulation = null;
// v5.34.4：请求令牌，杜绝 loadTree 竞态（旧请求晚到覆盖新请求的 placeholder）
let _loadTreeToken = 0;

// v5.30：先加载课标清单，再按 localStorage/default 切到对应课标，最后 loadTree(0)
(async function initCurriculaAndTabs() {
  await loadCurriculaConfig();
  rebuildCurriculumTabs();
  let savedId = null;
  try { savedId = localStorage.getItem(CURRICULUM_STORAGE_KEY); } catch {}
  // v5.34.2 legacy id 迁移：curricula.json v1.0 → v1.1 ID 合并后的平滑切换
  const LEGACY_CURR_ID_MAP = {
    'ib-dp': 'ib',            // IB DP 合并到完整 IB（含 PYP/MYP/DP）
    'cambridge-al': 'cambridge', // 剑桥 A-Level 扩充为完整剑桥（含 Primary/LowerSec/IGCSE/AS/A2）
    'ap': 'us'                // AP 并入完整美式体系（含 K-5/6-8/9-12/AP）
  };
  if (savedId && LEGACY_CURR_ID_MAP[savedId]) {
    savedId = LEGACY_CURR_ID_MAP[savedId];
    try { localStorage.setItem(CURRICULUM_STORAGE_KEY, savedId); } catch {}
  }
  const defaultId = (savedId && CURRICULA.curricula.find(c => c.id === savedId))
    ? savedId
    : (CURRICULA.default || CURRICULA.curricula[0].id);
  switchCurriculum(defaultId);
})();

async function loadTree(index) {
  // v5.34.4：请求令牌，杜绝竞态
  const myToken = ++_loadTreeToken;
  // Update tab active state —— 按 data-tree-index 匹配（按钮可能在学段区，也可能在顶部“其他知识”区）
  document.querySelectorAll('#subjectTabs .subject-tab, #curriculumTabs .other-btn').forEach(t => {
    t.classList.toggle('active', Number(t.dataset.treeIndex) === index);
  });
  // 进入新请求：先清上一轮残留 placeholder（无论它是成功还是失败留下的）
  document.querySelectorAll('.curriculum-placeholder').forEach(n => n.remove());

  try {
    console.log(`[KnowledgeMap] Loading: ${TREES[index].label} (${TREES[index].file})`);

    // 并行加载：知识树 + CoursewareHub 初始化
    const [treeData] = await Promise.all([
      fetchTreeJSON(TREES[index].file),
      window.TeachAnyHub ? TeachAnyHub.init() : Promise.resolve(),
    ]);
    // 如果已经有更新的请求进来，丢弃旧结果，避免旧数据覆盖
    if (myToken !== _loadTreeToken) {
      console.log('[KnowledgeMap] stale load ignored:', TREES[index].file);
      return;
    }
    currentTree = treeData;

    // 记录当前 tree 的路径（供弹窗的课标内容模块从 excerpts 取数）
    // TREES[index].file 形如 'data/trees/cn/middle/math.json'
    // 我们把 'cn/middle/math.json' 部分作为 currentTreeMeta.path
    const _treeFile = TREES[index].file || '';
    const _m = _treeFile.match(/data\/trees\/(.+)$/);
    window.currentTreeMeta = {
      index,
      file: _treeFile,
      path: _m ? _m[1] : null,   // e.g. 'cn/middle/math.json'
      label: TREES[index].label,
    };

    // 成功分支：再次确保 placeholder 被清掉（防御性）
    document.querySelectorAll('.curriculum-placeholder').forEach(n => n.remove());

    // 统计 active 节点
    const allNodes = currentTree.domains.flatMap(d => d.nodes);
    const activeNodes = allNodes.filter(n => n.status === 'active' && n.courses && n.courses.length);
    // 通过 Hub 检测额外有课件的节点（社区/用户课件自动接入）
    const hubCoveredNodes = allNodes.filter(n => {
      if (n.status === 'active' && n.courses && n.courses.length) return false; // 已计入 active
      return window.TeachAnyHub && TeachAnyHub.hasAnyCourseware(n.id);
    });
    console.log(`[KnowledgeMap] ${TREES[index].label}: ${allNodes.length} nodes, ${activeNodes.length} active, ${hubCoveredNodes.length} hub-covered`);

    renderTree(currentTree);
  } catch (err) {
    // v5.34.4：旧请求晚到的失败直接吞掉，不要覆盖已经成功渲染的新树
    if (myToken !== _loadTreeToken) {
      console.log('[KnowledgeMap] stale load error ignored:', TREES[index].file, err.message);
      return;
    }
    console.error('[KnowledgeMap] Failed to load tree:', err);
    // v5.30：树加载失败时显示友好占位，尤其是国际课标树尚未建立的场景
    const svg = document.getElementById('treeSvg');
    if (svg) svg.innerHTML = '';
    const container = document.getElementById('tree-container');
    if (container) {
      document.querySelectorAll('.curriculum-placeholder').forEach(n => n.remove());
      const msg = document.createElement('div');
      msg.className = 'curriculum-placeholder';
      msg.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--dim);font-size:16px;text-align:center;max-width:600px;padding:24px;';
      const currName = (CURRENT_CURRICULUM && (CURRENT_CURRICULUM.name_zh || CURRENT_CURRICULUM.name_en)) || '该体系';
      msg.innerHTML = `<div style="font-size:56px;margin-bottom:16px;">${(CURRENT_CURRICULUM && CURRENT_CURRICULUM.emoji) || '📚'}</div>
        <div style="font-size:20px;font-weight:600;color:var(--text);margin-bottom:8px;">${TREES[index].label_zh || TREES[index].label}</div>
        <div style="margin-bottom:12px;opacity:0.75;">该知识树尚未建立 / Tree not yet available</div>
        <div style="font-size:13px;opacity:0.55;line-height:1.6;">这是 <strong>${currName}</strong> 体系下的知识树占位。<br/>欢迎国际学校老师贡献首棵树！<br/>详见 <code>data/trees/international/README.md</code></div>`;
      container.appendChild(msg);
    }
  }
}

function renderTree(tree) {
  const svg = d3.select('#treeSvg');
  svg.selectAll('*').remove();

  const container = document.getElementById('tree-container');
  const W = container.clientWidth;
  const nodeCount = (tree.domains || []).reduce((sum, d) => sum + (d.nodes || []).length, 0);

  // ── 根据节点数量动态计算 SVG 高度（避免节点挤在一起） ──
  const density = 8000; // 每个节点所需像素面积（约 90x90 舒适空间）
  const minH = Math.max(600, window.innerHeight - 160);
  const calcH = Math.ceil(nodeCount * density / W);
  const H = Math.max(minH, Math.min(calcH, 3000)); // 上限 3000px

  // 力导向参数随节点数缩放
  const baseLinkDist = Math.max(120, Math.min(250, 100 + nodeCount * 0.4));
  const baseCharge = Math.max(-3000, Math.min(-400, -200 - nodeCount * 2));
  const baseCollide = Math.max(55, Math.min(80, 40 + nodeCount * 0.12));

  // Build nodes and links from tree data
  const nodes = [];
  const links = [];
  const nodeMap = {};

  tree.domains.forEach(domain => {
    domain.nodes.forEach(node => {
      const n = {
        id: node.id,
        name: node.name,
        name_en: node.name_en || '',
        grade: node.grade,
        domain: domain.name,
        domainColor: domain.color,
        status: node.status,
        courses: node.courses || [],
        prerequisites: node.prerequisites || [],
        extends: node.extends || [],
        parallel: node.parallel || [],
        curriculum_points: node.curriculum_points || []
      };
      nodes.push(n);
      nodeMap[node.id] = n;
    });
  });

  // Create links
  nodes.forEach(n => {
    n.prerequisites.forEach(pid => {
      if (nodeMap[pid]) {
        links.push({ source: pid, target: n.id, type: 'prerequisite' });
      }
    });
    n.extends.forEach(eid => {
      if (nodeMap[eid]) {
        links.push({ source: n.id, target: eid, type: 'extends' });
      }
    });
    n.parallel.forEach(pid => {
      if (nodeMap[pid]) {
        // avoid duplicate parallel links
        const exists = links.find(l =>
          l.type === 'parallel' &&
          ((l.source === n.id && l.target === pid) || (l.source === pid && l.target === n.id))
        );
        if (!exists) links.push({ source: n.id, target: pid, type: 'parallel' });
      }
    });
  });

  // Check user-uploaded courses (必须在 Stats 之前，避免 TDZ 错误)
  const userCourses = window.TeachAnyImporter ? TeachAnyImporter.getUserCourses() : [];
  // 使用 isUserCourseNode 支持别名映射匹配（解决 node_id 不一致问题）
  const hasUserCourse = (nodeId) => window.TeachAnyImporter ? TeachAnyImporter.isUserCourseNode(nodeId) : false;
  // Hub 通用检测：只要有任何来源的课件就算有
  const hubHasCourse = (nodeId) => window.TeachAnyHub ? TeachAnyHub.hasAnyCourseware(nodeId) : false;
  // 统一判断：节点是否有课件（合并所有来源）
  const nodeHasAnyCourse = (n) => {
    if (n.status === 'active' && n.courses && n.courses.length) return true;
    if (hasUserCourse(n.id)) return true;
    if (hubHasCourse(n.id)) return true;
    return false;
  };
  // 暴露到全局，供全局 showTooltip / onNodeClick 使用
  window.nodeHasAnyCourse = nodeHasAnyCourse;
  // 统计每个 node_id 下的课件数量
  const nodeCourseCounts = {};
  userCourses.forEach(c => {
    const nid = c.manifest?.node_id;
    if (nid) nodeCourseCounts[nid] = (nodeCourseCounts[nid] || 0) + 1;
  });

  // Stats — 使用 nodeHasAnyCourse() 统一统计所有来源
  const totalNodes = nodes.length;
  const officialNodes = nodes.filter(n => n.status === 'active' && n.courses && n.courses.length).length;
  const userOnlyNodes = nodes.filter(n => !(n.status === 'active' && n.courses && n.courses.length) && hasUserCourse(n.id)).length;
  const hubOnlyNodes = nodes.filter(n => {
    if (n.status === 'active' && n.courses && n.courses.length) return false;
    if (hasUserCourse(n.id)) return false;
    return hubHasCourse(n.id);
  }).length;
  const coveredNodes = officialNodes + userOnlyNodes + hubOnlyNodes;
  const gapNodes = totalNodes - coveredNodes;

  // 记录所有有课件的节点列表（包括 Hub 覆盖），供点击跳转
  const activeNodeList = nodes.filter(n => nodeHasAnyCourse(n));
  let focusActiveIndex = 0; // 轮转索引

  const statParts = [
    `<div class="stat-chip">节点 <strong>${totalNodes}</strong></div>`,
    `<div class="stat-chip clickable" id="jumpActiveBtn" title="点击定位到有课件的节点">有课件 <strong>${coveredNodes}</strong> 📍</div>`,
  ];
  if (userOnlyNodes > 0) {
    statParts.push(`<div class="stat-chip">我的课件 <strong style="color:#fbbf24;">${userOnlyNodes}</strong></div>`);
  }
  if (hubOnlyNodes > 0) {
    statParts.push(`<div class="stat-chip">社区接入 <strong style="color:#06b6d4;">${hubOnlyNodes}</strong></div>`);
  }
  statParts.push(`<div class="stat-chip">待创建 <strong style="color:var(--danger);">${gapNodes}</strong></div>`);
  statParts.push(`<div class="stat-chip" style="font-size:11px;opacity:0.6;">更新于 ${new Date().toLocaleTimeString('zh-CN')}</div>`);
  statParts.push(`<div class="stat-chip">覆盖率 <strong>${totalNodes > 0 ? Math.round(coveredNodes/totalNodes*100) : 0}%</strong></div>`);
  statParts.push(`<button class="refresh-btn" onclick="refreshCurrentTree()" title="刷新知识地图数据">🔄</button>`);

  document.getElementById('statsBar').innerHTML = statParts.join('\n    ');

  // D3 force simulation
  const g = svg.append('g');

  // Zoom
  const zoom = d3.zoom()
    .scaleExtent([0.1, 4])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  // Arrow markers
  const defs = svg.append('defs');
  defs.append('marker')
    .attr('id', 'arrow-prereq')
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 28).attr('refY', 0)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0,-5L10,0L0,5')
    .attr('fill', 'rgba(148,163,184,0.4)');

  // Links
  const linkSel = g.selectAll('.link')
    .data(links)
    .enter().append('line')
    .attr('class', d => 'link link-' + d.type)
    .attr('marker-end', d => d.type === 'prerequisite' ? 'url(#arrow-prereq)' : '');

  // Node groups
  const nodeSel = g.selectAll('.node-group')
    .data(nodes, d => d.id)
    .enter().append('g')
    .attr('class', 'node-group')
    .call(d3.drag()
      .on('start', dragStart)
      .on('drag', dragging)
      .on('end', dragEnd))
    .on('mouseenter', showTooltip)
    .on('mousemove', moveTooltip)
    .on('mouseleave', hideTooltip)
    .on('click', onNodeClick);

  // Circle — 使用 nodeHasAnyCourse() 统一检测
  nodeSel.append('circle')
    .attr('class', 'node-circle')
    .attr('r', d => nodeHasAnyCourse(d) ? 22 : 18)
    .attr('fill', d => {
      if (d.status === 'active') return hexToRgba(d.domainColor, 0.25);
      if (hasUserCourse(d.id)) return hexToRgba(d.domainColor, 0.15);
      if (hubHasCourse(d.id)) return hexToRgba(d.domainColor, 0.15);
      // 无课件节点：使用所在域颜色的很浅背景（5% 透明度），让域归属一眼可见
      return hexToRgba(d.domainColor, 0.05);
    })
    .attr('stroke', d => {
      if (d.status === 'active') return d.domainColor;
      if (hasUserCourse(d.id)) return d.domainColor;
      if (hubHasCourse(d.id)) return d.domainColor;
      // 无课件节点：使用所在域颜色的 55% 透明度，比有课件的稍淡但仍能看出域
      return hexToRgba(d.domainColor, 0.55);
    })
    .attr('stroke-dasharray', d => {
      if (nodeHasAnyCourse(d)) return 'none';
      return '4 3';
    })
    .attr('stroke-width', d => {
      // Hub 社区接入节点用双线样式区分
      if (!(d.status === 'active' && d.courses && d.courses.length) && !hasUserCourse(d.id) && hubHasCourse(d.id)) return 3.5;
      return 2.5;
    });

  // Status icon — 区分来源
  nodeSel.append('text')
    .attr('text-anchor', 'middle')
    .attr('dy', '0.35em')
    .attr('font-size', '14px')
    .text(d => {
      if (d.status === 'active') return '✅';
      if (hasUserCourse(d.id)) return '📂';
      if (hubHasCourse(d.id)) return '🌐';
      return '📝';
    });

  // Label (中文主名)
  nodeSel.append('text')
    .attr('class', 'node-label')
    .attr('dy', 38)
    .text(d => d.name);

  // English label (v5.33：若有 name_en 则显示为次级副标)
  nodeSel.append('text')
    .attr('class', 'node-label-en')
    .attr('dy', 52)
    .style('opacity', 0.55)
    .style('font-style', 'italic')
    .style('font-size', '10px')
    .text(d => d.name_en || '');

  // Grade（有英文时下移以避免重叠）
  nodeSel.append('text')
    .attr('class', 'node-grade')
    .attr('dy', d => d.name_en ? 68 : 52)
    .text(d => d.grade + '年级');

  // Simulation（参数随节点数量动态缩放）
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(baseLinkDist).strength(0.5))
    .force('charge', d3.forceManyBody().strength(baseCharge))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide().radius(baseCollide))
    .force('x', d3.forceX(W / 2).strength(0.03))
    .force('y', d3.forceY(H / 2).strength(0.03))
    .on('tick', () => {
      linkSel
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);
      nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
    });

  // ── Auto-fit zoom：模拟稳定后自动缩放至全貌可见 ──
  let tickCount = 0;
  const autoFitZoom = () => {
    tickCount++;
    if (tickCount === 120) {
      const gEl = g.node();
      if (!gEl) return;
      const bbox = gEl.getBBox();
      if (bbox.width > 0 && bbox.height > 0) {
        const padding = 80;
        const scale = Math.min(
          (W - padding * 2) / bbox.width,
          (H - padding * 2) / bbox.height,
          1.5
        );
        const tx = W / 2 - (bbox.x + bbox.width / 2) * scale;
        const ty = H / 2 - (bbox.y + bbox.height / 2) * scale;
        svg.transition().duration(600)
          .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
      }
    }
  };
  simulation.on('tick.autoFit', autoFitZoom);

  // 初始缩放（保留原有行为作为降级方案）
  setTimeout(() => {
    if (tickCount >= 120) return; // autoFit 已执行则跳过
    svg.call(zoom.transform, d3.zoomIdentity.translate(0, 0).scale(0.9));

    // 绑定"有课件"跳转按钮
    const jumpBtn = document.getElementById('jumpActiveBtn');
    if (jumpBtn && activeNodeList.length > 0) {
      jumpBtn.addEventListener('click', () => {
        const target = activeNodeList[focusActiveIndex % activeNodeList.length];
        focusActiveIndex++;
        if (!target || target.x == null) return;

        const container = document.getElementById('tree-container');
        const W = container.clientWidth;
        const H = container.clientHeight;
        const scale = 1.8;
        const tx = W / 2 - scale * target.x;
        const ty = H / 2 - scale * target.y;

        svg.transition().duration(600)
          .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));

        // 脉冲高亮
        const nodeG = g.selectAll('.node-group').filter(d => d.id === target.id);
        nodeG.selectAll('.node-pulse').remove();
        nodeG.append('circle')
          .attr('class', 'node-pulse')
          .attr('r', 22)
          .attr('fill', 'none')
          .attr('stroke', target.domainColor || '#3b82f6')
          .attr('stroke-width', 3)
          .attr('opacity', 0.8)
          .transition().duration(900).ease(d3.easeLinear)
          .attr('r', 42)
          .attr('opacity', 0)
          .on('end', function() { d3.select(this).remove(); });

        // 更新按钮文字提示
        if (activeNodeList.length > 1) {
          jumpBtn.title = `点击切换下一个有课件的节点（${focusActiveIndex % activeNodeList.length + 1}/${activeNodeList.length}）`;
        }
      });
    } else if (jumpBtn) {
      jumpBtn.style.opacity = '0.4';
      jumpBtn.style.cursor = 'default';
      jumpBtn.title = '暂无有课件的节点';
    }
  }, 500);
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// Drag handlers
function dragStart(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragging(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnd(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// Tooltip
const tooltip = document.getElementById('tooltip');

// ── 课标内容模块 ──

// excerpts 缓存：tree_path → excerpts 数据
const excerptsCache = new Map();
// 记录用户对 curriculum-section 的折叠偏好
let curriculumSectionCollapsed = false;

/**
 * 根据 node 推断其所属的 tree 路径（curriculum/stage/subject）
 * 用于从对应的 excerpts 文件加载课标片段
 */
function inferTreePathForNode(d) {
  // 优先使用 d 自身的元数据（若构造 tree 数据时已带上）
  if (d._treePath) return d._treePath;
  if (d.tree_path) return d.tree_path;

  // 否则用 currentTreeMeta（全局变量，loadTree 时设置）
  if (window.currentTreeMeta && window.currentTreeMeta.path) {
    return window.currentTreeMeta.path;
  }
  return null;
}

/**
 * 异步加载某个 tree 的 excerpts（如有）
 * excerpts 文件路径：data/excerpts/{curriculum}/{stage}/{subject}.json
 */
async function loadExcerptsForTree(treePath) {
  if (!treePath) return null;
  if (excerptsCache.has(treePath)) return excerptsCache.get(treePath);
  try {
    const url = `./data/excerpts/${treePath}`;
    const resp = await fetch(url);
    if (!resp.ok) {
      excerptsCache.set(treePath, null);
      return null;
    }
    const data = await resp.json();
    excerptsCache.set(treePath, data);
    return data;
  } catch (err) {
    excerptsCache.set(treePath, null);
    return null;
  }
}

/**
 * 从 excerpts 数据中筛选出与当前节点匹配的片段
 */
function findExcerptsForNode(excerptsData, nodeId) {
  if (!excerptsData) return [];
  const list = Array.isArray(excerptsData) ? excerptsData : (excerptsData.excerpts || []);
  if (!list.length) return [];
  return list.filter(ex => {
    // 1. 直接 node_id 匹配
    if (ex.node_id === nodeId) return true;
    if (Array.isArray(ex.node_ids) && ex.node_ids.includes(nodeId)) return true;
    // 2. kp_id 字段匹配（后端生成的 excerpts 使用 kp_id 字符串，且以 nodeId 结尾）
    if (typeof ex.kp_id === 'string') {
      if (ex.kp_id === nodeId || ex.kp_id.endsWith(nodeId)) return true;
    }
    // 3. kp_ids 数组匹配（兼容旧格式）
    if (Array.isArray(ex.kp_ids)) {
      return ex.kp_ids.some(kp => typeof kp === 'string' && (kp === nodeId || kp.includes(nodeId)));
    }
    return false;
  });
}

/**
 * 渲染"课标内容"折叠模块的 HTML（同步，先渲染占位；excerpts 异步填充）
 */
function renderCurriculumSection(d) {
  // 1. 节点自带的 curriculum_points（中国课标目前 100% 有，但多为模板文本）
  const points = Array.isArray(d.curriculum_points) ? d.curriculum_points : [];

  // 2. 构造占位容器；excerpts 异步加载后再注入
  const collapsedCls = curriculumSectionCollapsed ? 'collapsed' : '';
  const sectionId = `cs-${d.id || 'unknown'}`;

  let inner = '';

  // 2a. 渲染 curriculum_points（2026-05-08 后：课标原文已从 data/excerpts/ 迁入 skill/data/kp-md/，tree.html 只展示 curriculum_points 即可）
  if (points.length) {
    inner += `<div class="cs-block" data-type="curriculum-points">`;
    inner += `<div style="font-size:11px;color:var(--dimmer);margin:4px 0;">📖 课标原文要点</div>`;
    points.forEach(p => {
      inner += `<div class="cs-item">${escapeHtml(p)}</div>`;
    });
    inner += `</div>`;
  } else {
    inner += `<div class="cs-block"><div class="cs-empty">（本节点暂未录入课标要点）</div></div>`;
  }

  const html = `
    <div class="curriculum-section ${collapsedCls}" id="${sectionId}">
      <div class="cs-header" onclick="toggleCurriculumSection('${sectionId}')">
        <span>📚 课标内容</span>
        <span class="cs-toggle">▼</span>
      </div>
      <div class="cs-body">
        ${inner}
      </div>
    </div>
  `;

  return html;
}

async function fillExcerptsIntoSection(sectionId, d, treePath) {
  const container = document.getElementById(`${sectionId}-excerpts`);
  if (!container) return;

  if (!treePath) {
    container.innerHTML = `<div class="cs-empty">（本节点暂无教材/课标片段，待 LLM 匹配后填充）</div>`;
    return;
  }

  const excerptsData = await loadExcerptsForTree(treePath);
  const matched = findExcerptsForNode(excerptsData, d.id);

  if (!matched.length) {
    container.innerHTML = `
      <div style="font-size:11px;color:var(--dimmer);margin:4px 0;">📄 教材/课标片段</div>
      <div class="cs-empty">（本节点暂无匹配片段，可运行 LLM 分类工具生成）</div>
    `;
    return;
  }

  let inner = `<div style="font-size:11px;color:var(--dimmer);margin:4px 0;">📄 教材/课标片段（${matched.length}）</div>`;
  matched.slice(0, 10).forEach(ex => {
    const src = ex.source || ex.source_file || '未知';
    const srcShort = src.split('/').slice(-1)[0].replace(/\.(md|json)$/i, '');
    const text = ex.text || ex.content || '';
    const textShort = text.length > 220 ? text.slice(0, 220) + '…' : text;
    inner += `
      <div class="cs-item">
        <span class="cs-item-source">${escapeHtml(srcShort)}</span>
        ${escapeHtml(textShort)}
      </div>
    `;
  });
  if (matched.length > 10) {
    inner += `<div style="font-size:11px;color:var(--dimmer);margin-top:4px;">… 还有 ${matched.length - 10} 条未展示</div>`;
  }
  container.innerHTML = inner;
}

function toggleCurriculumSection(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('collapsed');
  curriculumSectionCollapsed = el.classList.contains('collapsed');
}

function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── Tooltip 交互（固定定位 + 延迟隐藏，确保按钮可点击）──

let tooltipLocked = false;   // tooltip 被锁定（用户鼠标在 tooltip 上）
let activeNodeData = null;   // 当前显示 tooltip 的节点数据

function showTooltip(event, d) {
  clearTimeout(tooltip._hideTimer);
  activeNodeData = d;

  let html = `<h3>${d.name}</h3>`;
  html += `<div class="meta">${d.domain} · ${d.grade}年级</div>`;

  // ── 统一通过 Hub 获取所有课件（已按 likes 降序排列） ──
  const hubCourses = window.TeachAnyHub ? TeachAnyHub.getAllCoursesForNode(d.id) : [];
  const hubCount = hubCourses.length;

  // 同时保留旧逻辑作为 fallback（Hub 未初始化时）
  const userCourses = window.TeachAnyImporter ? TeachAnyImporter.getTopCoursesForTreeNode(d.id) : [];
  const hasUserCourses = userCourses.length > 0;
  const communityCourses = window.TeachAnyCommunity ? TeachAnyCommunity.getTopCommunityCourses(d.id, 5) : [];
  const hasCommunity = communityCourses.length > 0;

  // ── 状态徽章（基于统一检测） ──
  const hasAnyCourse = nodeHasAnyCourse(d);
  if (hasAnyCourse) {
    if (d.status === 'active' && d.courses && d.courses.length) {
      html += `<span class="status-badge badge-active">✅ 有课件</span>`;
    } else if (hasUserCourses) {
      html += `<span class="status-badge badge-active">📂 我的课件</span>`;
    } else if (hubCount > 0) {
      html += `<span class="status-badge badge-active">🌐 社区接入</span>`;
    } else {
      html += `<span class="status-badge badge-active">✅ 有课件</span>`;
    }
  } else {
    html += `<span class="status-badge badge-gap">📝 待创建</span>`;
  }

  // ── 来源统计行 ──
  const statParts = [];

  if (hubCount > 0) {
    // Hub 模式：显示聚合统计
    const officialCount = hubCourses.filter(c => c.source === 'official').length;
    const communityRegCount = hubCourses.filter(c => c.source === 'community_registry').length;
    const communitySharedCount = hubCourses.filter(c => c.source === 'community_shared').length;
    const userCount = hubCourses.filter(c => c.source === 'user').length;

    if (officialCount > 0) statParts.push(`📋 官方 ×${officialCount}`);
    if (communityRegCount > 0) statParts.push(`🔖 社区精选 ×${communityRegCount}`);
    if (communitySharedCount > 0) statParts.push(`🌐 社区共享 ×${communitySharedCount}`);
    if (userCount > 0) statParts.push(`📂 我的 ×${userCount}`);

    // 总 likes 数
    const totalLikes = hubCourses.reduce((sum, c) => sum + (c.likes || 0), 0);
    if (totalLikes > 0) statParts.push(`❤️ ${totalLikes}`);

    // 总课件数
    if (hubCount > 1) statParts.push(`共 ${hubCount} 个课件`);
  } else {
    // Fallback：Hub 未初始化时走旧逻辑
    if (d.status === 'active' && d.courses.length) {
      statParts.push(`📋 官方 ×${d.courses.length}`);
    }
    if (hasCommunity) statParts.push(`🌐 社区 ×${communityCourses.length}`);
    if (hasUserCourses) statParts.push(`📂 我的 ×${userCourses.length}`);

    // 爱心数（旧逻辑）
    let totalLikes = 0;
    if (window.TeachAnyRegistry) {
      d.courses.forEach(c => {
        const cid = typeof c === 'string' ? c.split('/').pop() : '';
        totalLikes += TeachAnyRegistry.getRegistryLikeCount(cid);
      });
    }
    if (window.TeachAnyImporter) {
      userCourses.forEach(c => { totalLikes += TeachAnyImporter.getCourseLikes(c.id); });
    }
    if (totalLikes > 0) statParts.push(`❤️ ${totalLikes}`);
  }

  // 星标推荐
  if (window.TeachAnyFeatured) {
    const featuredStats = TeachAnyFeatured.getFeaturedStatsForNode(d.id);
    if (featuredStats.total > 0) {
      if (featuredStats.approved > 0) statParts.push(`⭐ 推荐 ×${featuredStats.approved}`);
      if (featuredStats.starred > 0) statParts.push(`🔸 待审核 ×${featuredStats.starred}`);
    }
  }

  if (statParts.length > 0) {
    html += `<div class="meta" style="margin-top:4px;">${statParts.join(' · ')}</div>`;
  }

  // ── 前置知识 ──
  if (d.prerequisites.length) {
    html += `<div class="prereqs">前置知识：${d.prerequisites.join('、')}</div>`;
  }

  // ── 课标内容模块（curriculum_points + excerpts） ──
  html += renderCurriculumSection(d);

  // ── 课件列表（始终展示列表+心标，用户点选进入） ──
  if (hubCount > 0) {
    html += `<div style="margin-top:8px;font-size:12px;color:var(--dim);">课件列表${hubCount > 1 ? '（按 ❤️ 排序）' : ''}：</div>`;
    html += `<div style="max-height:160px;overflow-y:auto;margin-top:4px;">`;
    hubCourses.forEach((c, idx) => {
      const sourceIcon = { official: '📋', community_registry: '🔖', community_shared: '🌐', user: '📂' }[c.source] || '📚';
      const likeBadge = c.likes > 0 ? ` <span style="color:#f87171;">❤️${c.likes}</span>` : ' <span style="color:var(--dimmer);">❤️0</span>';
      const isBest = idx === 0 && hubCount > 1 ? ' <span style="color:var(--accent);">👑</span>' : '';
      const courseUrl = c.url || (c.path ? `./${c.path}/index.html` : '');
      if (courseUrl) {
        html += `<a ${courseLinkAttrs(courseUrl)}
          style="display:flex;align-items:center;gap:6px;padding:6px 10px;margin:3px 0;border-radius:6px;font-size:13px;color:var(--text);text-decoration:none;background:rgba(148,163,184,0.08);transition:all 0.2s;pointer-events:auto;border:1px solid transparent;"
          onmouseover="this.style.background='rgba(59,130,246,0.15)';this.style.borderColor='rgba(59,130,246,0.3)'"
          onmouseout="this.style.background='rgba(148,163,184,0.08)';this.style.borderColor='transparent'"
        ><span>${sourceIcon}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.name}</span>${likeBadge}${isBest}</a>`;
      }
    });
    html += `</div>`;
  } else if (d.status === 'active' && d.courses.length) {
    // Fallback：用 tree 中的课件列表
    html += `<div style="margin-top:8px;font-size:12px;color:var(--dim);">课件列表：</div>`;
    html += `<div style="max-height:160px;overflow-y:auto;margin-top:4px;">`;
    d.courses.forEach(courseId => {
      // v6.6: 优先从 TeachAnyHub 查 course 的真实 path（community/xxx 或 examples/xxx）
      // 避免硬编码 ./examples/ 导致 community 课件 404
      let courseUrl = '';
      if (window.TeachAnyHub && typeof TeachAnyHub.getCourseById === 'function') {
        const hit = TeachAnyHub.getCourseById(courseId);
        if (hit && hit.url) courseUrl = hit.url;
      }
      if (!courseUrl) {
        // 兜底 1：courses[] 里自带路径前缀
        if (courseId.startsWith('examples/') || courseId.startsWith('community/')) {
          courseUrl = `./${courseId}/index.html`;
        } else {
          // 兜底 2：尝试 community/<id>（新课件主力通道）
          courseUrl = `./community/${courseId}/index.html`;
        }
      }
      const likesCount = window.TeachAnyRegistry ? TeachAnyRegistry.getRegistryLikeCount(courseId) : 0;
      const likeBadge = likesCount > 0 ? ` <span style="color:#f87171;">❤️${likesCount}</span>` : ' <span style="color:var(--dimmer);">❤️0</span>';
      html += `<a ${courseLinkAttrs(courseUrl)}
        style="display:flex;align-items:center;gap:6px;padding:6px 10px;margin:3px 0;border-radius:6px;font-size:13px;color:var(--text);text-decoration:none;background:rgba(148,163,184,0.08);transition:all 0.2s;pointer-events:auto;border:1px solid transparent;"
        onmouseover="this.style.background='rgba(59,130,246,0.15)';this.style.borderColor='rgba(59,130,246,0.3)'"
        onmouseout="this.style.background='rgba(148,163,184,0.08)';this.style.borderColor='transparent'"
      ><span>📋</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${courseId}</span>${likeBadge}</a>`;
    });
    html += `</div>`;
  }

  html += `<button type="button" class="tree-make-course-btn" data-tree-make-course="${escapeHtml(d.id)}">✨ 制作课件</button>`;

  tooltip.innerHTML = html;

  // 为有用户课件的节点或 gap 节点添加上传按钮
  if (window.TeachAnyImporter && (hasUserCourses || !hasAnyCourse)) {
    TeachAnyImporter.addTreeUploadButton(d, tooltip);
  }

  // 渲染社区共享课件列表（仅在 Hub 未覆盖时走旧逻辑）
  if (hubCount === 0 && window.TeachAnyCommunity && hasCommunity) {
    TeachAnyCommunity.renderCommunityCoursesInTooltip(d.id, tooltip);
  }

  // 定位
  positionTooltipAtNode(event, d);
  tooltip.classList.add('visible');
}

function positionTooltipAtNode(event, d) {
  const container = document.getElementById('tree-container');
  const rect = container.getBoundingClientRect();
  const svgEl = document.getElementById('treeSvg');
  const gEl = svgEl.querySelector('g');
  const ctm = gEl ? gEl.getCTM() : null;

  let x, y;
  if (ctm && d.x != null && d.y != null) {
    // 将节点的模拟坐标经由 SVG CTM 变换为屏幕坐标，再转为容器内相对坐标
    const screenX = ctm.a * d.x + ctm.c * d.y + ctm.e;
    const screenY = ctm.b * d.x + ctm.d * d.y + ctm.f;
    x = screenX - rect.left + 28;  // 紧贴节点右侧
    y = screenY - rect.top - 20;
  } else {
    // fallback：用鼠标位置
    x = event.clientX - rect.left + 12;
    y = event.clientY - rect.top - 20;
  }

  // 边界修正
  const tw = 290; // tooltip 大致宽度
  const th = 200; // tooltip 大致高度
  if (x + tw > rect.width) x = x - tw - 56; // 翻到节点左侧
  if (y + th > rect.height) y = rect.height - th - 10;
  if (y < 10) y = 10;

  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function moveTooltip(event) {
  // 不再跟随鼠标移动——tooltip 固定在节点旁边
  // 仅在 tooltip 尚未显示时定位（已由 showTooltip 处理）
}

function hideTooltip() {
  // 如果 tooltip 被锁定（鼠标在 tooltip 上），不隐藏
  if (tooltipLocked) return;

  clearTimeout(tooltip._hideTimer);
  tooltip._hideTimer = setTimeout(() => {
    // 再次检查：用户是否已经把鼠标移到 tooltip 上
    if (!tooltipLocked && !tooltip.matches(':hover')) {
      tooltip.classList.remove('visible');
      activeNodeData = null;
    }
  }, 350); // 350ms 延迟，给用户充足时间移到 tooltip
}

// tooltip 鼠标进入/离开
tooltip.addEventListener('mouseenter', function() {
  tooltipLocked = true;
  clearTimeout(this._hideTimer);
});
tooltip.addEventListener('mouseleave', function() {
  tooltipLocked = false;
  clearTimeout(this._hideTimer);
  // 延迟隐藏：给用户足够时间回到 tooltip 或点击链接
  this._hideTimer = setTimeout(() => {
    if (!tooltipLocked && !tooltip.matches(':hover')) {
      tooltip.classList.remove('visible');
      tooltip.style.borderColor = '';
      tooltip.style.boxShadow = '';
      activeNodeData = null;
    }
  }, 400);
});

tooltip.addEventListener('click', function(event) {
  const btn = event.target && event.target.closest ? event.target.closest('[data-tree-make-course]') : null;
  if (!btn) return;
  event.preventDefault();
  event.stopPropagation();
  const nodeId = btn.getAttribute('data-tree-make-course');
  const nodeName = activeNodeData && activeNodeData.name ? activeNodeData.name : nodeId;
  const meta = activeNodeData ? {
    name: activeNodeData.name,
    subject: activeNodeData.subject || activeNodeData.domain || '',
    grade: activeNodeData.grade,
    domain: activeNodeData.domain || '',
    name_en: activeNodeData.name_en || '',
    definition: activeNodeData.definition || '',
    key_concepts: activeNodeData.key_concepts || [],
    curriculum_points: activeNodeData.curriculum_points || [],
  } : {};
  if (window.TeachAnyMakeCourse && typeof TeachAnyMakeCourse.open === 'function') {
    TeachAnyMakeCourse.open({ nodeId, nodeName, source: 'tree', meta });
  } else if (typeof window.generateCourseware === 'function') {
    window.generateCourseware(nodeId, nodeName);
  }
  tooltipLocked = false;
  clearTimeout(tooltip._hideTimer);
  tooltip.classList.remove('visible');
  activeNodeData = null;
});

// ── TeachAny 导航白名单 ──
const TEACHANY_NAV_WHITELIST = [
  /^\.\.?\//,                                          // 相对路径
  /^#/,                                                // 锚点
  /^imported-course\.html/,                            // 用户课件查看器
  /^https?:\/\/(www\.)?teachany\.cn\//,                // 生产站点（Hub 默认 URL）
  /^https?:\/\/weponusa\.github\.io\/teachany\//,      // TeachAny Pages
  /^https?:\/\/weponusa\.github\.io\/teachany-courseware\//, // TeachAny Courseware Pages
  /^https?:\/\/github\.com\/weponusa\/teachany\//,     // TeachAny GitHub
];

function isTeachAnyUrl(url) {
  if (!url || url === '#') return false;
  url = url.trim();
  // 相对路径（不含协议前缀）都允许
  if (!/^[a-z]+:/i.test(url)) return true;
  return TEACHANY_NAV_WHITELIST.some(re => re.test(url));
}

/** 生成课件链接属性：白名单内用原生 <a>，避免 preventDefault + window.open 被拦或误杀 teachany.cn */
function courseLinkAttrs(url) {
  if (!url || url === '#') return 'href="#"';
  const safe = isTeachAnyUrl(url);
  const esc = url.replace(/"/g, '&quot;');
  if (safe) {
    return `href="${esc}" target="_blank" rel="noopener noreferrer"`;
  }
  return `href="#" title="链接未通过安全校验" onclick="console.warn('[TeachAny] 已拦截非课件链接:', '${url.replace(/'/g, "\\'")}');return false;"`;
}

function onNodeClick(event, d) {
  // 点击节点 → 显示课件列表，用户从列表选择进入
  // 只做两件事：展示 tooltip、锁定不让它消失
  showTooltip(event, d);
  tooltipLocked = true;
  clearTimeout(tooltip._hideTimer);
  tooltip.style.borderColor = 'var(--primary)';
  tooltip.style.boxShadow = '0 0 20px rgba(59,130,246,0.3)';
}

// 刷新当前知识地图数据（手动触发，绕过一切缓存）
async function refreshCurrentTree() {
  const btn = document.querySelector('.refresh-btn');
  if (btn) { btn.classList.add('spinning'); btn.disabled = true; }
  try {
    const activeBtn = document.querySelector('#subjectTabs .subject-tab.active');
    const activeIdx = activeBtn ? Number(activeBtn.dataset.treeIndex) : -1;
    if (activeIdx >= 0) await loadTree(activeIdx);
  } finally {
    if (btn) { btn.classList.remove('spinning'); btn.disabled = false; }
  }
}

  const activeIdx = Array.from(document.querySelectorAll('#subjectTabs .subject-tab')).findIndex(t => t.classList.contains('active'));
  if (activeIdx >= 0) loadTree(activeIdx);
};
