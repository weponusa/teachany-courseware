<!DOCTYPE html>
<html lang="zh-CN">
<head>

<style>
:root {
  --bg: #0a0e1a;
  --bg2: #131a2e;
  --card: rgba(20, 30, 55, 0.92);
  --border: rgba(100, 120, 160, 0.2);
  --text: #e8ecf4;
  --dim: #8b99b0;
  --dimmer: #5a6880;
  --primary: #4f8fff;
  --secondary: #a855f7;
  --accent: #f59e0b;
  --success: #10b981;
  --radius: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* Top bar */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 48px; display: flex; align-items: center; padding: 0 20px; gap: 16px;
  background: linear-gradient(180deg, rgba(10,14,26,0.97), rgba(10,14,26,0.85));
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.top-bar h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; white-space: nowrap; }
.top-bar h1 span { color: var(--dim); font-weight: 400; margin-left: 8px; font-size: 12px; }
.top-bar .nav-links { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.top-bar .nav-links a {
  color: var(--dim); text-decoration: none; font-size: 12px; padding: 4px 8px;
  border-radius: 6px; transition: color 0.2s, background 0.2s; white-space: nowrap;
}
.top-bar .nav-links a:hover { color: var(--text); background: rgba(255,255,255,0.06); }
.top-bar .nav-links a.active { color: var(--primary); background: rgba(79,143,255,0.12); }
.top-bar .nav-link {
  margin-left: 24px; color: var(--dim); text-decoration: none; font-size: 13px;
  transition: color 0.2s;
}
.top-bar .nav-link:hover { color: var(--text); }

/* Stats bar */
.stats-bar {
  position: fixed; top: 48px; left: 0; right: 0; z-index: 90;
  height: 36px; display: flex; align-items: center; gap: 16px; padding: 0 20px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  font-size: 12px; color: var(--dim);
}
.stat-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 10px; border-radius: 20px;
  background: rgba(79, 143, 255, 0.08); border: 1px solid rgba(79, 143, 255, 0.15);
}
.stat-chip b { color: var(--text); font-weight: 600; }

/* Controls panel */
.controls {
  position: fixed; top: 96px; left: 16px; z-index: 80;
  width: 280px; padding: 16px;
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  backdrop-filter: blur(16px);
  max-height: calc(100vh - 120px); overflow-y: auto;
}
.controls::-webkit-scrollbar { width: 4px; }
.controls::-webkit-scrollbar-thumb { background: var(--dimmer); border-radius: 2px; }

.ctrl-section { margin-bottom: 16px; }
.ctrl-section:last-child { margin-bottom: 0; }
.ctrl-label { font-size: 11px; color: var(--dimmer); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }

/* Search */
.search-box {
  width: 100%; padding: 8px 12px; border-radius: 6px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  color: var(--text); font-size: 13px; outline: none;
  transition: border-color 0.2s;
}
.search-box:focus { border-color: var(--primary); }
.search-box::placeholder { color: var(--dimmer); }

/* Subject filters */
.subject-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.subject-chip {
  padding: 4px 10px; border-radius: 14px; font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
  user-select: none;
}
.subject-chip.active { border-color: currentColor; }
.subject-chip.inactive { opacity: 0.35; }

/* Grade slider */
.grade-range {
  display: flex; align-items: center; gap: 8px;
}
.grade-range input[type=range] {
  flex: 1; appearance: none; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.1); outline: none;
}
.grade-range input[type=range]::-webkit-slider-thumb {
  appearance: none; width: 14px; height: 14px; border-radius: 50%;
  background: var(--primary); cursor: pointer;
}
.grade-val { font-size: 12px; color: var(--text); min-width: 50px; text-align: center; }

/* Node detail panel（与 tree / PBL 属性页一致） */
.node-detail-panel {
  position: fixed; top: 84px; right: -400px; width: 380px; height: calc(100vh - 84px);
  background: var(--bg2); border-left: 1px solid var(--border);
  box-shadow: -4px 0 24px rgba(0,0,0,0.35); z-index: 95;
  transition: right 0.3s ease; overflow-y: auto; padding: 22px 20px 28px;
}
.node-detail-panel.open { right: 0; }
.node-detail-panel::-webkit-scrollbar { width: 4px; }
.node-detail-panel::-webkit-scrollbar-thumb { background: var(--dimmer); border-radius: 2px; }
.node-detail-panel .close-btn {
  position: absolute; top: 12px; right: 12px; padding: 6px 10px;
  border-radius: 6px; border: 1px solid var(--border); background: var(--bg);
  color: var(--dim); cursor: pointer; font-size: 14px; z-index: 1;
}
.node-detail-panel .close-btn:hover { color: var(--text); }
.node-detail-panel h3 {
  font-size: 18px; font-weight: 700; color: var(--text);
  margin-bottom: 8px; padding-right: 36px;
}

/* Canvas */
#graphCanvas {
  position: fixed; top: 84px; left: 0; right: 0; bottom: 0;
  width: 100%; height: calc(100vh - 84px);
  cursor: grab;
}
#graphCanvas:active { cursor: grabbing; }

/* Legend */
.legend {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 80;
  display: flex; gap: 12px; padding: 8px 16px;
  background: var(--card); border: 1px solid var(--border); border-radius: 20px;
  backdrop-filter: blur(12px);
}
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--dim); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

/* Loading */
.loading-overlay {
  position: fixed; inset: 0; z-index: 200;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px;
  background: var(--bg);
}
.loading-spinner {
  width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--dim); font-size: 13px; }

/* Responsive */
@media (max-width: 768px) {
  .controls { width: 240px; left: 8px; top: 90px; padding: 12px; }
  .node-detail-panel { width: 300px; }
  .legend { gap: 8px; padding: 6px 12px; }
}
</style>
</head>

async function loadDomainLabels() {
  try {
    const resp = await fetch('./data/knowledge-map-domain-labels.json?v=20260608');
    if (!resp.ok) return;
    const data = await resp.json();
    Object.assign(DOMAIN_LABELS, data.labels || {});
  } catch (e) { /* 使用内置 DOMAIN_LABELS 回退 */ }
}

async function ensureMetaIndex() {
  if (metaById) return metaById;
  if (!metaLoadPromise) {
    metaLoadPromise = fetch('./data/nodes-metadata.json?v=20260608')
      .then((r) => (r.ok ? r.json() : { nodes: [] }))
      .then((d) => {
        metaById = new Map();
        (d.nodes || []).forEach((n) => { if (n.id) metaById.set(n.id, n); });
        return metaById;
      })
      .catch(() => {
        metaById = new Map();
        return metaById;
      });
  }
  return metaLoadPromise;
}

async function init() {
  await loadDomainLabels();
  const hubInit = window.TeachAnyHub ? TeachAnyHub.init().catch(() => {}) : Promise.resolve();
  try {
    const [_, resp] = await Promise.all([
      hubInit,
      fetch('./data/knowledge-map-data.json?v=20260608'),
    ]);
    graphData = await resp.json();
  } catch (e) {
    document.getElementById('loading').innerHTML = '<div style="color:#ef4444">加载失败: ' + e.message + '</div>';
    return;
  }
  ensureMetaIndex();

  // Build lookups
  graphData.nodes.forEach(n => {
    n.vx = 0; n.vy = 0;
    nodeMap.set(n.id, n);
  });
  window.KnowledgeMapNodeIndex = nodeMap;
  graphData.edges.forEach(e => {
    if (!edgesByTarget.has(e.target)) edgesByTarget.set(e.target, []);
    edgesByTarget.get(e.target).push(e.source);
    if (!edgesBySource.has(e.source)) edgesBySource.set(e.source, []);
    edgesBySource.get(e.source).push(e.target);
  });

  setupCanvas();
  setupControls();
  updateStats();
  startSimulation();
  document.getElementById('loading').style.display = 'none';
  requestAnimationFrame(renderLoop);
}

function setupCanvas() {
  canvas = document.getElementById('graphCanvas');
  ctx = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);

  // Zoom & pan
  const zoom = d3.zoom()
    .scaleExtent([0.1, 8])
    .on('zoom', (event) => {
      transform = event.transform;
    });
  d3.select(canvas).call(zoom);

  // Click & hover
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('click', onClick);
}

function resize() {
  width = window.innerWidth;
  height = window.innerHeight - 84;
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function startSimulation() {
  const visibleNodes = getVisibleNodes();
  const visibleIds = new Set(visibleNodes.map(n => n.id));
  const visibleEdges = graphData.edges.filter(e => visibleIds.has(e.source) && visibleIds.has(e.target));

  if (simulation) simulation.stop();

  // 大图优化：7000+ 节点时降低精度加快收敛
  const isLargeGraph = visibleNodes.length > 2000;
  const linkObjs = visibleEdges.slice(0, isLargeGraph ? 5000 : visibleEdges.length)
    .map(e => ({ source: nodeMap.get(e.source), target: nodeMap.get(e.target) }))
    .filter(e => e.source && e.target);

  if (currentLayout === 'force') {
    simulation = d3.forceSimulation(visibleNodes)
      .force('link', d3.forceLink(linkObjs)
        .distance(isLargeGraph ? 25 : 40).strength(isLargeGraph ? 0.15 : 0.3))
      .force('charge', d3.forceManyBody().strength(isLargeGraph ? -15 : -30).distanceMax(isLargeGraph ? 200 : 300))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('collide', d3.forceCollide(isLargeGraph ? 4 : 8))
      .force('x', d3.forceX(n => getSubjectX(n.subject)).strength(isLargeGraph ? 0.2 : 0.12))
      .force('y', d3.forceY(n => getGradeY(n.grade)).strength(isLargeGraph ? 0.12 : 0.08))
      .alphaDecay(isLargeGraph ? 0.04 : 0.02)
      .velocityDecay(isLargeGraph ? 0.5 : 0.4);
  } else if (currentLayout === 'radial') {
    // Radial: group by subject, spread by grade
    const subjects = [...new Set(visibleNodes.map(n => n.subject))];
    const angleStep = (2 * Math.PI) / subjects.length;
    const baseRadius = Math.min(width, height) * 0.25;
    visibleNodes.forEach(n => {
      const idx = subjects.indexOf(n.subject);
      const angle = idx * angleStep - Math.PI / 2;
      const effectiveGrade = n.grade === 0 ? 13 : n.grade;
      const radius = baseRadius + (effectiveGrade - 1) * 18 + (Math.random() - 0.5) * 30;
      n.x = width / 2 + Math.cos(angle) * radius + (Math.random() - 0.5) * 40;
      n.y = height / 2 + Math.sin(angle) * radius + (Math.random() - 0.5) * 40;
    });
    simulation = d3.forceSimulation(visibleNodes)
      .force('collide', d3.forceCollide(isLargeGraph ? 3 : 7))
      .force('link', d3.forceLink(linkObjs).distance(20).strength(0.1))
      .alphaDecay(0.05)
      .velocityDecay(0.5);
  } else {
    // Grid: by subject columns, grade rows
    const subjects = [...activeSubjects].filter(s => visibleNodes.some(n => n.subject === s));
    const colWidth = width / (subjects.length + 1);
    const rowHeight = height / 15;
    visibleNodes.forEach(n => {
      const col = subjects.indexOf(n.subject);
      const effectiveGrade = n.grade === 0 ? 13 : n.grade;
      const nodesInCell = visibleNodes.filter(m => m.subject === n.subject && m.grade === n.grade);
      const cellIdx = nodesInCell.indexOf(n);
      n.x = colWidth * (col + 1) + (cellIdx % 8 - 4) * 10;
      n.y = rowHeight * (effectiveGrade + 0.5) + Math.floor(cellIdx / 8) * 10;
    });
    simulation = d3.forceSimulation(visibleNodes)
      .force('collide', d3.forceCollide(isLargeGraph ? 3 : 6))
      .alphaDecay(0.08)
      .velocityDecay(0.6);
  }
}

function getSubjectX(subject) {
  let idx = SUBJECT_LAYOUT_ORDER.indexOf(subject);
  let cols = SUBJECT_LAYOUT_ORDER.length;
  if (idx < 0) {
    const subjects = Object.keys(SUBJECT_CONFIG);
    idx = subjects.indexOf(subject);
    cols = subjects.length;
  }
  if (idx < 0) return width / 2;
  return (width / (cols + 1)) * (idx + 1);
}

function getGradeY(grade) {
  const g = grade === 0 ? 13 : grade; // university nodes at bottom
  return (height / 15) * (g + 0.5);
}

/** 学科簇大字标注（屏幕字号固定，远景导航用） */
const CLUSTER_LABEL_SCREEN_PX = 26;

function computeSubjectClusters(visibleNodes) {
  const map = new Map();
  visibleNodes.forEach((n) => {
    if (n.x == null || n.y == null || !activeSubjects.has(n.subject)) return;
    let c = map.get(n.subject);
    if (!c) {
      c = { sumX: 0, sumY: 0, count: 0, minY: Infinity, maxY: -Infinity };
      map.set(n.subject, c);
    }
    c.sumX += n.x;
    c.sumY += n.y;
    c.count += 1;
    c.minY = Math.min(c.minY, n.y);
    c.maxY = Math.max(c.maxY, n.y);
  });
  return map;
}

function clusterInViewport(c) {
  const cx = c.sumX / c.count;
  const cy = (c.minY + c.maxY) / 2;
  const margin = 120;
  const x0 = (-transform.x - margin) / transform.k;
  const y0 = (-transform.y - margin) / transform.k;
  const x1 = (width - transform.x + margin) / transform.k;
  const y1 = (height - transform.y + margin) / transform.k;
  return cx >= x0 && cx <= x1 && cy >= y0 && cy <= y1;
}

function drawSubjectClusterLabels(visibleNodes) {
  const clusters = computeSubjectClusters(visibleNodes);
  if (!clusters.size) return;

  const fontPx = CLUSTER_LABEL_SCREEN_PX / transform.k;
  const padX = 14 / transform.k;
  const padY = 8 / transform.k;
  const alpha = transform.k < 0.7 ? 0.52 : (transform.k < 1.2 ? 0.42 : (transform.k < 2.2 ? 0.3 : 0.2));

  [...clusters.entries()]
    .filter(([, c]) => c.count >= 5 && clusterInViewport(c))
    .sort((a, b) => (a[1].sumX / a[1].count) - (b[1].sumX / b[1].count))
    .forEach(([subjectId, c]) => {
      const cfg = SUBJECT_CONFIG[subjectId];
      if (!cfg) return;

      const cx = c.sumX / c.count;
      const labelY = c.minY - 28 / transform.k;
      const text = `${cfg.emoji} ${cfg.label}`;

      ctx.font = `800 ${fontPx}px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';

      const tw = ctx.measureText(text).width;
      const boxH = fontPx + padY * 2;
      const boxW = tw + padX * 2;

      ctx.globalAlpha = alpha * 0.55;
      ctx.fillStyle = 'rgba(10, 14, 26, 0.55)';
      ctx.fillRect(cx - boxW / 2, labelY - boxH, boxW, boxH);

      ctx.globalAlpha = alpha;
      ctx.fillStyle = cfg.color;
      ctx.fillText(text, cx, labelY - padY * 0.35);
    });
}

function getVisibleNodes() {
  return graphData.nodes.filter(n => {
    if (!activeSubjects.has(n.subject)) return false;
    if (n.grade === 0) { if (!includeUni) return false; }
    else if (n.grade < gradeRange[0] || n.grade > gradeRange[1]) return false;
    if (searchQuery && !n.name.toLowerCase().includes(searchQuery) && !n.id.includes(searchQuery) && !(DOMAIN_LABELS[n.domain] || '').includes(searchQuery)) return false;
    return true;
  });
}

// ═══════════════════════════════════════════════════════════════
// LABELS — 默认隐藏；高倍缩放碰撞避让后全显；悬浮/选中单点标注
// ═══════════════════════════════════════════════════════════════

const NODE_SCREEN_R_BASE = 5;    // 默认屏幕半径（px）
const NODE_SCREEN_R_ZOOMED = 6.5; // 放大后保持可点、可辨
const LABEL_SCREEN_PX = 11;

/** 节点屏幕半径：远景略小，放大后稳定在 5–6.5px（不再越放大越小） */
function nodeScreenRadius(multiplier = 1) {
  const k = transform.k;
  if (k < 0.5) return Math.max(2.2, NODE_SCREEN_R_BASE * multiplier * (k / 0.5));
  if (k < 1.2) return NODE_SCREEN_R_BASE * multiplier;
  return Math.min(NODE_SCREEN_R_ZOOMED * multiplier, NODE_SCREEN_R_BASE * multiplier + (k - 1) * 0.9);
}

function getViewportNodes(nodes) {
  const margin = 48;
  const x0 = (-transform.x - margin) / transform.k;
  const y0 = (-transform.y - margin) / transform.k;
  const x1 = (width - transform.x + margin) / transform.k;
  const y1 = (height - transform.y + margin) / transform.k;
  return nodes.filter(n => n.x != null && n.x >= x0 && n.x <= x1 && n.y >= y0 && n.y <= y1);
}

function nodeGraphRadius(multiplier = 1) {
  return nodeScreenRadius(multiplier) / transform.k;
}

function labelFontSize(screenPx = LABEL_SCREEN_PX) {
  return screenPx / transform.k;
}

function labelBoxOverlaps(a, b) {
  return !(a.right < b.left || a.left > b.right || a.bottom < b.top || a.top > b.bottom);
}

function shouldShowAllLabels(viewportCount) {
  if (viewportCount < 1 || transform.k < 1.05) return false;
  const density = viewportCount / Math.max(width * height, 1);
  const estSpacing = Math.sqrt(1 / Math.max(density, 1e-9)) * 0.55;
  if (transform.k >= 2) return estSpacing >= 36 || viewportCount <= 80;
  if (transform.k >= 1.4) return estSpacing >= 44 || viewportCount <= 150;
  return estSpacing >= 58 && viewportCount <= 350;
}

function measureLabelBox(name, x, y, anchorR) {
  const fontSize = labelFontSize();
  ctx.font = `${fontSize}px -apple-system, PingFang SC, sans-serif`;
  const tw = ctx.measureText(name).width;
  const lx = x;
  const ly = y - anchorR - 6 / transform.k;
  const padX = 4 / transform.k;
  const padY = 3 / transform.k;
  return {
    left: lx - tw / 2 - padX,
    right: lx + tw / 2 + padX,
    top: ly - fontSize - padY,
    bottom: ly + padY,
    lx,
    ly,
    fontSize,
    tw,
  };
}

function drawNodeLabel(n, r, alpha, { force = false, placed = null } = {}) {
  const box = measureLabelBox(n.name, n.x, n.y, r);
  if (!force && placed) {
    if (placed.some(b => labelBoxOverlaps(box, b))) return false;
    placed.push(box);
  } else if (placed) {
    placed.push(box);
  }

  if (force) {
    ctx.globalAlpha = 0.92;
    ctx.fillStyle = 'rgba(10, 14, 26, 0.9)';
    ctx.fillRect(box.left, box.top, box.right - box.left, box.bottom - box.top);
    ctx.strokeStyle = 'rgba(100, 120, 160, 0.35)';
    ctx.lineWidth = 1 / transform.k;
    ctx.strokeRect(box.left, box.top, box.right - box.left, box.bottom - box.top);
  }

  ctx.globalAlpha = alpha;
  ctx.fillStyle = force ? '#f8fafc' : '#e8ecf4';
  ctx.font = `${box.fontSize}px -apple-system, PingFang SC, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText(n.name, box.lx, box.ly);
  return true;
}

// ═══════════════════════════════════════════════════════════════
// RENDER LOOP (Canvas)
// ═══════════════════════════════════════════════════════════════

function renderLoop() {
  render();
  requestAnimationFrame(renderLoop);
}

function render() {
  ctx.save();
  ctx.clearRect(0, 0, width, height);
  ctx.translate(transform.x, transform.y);
  ctx.scale(transform.k, transform.k);

  const visibleNodes = getVisibleNodes();
  const visibleIds = new Set(visibleNodes.map(n => n.id));

  // Draw edges (performance: limit edge count at low zoom)
  const maxEdges = transform.k > 1 ? 13000 : transform.k > 0.5 ? 6000 : 2000;
  let edgeCount = 0;
  ctx.globalAlpha = visibleIds.size > 3000 ? 0.06 : 0.12;
  ctx.strokeStyle = '#6b7fa8';
  ctx.lineWidth = 0.4;
  ctx.beginPath();
  for (const e of graphData.edges) {
    if (edgeCount >= maxEdges) break;
    const s = nodeMap.get(e.source);
    const t = nodeMap.get(e.target);
    if (!s || !t || !visibleIds.has(s.id) || !visibleIds.has(t.id)) continue;
    if (s.x == null || t.x == null) continue;
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(t.x, t.y);
    edgeCount++;
  }
  ctx.stroke();

  // 学科簇大字主题（在节点之下作背景导向）
  drawSubjectClusterLabels(visibleNodes);

  // Highlight edges for selected/hovered node
  const highlightId = selectedNode?.id || hoveredNode?.id;
  if (highlightId) {
    ctx.globalAlpha = 0.6;
    ctx.lineWidth = 1.5;
    const prereqs = edgesByTarget.get(highlightId) || [];
    const nexts = edgesBySource.get(highlightId) || [];
    // Prerequisites (incoming) - purple
    ctx.strokeStyle = '#a855f7';
    prereqs.forEach(srcId => {
      const s = nodeMap.get(srcId);
      const t = nodeMap.get(highlightId);
      if (s && t && s.x != null && t.x != null) {
        ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(t.x, t.y); ctx.stroke();
      }
    });
    // Next steps (outgoing) - cyan
    ctx.strokeStyle = '#06b6d4';
    nexts.forEach(tgtId => {
      const s = nodeMap.get(highlightId);
      const t = nodeMap.get(tgtId);
      if (s && t && s.x != null && t.x != null) {
        ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(t.x, t.y); ctx.stroke();
      }
    });
  }

  // Draw nodes
  ctx.globalAlpha = 1;
  const nodeRadius = nodeGraphRadius();
  const viewportNodes = getViewportNodes(visibleNodes);
  const showAllLabels = shouldShowAllLabels(viewportNodes.length);
  const placedLabels = showAllLabels ? [] : (searchQuery ? [] : null);
  const labelViewportIds = showAllLabels ? new Set(viewportNodes.map(n => n.id)) : null;
  const hoverId = hoveredNode?.id;
  const selectedId = selectedNode?.id;

  visibleNodes.forEach(n => {
    if (n.x == null) return;
    const cfg = SUBJECT_CONFIG[n.subject] || { color: '#666' };
    const isHighlighted = highlightId && (n.id === highlightId ||
      (edgesByTarget.get(highlightId) || []).includes(n.id) ||
      (edgesBySource.get(highlightId) || []).includes(n.id));
    const isSelected = selectedNode?.id === n.id;
    const isSearchHit = searchQuery && n.name.toLowerCase().includes(searchQuery);

    let r = nodeRadius;
    let alpha = 0.7;

    if (isSelected) { r = nodeGraphRadius(1.5); alpha = 1; }
    else if (isHighlighted) { r = nodeGraphRadius(1.25); alpha = 1; }
    else if (searchQuery && !isSearchHit) { alpha = 0.15; }
    else if (highlightId && !isHighlighted) { alpha = 0.15; }

    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = cfg.color;
    ctx.fill();

    if (isSelected) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5 / transform.k;
      ctx.stroke();
    }

    // 标注：悬浮/选中单点；搜索命中；或高倍缩放且碰撞不重叠时全量
    const isHover = hoverId === n.id;
    const isSel = selectedId === n.id;
    if (isHover) {
      drawNodeLabel(n, r, 1, { force: true });
    } else if (isSel && !hoverId) {
      drawNodeLabel(n, r, 1, { force: true });
    } else if (searchQuery && isSearchHit && placedLabels) {
      drawNodeLabel(n, r, alpha, { placed: placedLabels });
    } else if (showAllLabels && labelViewportIds && labelViewportIds.has(n.id)) {
      drawNodeLabel(n, r, alpha * 0.9, { placed: placedLabels });
    }
  });

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════════════════════════

function onMouseMove(event) {
  const rect = canvas.getBoundingClientRect();
  const mx = (event.clientX - rect.left - transform.x) / transform.k;
  const my = (event.clientY - rect.top - transform.y) / transform.k;

  const visibleNodes = getVisibleNodes();
  let closest = null;
  let minDist = Math.max(nodeGraphRadius(1.8), 14 / transform.k);

  for (const n of visibleNodes) {
    if (n.x == null) continue;
    const dx = n.x - mx, dy = n.y - my;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < minDist) { minDist = dist; closest = n; }
  }

  if (closest !== hoveredNode) {
    hoveredNode = closest;
    canvas.style.cursor = closest ? 'pointer' : 'grab';
  }
}

function onClick(event) {
  if (hoveredNode) {
    selectedNode = hoveredNode;
    showDetail(selectedNode);
  } else {
    selectedNode = null;
    closeDetail();
  }
}

async function showDetail(node) {
  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('detailContent');
  if (!panel || !content || !node) return;

  await ensureMetaIndex();
  if (window.TeachAnyHub) await TeachAnyHub.init();

  const meta = metaById?.get(node.id) || {};
  const graphPrereqs = edgesByTarget.get(node.id) || [];
  const graphNexts = edgesBySource.get(node.id) || [];

  KnowledgeNodeDetail.render(content, node, {
    meta,
    subjectConfig: SUBJECT_CONFIG,
    getDomainLabel,
    getNodeById: (id) => nodeMap.get(id),
    onFocusNode: focusNode,
    prerequisiteIds: graphPrereqs.length ? graphPrereqs : (meta.prerequisites || []),
    nextIds: graphNexts.length ? graphNexts : (meta.next_steps || []),
  });

  panel.classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  selectedNode = null;
}

function focusNode(id) {
  const node = nodeMap.get(id);
  if (!node || node.x == null) return;
  selectedNode = node;
  hoveredNode = node;
  showDetail(node);

  // Pan to node
  const targetX = width / 2 - node.x * transform.k;
  const targetY = height / 2 - node.y * transform.k;
  transform = d3.zoomIdentity.translate(targetX, targetY).scale(transform.k);
  d3.select(canvas).transition().duration(500).call(
    d3.zoom().transform, transform
  );
}

// ═══════════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════════

function setupControls() {
  // Subject chips
  const chipsDiv = document.getElementById('subjectChips');
  Object.entries(SUBJECT_CONFIG).forEach(([id, cfg]) => {
    const chip = document.createElement('span');
    chip.className = 'subject-chip active';
    chip.style.color = cfg.color;
    chip.style.background = cfg.color + '18';
    chip.textContent = cfg.emoji + ' ' + cfg.label;
    chip.dataset.subject = id;
    chip.onclick = () => toggleSubject(id, chip);
    chipsDiv.appendChild(chip);
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchQuery = e.target.value.trim().toLowerCase();
    updateStats();
  });

  // Grade range
  const gradeMin = document.getElementById('gradeMin');
  const gradeMax = document.getElementById('gradeMax');
  const gradeLabel = document.getElementById('gradeLabel');
  const updateGrade = () => {
    gradeRange = [parseInt(gradeMin.value), parseInt(gradeMax.value)];
    if (gradeRange[0] > gradeRange[1]) {
      [gradeRange[0], gradeRange[1]] = [gradeRange[1], gradeRange[0]];
    }
    gradeLabel.textContent = `${gradeRange[0]}年级 – ${gradeRange[1]}年级`;
    restartSimulation();
  };
  gradeMin.addEventListener('input', updateGrade);
  gradeMax.addEventListener('input', updateGrade);

  const includeUniCb = document.getElementById('includeUni');
  includeUniCb.addEventListener('change', () => { includeUni = includeUniCb.checked; restartSimulation(); });

  // Legend
  buildLegend();
}

function toggleSubject(id, chip) {
  if (activeSubjects.has(id)) {
    activeSubjects.delete(id);
    chip.classList.remove('active');
    chip.classList.add('inactive');
  } else {
    activeSubjects.add(id);
    chip.classList.add('active');
    chip.classList.remove('inactive');
  }
  restartSimulation();
}

function setLayout(layout) {
  currentLayout = layout;
  document.querySelectorAll('.controls button[id^=btn]').forEach(b => b.classList.remove('active'));
  document.getElementById('btn' + layout.charAt(0).toUpperCase() + layout.slice(1)).classList.add('active');
  restartSimulation();
}

function restartSimulation() {
  startSimulation();
  updateStats();
}

function updateStats() {
  const visible = getVisibleNodes();
  document.getElementById('statNodes').textContent = graphData.nodes.length;
  document.getElementById('statEdges').textContent = graphData.edges.length;
  document.getElementById('statSubjects').textContent = Object.keys(SUBJECT_CONFIG).length;
  document.getElementById('statVisible').textContent = visible.length;
}

function buildLegend() {
  const legend = document.getElementById('legend');
  // Show STEM subjects in legend (skip humanities)
  const stemSubjects = Object.entries(SUBJECT_CONFIG).filter(([,cfg]) => cfg.group !== 'humanities');
  legend.innerHTML = stemSubjects.slice(0, 10).map(([id, cfg]) =>
    `<div class="legend-item"><div class="legend-dot" style="background:${cfg.color}"></div>${cfg.label}</div>`
  ).join('') + (stemSubjects.length > 10 ? `<div class="legend-item" style="opacity:0.6">+${stemSubjects.length - 10}</div>` : '');
}

// ═══════════════════════════════════════════════════════════════

init();
</script>
