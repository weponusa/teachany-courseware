<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeachAny K12 空间资产浏览器</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
  --text: #f1f5f9; --text2: #94a3b8; --accent: #38bdf8;
  --green: #4ade80; --amber: #fbbf24; --rose: #fb7185;
  --purple: #a78bfa; --cyan: #22d3ee; --orange: #fb923c;
  --radius: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

/* Layout */
.app { display: flex; height: 100vh; }
.sidebar { width: 340px; background: var(--surface); display: flex; flex-direction: column; border-right: 1px solid var(--surface2); z-index: 1000; flex-shrink: 0; }
.map-wrap { flex: 1; position: relative; }
#map { width: 100%; height: 100%; background: #1a1a2e; }

/* Sidebar header */
.sidebar-header { padding: 16px 20px; background: linear-gradient(135deg, #0ea5e9, #6366f1); }
.sidebar-header h1 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.sidebar-header p { font-size: 12px; opacity: .8; margin-top: 4px; }

/* Category tabs */
.tabs { display: flex; border-bottom: 1px solid var(--surface2); background: var(--surface); }
.tab { flex: 1; padding: 10px 4px; text-align: center; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text2); transition: all .2s; }
.tab:hover { color: var(--text); background: var(--surface2); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Layer list */
.layer-list { flex: 1; overflow-y: auto; padding: 8px; }
.layer-list::-webkit-scrollbar { width: 4px; }
.layer-list::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

.layer-card { background: var(--surface2); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 6px; cursor: pointer; transition: all .2s; border: 1px solid transparent; position: relative; }
.layer-card:hover { border-color: var(--accent); transform: translateX(2px); }
.layer-card.active { border-color: var(--accent); background: rgba(56,189,248,.1); }
.layer-card.loading { opacity: .6; pointer-events: none; }

.layer-top { display: flex; align-items: center; gap: 10px; }
.layer-icon { font-size: 20px; width: 32px; text-align: center; flex-shrink: 0; }
.layer-info { flex: 1; min-width: 0; }
.layer-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.layer-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
.layer-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; flex-shrink: 0; }

.layer-desc { font-size: 11px; color: var(--text2); margin-top: 6px; line-height: 1.5; display: none; }
.layer-card.active .layer-desc { display: block; }

/* Status bar */
.status-bar { padding: 10px 16px; border-top: 1px solid var(--surface2); font-size: 11px; color: var(--text2); display: flex; justify-content: space-between; background: var(--surface); }

/* Map overlay info */
.map-info { position: absolute; top: 12px; right: 12px; background: rgba(15,23,42,.92); backdrop-filter: blur(8px); border-radius: var(--radius); padding: 14px 18px; z-index: 999; max-width: 320px; border: 1px solid var(--surface2); display: none; }
.map-info.show { display: block; animation: fadeIn .3s; }
.map-info h3 { font-size: 14px; margin-bottom: 6px; color: var(--accent); }
.map-info p { font-size: 12px; color: var(--text2); line-height: 1.6; }
.map-info .close { position: absolute; top: 8px; right: 10px; background: none; border: none; color: var(--text2); cursor: pointer; font-size: 16px; }

/* Legend */
.map-legend { position: absolute; bottom: 16px; right: 12px; background: rgba(15,23,42,.88); backdrop-filter: blur(8px); border-radius: var(--radius); padding: 10px 14px; z-index: 999; font-size: 11px; border: 1px solid var(--surface2); }
.legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.legend-swatch { width: 16px; height: 4px; border-radius: 2px; }

/* Zoom hint */
.zoom-hint { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); background: rgba(15,23,42,.8); padding: 6px 16px; border-radius: 20px; font-size: 12px; color: var(--text2); z-index: 999; pointer-events: none; transition: opacity .5s; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
@media (max-width: 768px) { .sidebar { width: 280px; } }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>🌏 K12 空间资产浏览器</h1>

    </div>
    <div class="tabs" id="tabs"></div>
    <div class="layer-list" id="layerList"></div>
    <div class="status-bar">
      <span id="statusText">就绪</span>
      <span id="layerCount">0 个图层已加载</span>
    </div>
  </div>

  <!-- Map -->
  <div class="map-wrap">
    <div id="map"></div>
    <div class="map-info" id="mapInfo">
      <button class="close" onclick="document.getElementById('mapInfo').classList.remove('show')">✕</button>
      <h3 id="infoTitle"></h3>
      <p id="infoContent"></p>
    </div>
    <div class="map-legend" id="mapLegend" style="display:none"></div>
    <div class="zoom-hint" id="zoomHint">滚轮缩放 · 拖拽平移 · 点击图层</div>
  </div>
</div>

// ============================================================
// App State
// ============================================================
let map, activeLayers = {}, activeTab = 'terrain', loadedCount = 0;
const BASE = 'geography/hillshade/global-color-hillshade-4k.jpg';

// ============================================================
// Initialize Map
// ============================================================
function initMap() {
  // 使用 EPSG:4326（等距圆柱投影），与 hillshade 图片投影一致
  // GeoJSON (WGS84) 也是 4326，三者统一，无变形
  map = L.map('map', {
    crs: L.CRS.EPSG4326,
    center: [35, 105], zoom: 3, minZoom: 1, maxZoom: 10,
    zoomControl: false, attributionControl: false,
    maxBounds: [[-90, -240], [90, 240]],
    maxBoundsViscosity: 0.8
  });
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  L.control.attribution({ position: 'bottomleft', prefix: false })
    .addAttribution('数据: <a href="https://naturalearthdata.com">Natural Earth</a> · <a href="https://chgis.fas.harvard.edu">CHGIS V6</a>')
    .addTo(map);

  // Hillshade 底图（EPSG:4326 等距圆柱，与 CRS 匹配，无变形）
  const bounds = [[-90, -180], [90, 180]];
  L.imageOverlay(BASE, bounds, { opacity: 1, className: 'hillshade-base' }).addTo(map);

  // Fade zoom hint
  setTimeout(() => { const h = document.getElementById('zoomHint'); if(h) h.style.opacity = '0'; }, 4000);
}

// ============================================================
// Render UI
// ============================================================
function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = CATEGORIES.map(c =>
    `<div class="tab${c.id===activeTab?' active':''}" onclick="switchTab('${c.id}')">${c.label}</div>`
  ).join('');
}

function switchTab(catId) {
  activeTab = catId;
  renderTabs();
  renderLayers();
}

function renderLayers() {
  const el = document.getElementById('layerList');
  const items = LAYERS.filter(l => l.cat === activeTab);
  el.innerHTML = items.map(l => {
    const isActive = !!activeLayers[l.id];
    return `<div class="layer-card${isActive?' active':''}" id="card-${l.id}" onclick="toggleLayer('${l.id}')">
      <div class="layer-top">
        <span class="layer-icon">${l.icon}</span>
        <div class="layer-info">
          <div class="layer-name">${l.name}</div>
          <div class="layer-meta">${l.size} · ${l.features?l.features+' features · ':''}${l.source}</div>
        </div>
        <span class="layer-badge" style="background:${l.badgeColor||'#475569'}; color:#fff">${l.badge||l.cat}</span>
      </div>
      <div class="layer-desc">${l.desc}<br><span style="color:#64748b">许可证: ${l.license}</span></div>
    </div>`;
  }).join('');
}

// ============================================================
// Toggle Layer
// ============================================================
async function toggleLayer(id) {
  const layer = LAYERS.find(l => l.id === id);
  if (!layer) return;

  if (activeLayers[id]) {
    // Remove
    map.removeLayer(activeLayers[id]);
    delete activeLayers[id];
    loadedCount--;
    updateStatus(`已移除: ${layer.name}`);
  } else {
    // Load
    const card = document.getElementById('card-' + id);
    if (card) card.classList.add('loading');
    updateStatus(`加载中: ${layer.name}...`);

    try {
      if (layer.type === 'image') {
        await loadImageLayer(layer);
      } else {
        await loadGeoJSONLayer(layer);
      }
      loadedCount++;
      updateStatus(`已加载: ${layer.name}`);
    } catch (e) {
      updateStatus(`❌ 加载失败: ${layer.name} (${e.message})`);
      console.error(e);
    }
    if (card) card.classList.remove('loading');
  }

  renderLayers();
  document.getElementById('layerCount').textContent = `${loadedCount} 个图层已加载`;
  updateLegend();
}

async function loadImageLayer(layer) {
  const bounds = [[-90, -180], [90, 180]];
  // Remove existing hillshade base first
  map.eachLayer(l => { if (l instanceof L.ImageOverlay) map.removeLayer(l); });
  const overlay = L.imageOverlay(layer.path, bounds, { opacity: 1 }).addTo(map);
  activeLayers[layer.id] = overlay;
  // Remove other image layers from active
  LAYERS.filter(l => l.type === 'image' && l.id !== layer.id).forEach(l => {
    if (activeLayers[l.id]) { delete activeLayers[l.id]; loadedCount--; }
  });
}

async function loadGeoJSONLayer(layer) {
  const res = await fetch(layer.path);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();

  let leafletLayer;
  if (layer.type === 'point') {
    leafletLayer = L.geoJSON(data, {
      pointToLayer: (f, ll) => L.circleMarker(ll, layer.style),
      onEachFeature: (f, l) => bindPopup(f, l, layer)
    }).addTo(map);
  } else {
    leafletLayer = L.geoJSON(data, {
      style: () => layer.style,
      onEachFeature: (f, l) => bindPopup(f, l, layer)
    }).addTo(map);
  }

  activeLayers[layer.id] = leafletLayer;

  // Fit bounds
  if (layer.center) {
    map.setView(layer.center, layer.zoom || 8);
  } else if (layer.fitBounds) {
    map.fitBounds(layer.fitBounds);
  } else {
    try { map.fitBounds(leafletLayer.getBounds().pad(0.1)); } catch {}
  }
}

function bindPopup(feature, leafletLayer, layerDef) {
  const p = feature.properties || {};
  const name = p.name || p.NAME || p.NAME_ZH || p.admin || p.ADMIN || p.name_zh || '';
  const extras = [];
  if (p.year) extras.push(`年份: ${p.year < 0 ? '前'+(-p.year)+'年' : p.year+'年'}`);
  if (p.dynasty) extras.push(`朝代: ${p.dynasty}`);
  if (p.sides) extras.push(`双方: ${Array.isArray(p.sides) ? p.sides.join(' vs ') : p.sides}`);
  if (p.result) extras.push(`结果: ${p.result}`);
  if (p.terrainFactor) extras.push(`地形: ${p.terrainFactor}`);
  if (p.type) extras.push(`类型: ${p.type}`);
  if (p.description) extras.push(p.description);

  const html = `<div style="max-width:220px">
    <strong style="font-size:13px">${name || '(无名称)'}</strong>
    ${extras.length ? '<div style="font-size:11px;color:#666;margin-top:4px;line-height:1.5">'+extras.join('<br>')+'</div>' : ''}
    <div style="font-size:10px;color:#999;margin-top:4px">数据源: ${layerDef.source}</div>
  </div>`;

  leafletLayer.bindPopup(html, { maxWidth: 260 });

  if (layerDef.type === 'point') {
    leafletLayer.on('mouseover', function() { this.openPopup(); });
  }
}

// ============================================================
// Legend & Status
// ============================================================
function updateLegend() {
  const el = document.getElementById('mapLegend');
  const active = Object.keys(activeLayers).map(id => LAYERS.find(l => l.id === id)).filter(Boolean).filter(l => l.type !== 'image');
  if (active.length === 0) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  el.innerHTML = '<div style="font-weight:600;margin-bottom:6px;font-size:12px">图例</div>' +
    active.map(l => {
      const c = l.style.color || l.style.fillColor || '#888';
      return `<div class="legend-item">
        <span class="legend-swatch" style="background:${c}; ${l.type==='point'?'width:8px;height:8px;border-radius:50%':''}"></span>
        <span>${l.name}</span>
      </div>`;
    }).join('');
}

function updateStatus(text) {
  document.getElementById('statusText').textContent = text;
}

loadedCount = 1;
document.getElementById('layerCount').textContent = '1 个图层已加载';
renderLayers();
</script>
