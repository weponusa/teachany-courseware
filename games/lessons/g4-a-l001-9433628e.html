<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>观潮互动挑战</title>
<style>
:root{--bg:#0f1022;--panel:#1b1d3d;--panel2:#242752;--gold:#e7c66b;--ink:#f8f0d8;--muted:#c4bddb;--line:rgba(231,198,107,.24);--ok:#62d99a;--no:#e98175}
*{box-sizing:border-box}html,body{margin:0}body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:radial-gradient(1000px 540px at 50% -10%,#34466f 0%,transparent 62%),radial-gradient(900px 520px at 100% 100%,#253d34 0%,transparent 55%),var(--bg);color:var(--ink);min-height:100vh}.stars{position:fixed;inset:0;pointer-events:none;opacity:.42}.wrap{position:relative;z-index:1;max-width:840px;margin:0 auto;padding:18px 16px 58px}.top{display:flex;align-items:center;gap:12px;margin-bottom:14px}.crest{width:48px;height:48px;border-radius:14px;overflow:hidden;border:1px solid var(--line);display:grid;place-items:center;padding:0;background:#111}.crest img{width:100%;height:100%;object-fit:cover;display:block}.title h1{font-size:19px;margin:0}.title p{margin:3px 0 0;font-size:12px;color:var(--muted)}.badge{margin-left:auto;font-size:12px;color:var(--gold);background:rgba(231,198,107,.1);border:1px solid var(--line);border-radius:999px;padding:6px 12px}.steps{display:flex;gap:6px;margin:0 0 16px}.step{flex:1;height:6px;border-radius:999px;background:rgba(255,255,255,.08)}.step.done{background:var(--gold)}.step.cur{background:linear-gradient(90deg,var(--gold),rgba(231,198,107,.2))}.card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 22px 56px rgba(0,0,0,.34)}.scene-tag{display:inline-block;font-size:12px;color:var(--gold);background:rgba(231,198,107,.1);border:1px solid var(--line);border-radius:999px;padding:5px 12px;margin-bottom:14px}.stage{position:relative;width:100%;aspect-ratio:16/10;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#111831;margin-bottom:15px}.stage img{width:100%;height:100%;object-fit:cover;display:block}.stage .loading{position:absolute;inset:0;display:grid;place-items:center;color:var(--muted);background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(0,0,0,.18));text-align:center;padding:20px}.story{font-size:15px;line-height:1.9;margin:0 0 12px}.story em{font-style:normal;color:var(--gold)}.qbox{margin-top:16px;padding-top:16px;border-top:1px dashed var(--line)}.q{font-size:18px;font-weight:800;line-height:1.65;margin:0 0 4px}.hint{font-size:12px;color:var(--muted);margin:0 0 12px}.opts{display:grid;gap:10px}.opt{text-align:left;font-size:14px;line-height:1.55;padding:14px 15px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--ink);cursor:pointer;font-family:inherit}.opt:hover{border-color:var(--gold);background:rgba(231,198,107,.08)}.opt.ok{border-color:var(--ok);background:rgba(98,217,154,.14);color:#c8f7df}.opt.no{border-color:var(--no);background:rgba(233,129,117,.14);color:#ffd0ca}.feedback{display:none;margin-top:14px;padding:14px 15px;border-radius:14px;font-size:13px;line-height:1.8;border:1px solid var(--line);background:rgba(231,198,107,.07)}.feedback.show{display:block}.nav{display:flex;gap:10px;margin-top:16px}button{font-family:inherit}.btn{flex:1;border:0;border-radius:14px;padding:13px;font-size:14px;font-weight:800;cursor:pointer}.btn-primary{background:linear-gradient(180deg,var(--gold),#bd9343);color:#241b08}.btn-primary:disabled{opacity:.45;cursor:default}.btn-ghost{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--line)}.end{text-align:center;padding:10px 0}.end h2{color:var(--gold);font-size:26px;margin:8px 0}.blurb{font-size:15px;line-height:1.9;color:var(--ink)}.create{margin-top:18px;text-align:left;border:1px solid var(--line);border-radius:18px;padding:16px;background:rgba(255,255,255,.05)}.create h3{margin:0 0 8px;color:var(--gold)}.create p{margin:0 0 12px;color:var(--muted);line-height:1.75;font-size:13px}.prompt-row{display:flex;gap:8px}.prompt-row input{flex:1;border:1px solid var(--line);border-radius:12px;background:rgba(0,0,0,.22);color:var(--ink);padding:12px;font:inherit}.image-box{display:none;margin-top:14px;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#111}.image-box img{display:block;width:100%;height:auto}.image-caption{padding:10px 12px;color:var(--muted);font-size:12px;line-height:1.6}@media(max-width:640px){.wrap{padding:12px 10px 42px}.card{padding:16px;border-radius:16px}.prompt-row{display:grid}}
.tts-btn{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;border:1.5px solid var(--gold);background:rgba(231,198,107,.12);color:var(--gold);cursor:pointer;font-size:16px;vertical-align:middle;margin-left:6px;transition:all .2s;flex-shrink:0}.tts-btn:hover{background:rgba(231,198,107,.25);transform:scale(1.1)}.tts-btn.playing{animation:tts-pulse 1s infinite;background:rgba(231,198,107,.3)}@keyframes tts-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
</style>
<link rel="icon" href="../../assets/teachany-icon.png" type="image/png">
</head>
<body>
<canvas class="stars" id="stars"></canvas>
<div class="wrap">
  <div class="top"><div class="crest"><img src="../../assets/teachany-icon.png" alt="TeachAny"></div><div class="title"><h1>观潮互动挑战</h1><p>4年级上册 · 故事闯关</p></div><span class="badge" id="scoreBadge">积分 0</span></div>
  <div class="steps" id="steps"></div>
  <div class="card" id="scene"></div>
</div>
<script>
const DATA={"item":{"kind":"lesson","grade":4,"volume":"上册","no":1,"title":"观潮","theme":"故事闯关","difficulty":"中年级","url":"games/lessons/g4-a-l001-9433628e.html"},"levels":[{"tag":"第 1 关 · 潮来前的宁静","img":"Children's picture book style illustration of a calm Qiantang River under misty sunlight, with a stone pagoda and pavilion standing on the riverbank, crowded people looking east, soft pastel colors, no text","story":"清晨的海塘大堤上人山人海，大家昂首东望。江面平静，笼罩着蒙蒙薄雾，远处的镇海古塔若隐若现。这是大潮来临前特有的宁静与期待。","q":"潮来前江面是什么样的？","opts":[{"t":"宽阔平静，笼罩薄雾","c":true},{"t":"波涛汹涌，浪花飞溅","c":false},{"t":"漆黑一片，伸手不见","c":false},{"t":"结冰封冻，白雪皑皑","c":false}],"hint":"回想第二段描写江面的句子。","fb":"正确！课文提到江面很平静，笼罩着蒙蒙薄雾。作者用平静的江面衬托即将而来的大潮，动静对比强烈。","image":"/assets/generated-scenes/9433628e-01-87eb1dc3d7.webp"},{"tag":"第 2 关 · 远处的白线","img":"Picture book style view of a distant river horizon showing a thin white line against blue water and sky, people tiptoeing to look, soft lighting, no text","story":"午后一点左右，响声如闷雷滚动。大家踮起脚尖向东望去，起初江面似乎没变化，但很快东边水天相接处出现了一条白线。","q":"潮水初来时，远处出现了什么景象？","opts":[{"t":"一条快速移来的白线","c":true},{"t":"一座巨大的海上城堡","c":false},{"t":"一群飞翔的海鸥群","c":false},{"t":"一道绚丽的彩虹桥","c":false}],"hint":"关注第三段中描写“白线”的部分。","fb":"正确！课文写道“只见东边水天相接的地方出现了一条白线”。这条白线是潮水由远及近的第一个显著标志。","image":"/assets/generated-scenes/9433628e-02-3554f1d37b.webp"},{"tag":"第 3 关 · 近处的水墙","img":"Dynamic children's book style close-up of a huge two-zhang high wall of white water crashing forward, splashing droplets, intense energy, no text","story":"白线逐渐拉长变粗，横贯江面。再近些，白浪翻滚，形成一堵两丈多高的水墙，气势磅礴，让人震撼不已。","q":"浪潮靠近时，形成了怎样的形态？","opts":[{"t":"一堵两丈多高的水墙","c":true},{"t":"一层薄薄的轻纱","c":false},{"t":"一颗颗细小的珍珠","c":false},{"t":"一排排整齐的栅栏","c":false}],"hint":"寻找第四段中关于“水墙”的描述。","fb":"正确！课文形容浪潮“形成一堵两丈多高的水墙”。这个比喻生动地写出了潮水的高度和力量感。","image":"/assets/generated-scenes/9433628e-03-8eb89fb391.webp"},{"tag":"第 4 关 · 万马奔腾之声","img":"Exciting picture book style illustration of thousands of white war horses galloping together towards the viewer, dust flying, thunderous expression, vibrant colors, no text","story":"浪潮越来越近，犹如千万匹白色战马齐头并进。那声音如同山崩地裂，好像大地都被震得颤动起来，真是壮观极了。","q":"作者把浪潮的声音比作什么？","opts":[{"t":"山崩地裂","c":true},{"t":"风吹树叶","c":false},{"t":"小鸟歌唱","c":false},{"t":"细雨沙沙","c":false}],"hint":"注意第四段中描写声音的词句。","fb":"正确！课文用“山崩地裂”形容潮声之大，极具感染力。这种夸张的手法突出了钱塘江大潮的雄伟气势。","image":"/assets/generated-scenes/9433628e-04-9e3c72ea0a.webp"},{"tag":"第 5 关 · 天下奇观之美","img":"Serene picture book style aftermath scene, river level slightly higher but calm, sunset glow on water, people slowly dispersing, peaceful atmosphere, no text","story":"潮头奔腾西去，余波漫天卷地。过了好久，钱塘江才恢复平静。看看堤下，江水已涨了两丈来高。这就是被称为“天下奇观”的钱塘江大潮。","q":"为什么说钱塘江大潮是“天下奇观”？","opts":[{"t":"气势雄伟，景象奇特","c":true},{"t":"水流缓慢，非常温柔","c":false},{"t":"只有冬天才能看到","c":false},{"t":"颜色五彩斑斓如彩虹","c":false}],"hint":"结合全文对潮水形态和声音的描写。","fb":"正确！大潮来时声音巨大、形态万千，去后余波尚存，其雄伟奇特的景象自古闻名，故称“天下奇观”。","image":"/assets/generated-scenes/9433628e-05-f0ccf2ec68.webp"}]};
let state={idx:0,score:0,answered:false};
const $=s=>document.querySelector(s), scene=$('#scene'), steps=$('#steps'), scoreBadge=$('#scoreBadge');
function hash(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return h}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function ttsSpeak(text,btn){
if(!window.speechSynthesis)return;
window.speechSynthesis.cancel();
document.querySelectorAll('.tts-btn.playing').forEach(b=>b.classList.remove('playing'));
const u=new SpeechSynthesisUtterance(text);
u.lang='zh-CN';u.rate=0.82;u.pitch=1.1;
const pick=()=>{const zh=speechSynthesis.getVoices().filter(v=>v.lang.startsWith('zh'));if(zh.length)u.voice=zh[0];};
pick();if(!speechSynthesis.getVoices().length)speechSynthesis.onvoiceschanged=pick;
if(btn){btn.classList.add('playing');u.onend=()=>btn.classList.remove('playing');u.onerror=()=>btn.classList.remove('playing')}
speechSynthesis.speak(u);
}



function onSceneImgError(img){
const loading=img.previousElementSibling;
const prompt=decodeURIComponent(img.dataset.fallbackPrompt||'')||'reading scene';
(async()=>{try{img.src=await agnesImage(prompt)}catch(e){if(loading)loading.textContent='插画加载失败，继续答题吧～'}})();
}

function renderSteps(){steps.innerHTML='';DATA.levels.forEach((_,i)=>{const d=document.createElement('div');d.className='step'+(i<state.idx?' done':'')+(i===state.idx?' cur':'');steps.appendChild(d)})}
function renderLevel(){renderSteps();scoreBadge.textContent='积分 '+state.score;state.answered=false;const lv=DATA.levels[state.idx];const hasImg=lv.image||lv.img;let imgHtml='';if(hasImg){const imgSrc=(lv.image||'').replace(/^\.\.\/\.\.\//,'/');imgHtml='<div class="stage"><div class="loading">正在打开阅读插画…</div><img alt="场景插画" src="'+imgSrc+'" data-img-prompt="'+encodeURIComponent(lv.img||'')+'" onerror="onSceneImgError(this)" onload="if(this.previousElementSibling)this.previousElementSibling.remove()"></div>';}scene.innerHTML=`<span class="scene-tag">${lv.tag}</span>${imgHtml}<p class="story"><button type="button" class="tts-btn" onclick="ttsSpeak(DATA.levels[state.idx].story,this)" title="听故事">🔊</button> ${lv.story}</p><div class="qbox"><p class="q"><button type="button" class="tts-btn" onclick="ttsSpeak(DATA.levels[state.idx].q,this)" title="听题目">🔊</button> ${lv.q}</p><p class="hint">${lv.hint}</p><div class="opts" id="opts"></div><div class="feedback" id="feedback"></div></div><div class="nav"><button class="btn btn-ghost" id="prevBtn" ${state.idx===0?'style="display:none"':''}>← 上一关</button><button class="btn btn-primary" id="nextBtn" disabled>${state.idx===DATA.levels.length-1?'查看结果 ✦':'下一关 →'}</button></div>`;const opts=$('#opts');shuffle(lv.opts.slice()).forEach(o=>{const b=document.createElement('button');b.className='opt';b.textContent=o.t;b.onclick=()=>answer(b,o,lv);opts.appendChild(b)});$('#nextBtn').onclick=()=>{state.idx===DATA.levels.length-1?showEnd():(state.idx++,renderLevel())};const prev=$('#prevBtn');if(prev)prev.onclick=()=>{state.idx--;renderLevel()}}
function answer(btn,opt,lv){if(state.answered)return;state.answered=true;document.querySelectorAll('.opt').forEach(b=>{const o=lv.opts.find(x=>x.t===b.textContent);if(o&&o.c)b.classList.add('ok');else if(b===btn)b.classList.add('no')});const fb=$('#feedback');fb.innerHTML=(opt.c?'🌟 ':'💡 ')+lv.fb;fb.classList.add('show');if(opt.c){state.score++;scoreBadge.textContent='积分 '+state.score}$('#nextBtn').disabled=false}
function showEnd(){renderSteps();document.querySelectorAll('.step').forEach(s=>s.classList.add('done'));const full=state.score===DATA.levels.length;scene.innerHTML=`<div class="end"><div style="font-size:46px">${full?'🏅':'📖'}</div><h2>${full?'阅读徽章到手':'闯关完成'}</h2><p class="blurb">你获得 <b style="color:var(--gold)">${state.score} / ${DATA.levels.length}</b> 分。真正的通关，是能带着文本证据说出自己的理解。</p><div class="create"><h3>最后的创作任务：把阅读变成一张图</h3><p>请写一段图像提示词，包含"谁、在哪里、做什么、画面颜色或心情"。写好后点击生成，看看你的阅读画面会变成什么样。</p><div class="prompt-row"><input id="imagePrompt" value="《观潮》中我最想画的一幕，写清楚谁在哪里做什么，儿童绘本风格，温暖光线"><button class="btn btn-primary" id="imageBtn">生成我的阅读插画</button></div><div class="image-box" id="imageBox"><img id="imageResult" alt="阅读插画"><div class="image-caption" id="imageCaption"></div></div></div><div class="nav"><button class="btn btn-ghost" id="againBtn">再玩一次</button></div></div>`;$('#againBtn').onclick=()=>{state={idx:0,score:0,answered:false};renderLevel()};$('#imageBtn').onclick=generateImage}
const AGNES_CFG={key:'sk-sizYW5qbTggzJ2liRgzJ9wj7IYGajALpUBtvzOfY86h1BqRE',base:'https://apihub.agnes-ai.com/v1',model:'agnes-image-2.1-flash'};
async function agnesImage(prompt){const finalPrompt=prompt+'，儿童绘本插画，温暖光线，适合小学生阅读分享，无文字';const r=await fetch(AGNES_CFG.base+'/images/generations',{method:'POST',headers:{Authorization:'Bearer '+AGNES_CFG.key,'Content-Type':'application/json'},body:JSON.stringify({model:AGNES_CFG.model,prompt:finalPrompt,n:1,size:'1024x1024'})});if(!r.ok)throw new Error('生图失败 '+r.status);const d=await r.json();const item=(d.data&&d.data[0])||{};if(item.url)return item.url;if(item.b64_json)return 'data:image/png;base64,'+item.b64_json;throw new Error('生图返回为空')}
async function generateImage(){const input=$('#imagePrompt');const prompt=(input.value||'').trim();if(!prompt){input.focus();return}const img=$('#imageResult'),box=$('#imageBox'),caption=$('#imageCaption'),btn=$('#imageBtn');box.style.display='block';caption.textContent='正在生成阅读插画…';btn.disabled=true;try{img.src=await agnesImage(prompt);caption.textContent='提示词：'+prompt}catch(e){caption.textContent='生图失败：'+e.message}finally{btn.disabled=false}}
(function stars(){const c=$('#stars'),x=c.getContext('2d');function rs(){c.width=innerWidth;c.height=innerHeight}rs();addEventListener('resize',rs);const st=[];for(let i=0;i<80;i++)st.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.4+.3,a:Math.random()});(function draw(){x.clearRect(0,0,c.width,c.height);st.forEach(s=>{s.a+=(Math.random()-.5)*.05;if(s.a<.1)s.a=.1;if(s.a>1)s.a=1;x.beginPath();x.arc(s.x,s.y,s.r,0,7);x.fillStyle='rgba(231,198,107,'+(s.a*.65)+')';x.fill()});requestAnimationFrame(draw)})()})();
renderLevel();
</script>
</body>
</html>
