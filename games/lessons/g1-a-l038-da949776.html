<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>语文园地八互动挑战</title>
<style>
:root{--bg:#0e1710;--panel:#19281d;--panel2:#203326;--gold:#e1bc62;--ink:#fff7e2;--muted:#c2cfb6;--line:rgba(225,188,98,.24);--ok:#62d99a;--no:#e98175}
*{box-sizing:border-box}html,body{margin:0}body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:radial-gradient(900px 520px at 50% -10%,#35523b 0%,transparent 62%),radial-gradient(900px 520px at 100% 100%,#2b3d2f 0%,transparent 55%),var(--bg);color:var(--ink);min-height:100vh}.stars{position:fixed;inset:0;pointer-events:none;opacity:.45}.wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:18px 16px 58px}.top{display:flex;align-items:center;gap:12px;margin-bottom:14px}.crest{width:48px;height:48px;border-radius:14px;overflow:hidden;border:1px solid var(--line);display:grid;place-items:center;padding:0;background:#111}.crest img{width:100%;height:100%;object-fit:cover;display:block}.title h1{font-size:19px;margin:0}.title p{margin:3px 0 0;font-size:12px;color:var(--muted)}.badge{margin-left:auto;font-size:12px;color:var(--gold);background:rgba(225,188,98,.1);border:1px solid var(--line);border-radius:999px;padding:6px 12px}.steps{display:flex;gap:6px;margin:0 0 16px}.step{flex:1;height:6px;border-radius:999px;background:rgba(255,255,255,.08)}.step.done{background:var(--gold)}.step.cur{background:linear-gradient(90deg,var(--gold),rgba(225,188,98,.2))}.card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 22px 56px rgba(0,0,0,.34)}.scene-tag{display:inline-block;font-size:12px;color:var(--gold);background:rgba(225,188,98,.1);border:1px solid var(--line);border-radius:999px;padding:5px 12px;margin-bottom:14px}.story{font-size:15px;line-height:1.9;margin:0 0 12px}.story em{font-style:normal;color:var(--gold)}.qbox{margin-top:16px;padding-top:16px;border-top:1px dashed var(--line)}.q{font-size:18px;font-weight:800;line-height:1.65;margin:0 0 4px}.hint{font-size:12px;color:var(--muted);margin:0 0 12px}.opts{display:grid;gap:10px}.opt{text-align:left;font-size:14px;line-height:1.55;padding:14px 15px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--ink);cursor:pointer;font-family:inherit}.opt:hover{border-color:var(--gold);background:rgba(225,188,98,.08)}.opt.ok{border-color:var(--ok);background:rgba(98,217,154,.14);color:#c8f7df}.opt.no{border-color:var(--no);background:rgba(233,129,117,.14);color:#ffd0ca}.feedback{display:none;margin-top:14px;padding:14px 15px;border-radius:14px;font-size:13px;line-height:1.8;border:1px solid var(--line);background:rgba(225,188,98,.07)}.feedback.show{display:block}.nav{display:flex;gap:10px;margin-top:16px}button{font-family:inherit}.btn{flex:1;border:0;border-radius:14px;padding:13px;font-size:14px;font-weight:800;cursor:pointer}.btn-primary{background:linear-gradient(180deg,var(--gold),#bd9343);color:#241b08}.btn-primary:disabled{opacity:.45;cursor:default}.btn-ghost{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--line)}.end{text-align:center;padding:10px 0}.end h2{color:var(--gold);font-size:26px;margin:8px 0}.blurb{font-size:15px;line-height:1.9;color:var(--ink)}.create{margin-top:18px;text-align:left;border:1px solid var(--line);border-radius:18px;padding:16px;background:rgba(255,255,255,.05)}.create h3{margin:0 0 8px;color:var(--gold)}.create p{margin:0 0 12px;color:var(--muted);line-height:1.75;font-size:13px}.prompt-row{display:flex;gap:8px}.prompt-row input{flex:1;border:1px solid var(--line);border-radius:12px;background:rgba(0,0,0,.22);color:var(--ink);padding:12px;font:inherit}.image-box{display:none;margin-top:14px;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#111}.image-box img{display:block;width:100%;height:auto}.image-caption{padding:10px 12px;color:var(--muted);font-size:12px;line-height:1.6}@media(max-width:640px){.wrap{padding:12px 10px 42px}.card{padding:16px;border-radius:16px}.prompt-row{display:grid}}
.tts-btn{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;border:1.5px solid var(--gold);background:rgba(231,198,107,.12);color:var(--gold);cursor:pointer;font-size:16px;vertical-align:middle;margin-left:6px;transition:all .2s;flex-shrink:0}.tts-btn:hover{background:rgba(231,198,107,.25);transform:scale(1.1)}.tts-btn.playing{animation:tts-pulse 1s infinite;background:rgba(231,198,107,.3)}@keyframes tts-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
</style>
<link rel="icon" href="../../assets/teachany-icon.png" type="image/png">
</head>
<body>
<canvas class="stars" id="stars"></canvas>
<div class="wrap">
  <div class="top"><div class="crest"><img src="../../assets/teachany-icon.png" alt="TeachAny"></div><div class="title"><h1>语文园地八互动挑战</h1><p>1年级上册 · 故事闯关</p></div><span class="badge" id="scoreBadge">积分 0</span></div>
  <div class="steps" id="steps"></div>
  <div class="card" id="scene"></div>
</div>
<script>
const DATA={"item": {"kind": "lesson", "grade": 1, "volume": "上册", "no": 38, "title": "语文园地八", "writing": "牛羊果白", "literacy": "牛羊爪旦拼音"}, "levels": [{"tag": "第 1 关 · 进入关卡", "story": "你现在是《语文园地八》的探险者。进入关卡前，要先给自己画一张阅读地图。", "q": "读《语文园地八》前，小读者先看什么最合适？", "hint": "先整体看，再进入细节。", "opts": [{"t": "看题目，想一想可能会讲什么", "c": true}, {"t": "先把所有生字抄三遍", "c": false}, {"t": "只看标题，不读内容", "c": false}, {"t": "直接猜作者想表达什么", "c": false}], "fb": "阅读闯关的第一步是抓住人物、事件和结果，先建立整体地图。"}, {"stage": "生字密码", "q": "下面哪组字最适合作为《语文园地八》的本课入口密码？", "hint": "从本课生字或关键词里找线索。", "opts": [{"t": "牛、羊、果", "c": true}, {"t": "羊、牛、白", "c": false}, {"t": "山、月、火", "c": false}, {"t": "猫、桥、云", "c": false}], "fb": "你找到了入口密码。把生字或关键词放进游戏，可以让阅读闯关和课文学习连在一起。"}, {"tag": "第 3 关 · 线索搜集", "story": "探险者发现了一条发光线索：牛。真正的答案不能只靠猜，要回到文本里找证据。", "q": "如果要把《语文园地八》做成剧情任务，哪种任务最适合放在这一关？", "hint": "阅读理解要有文本证据。", "opts": [{"t": "找出和“牛”最相关的句子或情节", "c": true}, {"t": "让同学背诵一段无关材料", "c": false}, {"t": "只统计全文一共有多少个标点", "c": false}, {"t": "跳过文本直接看答案", "c": false}], "fb": "好问题会把你带回文本。找到证据，理解才站得住。"}, {"tag": "第 4 关 · 句子显微镜", "story": "你遇到一张句子卡：文本片段。这张卡要求你不仅读懂字面意思，还要说出它写出了什么。", "q": "解释一个词句时，最稳的方法是什么？", "hint": "不要孤立解释，要看上下文。", "opts": [{"t": "联系上下文，说明它写出了什么画面或变化", "c": true}, {"t": "只查字典，不看句子", "c": false}, {"t": "用一个同义词替换就结束", "c": false}, {"t": "凭感觉选一个最像的答案", "c": false}], "fb": "词句理解要回到上下文，最好能说出画面、情绪或人物变化。"}, {"tag": "第 5 关 · 通关徽章", "story": "你已经走到《语文园地八》最后一关。通关不是只看分数，还要留下自己的阅读发现。", "q": "最值得留下的阅读成果是什么？", "hint": "想一想怎样证明自己真的读懂了。", "opts": [{"t": "能用一个文本细节说明自己的理解或启发", "c": true}, {"t": "记住页面用了什么颜色", "c": false}, {"t": "只知道自己得了几分", "c": false}, {"t": "把选项顺序背下来", "c": false}], "fb": "阅读游戏最终要回到表达：用细节支撑理解。"}], "theme": {"id": "adventure", "name": "故事闯关", "role": "探险者", "place": "关卡", "icon": "✦"}};
const TTS_ID='g1-a-l038-da949776';
let state={idx:0,score:0,answered:false};
const $=s=>document.querySelector(s), scene=$('#scene'), steps=$('#steps'), scoreBadge=$('#scoreBadge');
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}




function onSceneImgError(img){
const loading=img.previousElementSibling;
const prompt=decodeURIComponent(img.dataset.fallbackPrompt||'')||'reading scene';
(async()=>{try{img.src=await agnesImage(prompt)}catch(e){if(loading)loading.textContent='插画加载失败，继续答题吧～'}})();
}

let _ttsAudio=null;
function ttsPlay(kind,btn){
if(_ttsAudio){try{_ttsAudio.pause()}catch(e){}_ttsAudio=null;}
document.querySelectorAll('.tts-btn.playing').forEach(b=>b.classList.remove('playing'));
const a=new Audio('/assets/tts/g1/'+TTS_ID+'/'+state.idx+'-'+kind+'.mp3');
_ttsAudio=a;
if(btn){btn.classList.add('playing');const done=()=>{btn.classList.remove('playing');if(_ttsAudio===a)_ttsAudio=null};a.onended=done;a.onerror=done;}
a.play().catch(()=>{if(btn)btn.classList.remove('playing')});
}

function renderSteps(){steps.innerHTML='';DATA.levels.forEach((_,i)=>{const d=document.createElement('div');d.className='step'+(i<state.idx?' done':'')+(i===state.idx?' cur':'');steps.appendChild(d)})}
function renderLevel(){renderSteps();scoreBadge.textContent='积分 '+state.score;state.answered=false;const lv=DATA.levels[state.idx];scene.innerHTML=`<span class="scene-tag">${lv.tag}</span><p class="story"><button type="button" class="tts-btn" onclick="ttsPlay('story',this)" title="听故事">🔊</button> ${lv.story}</p><div class="qbox"><p class="q"><button type="button" class="tts-btn" onclick="ttsPlay('q',this)" title="听题目">🔊</button> ${lv.q}</p><p class="hint">${lv.hint}</p><div class="opts" id="opts"></div><div class="feedback" id="feedback"></div></div><div class="nav"><button class="btn btn-ghost" id="prevBtn" ${state.idx===0?'style="display:none"':''}>← 上一关</button><button class="btn btn-primary" id="nextBtn" disabled>${state.idx===DATA.levels.length-1?'查看结果 ✦':'下一关 →'}</button></div>`;const opts=$('#opts');shuffle(lv.opts.slice()).forEach(o=>{const b=document.createElement('button');b.className='opt';b.textContent=o.t;b.onclick=()=>answer(b,o,lv);opts.appendChild(b)});$('#nextBtn').onclick=()=>{state.idx===DATA.levels.length-1?showEnd():(state.idx++,renderLevel())};const prev=$('#prevBtn');if(prev)prev.onclick=()=>{state.idx--;renderLevel()}}
function answer(btn,opt,lv){if(state.answered)return;state.answered=true;document.querySelectorAll('.opt').forEach(b=>{const o=lv.opts.find(x=>x.t===b.textContent);if(o&&o.c)b.classList.add('ok');else if(b===btn)b.classList.add('no')});const fb=$('#feedback');fb.innerHTML=(opt.c?'🌟 ':'💡 ')+lv.fb;fb.classList.add('show');if(opt.c){state.score++;scoreBadge.textContent='积分 '+state.score}$('#nextBtn').disabled=false}
function showEnd(){renderSteps();document.querySelectorAll('.step').forEach(s=>s.classList.add('done'));const full=state.score===DATA.levels.length;scene.innerHTML=`<div class="end"><div style="font-size:46px">${full?'🏅':'📖'}</div><h2>${full?'阅读徽章到手':'闯关完成'}</h2><p class="blurb">你获得 <b style="color:var(--gold)">${state.score} / ${DATA.levels.length}</b> 分。真正的通关，是能带着文本证据说出自己的理解。</p><div class="create"><h3>最后的创作任务：把阅读变成一张图</h3><p>请写一段图像提示词，包含“谁、在哪里、做什么、画面颜色或心情”。写好后点击生成，看看你的阅读画面会变成什么样。</p><div class="prompt-row"><input id="imagePrompt" value="《语文园地八》中最打动我的画面，儿童绘本风格，温暖光线，细节丰富"><button class="btn btn-primary" id="imageBtn">生成我的阅读插画</button></div><div class="image-box" id="imageBox"><img id="imageResult" alt="阅读插画"><div class="image-caption" id="imageCaption"></div></div></div><div class="nav"><button class="btn btn-ghost" id="againBtn">再玩一次</button></div></div>`;$('#againBtn').onclick=()=>{state={idx:0,score:0,answered:false};renderLevel()};$('#imageBtn').onclick=generateImage}
const AGNES_CFG={key:'sk-sizYW5qbTggzJ2liRgzJ9wj7IYGajALpUBtvzOfY86h1BqRE',base:'https://apihub.agnes-ai.com/v1',model:'agnes-image-2.1-flash'};
async function agnesImage(prompt){const finalPrompt=prompt+'，儿童绘本插画，温暖光线，适合小学生阅读分享，无文字';const r=await fetch(AGNES_CFG.base+'/images/generations',{method:'POST',headers:{Authorization:'Bearer '+AGNES_CFG.key,'Content-Type':'application/json'},body:JSON.stringify({model:AGNES_CFG.model,prompt:finalPrompt,n:1,size:'1024x1024'})});if(!r.ok)throw new Error('生图失败 '+r.status);const d=await r.json();const item=(d.data&&d.data[0])||{};if(item.url)return item.url;if(item.b64_json)return 'data:image/png;base64,'+item.b64_json;throw new Error('生图返回为空')}
async function generateImage(){const input=$('#imagePrompt');const prompt=(input.value||'').trim();if(!prompt){input.focus();return}const img=$('#imageResult'),box=$('#imageBox'),caption=$('#imageCaption'),btn=$('#imageBtn');box.style.display='block';caption.textContent='正在生成阅读插画…';btn.disabled=true;try{img.src=await agnesImage(prompt);caption.textContent='提示词：'+prompt}catch(e){caption.textContent='生图失败：'+e.message}finally{btn.disabled=false}}
(function stars(){const c=$('#stars'),x=c.getContext('2d');function rs(){c.width=innerWidth;c.height=innerHeight}rs();addEventListener('resize',rs);const st=[];for(let i=0;i<80;i++)st.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.4+.3,a:Math.random()});(function draw(){x.clearRect(0,0,c.width,c.height);st.forEach(s=>{s.a+=(Math.random()-.5)*.05;if(s.a<.1)s.a=.1;if(s.a>1)s.a=1;x.beginPath();x.arc(s.x,s.y,s.r,0,7);x.fillStyle='rgba(225,188,98,'+(s.a*.65)+')';x.fill()});requestAnimationFrame(draw)})()})();
renderLevel();
</script>
</body>
</html>
